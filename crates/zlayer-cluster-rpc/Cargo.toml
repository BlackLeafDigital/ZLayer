[package]
name = "zlayer-cluster-rpc"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
rust-version.workspace = true
description = "gRPC client stubs, server traits, and prost message types for the ZLayer worker ↔ control-plane RPC surface (registration, server-streamed assignment delivery, bidirectional status heartbeats, and out-of-band command dispatch). mTLS-authenticated everywhere except the JWT-bootstrapped Register call. Generated from cluster.proto via tonic-prost-build."

[dependencies]
prost = "0.14.3"
prost-types = "0.14.3"
serde = { workspace = true, features = ["derive"] }
thiserror.workspace = true
tonic = { version = "0.14.5", features = ["tls-ring", "tls-webpki-roots", "transport", "router"] }
tonic-prost = "0.14.5"
zlayer-types.workspace = true

[lints]
workspace = true

[build-dependencies]
tonic-build = "0.14.5"
tonic-prost-build = "0.14.5"
