name: Bootstrap first admin
platform: web
variables:
  ADMIN_EMAIL: admin@e2e.local
  ADMIN_PASSWORD: e2e-test-password-1234
  ADMIN_DISPLAY: E2E Admin

steps:
  # Empty users table -> AuthGuard redirects "/" to "/bootstrap".
  - type: navigate
    value: /

  - type: wait
    target: { css: "#bs-email" }
    timeout: 15000

  - type: input
    target: { css: "#bs-email" }
    value: ${ADMIN_EMAIL}

  - type: input
    target: { css: "#bs-display-name" }
    value: ${ADMIN_DISPLAY}

  - type: input
    target: { css: "#bs-password" }
    value: ${ADMIN_PASSWORD}

  - type: input
    target: { css: "#bs-confirm" }
    value: ${ADMIN_PASSWORD}

  - type: tap
    target: { role: button, name: "Create admin account" }

  # Successful bootstrap lands on "/" with the dashboard shell loaded.
  - type: waitForSelector
    target: { role: heading }
    state: visible
    timeout: 15000

  - type: screenshot
    name: bootstrap-success.png
