      parameters:
      - description: Execution ID
        explode: false
        in: path
        name: execution_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JobExecutionResponse"
          description: Execution status
        "401":
          description: Unauthorized
        "404":
          description: Execution not found
      security:
      - bearer_auth: []
      summary: "GET /`api/v1/jobs/{execution_id}/status` - Get execution status"
      tags:
      - Jobs
  /api/v1/jobs/{name}/executions:
    get:
      description: |-
        Returns a list of recent executions for the specified job.

        # Errors

        Returns an error if authentication fails.
      operationId: list_job_executions
      parameters:
      - description: Job name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Maximum number of executions to return
        explode: true
        in: query
        name: limit
        required: false
        schema:
          minimum: 0
          type: integer
        style: form
      - description: "Filter by status (pending, running, completed, failed)"
        explode: true
        in: query
        name: status
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/JobExecutionResponse"
                type: array
          description: List of executions
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: "GET /api/v1/jobs/{name}/executions - List executions for a job"
      tags:
      - Jobs
  /api/v1/jobs/{name}/trigger:
    post:
      description: |-
        Starts a new execution of the specified job. Returns immediately with an
        execution ID that can be used to track the job's progress.

        # Errors

        Returns an error if the job is not found or triggering fails.
      operationId: trigger_job
      parameters:
      - description: Job name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerJobResponse"
          description: Job triggered successfully
        "401":
          description: Unauthorized
        "404":
          description: Job not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: "POST /api/v1/jobs/{name}/trigger - Trigger a job execution"
      tags:
      - Jobs
