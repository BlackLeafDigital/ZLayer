name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================
  # Check (fmt, clippy)
  # ===========================================
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

  # ===========================================
  # Check macOS (check, clippy)
  # Runs in parallel with Linux check to catch macOS-specific
  # compilation errors in #[cfg(target_os = "macos")] code
  # ===========================================
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Check compilation
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ===========================================
  # Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [check, check-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          nextest: true

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Run unit and integration tests
        run: |
          # Scheduler tests need test-skip-http feature
          cargo nextest run -p zlayer-scheduler --features test-skip-http
          # Run all other tests (unit + integration)
          cargo nextest run --workspace --exclude zlayer-scheduler

      - name: Run doc tests
        run: cargo test --workspace --doc

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

  # ===========================================
  # Test macOS
  # Runs unit and doc tests on macOS. Integration tests
  # requiring root/containers are auto-skipped via cfg(target_os).
  # ===========================================
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    needs: check-macos
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Run unit tests
        run: cargo test --workspace --lib --bins

      - name: Run doc tests
        run: cargo test --workspace --doc

  # ===========================================
  # Build Release (Linux) — sanity-check only.
  # The real multi-platform release build runs in build.yml,
  # dispatched by auto-tag below.
  # ===========================================
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [test, feature-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev cmake pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build release binary
        run: cargo build --release --package zlayer

      - name: Upload artifacts
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/zlayer
          retention-days: 7

  # ===========================================
  # Build Release (macOS ARM64) — sanity-check only.
  # The real multi-platform release build runs in build.yml,
  # dispatched by auto-tag below.
  # ===========================================
  build-macos:
    name: Build Release (macOS)
    runs-on: macos-latest
    needs: [test-macos]
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Build release binary
        run: cargo build --release --package zlayer

      - name: Upload artifacts
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: binaries-macos-arm64
          path: |
            target/release/zlayer
          retention-days: 7

  # ===========================================
  # Feature Matrix Tests
  # ===========================================
  feature-tests:
    name: Feature Tests
    runs-on: ubuntu-latest
    needs: [check, check-macos]
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--features full"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build with features
        run: cargo build --package zlayer ${{ matrix.features }}

      - name: Test with features
        run: cargo test --package zlayer ${{ matrix.features }}

  # ===========================================
  # Dispatch E2E (gate for the release chain)
  #
  # Runs on every successful check+test+feature-tests+sanity-build. On dev
  # pushes (without a `[np]` marker in the commit message), this job also
  # computes the next version and forwards it to e2e.yml, which in turn
  # dispatches build.yml on success. build.yml is responsible for
  # auto-tagging after the multi-platform build succeeds — the tag is
  # never created speculatively.
  #
  # - PR run:        dispatch e2e with version="" (sanity only, no release).
  # - Dev push:      dispatch e2e with computed version (starts release chain).
  # - [np] dev push: dispatch e2e with version="" (no release).
  # - Manual dispatch with inputs.version: forwarded verbatim.
  # ===========================================
  trigger-e2e:
    name: Trigger E2E
    runs-on: ubuntu-latest
    needs: [build, build-macos, feature-tests]
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Checkout (full history for tag lookup)
        if: ${{ github.ref == 'refs/heads/dev' && !contains(github.event.head_commit.message, '[np]') }}
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate next version
        id: resolve
        if: ${{ github.ref == 'refs/heads/dev' && !contains(github.event.head_commit.message, '[np]') }}
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          tag-prefix: v
          bump: patch

      - name: Determine version to forward
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            # Manual workflow_dispatch with an explicit version wins.
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ steps.resolve.outputs.version }}" ]]; then
            # Dev push without [np]: tag prefix + computed next version.
            echo "version=v${{ steps.resolve.outputs.version }}" >> $GITHUB_OUTPUT
          else
            # PR runs and [np] dev pushes: e2e still runs for signal, but
            # no build/tag/release chain fires.
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Trigger E2E workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/e2e.yml/dispatches" \
            -d '{"ref": "${{ github.ref }}", "inputs": {"version": "${{ steps.version.outputs.version }}", "sha": "${{ github.sha }}"}}'

  # ===========================================
  # Cache Cleanup
  # ===========================================
  cache-cleanup:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    needs: [build, build-macos, feature-tests]
    if: always()
    steps:
      - name: Cleanup old caches
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: cleanup
          max-age-days: '30'
          keep-latest: '5'
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
