name: Publish SDKs

# Dispatched by release.yml on general releases. Uses detect-changes with
# registry checks to skip SDKs that are already published at the target version.
# Covers the Python binding (zlayer-py), TypeScript API clients, and the
# WASM plugin SDKs (rust, python, typescript, go, c).
#
# Build strategy for zlayer-py: ONE abi3 wheel per platform. The crate uses
# pyo3's `abi3-py38` feature, so a single wheel per platform installs on
# every CPython >= 3.8. No Python-version matrix needed.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.10.104)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================
  # Detect which SDKs actually need publishing
  # ===========================================
  detect:
    runs-on: ubuntu-latest
    outputs:
      services-to-release: ${{ steps.detect.outputs.services-to-release }}
      services-to-release-flat: ${{ steps.detect.outputs.services-to-release-flat }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Detect changes
        id: detect
        uses: https://forge.blackleafdigital.com/Public/actions/detect-changes@main
        with:
          config-path: .forgejo/build-config.yaml
          check-registry: 'true'
          version: ${{ inputs.version }}
      # NB: we intentionally do NOT purge ci-status markers here. Re-dispatching
      # the same version should resume from whatever finished last time — not
      # wipe state and retry publishes that would then 409/conflict against
      # an already-published artifact. If markers ever genuinely need clearing,
      # do it manually via `ci-step-status` with `mode: purge-version`.

  # ===========================================
  # zlayer-py (Python binding) -> PyPI as `zlayer`
  # One abi3 wheel per platform (works on CPython >= 3.8).
  # ===========================================
  publish-py-binding-build-linux-x86_64:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/py-binding')
    name: Build wheel (linux-x86_64)
    runs-on: ubuntu-latest
    # Build inside the stock upstream manylinux image so the wheel picks up
    # the right glibc and a yum-provided libseccomp that the native linker
    # can resolve. No zigbuild, no cross-compilation.
    container: quay.io/pypa/manylinux_2_28_x86_64
    timeout-minutes: 30
    steps:
      - name: Bootstrap Node.js for actions (manylinux)
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          yum install -y nodejs

      - uses: actions/checkout@v4

      - name: Install system deps (yum, inside manylinux)
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          # AlmaLinux 8's `protobuf-devel` (a) lives in the CRB repo which
          # manylinux images don't enable, and (b) splits well-known .proto
          # files into a non-standard search path that protoc 3.x from the
          # RPM doesn't auto-include. Use the official protobuf release
          # below for protoc + the bundled well-known protos.
          packages: 'pkg-config openssl-devel libseccomp-devel clang-devel unzip'
          cross-platform: 'true'

      - name: Install protoc from official release
        shell: bash
        run: |
          set -euo pipefail
          # Pin to the latest protoc release; the zip bundles
          # `include/google/protobuf/*.proto` which protoc's default search
          # path (`<exe>/../include`) covers. That resolves the
          # `import "google/protobuf/timestamp.proto"` in cluster.proto
          # without any extra -I flags from build.rs.
          PROTOC_TAG=$(curl -sSL https://api.github.com/repos/protocolbuffers/protobuf/releases/latest | grep -oE '"tag_name":\s*"v[0-9.]+"' | grep -oE '[0-9.]+')
          if [ -z "${PROTOC_TAG}" ]; then
            echo "Failed to resolve latest protoc tag" >&2
            exit 1
          fi
          echo "Installing protoc v${PROTOC_TAG} (linux-x86_64)"
          curl -fsSL -o /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_TAG}/protoc-${PROTOC_TAG}-linux-x86_64.zip"
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc
          /usr/local/bin/protoc --version
          ls /usr/local/include/google/protobuf/timestamp.proto
          echo "PROTOC=/usr/local/bin/protoc" >> "${GITHUB_ENV}"

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Set pyproject version
        shell: bash
        working-directory: crates/zlayer-py
        run: |
          VERSION="${{ inputs.version }}"
          if grep -qE '^version = ' pyproject.toml; then
            sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          else
            sed -i "s/^dynamic = .*/version = \"${VERSION}\"/" pyproject.toml
          fi
          grep -E '^(version|dynamic) = ' pyproject.toml || true

      - name: Build wheel
        working-directory: crates/zlayer-py
        run: uvx maturin build --release --target x86_64-unknown-linux-gnu --manylinux 2_28 --out dist

      - uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: crates/zlayer-py/dist/*.whl
          retention-days: 7

  publish-py-binding-build-linux-aarch64:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/py-binding')
    name: Build wheel (linux-aarch64)
    # Native aarch64 self-hosted runner. No cross-compilation.
    runs-on: arm64
    container: quay.io/pypa/manylinux_2_28_aarch64
    timeout-minutes: 45
    steps:
      - name: Bootstrap Node.js for actions (manylinux)
        run: |
          curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
          yum install -y nodejs

      - uses: actions/checkout@v4

      - name: Install system deps (yum, inside manylinux)
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          # See the x86_64 job above for why we install protoc from the
          # official protobuf release rather than via `protobuf-devel`.
          packages: 'pkg-config openssl-devel libseccomp-devel clang-devel unzip'
          cross-platform: 'true'

      - name: Install protoc from official release
        shell: bash
        run: |
          set -euo pipefail
          PROTOC_TAG=$(curl -sSL https://api.github.com/repos/protocolbuffers/protobuf/releases/latest | grep -oE '"tag_name":\s*"v[0-9.]+"' | grep -oE '[0-9.]+')
          if [ -z "${PROTOC_TAG}" ]; then
            echo "Failed to resolve latest protoc tag" >&2
            exit 1
          fi
          echo "Installing protoc v${PROTOC_TAG} (linux-aarch_64)"
          curl -fsSL -o /tmp/protoc.zip "https://github.com/protocolbuffers/protobuf/releases/download/v${PROTOC_TAG}/protoc-${PROTOC_TAG}-linux-aarch_64.zip"
          unzip -o /tmp/protoc.zip -d /usr/local
          chmod +x /usr/local/bin/protoc
          /usr/local/bin/protoc --version
          ls /usr/local/include/google/protobuf/timestamp.proto
          echo "PROTOC=/usr/local/bin/protoc" >> "${GITHUB_ENV}"

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Set pyproject version
        shell: bash
        working-directory: crates/zlayer-py
        run: |
          VERSION="${{ inputs.version }}"
          if grep -qE '^version = ' pyproject.toml; then
            sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          else
            sed -i "s/^dynamic = .*/version = \"${VERSION}\"/" pyproject.toml
          fi

      - name: Build wheel
        working-directory: crates/zlayer-py
        run: uvx maturin build --release --target aarch64-unknown-linux-gnu --manylinux 2_28 --out dist

      - uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: wheels-linux-aarch64
          path: crates/zlayer-py/dist/*.whl
          retention-days: 7

  publish-py-binding-build-macos-x86_64:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/py-binding')
    name: Build wheel (macos-x86_64)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: x86_64-apple-darwin

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Set pyproject version
        shell: bash
        working-directory: crates/zlayer-py
        run: |
          VERSION="${{ inputs.version }}"
          if grep -qE '^version = ' pyproject.toml; then
            sed -i '' "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          else
            sed -i '' "s/^dynamic = .*/version = \"${VERSION}\"/" pyproject.toml
          fi

      - name: Build wheel
        working-directory: crates/zlayer-py
        env:
          MACOSX_DEPLOYMENT_TARGET: '10.13'
        run: uvx maturin build --release --target x86_64-apple-darwin --out dist

      - uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: wheels-macos-x86_64
          path: crates/zlayer-py/dist/*.whl
          retention-days: 7

  publish-py-binding-build-macos-aarch64:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/py-binding')
    name: Build wheel (macos-aarch64)
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install system deps
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Set pyproject version
        shell: bash
        working-directory: crates/zlayer-py
        run: |
          VERSION="${{ inputs.version }}"
          if grep -qE '^version = ' pyproject.toml; then
            sed -i '' "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          else
            sed -i '' "s/^dynamic = .*/version = \"${VERSION}\"/" pyproject.toml
          fi

      - name: Build wheel
        working-directory: crates/zlayer-py
        env:
          MACOSX_DEPLOYMENT_TARGET: '11.0'
        run: uvx maturin build --release --target aarch64-apple-darwin --out dist

      - uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: wheels-macos-aarch64
          path: crates/zlayer-py/dist/*.whl
          retention-days: 7

  publish-py-binding-build-windows-x86_64:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/py-binding')
    name: Build wheel (windows-x86_64)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      # MiniWindows runner runs as LocalSystem. Without Git Bash, every
      # `shell: bash` step below resolves to `wsl.exe bash` and fails with
      # `WSL_E_LOCAL_SYSTEM_NOT_SUPPORTED`. Same pattern `check-windows` /
      # `build-windows-amd64` use in `ci.yaml` / `build.yml`.
      - uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        with:
          python-version: '3.12'

      - name: Install protobuf
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'

      - name: Export PROTOC env
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV

      - name: Set pyproject version
        shell: bash
        working-directory: crates/zlayer-py
        run: |
          VERSION="${{ inputs.version }}"
          if grep -qE '^version = ' pyproject.toml; then
            sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          else
            sed -i "s/^dynamic = .*/version = \"${VERSION}\"/" pyproject.toml
          fi

      - name: Build wheel
        shell: bash
        working-directory: crates/zlayer-py
        run: uvx maturin build --release --out dist

      - uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: wheels-windows-x86_64
          path: crates/zlayer-py/dist/*.whl
          retention-days: 7

  publish-py-binding-build-sdist:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/py-binding')
    name: Build sdist
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      # `uvx maturin sdist` invokes `cargo metadata` to validate the workspace,
      # which makes rustup try to install the pinned toolchain into
      # /var/lib/forgejo-runner/.rustup. On this runner that dir is owned by
      # root and the job runs as a different user — perms blow up. setup-rust
      # drops rustup + cargo into the per-job HOME instead.
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main

      - name: Set pyproject version
        shell: bash
        working-directory: crates/zlayer-py
        run: |
          VERSION="${{ inputs.version }}"
          if grep -qE '^version = ' pyproject.toml; then
            sed -i "s/^version = .*/version = \"${VERSION}\"/" pyproject.toml
          else
            sed -i "s/^dynamic = .*/version = \"${VERSION}\"/" pyproject.toml
          fi

      - name: Build sdist
        working-directory: crates/zlayer-py
        run: uvx maturin sdist --out dist

      - uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: sdist
          path: crates/zlayer-py/dist/*.tar.gz
          retention-days: 7

  publish-py-binding:
    needs:
      - detect
      - publish-py-binding-build-linux-x86_64
      - publish-py-binding-build-linux-aarch64
      - publish-py-binding-build-macos-x86_64
      - publish-py-binding-build-macos-aarch64
      - publish-py-binding-build-windows-x86_64
      - publish-py-binding-build-sdist
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/py-binding')
    name: Publish to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-py-binding
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        if: steps.check.outputs.completed != 'true'

      - name: Download all wheel artifacts
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/download-artifacts@main
        with:
          path: dist
          merge-multiple: true

      - name: List collected distributions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          echo "=== dist/ ==="
          find dist -type f \( -name '*.whl' -o -name '*.tar.gz' \) | sort

      - name: Publish to PyPI
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
          TWINE_NON_INTERACTIVE: '1'
        run: uvx twine upload --skip-existing dist/*.whl dist/*.tar.gz

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-py-binding
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # TypeScript clients: @zlayer/api-client + @zlayer/client
  # ===========================================
  publish-ts-client:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/ts-client')
    name: Publish to npm
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-ts-client
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - uses: https://forge.blackleafdigital.com/Public/actions/setup-node@main
        if: steps.check.outputs.completed != 'true'
        with:
          node-version: '22'

      - name: Publish @zlayer/api-client (raw generated client)
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DIR="clients/typescript"
          if [ ! -f "${DIR}/package.json" ]; then
            echo "Skipping ${DIR}: no package.json found"
            exit 0
          fi
          cd "${DIR}"
          VERSION="${{ inputs.version }}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No build script; skipping build step"
          fi

          npm publish --access public || echo "npm publish failed or version already exists"

      - name: Publish @zlayer/client (façade)
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DIR="clients/typescript-client"
          if [ ! -f "${DIR}/package.json" ]; then
            echo "Skipping ${DIR}: no package.json found"
            exit 0
          fi
          cd "${DIR}"
          VERSION="${{ inputs.version }}"
          npm version "${VERSION}" --no-git-tag-version --allow-same-version

          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi

          if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.build ? 0 : 1)"; then
            npm run build
          else
            echo "No build script; skipping build step"
          fi

          npm publish --access public || echo "npm publish failed or version already exists"

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-ts-client
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # WASM Plugin SDKs
  # ===========================================
  publish-plugin-sdk-rust:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/plugin-sdk-rust')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        if: steps.check.outputs.completed != 'true'
      - name: Check and publish
        if: steps.check.outputs.completed != 'true'
        working-directory: clients/zlayer-sdk/rust
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          set -uo pipefail
          INPUT_VERSION="${{ inputs.version }}"
          echo "Setting zlayer-sdk version to ${INPUT_VERSION}..."
          sed -i "s/^version = .*/version = \"${INPUT_VERSION}\"/" Cargo.toml
          echo "Publishing rust-sdk ${INPUT_VERSION}..."
          # Try publish; if crates.io says this exact version is already there
          # (e.g. a prior run published but the ci-step-status marker didn't
          # land), treat as success. Any OTHER error is still fatal. cargo
          # doesn't have a `--skip-existing` flag, so we pattern-match stderr.
          if cargo publish --allow-dirty 2>&1 | tee /tmp/rust-sdk-publish.log; then
            echo "Published rust-sdk ${INPUT_VERSION}"
          elif grep -q "already exists on crates.io index" /tmp/rust-sdk-publish.log; then
            echo "rust-sdk ${INPUT_VERSION} already on crates.io — treating as success"
          else
            echo "cargo publish failed for a reason other than 'already exists'"
            exit 1
          fi
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-rust
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-plugin-sdk-python:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/plugin-sdk-python')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-python@main
        if: steps.check.outputs.completed != 'true'
      - name: Check and publish
        if: steps.check.outputs.completed != 'true'
        working-directory: clients/zlayer-sdk/python
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          LATEST_TAG=$(git tag -l "py-sdk-v*" | grep -oP '\d+\.\d+\.\d+' | sort -V | tail -n1 || echo "0.0.0")
          if [[ "$LATEST_TAG" == "" ]] || [[ "$(printf '%s\n' "$INPUT_VERSION" "$LATEST_TAG" | sort -V | head -n1)" != "$INPUT_VERSION" ]]; then
            echo "Publishing python-sdk..."
            sed -i "s/^version = .*/version = \"$INPUT_VERSION\"/" pyproject.toml
            sed -i "s/__version__ = .*/__version__ = \"$INPUT_VERSION\"/" zlayer/__init__.py
            uvx --from build pyproject-build
            uvx twine upload --skip-existing dist/* || echo "May already exist"
          else
            echo "Skipping python-sdk (already at or above $INPUT_VERSION)"
          fi
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-python
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  publish-plugin-sdk-typescript:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/plugin-sdk-typescript')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-typescript
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-node@main
        if: steps.check.outputs.completed != 'true'
        with:
          node-version: '22'
      - name: Check and publish
        if: steps.check.outputs.completed != 'true'
        working-directory: clients/zlayer-sdk/typescript
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          INPUT_VERSION="${{ inputs.version }}"
          LATEST_TAG=$(git tag -l "ts-sdk-v*" | grep -oP '\d+\.\d+\.\d+' | sort -V | tail -n1 || echo "0.0.0")
          if [[ "$LATEST_TAG" == "" ]] || [[ "$(printf '%s\n' "$INPUT_VERSION" "$LATEST_TAG" | sort -V | head -n1)" != "$INPUT_VERSION" ]]; then
            echo "Publishing typescript-sdk..."
            npm version "$INPUT_VERSION" --no-git-tag-version
            npm ci
            npm run build
            npm publish --access public || echo "May already exist"
          else
            echo "Skipping typescript-sdk (already at or above $INPUT_VERSION)"
          fi
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-typescript
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # Go modules publish via git tags matching the module subpath. Tagging
  # `clients/zlayer-sdk/go/v<VERSION>` lets consumers `go get` it at
  # `github.com/BlackLeafDigital/ZLayer/clients/zlayer-sdk/go@v<VERSION>`.
  publish-plugin-sdk-go:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/plugin-sdk-go')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-go
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-go@main
        if: steps.check.outputs.completed != 'true'
        with:
          go-version: '1.24'
      - name: Verify Go module
        if: steps.check.outputs.completed != 'true'
        working-directory: clients/zlayer-sdk/go
        run: go mod verify
      - name: Tag and push Go SDK release
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          TAG="clients/zlayer-sdk/go/v${{ inputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — skipping."
            exit 0
          fi
          git config user.name "Forgejo CI"
          git config user.email "ci@forge.blackleafdigital.com"
          git tag -a "${TAG}" -m "zlayer-sdk-go ${{ inputs.version }}"
          git push origin "${TAG}"

      # Forgejo→GitHub mirror is disabled; push the subpath tag explicitly
      # with a narrow refspec so `go get github.com/BlackLeafDigital/ZLayer/...`
      # resolves. NEVER use --mirror / --all / refs/*:refs/*.
      - name: Push go-sdk tag to GitHub
        if: steps.check.outputs.completed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          TAG="clients/zlayer-sdk/go/v${{ inputs.version }}"
          git remote remove github 2>/dev/null || true
          git remote add github "https://x-access-token:${GH_TOKEN}@github.com/BlackLeafDigital/ZLayer.git"
          git push github "refs/tags/${TAG}:refs/tags/${TAG}"
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-go
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # OpenAPI Go client publish (mirrors publish-plugin-sdk-go pattern).
  # The committed `clients/go/` tree carries `0.0.0-dev` as a sentinel
  # `packageVersion` (baked into UserAgent + README headers by openapi-generator);
  # this job seds it to the real `inputs.version`, makes a one-off commit on
  # detached HEAD, tags `clients/go/v<VERSION>` against that stamped commit,
  # and pushes only the tag (Forgejo + GitHub mirror). The branch never moves;
  # `go get github.com/BlackLeafDigital/ZLayer/clients/go@v<VERSION>` resolves
  # the tag directly so the consumer-visible UserAgent string carries the real
  # release version, not the dev sentinel.
  publish-openapi-go:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/openapi-go')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-openapi-go
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-go@main
        if: steps.check.outputs.completed != 'true'
        with:
          go-version: '1.24'
      - name: Verify Go module
        if: steps.check.outputs.completed != 'true'
        working-directory: clients/go
        run: go mod verify
      - name: Stamp version into committed sources
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          VER='${{ inputs.version }}'
          # Limit substitution to the openapi-go tree so we never touch unrelated
          # `0.0.0-dev` strings elsewhere in the repo. Also normalize any
          # leftover OpenAPI Generator placeholders — `gitUserId`/`gitRepoId`
          # additional-properties don't fully substitute into test/*.go and
          # docs/*.md when gitRepoId contains a slash; fix them here so the
          # publish never depends on hand-editing after a regen.
          find clients/go -type f \( -name '*.go' -o -name '*.md' \) -exec sed -i \
            -e "s|0\\.0\\.0-dev|${VER}|g" \
            -e 's|github.com/GIT_USER_ID/GIT_REPO_ID/zlayer|github.com/BlackLeafDigital/ZLayer/clients/go|g' \
            -e 's|github.com/BlackLeafDigital/ZLayer/clients/go/zlayer|github.com/BlackLeafDigital/ZLayer/clients/go|g' \
            {} +
          # OpenAPI Generator's `test/*_test.go` files self-import the module
          # path (`openapiclient "github.com/BlackLeafDigital/ZLayer/clients/go"`),
          # which Go rejects as "no required module provides package …" when the
          # tests live INSIDE the module they're testing. The generated tests
          # are pure boilerplate (`assert.NotNil(apiClient)` shells); strip them
          # so `go vet ./...` and downstream consumers can compile the module.
          rm -rf clients/go/test
          # Sanity: confirm the stamp actually landed in UserAgent.
          grep -q "OpenAPI-Generator/${VER}/go" clients/go/configuration.go
          # Build to catch any syntax fallout from the substitution.
          (cd clients/go && go vet ./...)
      - name: Tag and push OpenAPI Go release
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          TAG="clients/go/v${{ inputs.version }}"
          if git rev-parse -q --verify "refs/tags/${TAG}" >/dev/null; then
            echo "Tag ${TAG} already exists — skipping."
            exit 0
          fi
          git config user.name "Forgejo CI"
          git config user.email "ci@forge.blackleafdigital.com"
          # Commit the stamped tree on detached HEAD; tag references this commit
          # only — never pushed to a branch.
          git add clients/go
          git commit -m "openapi-go: stamp v${{ inputs.version }}"
          git tag -a "${TAG}" -m "openapi-go ${{ inputs.version }}"
          # Push only the tag. The stamped commit lives solely as the tag's target.
          git push origin "refs/tags/${TAG}"
      - name: Push openapi-go tag to GitHub
        if: steps.check.outputs.completed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          TAG="clients/go/v${{ inputs.version }}"
          git remote remove github 2>/dev/null || true
          git remote add github "https://x-access-token:${GH_TOKEN}@github.com/BlackLeafDigital/ZLayer.git"
          git push github "refs/tags/${TAG}:refs/tags/${TAG}"
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-openapi-go
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # C SDK is shipped as a source tarball uploaded to Forgejo generic
  # packages. Consumers download, extract, and build with cmake themselves.
  publish-plugin-sdk-c:
    needs: [detect]
    if: contains(fromJson(needs.detect.outputs.services-to-release-flat), 'sdks/plugin-sdk-c')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-c
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Install build dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'cmake build-essential'
      - name: Install WASI SDK
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-wasi-sdk@main
      - name: Verify C SDK builds
        if: steps.check.outputs.completed != 'true'
        working-directory: clients/zlayer-sdk/c
        # The SDK targets wasm32-wasip2; use the WASI-SDK toolchain file so
        # cmake configures clang with the right sysroot instead of the host
        # compiler.
        run: |
          cmake -B build -DCMAKE_TOOLCHAIN_FILE="${WASI_SDK_PREFIX}/share/cmake/wasi-sdk.cmake"
          cmake --build build
      - name: Package C SDK tarball
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TARBALL="zlayer-sdk-c-v${VERSION}.tar.gz"
          # Tarball excludes the build directory so consumers get clean sources.
          tar --exclude='./build' -czf "${TARBALL}" -C clients/zlayer-sdk/c .
          echo "Packaged ${TARBALL} ($(stat -c%s "${TARBALL}") bytes)"
      - name: Upload C SDK tarball to Forgejo Packages
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          TARBALL="zlayer-sdk-c-v${VERSION}.tar.gz"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer-sdk-c/${VERSION}/${TARBALL}"
          local_size=$(stat -c%s "${TARBALL}")
          # Version-pinned artifacts are immutable. Forgejo's generic-packages
          # endpoint rejects HEAD with HTTP 405 (allow: GET, PUT, DELETE), so
          # `curl -sI` returns empty headers and the size-check falls through →
          # PUT → 409. Use a tiny ranged GET instead: 200/206 = file exists,
          # 404 = doesn't.
          http_code=$(curl -s -o /dev/null -w "%{http_code}" \
            --request GET --range 0-0 --max-time 30 --connect-timeout 10 \
            --user "${AUTH}" "${URL}" 2>/dev/null || echo "000")
          if [ "${http_code}" = "200" ] || [ "${http_code}" = "206" ]; then
            echo "= Skipping ${TARBALL} (already uploaded at ${URL}, HTTP ${http_code}, ${local_size} bytes local)"
            exit 0
          fi
          echo "Uploading ${TARBALL} (${local_size} bytes)..."
          curl --fail --max-time 600 --connect-timeout 30 --retry 3 --retry-delay 10 \
            --user "${AUTH}" \
            --upload-file "${TARBALL}" \
            "${URL}"
          echo "OK ${TARBALL} uploaded"
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version }}
          step: publish-plugin-sdk-c
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
