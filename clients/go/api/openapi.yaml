              schema:
                $ref: "#/components/schemas/ServiceDetails"
          description: Service details
        "401":
          description: Unauthorized
        "404":
          description: Service not found
      security:
      - bearer_auth: []
      summary: Get service details.
      tags:
      - Services
  /api/v1/deployments/{deployment}/services/{service}/logs:
    get:
      description: |-
        Returns service logs as plain text when `follow=false`, or as a Server-Sent
        Events stream when `follow=true`.  In follow mode the server first emits the
        last N lines (controlled by the `lines` parameter) and then continuously
        polls for new output, emitting each new line as a `data:` SSE event.

        # Errors

        Returns an error if the deployment or service is not found, or the service
        manager is not available.
      operationId: get_service_logs
      parameters:
      - description: Deployment name
        explode: false
        in: path
        name: deployment
        required: true
        schema:
          type: string
        style: simple
      - description: Service name
        explode: false
        in: path
        name: service
        required: true
        schema:
          type: string
        style: simple
      - description: Number of lines to return
        explode: true
        in: query
        name: lines
        required: false
        schema:
          format: int32
          minimum: 0
          type: integer
        style: form
      - description: Follow logs (streaming)
        explode: true
        in: query
        name: follow
        required: false
        schema:
          type: boolean
        style: form
      - description: Filter by container/instance
        explode: true
        in: query
        name: instance
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: Service logs (plain text or SSE stream)
        "401":
          description: Unauthorized
        "404":
          description: Service not found
      security:
      - bearer_auth: []
      summary: Get service logs.
      tags:
      - Services
