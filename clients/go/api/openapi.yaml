      operationId: update_network
      parameters:
      - description: Network name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema: {}
        required: true
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Network updated
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Network not found
      security:
      - bearer_auth: []
      summary: Update an existing network.
      tags:
      - Networks
  /api/v1/nodes:
    get:
      description: |-
        # Errors

        Returns an error if authentication fails.
      operationId: list_nodes
