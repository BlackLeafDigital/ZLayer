version: "1"

vars:
  REGISTRY: ghcr.io/blackleafdigital/zlayer

images:
  base:
    file: ZImagefile.base
    context: .
    tags:
      - "${REGISTRY}/base:latest"

  golang:
    file: ZImagefile.golang
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/golang:1.23"
      - "${REGISTRY}/golang:latest"

  rust:
    file: ZImagefile.rust
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/rust:latest"

  node:
    file: ZImagefile.node
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/node:22"
      - "${REGISTRY}/node:latest"

  python:
    file: ZImagefile.python
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/python:3.13"
      - "${REGISTRY}/python:latest"

  deno:
    file: ZImagefile.deno
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/deno:latest"

  bun:
    file: ZImagefile.bun
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/bun:latest"

  swift:
    file: ZImagefile.swift
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/swift:latest"

  zig:
    file: ZImagefile.zig
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/zig:latest"

  graalvm:
    file: ZImagefile.graalvm
    context: .
    depends_on: [base]
    tags:
      - "${REGISTRY}/graalvm:latest"

push:
  after_all: true
