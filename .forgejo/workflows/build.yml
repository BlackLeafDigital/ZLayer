name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for artifacts'
        required: true
        type: string
      sha:
        description: 'Commit SHA to build'
        required: false
        type: string
      force:
        description: 'Force rebuild even if artifacts exist'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  # Compile-time secret baked into release binaries by `option_env!` in the
  # zlayer-git reposync resolvers. Every `cargo build --release` step in this
  # workflow inherits this so the shipped binaries can HMAC-sign reposync
  # hint calls. If the repo secret is unset, this resolves to an empty string
  # — the Rust side must treat `Some("")` as absent. See follow-up.
  ZLAYER_REPOSYNC_HMAC_SECRET: ${{ secrets.ZLAYER_REPOSYNC_HMAC_SECRET }}

jobs:
  # ===========================================
  # Check if artifacts already exist for this version
  # ===========================================
  check-existing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      need_build: ${{ steps.check.outputs.need_build }}
      version: ${{ steps.normalize.outputs.version }}
      tag: ${{ steps.normalize.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
          sparse-checkout: scripts/check-existing-packages.sh
      - name: Normalize version
        id: normalize
        shell: bash
        run: |
          # Accept v0.11.01, 0.11, v0.11, 0.11.0-rc1, etc.
          # Cargo rejects leading zeros in components and requires X.Y.Z, so
          # strip the optional leading "v", split off any "-suffix", coerce
          # each numeric component through base-10 arithmetic to drop leading
          # zeros, default missing parts to 0, then re-assemble.
          RAW="${{ inputs.version }}"
          RAW="${RAW#v}"
          if [[ "$RAW" == *-* ]]; then
            CORE="${RAW%%-*}"
            SUFFIX="-${RAW#*-}"
          else
            CORE="$RAW"
            SUFFIX=""
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
          MAJOR=$((10#${MAJOR:-0}))
          MINOR=$((10#${MINOR:-0}))
          PATCH=$((10#${PATCH:-0}))
          VERSION="${MAJOR}.${MINOR}.${PATCH}${SUFFIX}"
          echo "Normalized '${{ inputs.version }}' -> ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
      - name: Check for existing release artifacts
        id: check
        shell: bash
        run: |
          VERSION="${{ steps.normalize.outputs.version }}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          chmod +x scripts/check-existing-packages.sh
          NEED_BUILD=$(./scripts/check-existing-packages.sh "$VERSION" "$AUTH" | tail -1)
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force rebuild requested"
            NEED_BUILD="true"
          fi
          echo "need_build=${NEED_BUILD}" >> $GITHUB_OUTPUT
      - name: Summary
        if: steps.check.outputs.need_build == 'false'
        run: |
          echo "## Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts already exist for version **${{ steps.normalize.outputs.version }}**." >> $GITHUB_STEP_SUMMARY
          echo "Use \`force: true\` to rebuild." >> $GITHUB_STEP_SUMMARY
      - name: Purge stale ci-status markers
        if: steps.check.outputs.need_build == 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: purge-version
          version: ${{ steps.normalize.outputs.version }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          keep-markers: ''
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Wave 1: Linux amd64 + macOS arm64 (2 parallel)
  # ===========================================
  build-linux-amd64:
    needs: [check-existing]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container: node:20-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          # libgpgme-dev / libassuan-dev / libgpg-error-dev are added so the
          # `zlayer-buildd` cgo build below links against the system gpgme
          # stack (buildah needs it for signed-image flows).
          packages: 'protobuf-compiler libseccomp-dev cmake build-essential pkg-config libssl-dev clang git libgpgme-dev libassuan-dev libgpg-error-dev'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --package zlayer --package zlayer-overlayd || cargo build --release --package zlayer --package zlayer-overlayd
      - name: Set up Go (for zlayer-buildd sidecar)
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build zlayer-buildd sidecar
        if: steps.check.outputs.completed != 'true'
        shell: bash
        working-directory: bin/zlayer-buildd
        # Cross-builds to `release/zlayer-buildd-linux-amd64`. Bundling this
        # binary alongside `zlayer` in the tarball makes the sidecar
        # auto-discoverable via `$PATH` (see
        # `backend/buildah_sidecar/discover.rs`), so `zlayer build` on any
        # CI runner that installed this tarball gets the native
        # `imagebuildah.BuildDockerfiles` path that handles distroless
        # WORKDIR correctly.
        run: |
          set -euo pipefail
          make release-amd64
          test -x release/zlayer-buildd-linux-amd64
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p completions
          "$CARGO_TARGET_DIR/release/zlayer" completions bash > completions/zlayer.bash
          "$CARGO_TARGET_DIR/release/zlayer" completions zsh > completions/_zlayer
          "$CARGO_TARGET_DIR/release/zlayer" completions fish > completions/zlayer.fish
          "$CARGO_TARGET_DIR/release/zlayer" completions powershell > completions/zlayer.ps1
          "$CARGO_TARGET_DIR/release/zlayer" completions elvish > completions/zlayer.elv
      - name: Package
        if: steps.check.outputs.completed != 'true'
        run: |
          cp -r completions "$CARGO_TARGET_DIR/release/completions"
          # Drop the buildd binary next to `zlayer` under its canonical name
          # so `discover()` finds it via `$PATH` after `install.sh` extracts
          # everything in the tarball into `/usr/local/bin/`.
          cp bin/zlayer-buildd/release/zlayer-buildd-linux-amd64 "$CARGO_TARGET_DIR/release/zlayer-buildd"
          chmod +x "$CARGO_TARGET_DIR/release/zlayer-buildd"
          # zlayer-overlayd (built above via --package zlayer-overlayd) is the
          # root-privileged overlay network daemon. `zlayer daemon install`
          # registers it as a service and looks for it next to the zlayer
          # binary, so ship it in the tarball for install.sh to stage.
          tar czf "zlayer-linux-amd64.tar.gz" -C "$CARGO_TARGET_DIR/release" zlayer zlayer-overlayd zlayer-buildd completions
      - name: Package completions (standalone)
        if: steps.check.outputs.completed != 'true'
        run: tar czf "zlayer-completions.tar.gz" completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-linux-amd64
          path: zlayer-linux-amd64.tar.gz
          retention-days: 1
      - name: Upload completions artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-completions
          path: zlayer-completions.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-linux-amd64.tar.gz zlayer-completions.tar.gz completions

  # Static-musl Linux amd64 build. The canonical build-linux-amd64 job above
  # links against glibc (node:20-bullseye -> glibc 2.31), which means the
  # resulting binary cannot run on Alpine/musl hosts and is unusable as the
  # /usr/local/bin/zlayer inside the WSL2 rootfs we ship (Alpine minirootfs
  # has musl libc; gcompat does not backport __isoc23_* and friends). This
  # sibling job produces a fully static musl binary via cross-rs, which the
  # build-rootfs job below consumes instead of the glibc tarball.
  #
  # cross-rs (https://github.com/cross-rs/cross) is a Cargo-based
  # cross-compiler driver. For --target x86_64-unknown-linux-musl it spawns
  # the cross/x86_64-unknown-linux-musl docker image, which carries musl libc
  # + a musl cross-toolchain. The image does NOT ship libseccomp (the dep
  # libcontainer/youki needs) for the musl sysroot — Ubuntu's libseccomp-dev
  # is glibc-flavored. Cross.toml's [target.x86_64-unknown-linux-musl]
  # pre-build builds libseccomp from source against x86_64-linux-musl-gcc and
  # installs it into the musl prefix so pkg-config + the linker pick it up.
  # All install activity happens INSIDE the cross-rs container — the host
  # GitRunner gets nothing apt-installed. We do NOT run this job inside a
  # container — cross needs to spawn its own docker images, so the host must
  # be a plain runner with docker.
  build-linux-amd64-musl:
    needs: [check-existing]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: x86_64-unknown-linux-musl
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-amd64-musl
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install cross
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          # cross-rs version is looked up at workflow-edit time via
          #   gh release list -R cross-rs/cross --limit 1
          # See https://github.com/cross-rs/cross/releases — bump when a
          # newer stable lands. Pinned via --locked --version so a fresh
          # release can't silently change cross behavior in CI.
          CROSS_VERSION="0.2.5"
          cargo install --locked --version "$CROSS_VERSION" cross
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build (musl static)
        if: steps.check.outputs.completed != 'true'
        shell: bash
        # Unset CARGO_TARGET_DIR for this step: cross writes outputs to
        # `target/<triple>/release/` relative to the workspace root, and
        # forcing a non-default CARGO_TARGET_DIR can confuse the
        # docker-mounted build. Locally on the runner the path remains
        # `./target/x86_64-unknown-linux-musl/release/zlayer`.
        run: |
          set -euo pipefail
          unset CARGO_TARGET_DIR
          cross build --release \
            --package zlayer \
            --features youki-runtime \
            --target x86_64-unknown-linux-musl
      - name: Verify binary is statically linked
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          BIN="target/x86_64-unknown-linux-musl/release/zlayer"
          file "$BIN"
          # cross-rs musl images produce statically-linked binaries (no
          # NEEDED libc entry). If `file` reports "dynamically linked"
          # something has regressed in the cross image and the artifact
          # would NOT run inside the Alpine rootfs we ship for WSL2.
          if file "$BIN" | grep -q 'dynamically linked'; then
            echo "::error::zlayer is dynamically linked, expected static musl"
            exit 1
          fi
      - name: Package
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # Musl tarball ships ONLY the binary — no completions/ subdir.
          # Shell completions are already published in the glibc tarball
          # and in the standalone zlayer-completions artifact. The
          # build-rootfs job extracts this tarball flat into
          # rootfs-stage/usr/local/bin/.
          tar czf "zlayer-linux-amd64-musl.tar.gz" \
            -C "target/x86_64-unknown-linux-musl/release" zlayer
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-linux-amd64-musl
          path: zlayer-linux-amd64-musl.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-amd64-musl
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf target zlayer-linux-amd64-musl.tar.gz

  build-macos-arm64:
    needs: [check-existing]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: aarch64-apple-darwin
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Ensure target installed
        if: steps.check.outputs.completed != 'true'
        run: rustup target add aarch64-apple-darwin
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Clean build state
        if: steps.check.outputs.completed != 'true'
        run: cargo clean
      - name: Install protobuf
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i '' "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --target aarch64-apple-darwin --package zlayer
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          # macos-latest runners on Forgejo are Apple Silicon, so the
          # aarch64-apple-darwin binary runs natively on the host.
          mkdir -p completions
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions bash > completions/zlayer.bash
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions zsh > completions/_zlayer
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions fish > completions/zlayer.fish
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions powershell > completions/zlayer.ps1
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions elvish > completions/zlayer.elv
      - name: Package
        if: steps.check.outputs.completed != 'true'
        run: |
          cp -r completions "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/completions"
          # COPYFILE_DISABLE stops bsdtar embedding AppleDouble ._* entries
          # (com.apple.provenance xattrs) in the tarball.
          COPYFILE_DISABLE=1 tar czf "zlayer-darwin-arm64.tar.gz" -C "$CARGO_TARGET_DIR/aarch64-apple-darwin/release" zlayer completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-darwin-arm64
          path: zlayer-darwin-arm64.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-darwin-arm64.tar.gz completions

  # Single consolidated Windows build. Prior to Phase F-7a the workflow shipped
  # two Windows variants: a "thin CLI" (--features wsl alone, proxied commands
  # to a daemon inside WSL2) and an HCS-runtime build. After F-7a the wsl
  # feature is a delegate runtime inside the HCS CompositeRuntime, not a
  # standalone backend, so the thin build is obsolete. This job builds the
  # hcs-runtime,wsl combo -- the feature set CI already validates in
  # .forgejo/workflows/ci.yaml -- and ships it as zlayer-windows-amd64.zip.
  # zlayer-windows-amd64-hcs.exe is also uploaded as a one-release compat
  # alias for any downstream consumer that pinned the old name; scheduled for
  # removal after the next release.
  build-windows-amd64:
    needs: [check-existing]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache-windows
      - name: Install Git Bash
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-windows-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install protobuf
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'
      - name: Export PROTOC env
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --package zlayer --no-default-features --features hcs-runtime,wsl
      - name: Smoke test (binary launches)
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: ./target/release/zlayer.exe --version
      - name: Test zlayer-hcs on Windows
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-hcs --no-fail-fast
      - name: Install 7zip
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: '7zip'
          cross-platform: 'true'
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p completions
          ./target/release/zlayer.exe completions bash > completions/zlayer.bash
          ./target/release/zlayer.exe completions zsh > completions/_zlayer
          ./target/release/zlayer.exe completions fish > completions/zlayer.fish
          ./target/release/zlayer.exe completions powershell > completions/zlayer.ps1
          ./target/release/zlayer.exe completions elvish > completions/zlayer.elv
      - name: Package
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: 7z a zlayer-windows-amd64.zip target/release/zlayer.exe completions
      - name: Stage -hcs.exe compat alias
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p hcs-artifact
          cp target/release/zlayer.exe hcs-artifact/zlayer-windows-amd64-hcs.exe
      - name: Upload artifact (primary)
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-windows-amd64
          path: zlayer-windows-amd64.zip
          retention-days: 1
      - name: Upload artifact (-hcs.exe compat alias)
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-windows-amd64-hcs
          path: hcs-artifact/zlayer-windows-amd64-hcs.exe
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-windows-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: rm -rf target hcs-artifact zlayer-windows-amd64.zip completions

  # ===========================================
  # Wave 2: Image build + macOS amd64 (2 parallel)
  # ===========================================
  image-build:
    name: Image Build (Pipeline)
    needs: [check-existing, build-linux-amd64]
    if: needs.check-existing.outputs.need_build == 'true'
    # Needs linux-amd64 for zlayer binary
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: image-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Install buildah
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'buildah'
          cross-platform: 'true'
      - name: Download zlayer
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/download-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-linux-amd64
      - name: Install zlayer
        if: steps.check.outputs.completed != 'true'
        run: tar xzf zlayer-linux-amd64.tar.gz && chmod +x zlayer && sudo mv zlayer /usr/local/bin/
      - name: Prepare zlayer binary for node image
        if: steps.check.outputs.completed != 'true'
        run: |
          mkdir -p target/release
          cp /usr/local/bin/zlayer target/release/zlayer
      - name: Build all images with pipeline
        if: steps.check.outputs.completed != 'true'
        run: |
          sudo zlayer pipeline \
            -f ZPipeline.yaml \
            --no-tui \
            --set VERSION=build-${{ github.run_id }} \
            --set REGISTRY=zlayer

      - name: Export images as OCI archives
        if: steps.check.outputs.completed != 'true'
        run: |
          for img in zlayer-node zlayer-web zlayer-manager; do
            echo "Exporting ${img}..."
            sudo buildah push zlayer/${img}:build-${{ github.run_id }} \
              oci-archive:${img}-oci.tar
          done

      - name: Upload image artifacts
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: container-images
          path: |
            zlayer-node-oci.tar
            zlayer-web-oci.tar
            zlayer-manager-oci.tar
          retention-days: 1

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: image-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Build the zlayer WSL2 rootfs tarball
  #
  # Produces zlayer-rootfs.tar.gz: an Alpine minirootfs with
  # iproute2/iptables/ca-certificates installed plus our Linux zlayer
  # binary at /usr/local/bin/zlayer. Used by the Windows agent's WSL2
  # delegate (`wsl --import zlayer ... zlayer-rootfs.tar.gz`) so a fresh
  # Windows host has a ready-made distro it can shell into for Linux
  # workloads. Published as both a Forgejo release asset and an OCI image
  # at forge.blackleafdigital.com/blackleafdigital/zlayer-rootfs by the
  # release workflow; this job only stages it.
  #
  # The Alpine minirootfs version is looked up at job-run time against
  # https://dl-cdn.alpinelinux.org/alpine/latest-stable/releases/x86_64/latest-releases.yaml
  # — never hardcoded, so a stale CI workflow can't silently pin an EOL
  # branch. apk.static (statically linked apk-tools) is downloaded from
  # the same Alpine mirror and used with `--root` to install packages
  # into the staging dir without requiring chroot/proot, since the
  # ubuntu-latest runner is x86_64 just like the target rootfs.
  build-rootfs:
    name: Build WSL2 rootfs
    # Consumes the musl-static artifact (build-linux-amd64-musl), NOT the
    # canonical glibc tarball: Alpine ships musl libc and gcompat does not
    # backport modern glibc symbols (__isoc23_*, etc.), so the glibc binary
    # would fail to start inside this rootfs at WSL2 boot. The musl binary
    # is fully static and runs on Alpine without any libc shim.
    needs: [check-existing, build-linux-amd64-musl]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-rootfs
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Install tooling
        if: steps.check.outputs.completed != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends curl ca-certificates python3-yaml tar gzip
      - name: Download zlayer linux-amd64 (musl static) artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/download-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-linux-amd64-musl
      - name: Look up current Alpine minirootfs version
        if: steps.check.outputs.completed != 'true'
        id: alpine
        shell: bash
        run: |
          set -euo pipefail
          curl -fsSL -o latest-releases.yaml \
            "https://dl-cdn.alpinelinux.org/alpine/latest-stable/releases/x86_64/latest-releases.yaml"
          echo "::group::latest-releases.yaml (raw)"
          cat latest-releases.yaml
          echo "::endgroup::"
          # Parse with python+yaml (apt-installed python3-yaml). The schema
          # is a top-level list of dicts; the entry we want has
          # `flavor: alpine-minirootfs` (verified live before commit).
          # We need: version (e.g. 3.23.4), branch (e.g. v3.23), file.
          # Pin /usr/bin/python3 — MiniBeast has Linuxbrew python3 first on
          # PATH, which does NOT see apt-installed python3-yaml at
          # /usr/lib/python3/dist-packages/yaml.
          eval "$(/usr/bin/python3 - <<'PY'
          import sys, yaml
          with open("latest-releases.yaml") as f:
              data = yaml.safe_load(f)
          for entry in data:
              if entry.get("flavor") == "alpine-minirootfs" and entry.get("arch") == "x86_64":
                  print(f"VERSION={entry['version']}")
                  print(f"BRANCH={entry['branch']}")
                  print(f"FILE={entry['file']}")
                  print(f"SHA256={entry['sha256']}")
                  break
          else:
              sys.exit("no alpine-minirootfs x86_64 entry found")
          PY
          )"
          echo "Resolved Alpine: version=${VERSION} branch=${BRANCH} file=${FILE}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "branch=${BRANCH}"   >> "$GITHUB_OUTPUT"
          echo "file=${FILE}"       >> "$GITHUB_OUTPUT"
          echo "sha256=${SHA256}"   >> "$GITHUB_OUTPUT"
      - name: Download Alpine minirootfs
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          BRANCH: ${{ steps.alpine.outputs.branch }}
          FILE:   ${{ steps.alpine.outputs.file }}
          SHA256: ${{ steps.alpine.outputs.sha256 }}
        run: |
          set -euo pipefail
          curl -fsSLO "https://dl-cdn.alpinelinux.org/alpine/${BRANCH}/releases/x86_64/${FILE}"
          echo "${SHA256}  ${FILE}" | sha256sum -c -
      - name: Download apk.static
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          BRANCH: ${{ steps.alpine.outputs.branch }}
        run: |
          set -euo pipefail
          # Discover the latest apk-tools-static package in main/x86_64.
          # We do NOT hardcode the apk-tools-static version — let the mirror
          # tell us what it currently ships.
          INDEX_URL="https://dl-cdn.alpinelinux.org/alpine/${BRANCH}/main/x86_64/"
          APK_FILE=$(curl -fsSL "$INDEX_URL" \
            | grep -oE 'apk-tools-static-[^"]+\.apk' \
            | sort -V \
            | tail -1)
          if [ -z "$APK_FILE" ]; then
            echo "::error::could not find apk-tools-static in $INDEX_URL"
            exit 1
          fi
          echo "Using $APK_FILE"
          curl -fsSLO "${INDEX_URL}${APK_FILE}"
          mkdir -p apk-static-extract
          # apk packages are gzipped tarballs; warnings about extended
          # headers (APK-TOOLS.checksum.SHA1) are expected and harmless.
          tar -C apk-static-extract -xzf "$APK_FILE" || true
          test -x apk-static-extract/sbin/apk.static
          ./apk-static-extract/sbin/apk.static --version
      - name: Stage Alpine rootfs
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          FILE: ${{ steps.alpine.outputs.file }}
        run: |
          set -euo pipefail
          mkdir rootfs-stage
          sudo tar -C rootfs-stage -xzf "$FILE"
      - name: Install runtime packages into rootfs
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          BRANCH: ${{ steps.alpine.outputs.branch }}
        run: |
          set -euo pipefail
          sudo ./apk-static-extract/sbin/apk.static \
            --root "$(pwd)/rootfs-stage" \
            --arch x86_64 \
            --no-cache \
            --allow-untrusted \
            --repository "https://dl-cdn.alpinelinux.org/alpine/${BRANCH}/main" \
            --repository "https://dl-cdn.alpinelinux.org/alpine/${BRANCH}/community" \
            --initdb add \
            alpine-base ca-certificates iproute2 iptables
      - name: Install zlayer binary into rootfs
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # The musl tarball ships ONLY the binary — no completions/ subdir,
          # unlike the glibc tarball — so `tar xzf` lands `zlayer` directly
          # in the extract dir.
          mkdir -p extracted
          tar -C extracted -xzf zlayer-linux-amd64-musl.tar.gz
          test -x extracted/zlayer
          # Defense in depth: confirm the binary is statically linked.
          # build-linux-amd64-musl already enforces this, but a manual
          # rebuild of just this job that picked up the wrong artifact would
          # silently produce a broken rootfs otherwise.
          file extracted/zlayer
          if file extracted/zlayer | grep -q 'dynamically linked'; then
            echo "::error::rootfs source binary is dynamically linked, expected static musl"
            exit 1
          fi
          sudo mkdir -p rootfs-stage/usr/local/bin
          sudo cp extracted/zlayer rootfs-stage/usr/local/bin/zlayer
          sudo chmod 0755 rootfs-stage/usr/local/bin/zlayer
          # Drop a version marker for future debugging. Format is
          # intentionally trivial (key=value), no jq dependency at read time.
          sudo tee rootfs-stage/etc/zlayer-rootfs-version >/dev/null <<EOF
          version=${{ needs.check-existing.outputs.version }}
          git_sha=${{ inputs.sha || github.sha }}
          built_at=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          alpine_version=${{ steps.alpine.outputs.version }}
          alpine_branch=${{ steps.alpine.outputs.branch }}
          EOF
      - name: Package rootfs tarball
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # -C so the archive starts at the rootfs root (no leading
          # rootfs-stage/ prefix). This matches what `wsl --import` expects
          # and what `buildah add --chown 0:0 <tarball> /` lays out.
          sudo tar czf zlayer-rootfs.tar.gz -C rootfs-stage .
          sudo chown "$(id -u):$(id -g)" zlayer-rootfs.tar.gz
          ls -la zlayer-rootfs.tar.gz
      - name: Sanity-check rootfs tarball
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          # List the archive once into a temp file — piping `tar tzf` into
          # `head` under `set -o pipefail` causes tar to receive SIGPIPE
          # (exit 141) once head closes its stdin, which aborts the step.
          listing=$(mktemp)
          trap 'rm -f "$listing"' EXIT
          tar tzf zlayer-rootfs.tar.gz > "$listing"
          echo "=== first 20 entries ==="
          head -20 "$listing"
          echo "=== zlayer binary presence ==="
          count=$(grep -cE '(^|/)usr/local/bin/zlayer$' "$listing" || true)
          if [ "$count" != "1" ]; then
            echo "::error::expected exactly 1 usr/local/bin/zlayer entry, got ${count}"
            exit 1
          fi
          echo "=== version marker ==="
          grep -E '(^|/)etc/zlayer-rootfs-version$' "$listing"
          echo "=== iproute2/iptables presence ==="
          grep -E '(^|/)sbin/(ip|iptables)$' "$listing" | head -5 || true
      - name: Upload rootfs artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-rootfs
          path: zlayer-rootfs.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-rootfs
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: |
          sudo rm -rf rootfs-stage extracted apk-static-extract zlayer-rootfs.tar.gz zlayer-linux-amd64-musl.tar.gz alpine-minirootfs-*.tar.gz apk-tools-static-*.apk latest-releases.yaml || true

  build-macos-amd64:
    needs: [check-existing, build-macos-arm64, build-linux-amd64]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: x86_64-apple-darwin
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Ensure target installed
        if: steps.check.outputs.completed != 'true'
        run: rustup target add x86_64-apple-darwin
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install protobuf
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i '' "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --target x86_64-apple-darwin --package zlayer
      - name: Download shell completions
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/download-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-completions
      - name: Unpack completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          # Completion scripts are platform-agnostic text (generated from
          # the clap tree). The x86_64-apple-darwin binary can't run on the
          # Apple Silicon runner without Rosetta, so reuse the bytes
          # produced by build-linux-amd64.
          tar xzf zlayer-completions.tar.gz
          cp -r completions "$CARGO_TARGET_DIR/x86_64-apple-darwin/release/completions"
      - name: Package
        if: steps.check.outputs.completed != 'true'
        # COPYFILE_DISABLE: no AppleDouble ._* entries in the tarball.
        run: COPYFILE_DISABLE=1 tar czf "zlayer-darwin-amd64.tar.gz" -C "$CARGO_TARGET_DIR/x86_64-apple-darwin/release" zlayer completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-darwin-amd64
          path: zlayer-darwin-amd64.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-darwin-amd64.tar.gz zlayer-completions.tar.gz completions

  # ===========================================
  # Wave 3: Linux arm64 (native runner)
  # ===========================================
  build-linux-arm64:
    needs: [check-existing, image-build, build-macos-amd64]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: arm64
    timeout-minutes: 60
    # The `arm64` self-hosted label resolves to a macOS arm64 host, so apt
    # isn't on the host PATH. `node:20-bullseye` is a multi-arch manifest list;
    # the arm64 host pulls the arm64 variant natively (no cross-build). This
    # matches the amd64 sibling job and the in-repo `publish-sdks.yml`
    # arm64+container precedent.
    container: node:20-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          # libgpgme-dev / libassuan-dev / libgpg-error-dev are added so the
          # `zlayer-buildd` cgo build below links against the system gpgme
          # stack (buildah needs it for signed-image flows).
          packages: 'protobuf-compiler libseccomp-dev cmake build-essential pkg-config libssl-dev clang git libgpgme-dev libassuan-dev libgpg-error-dev'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --package zlayer --package zlayer-overlayd
      - name: Set up Go (for zlayer-buildd sidecar)
        if: steps.check.outputs.completed != 'true'
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - name: Build zlayer-buildd sidecar
        if: steps.check.outputs.completed != 'true'
        shell: bash
        working-directory: bin/zlayer-buildd
        # Native arm64 runner: `make release-arm64` detects `uname -m`
        # and uses the host `cc`, no cross-compiler needed. Bundling this
        # binary alongside `zlayer` in the tarball makes the sidecar
        # auto-discoverable on any CI runner that installs the tarball,
        # so `WORKDIR` against distroless bases hits the native
        # `imagebuildah.BuildDockerfiles` path instead of the broken
        # `buildah run -- mkdir` fallback.
        run: |
          set -euo pipefail
          make release-arm64
          test -x release/zlayer-buildd-linux-arm64
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p completions
          # Native arm64 runner: the binary runs here, generate completions locally.
          "$CARGO_TARGET_DIR/release/zlayer" completions bash > completions/zlayer.bash
          "$CARGO_TARGET_DIR/release/zlayer" completions zsh > completions/_zlayer
          "$CARGO_TARGET_DIR/release/zlayer" completions fish > completions/zlayer.fish
          "$CARGO_TARGET_DIR/release/zlayer" completions powershell > completions/zlayer.ps1
          "$CARGO_TARGET_DIR/release/zlayer" completions elvish > completions/zlayer.elv
          cp -r completions "$CARGO_TARGET_DIR/release/completions"
          # Drop the buildd binary next to `zlayer` under its canonical name
          # so `discover()` finds it on `$PATH` after install.
          cp bin/zlayer-buildd/release/zlayer-buildd-linux-arm64 "$CARGO_TARGET_DIR/release/zlayer-buildd"
          chmod +x "$CARGO_TARGET_DIR/release/zlayer-buildd"
      - name: Package
        if: steps.check.outputs.completed != 'true'
        # zlayer-overlayd (built above via --package zlayer-overlayd) is the
        # root-privileged overlay network daemon that `zlayer daemon install`
        # registers as a service and looks for next to the zlayer binary.
        run: tar czf "zlayer-linux-arm64.tar.gz" -C "$CARGO_TARGET_DIR/release" zlayer zlayer-overlayd zlayer-buildd completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/upload-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          name: zlayer-linux-arm64
          path: zlayer-linux-arm64.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-linux-arm64.tar.gz completions

  # ===========================================
  # Verify all builds passed
  # ===========================================
  verify:
    needs: [check-existing, build-linux-amd64, build-linux-amd64-musl, build-linux-arm64, build-macos-amd64, build-macos-arm64, build-windows-amd64, image-build, build-rootfs]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      success: ${{ steps.check.outputs.success }}
    steps:
      - name: Check all builds
        id: check
        run: echo "success=true" >> $GITHUB_OUTPUT

  # ===========================================
  # Upload artifacts to temp Forgejo Packages
  # ===========================================
  upload-temp-packages:
    needs: [check-existing, verify]
    if: needs.verify.outputs.success == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      package_base_url: ${{ steps.upload.outputs.package_base_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
          sparse-checkout: scripts/upload-packages.sh

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: upload-temp-packages
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      # Bulk download of every artifact the build jobs uploaded for this
      # run via `Public/actions/upload-artifact` into the Forgejo generic-
      # package zlayer-artifacts/<run_id>/. No `name:` = enumerate every
      # file in this run's package version and extract each into
      # artifacts/<name>/. Bypasses the Forgejo Actions Artifact API
      # entirely (which is incompatible with @actions/artifact v2+ and
      # has a 30s per-request timeout that flakes on big artifacts).
      - name: Download all artifacts
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/download-artifact@main
        with:
          token: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          path: artifacts

      - name: List artifacts for debugging
        if: steps.check.outputs.completed != 'true'
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -ls

      - name: Stamp version marker into artifacts
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          # Lets release.yml auto-discover the matching temp package by version.
          # See .forgejo/workflows/release.yml pre-check job.
          printf '%s\n' "${{ needs.check-existing.outputs.version }}" > artifacts/version.txt

      - name: Upload to temp packages
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          BASE_URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer-temp/${{ github.run_id }}"
          chmod +x scripts/upload-packages.sh
          ./scripts/upload-packages.sh "$BASE_URL" "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" artifacts

      - name: Set output URL
        id: upload
        run: |
          echo "package_base_url=https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer-temp/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: upload-temp-packages
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Dispatch Release workflow.
  #
  # Permanent v{VERSION} tags are NOT created here. release.yml's
  # create-forgejo-release cuts the tag at the temp/v{VERSION} branch HEAD
  # only after every publish step succeeds, then deletes the temp branch.
  # ===========================================
  dispatch-release:
    needs: [check-existing, verify, upload-temp-packages]
    if: needs.verify.outputs.success == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch Release
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -d '{
              "ref": "${{ github.ref }}",
              "inputs": {
                "version": "${{ needs.check-existing.outputs.version }}",
                "sha": "${{ inputs.sha || github.sha }}",
                "artifact_base_url": "${{ needs.upload-temp-packages.outputs.package_base_url }}"
              }
            }'

      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.check-existing.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ inputs.sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts**: ${{ needs.upload-temp-packages.outputs.package_base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag created and release workflow dispatched." >> $GITHUB_STEP_SUMMARY
