name: Mirror Test Images

# Mirror upstream test images we use in the e2e suite to our own GHCR
# namespace so CI doesn't depend on Docker Hub rate limits. Refreshed
# monthly so the mirror stays close to upstream :latest.

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 1 * *'  # 1st of each month at 06:00 UTC

permissions:
  contents: read
  packages: write

jobs:
  mirror:
    name: Mirror ${{ matrix.image.upstream }} -> ${{ matrix.image.mirror }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image:
          - upstream: docker.io/library/alpine:latest
            mirror: ghcr.io/blackleafdigital/zlayer-test-alpine:latest
          - upstream: docker.io/library/nginx:1.28-alpine
            mirror: ghcr.io/blackleafdigital/zlayer-test-nginx:1.28-alpine
          - upstream: docker.io/library/nginx:1.29-alpine
            mirror: ghcr.io/blackleafdigital/zlayer-test-nginx:1.29-alpine
    env:
      # skopeo's default auth path is /run/containers/$UID/auth.json which
      # is not writable in the Actions container. Point it at a tempfile.
      REGISTRY_AUTH_FILE: /tmp/skopeo-auth.json
    steps:
      - name: Install skopeo
        run: |
          sudo apt-get update
          sudo apt-get install -y skopeo

      - name: Login to GHCR
        run: |
          # skopeo reads the authfile before login to merge with existing entries.
          # An empty file fails JSON parse, so seed with "{}".
          umask 077
          printf '{}' > "$REGISTRY_AUTH_FILE"
          echo "${{ secrets.GH_ACCESS_TOKEN }}" | skopeo login ghcr.io \
            -u "${{ github.actor }}" --password-stdin \
            --authfile "$REGISTRY_AUTH_FILE"
          # Authenticate the docker.io SOURCE pull too: anonymous Hub pulls
          # hit toomanyrequests and kill the copy. Authenticated Hub gets
          # 200 pulls/6h, ample for this monthly 3-image mirror.
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | skopeo login docker.io \
            -u zachhandley --password-stdin \
            --authfile "$REGISTRY_AUTH_FILE"

      - name: Copy ${{ matrix.image.upstream }} -> ${{ matrix.image.mirror }}
        run: |
          set -euo pipefail
          echo "Copying all platforms from ${{ matrix.image.upstream }} to ${{ matrix.image.mirror }}"
          skopeo copy --all \
            --dest-authfile "$REGISTRY_AUTH_FILE" \
            docker://${{ matrix.image.upstream }} \
            docker://${{ matrix.image.mirror }}

      - name: Verify mirror is pullable
        run: |
          skopeo inspect \
            --authfile "$REGISTRY_AUTH_FILE" \
            docker://${{ matrix.image.mirror }} | head -40
