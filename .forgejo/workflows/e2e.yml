name: E2E Tests

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0) - triggers release if provided'
        required: false
        type: string
      sha:
        description: 'Commit SHA to test'
        required: false
        type: string
      test:
        description: 'Run a specific e2e suite (empty = all). For the intellitester subset, use `manager-intellitester:<yaml>` to run a single test.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - youki
          - wasm
          - docker
          - manager-unit
          - manager-intellitester
          - manager-intellitester:login.test.yaml
          - manager-intellitester:nav-smoke.test.yaml
          - manager-intellitester:stale-session-setup.test.yaml
          - manager-intellitester:stale-session-verify.test.yaml
          - raft-e2e
          - raft-e2e:cluster_3node
          - raft-e2e:cluster_failover
          - raft-e2e:cluster_scaling
          - raft-e2e:cluster_upgrade
          - raft-e2e:cluster_node_upgrade
          - scheduler-unit
          - macos-sandbox
          - windows-hcs
          - windows-hcs-hyperv

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================
  # E2E Tests (Youki/libcontainer)
  # ===========================================
  e2e-tests:
    name: E2E Tests (Youki)
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye
      options: --privileged --cap-add=NET_ADMIN --device=/dev/net/tun
    if: inputs.test == '' || inputs.test == 'youki'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-youki
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'sudo protobuf-compiler libseccomp-dev'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Login to Docker Hub
        if: steps.check.outputs.completed != 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u zachhandley --password-stdin

      - name: Setup E2E environment
        if: steps.check.outputs.completed != 'true'
        run: |
          # Clean up any leftover state from previous runs
          rm -rf /tmp/zlayer-youki-e2e-test 2>/dev/null || true
          # Create test directories (must match E2E_TEST_DIR in youki_e2e.rs)
          mkdir -p /tmp/zlayer-youki-e2e-test/{state,rootfs,bundles,cache}

      - name: Run E2E tests
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-agent --test youki_e2e -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Cleanup
        if: always()
        run: |
          rm -rf /var/lib/zlayer/* 2>/dev/null || true
          rm -rf /tmp/zlayer-youki-e2e-test 2>/dev/null || true

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-youki
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (WASM)
  # ===========================================
  wasm-e2e-tests:
    name: E2E Tests (WASM)
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye
      options: --privileged --cap-add=NET_ADMIN --device=/dev/net/tun
    if: inputs.test == '' || inputs.test == 'wasm'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'sudo protobuf-compiler'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Run WASM E2E tests
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-agent --features wasm --test wasm_e2e_test -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-wasm
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (Docker)
  # ===========================================
  docker-e2e-tests:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye
      options: --privileged --cap-add=NET_ADMIN --device=/dev/net/tun -v /var/run/docker.sock:/var/run/docker.sock
    if: inputs.test == '' || inputs.test == 'docker'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-docker
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'sudo protobuf-compiler libseccomp-dev docker.io'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Login to Docker Hub
        if: steps.check.outputs.completed != 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u zachhandley --password-stdin

      - name: Run Docker E2E tests
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-agent --features docker --test docker_runtime_test -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-docker
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (Manager UI)
  # ===========================================
  manager-tests:
    name: E2E Tests (Manager)
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye
      options: --privileged --cap-add=NET_ADMIN --device=/dev/net/tun
    if: inputs.test == '' || inputs.test == 'manager-unit'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-manager
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'sudo protobuf-compiler libseccomp-dev'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Run Manager tests
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-manager --lib --features ssr -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-manager
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (Manager Intellitester / Playwright)
  #
  # Boots a hermetic daemon + manager on non-default ports (data-dir
  # under target/zlayer-e2e/<suite-id>/), then runs the Intellitester
  # YAML suite via
  # `uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py`.
  # Use the `test` workflow_dispatch input (e.g.
  # `manager-intellitester:login.test.yaml`) to run a single test.
  # ===========================================
  manager-intellitester-tests:
    name: E2E Tests (Manager Intellitester)
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye
      options: --privileged --cap-add=NET_ADMIN --device=/dev/net/tun
    if: |
      inputs.test == '' ||
      inputs.test == 'manager-intellitester' ||
      startsWith(inputs.test, 'manager-intellitester:')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-manager-intellitester
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'sudo protobuf-compiler libseccomp-dev sqlite3'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cargo cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Restore Playwright cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: playwright-${{ hashFiles('crates/zlayer-manager/tests/e2e/package.json') }}
          path: /root/.cache/ms-playwright /home/runner/.cache/ms-playwright
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Install cargo-leptos
        if: steps.check.outputs.completed != 'true'
        run: cargo install cargo-leptos --locked || true

      - name: Setup pnpm
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        if: steps.check.outputs.completed != 'true'
        uses: https://code.forgejo.org/actions/setup-node@v4
        with:
          node-version: 20

      - name: Install node deps
        if: steps.check.outputs.completed != 'true'
        run: |
          pnpm install --prefix crates/zlayer-manager
          pnpm install --prefix crates/zlayer-manager/tests/e2e

      - name: Install Playwright Chromium
        if: steps.check.outputs.completed != 'true'
        run: pnpm --prefix crates/zlayer-manager/tests/e2e dlx playwright install chromium --with-deps

      - name: Setup uv
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run manager intellitester suite
        if: steps.check.outputs.completed != 'true'
        run: |
          # The dropdown emits either '', 'manager-intellitester', or
          # 'manager-intellitester:<yaml>'. Strip the prefix to get the
          # --only target; bare/empty values run the full suite.
          YAML="${{ inputs.test }}"
          case "$YAML" in
            manager-intellitester:*) ONLY="${YAML#manager-intellitester:}" ;;
            *) ONLY="" ;;
          esac
          # Container has CAP_NET_ADMIN + /dev/net/tun via the privileged
          # block above, so the throwaway daemon's overlay/TUN init no
          # longer degrades. --sudo-daemon is not needed.
          if [ -n "$ONLY" ]; then
            uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py \
              --throwaway --only "$ONLY"
          else
            uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py \
              --throwaway
          fi
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: info

      - name: Save Playwright cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: playwright-${{ hashFiles('crates/zlayer-manager/tests/e2e/package.json') }}
          path: /root/.cache/ms-playwright /home/runner/.cache/ms-playwright
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manager-e2e-screenshots
          path: |
            crates/zlayer-manager/tests/e2e/**/*.png
            crates/zlayer-manager/tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: intellitester-e2e-${{ github.run_id }}
          path: target/zlayer-e2e/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-manager-intellitester
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (Raft / Cluster)
  #
  # Builds zlayer once, then runs one or more cluster suites via the
  # throwaway-daemon harness (run-suite.py). Use the `test` input to
  # pick a single suite (e.g. `raft-e2e:cluster_failover`) or pass the
  # bare `raft-e2e` value (or leave empty) to run all four suites
  # sequentially.
  # ===========================================
  raft-e2e-tests:
    name: E2E Tests (Raft)
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye
      options: --privileged --cap-add=NET_ADMIN --device=/dev/net/tun
    if: |
      inputs.test == '' ||
      inputs.test == 'raft-e2e' ||
      startsWith(inputs.test, 'raft-e2e:')
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-raft
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          # psmisc (fuser) + lsof power the port-clearing fallback in
          # run-suite.py that prevents cross-suite contamination between
          # the five cluster suites sharing ports 19110/19120/19130.
          packages: 'sudo protobuf-compiler libseccomp-dev psmisc lsof'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cargo cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Setup uv
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Build zlayer
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release -p zlayer

      - name: Run raft cluster suite(s)
        if: steps.check.outputs.completed != 'true'
        run: |
          set -eo pipefail
          YAML="${{ inputs.test }}"
          case "$YAML" in
            raft-e2e:*) SUITE="${YAML#raft-e2e:}" ;;
            *) SUITE="cluster_3node" ;;
          esac
          if [ "$YAML" = "raft-e2e" ] || [ -z "$YAML" ]; then
            worst=0
            for s in cluster_3node cluster_failover cluster_scaling cluster_upgrade cluster_node_upgrade; do
              echo "=== Running suite: $s ==="
              if uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py --throwaway --suite "$s"; then
                echo "=== Suite $s OK ==="
              else
                rc=$?
                echo "=== Suite $s FAILED (rc=$rc) ==="
                worst=$rc
              fi
            done
            exit $worst
          else
            uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py --throwaway --suite "$SUITE"
          fi
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: info

      - name: Upload e2e artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: raft-e2e-${{ github.run_id }}
          path: target/zlayer-e2e/**
          if-no-files-found: ignore
          retention-days: 14

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-raft
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Scheduler Unit Tests
  #
  # Pure-Rust unit-test coverage for the zlayer-scheduler crate using
  # the `test-skip-http` feature to bypass real HTTP transports.
  # ===========================================
  scheduler-unit-tests:
    name: Unit Tests (Scheduler)
    runs-on: ubuntu-latest
    container:
      image: node:20-bullseye
      options: --privileged --cap-add=NET_ADMIN --device=/dev/net/tun
    if: inputs.test == '' || inputs.test == 'scheduler-unit'
    steps:
      - name: Checkout
        uses: https://code.forgejo.org/actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: scheduler-unit
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'sudo protobuf-compiler libseccomp-dev'

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cargo cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Install cargo-nextest
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/taiki-e/install-action@nextest

      - name: Run scheduler unit tests
        if: steps.check.outputs.completed != 'true'
        run: cargo nextest run -p zlayer-scheduler --features test-skip-http
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: warn

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: scheduler-unit
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (macOS Sandbox)
  # ===========================================
  macos-sandbox-e2e:
    name: E2E Tests (macOS Sandbox)
    runs-on: macos-latest
    if: inputs.test == '' || inputs.test == 'macos-sandbox'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        run: |
          brew install protobuf python3

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-macos-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Setup E2E environment
        if: steps.check.outputs.completed != 'true'
        run: |
          # Clean up any leftover state from previous runs
          rm -rf /tmp/zlayer-macos-sandbox-e2e-test 2>/dev/null || true
          # Create test directories (must match E2E_TEST_DIR in macos_sandbox_e2e.rs)
          mkdir -p /tmp/zlayer-macos-sandbox-e2e-test/{data,logs}
          mkdir -p /tmp/zlayer-macos-sandbox-e2e-test/data/{containers,images}

      - name: Run macOS Sandbox E2E tests
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-agent --test macos_sandbox_e2e -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/zlayer-macos-sandbox-e2e-test 2>/dev/null || true

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (Windows HCS)
  #
  # windows-latest provides HCS + HCN out of the box on Server 2022 image,
  # so the Host Compute Service / overlay / cluster-join suites can run
  # directly on the runner without extra VM provisioning. The three suites
  # below are all #[ignore]'d to keep `cargo test` quiet on non-Windows
  # hosts, hence the `--ignored` flag.
  # ===========================================
  windows-hcs-e2e:
    name: E2E Tests (Windows HCS)
    runs-on: windows-latest
    if: inputs.test == '' || inputs.test == 'windows-hcs'
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-windows-hcs
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache-windows-e2e

      - name: Install Git Bash
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Restore cargo registry cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-windows-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Install protoc
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'

      - name: Export PROTOC env
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV

      - name: Run Windows HCS E2E tests
        if: steps.check.outputs.completed != 'true'
        run: |
          cargo test --package zlayer-agent --test windows_hcs_e2e -- --ignored --nocapture
          cargo test --package zlayer-agent --test windows_overlay_e2e -- --ignored --nocapture
          cargo test --package zlayer-agent --test windows_cluster_join_e2e -- --ignored --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf target

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-windows-hcs
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # E2E Tests (Windows HCS Hyper-V)
  #
  # Runs the Hyper-V isolation variant on the same `windows-latest`
  # runner used by the W2 (process-isolated) job above; nested virt is
  # required on that host. The single suite below uses
  # `--test-threads=1` because two concurrent Hyper-V UVMs would stress
  # the runner's memory + CPU budget beyond what's comfortable.
  # ===========================================
  windows-hcs-hyperv-e2e:
    name: E2E Tests (Windows HCS Hyper-V)
    runs-on: windows-latest
    if: inputs.test == '' || inputs.test == 'windows-hcs-hyperv'
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ inputs.version || github.sha }}
          step: e2e-windows-hcs-hyperv
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache-windows-hyperv-e2e

      - name: Install Git Bash
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Restore cargo registry cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-windows-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Install protoc
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'

      - name: Export PROTOC env
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV

      - name: Run Windows HCS Hyper-V E2E tests
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-agent --test windows_hcs_hyperv_e2e -- --ignored --test-threads=1 --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Cleanup
        if: always()
        shell: bash
        run: rm -rf target

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ inputs.version || github.sha }}
          step: e2e-windows-hcs-hyperv
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Dispatch Build (release chain gate).
  #
  # This is the *only* path that dispatches build.yml. If an e2e job fails,
  # `needs: [...]` blocks this job and no build happens. If the trigger that
  # started this workflow didn't supply a version (PR runs, [np] dev pushes,
  # manual dispatch without a version), e2e still runs for signal but this
  # job skips — no build, no tag, no release.
  #
  # build.yml is responsible for creating the git tag after all platform
  # builds succeed. The tag never exists speculatively.
  # ===========================================
  dispatch-build:
    name: Dispatch Build
    runs-on: ubuntu-latest
    needs: [e2e-tests, wasm-e2e-tests, docker-e2e-tests, manager-tests, manager-intellitester-tests, raft-e2e-tests, scheduler-unit-tests, macos-sandbox-e2e, windows-hcs-e2e, windows-hcs-hyperv-e2e]
    # Release dispatch requires `inputs.test == ''` so partial e2e runs
    # (e.g. `test: manager-intellitester`) never short-circuit into a
    # build — the other suites would be skipped, not passed.
    if: inputs.version != '' && inputs.test == '' && !failure() && !cancelled()
    steps:
      - name: Dispatch Build workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/build.yml/dispatches" \
            -d '{"ref": "${{ github.ref }}", "inputs": {"version": "${{ inputs.version }}", "sha": "${{ inputs.sha || github.sha }}"}}'

      - name: Summary
        run: |
          echo "## E2E Tests Passed — Build Dispatched" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ inputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ inputs.sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The tag will be created by build.yml once all platform builds succeed." >> $GITHUB_STEP_SUMMARY
