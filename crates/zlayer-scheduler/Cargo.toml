[package]
name = "zlayer-scheduler"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Raft-based distributed scheduler for container orchestration"
keywords = ["container", "scheduler", "raft", "distributed", "orchestration"]
categories = ["concurrency"]
readme = "README.md"

[dependencies]
# Internal crates
zlayer-paths.workspace = true
zlayer-spec.workspace = true
zlayer-types.workspace = true
zlayer-core.workspace = true
zlayer-consensus.workspace = true
zlayer-secrets.workspace = true

# Serialization
serde.workspace = true

# Async
async-trait.workspace = true
tokio.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Logging/tracing
tracing.workspace = true

# UUID
uuid.workspace = true

# Web framework (for raft service router)
axum.workspace = true
hyper-util = { workspace = true }

# HTTP client (used by Scheduler for agent communication)
reqwest.workspace = true

# Tower middleware
tower.workspace = true
tower-http.workspace = true

# Consensus (re-exported via zlayer-consensus, but needed for declare_raft_types! macro)
openraft.workspace = true

# Metrics
metrics.workspace = true
prometheus.workspace = true
num_cpus = { workspace = true }

# JSON serialization for snapshots
serde_json.workspace = true

# OpenAPI schema generation
utoipa.workspace = true
zlayer-cluster-rpc = { version = "0.0.0-dev", path = "../zlayer-cluster-rpc" }
time.workspace = true
tonic = "0.14.5"
prost-types = "0.14.3"

# Testing utilities
[dev-dependencies]
tempfile = "3"
wiremock = "0.6"
chrono.workspace = true
postcard2 = { workspace = true }

[features]
test-skip-http = []
# Persistent storage is now provided by zlayer-consensus's redb-store feature.
# This feature flag is kept for backward compatibility with dependents.
persistent = ["zlayer-consensus/redb-store"]

[lints]
workspace = true
