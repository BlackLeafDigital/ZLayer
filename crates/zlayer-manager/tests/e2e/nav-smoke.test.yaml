name: Navigation smoke test across protected routes
platform: web
variables:
  ADMIN_EMAIL: admin@e2e.local
  ADMIN_PASSWORD: e2e-test-password-1234

steps:
  # Log in first (this test runs standalone, not in a workflow).
  - type: navigate
    value: /login

  - type: wait
    target: { css: "#login-email" }
    timeout: 15000

  - type: input
    target: { css: "#login-email" }
    value: ${ADMIN_EMAIL}

  - type: input
    target: { css: "#login-password" }
    value: ${ADMIN_PASSWORD}

  - type: tap
    target: { role: button, name: "Sign in" }

  - type: waitForSelector
    target: { role: heading }
    state: visible
    timeout: 15000

  # Walk every protected route and assert (a) the page-level <h1>/heading
  # renders and (b) we didn't land on the global "Page not found" fallback.
  #
  # The list mirrors the Route declarations in
  # crates/zlayer-manager/src/app/mod.rs:60-84. Update both when adding
  # or removing pages.

  - type: navigate
    value: /
  - type: waitForSelector
    target: { role: heading }
    state: visible
  - type: screenshot
    name: nav-dashboard.png

  - type: navigate
    value: /nodes
  - type: waitForSelector
    target: { role: heading }
    state: visible
  - type: screenshot
    name: nav-nodes.png

