name: Build

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for artifacts'
        required: true
        type: string
      sha:
        description: 'Commit SHA to build'
        required: false
        type: string
      force:
        description: 'Force rebuild even if artifacts exist'
        required: false
        type: boolean
        default: false

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"

jobs:
  # ===========================================
  # Check if artifacts already exist for this version
  # ===========================================
  check-existing:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      need_build: ${{ steps.check.outputs.need_build }}
      version: ${{ steps.normalize.outputs.version }}
      tag: ${{ steps.normalize.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
          sparse-checkout: scripts/check-existing-packages.sh
      - name: Normalize version
        id: normalize
        shell: bash
        run: |
          # Accept v0.11.01, 0.11, v0.11, 0.11.0-rc1, etc.
          # Cargo rejects leading zeros in components and requires X.Y.Z, so
          # strip the optional leading "v", split off any "-suffix", coerce
          # each numeric component through base-10 arithmetic to drop leading
          # zeros, default missing parts to 0, then re-assemble.
          RAW="${{ inputs.version }}"
          RAW="${RAW#v}"
          if [[ "$RAW" == *-* ]]; then
            CORE="${RAW%%-*}"
            SUFFIX="-${RAW#*-}"
          else
            CORE="$RAW"
            SUFFIX=""
          fi
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CORE"
          MAJOR=$((10#${MAJOR:-0}))
          MINOR=$((10#${MINOR:-0}))
          PATCH=$((10#${PATCH:-0}))
          VERSION="${MAJOR}.${MINOR}.${PATCH}${SUFFIX}"
          echo "Normalized '${{ inputs.version }}' -> ${VERSION}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}" >> $GITHUB_OUTPUT
      - name: Check for existing release artifacts
        id: check
        shell: bash
        run: |
          VERSION="${{ steps.normalize.outputs.version }}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          chmod +x scripts/check-existing-packages.sh
          NEED_BUILD=$(./scripts/check-existing-packages.sh "$VERSION" "$AUTH" | tail -1)
          if [ "${{ inputs.force }}" = "true" ]; then
            echo "Force rebuild requested"
            NEED_BUILD="true"
          fi
          echo "need_build=${NEED_BUILD}" >> $GITHUB_OUTPUT
      - name: Summary
        if: steps.check.outputs.need_build == 'false'
        run: |
          echo "## Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "All artifacts already exist for version **${{ steps.normalize.outputs.version }}**." >> $GITHUB_STEP_SUMMARY
          echo "Use \`force: true\` to rebuild." >> $GITHUB_STEP_SUMMARY
      - name: Purge stale ci-status markers
        if: steps.check.outputs.need_build == 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: purge-version
          version: ${{ steps.normalize.outputs.version }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          keep-markers: ''
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Wave 1: Linux amd64 + macOS arm64 (2 parallel)
  # ===========================================
  build-linux-amd64:
    needs: [check-existing]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container: node:20-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev cmake build-essential pkg-config libssl-dev clang git'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --package zlayer || cargo build --release --package zlayer
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p completions
          "$CARGO_TARGET_DIR/release/zlayer" completions bash > completions/zlayer.bash
          "$CARGO_TARGET_DIR/release/zlayer" completions zsh > completions/_zlayer
          "$CARGO_TARGET_DIR/release/zlayer" completions fish > completions/zlayer.fish
          "$CARGO_TARGET_DIR/release/zlayer" completions powershell > completions/zlayer.ps1
          "$CARGO_TARGET_DIR/release/zlayer" completions elvish > completions/zlayer.elv
      - name: Package
        if: steps.check.outputs.completed != 'true'
        run: |
          cp -r completions "$CARGO_TARGET_DIR/release/completions"
          tar czf "zlayer-linux-amd64.tar.gz" -C "$CARGO_TARGET_DIR/release" zlayer completions
      - name: Package completions (standalone)
        if: steps.check.outputs.completed != 'true'
        run: tar czf "zlayer-completions.tar.gz" completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zlayer-linux-amd64
          path: zlayer-linux-amd64.tar.gz
          retention-days: 1
      - name: Upload completions artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zlayer-completions
          path: zlayer-completions.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-linux-amd64.tar.gz zlayer-completions.tar.gz completions

  build-macos-arm64:
    needs: [check-existing]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: aarch64-apple-darwin
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Ensure target installed
        if: steps.check.outputs.completed != 'true'
        run: rustup target add aarch64-apple-darwin
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Clean build state
        if: steps.check.outputs.completed != 'true'
        run: cargo clean
      - name: Install protobuf
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i '' "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --target aarch64-apple-darwin --package zlayer
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          # macos-latest runners on Forgejo are Apple Silicon, so the
          # aarch64-apple-darwin binary runs natively on the host.
          mkdir -p completions
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions bash > completions/zlayer.bash
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions zsh > completions/_zlayer
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions fish > completions/zlayer.fish
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions powershell > completions/zlayer.ps1
          "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/zlayer" completions elvish > completions/zlayer.elv
      - name: Package
        if: steps.check.outputs.completed != 'true'
        run: |
          cp -r completions "$CARGO_TARGET_DIR/aarch64-apple-darwin/release/completions"
          tar czf "zlayer-darwin-arm64.tar.gz" -C "$CARGO_TARGET_DIR/aarch64-apple-darwin/release" zlayer completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zlayer-darwin-arm64
          path: zlayer-darwin-arm64.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-darwin-arm64.tar.gz completions

  # Single consolidated Windows build. Prior to Phase F-7a the workflow shipped
  # two Windows variants: a "thin CLI" (--features wsl alone, proxied commands
  # to a daemon inside WSL2) and an HCS-runtime build. After F-7a the wsl
  # feature is a delegate runtime inside the HCS CompositeRuntime, not a
  # standalone backend, so the thin build is obsolete. This job builds the
  # hcs-runtime,wsl combo -- the feature set CI already validates in
  # .forgejo/workflows/ci.yaml -- and ships it as zlayer-windows-amd64.zip.
  # zlayer-windows-amd64-hcs.exe is also uploaded as a one-release compat
  # alias for any downstream consumer that pinned the old name; scheduled for
  # removal after the next release.
  build-windows-amd64:
    needs: [check-existing]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache-windows
      - name: Install Git Bash
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-windows-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install protobuf
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'
      - name: Export PROTOC env
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --package zlayer --no-default-features --features hcs-runtime,wsl
      - name: Smoke test (binary launches)
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: ./target/release/zlayer.exe --version
      - name: Test zlayer-hcs on Windows
        if: steps.check.outputs.completed != 'true'
        run: cargo test --package zlayer-hcs --no-fail-fast
      - name: Install 7zip
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: '7zip'
          cross-platform: 'true'
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p completions
          ./target/release/zlayer.exe completions bash > completions/zlayer.bash
          ./target/release/zlayer.exe completions zsh > completions/_zlayer
          ./target/release/zlayer.exe completions fish > completions/zlayer.fish
          ./target/release/zlayer.exe completions powershell > completions/zlayer.ps1
          ./target/release/zlayer.exe completions elvish > completions/zlayer.elv
      - name: Package
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: 7z a zlayer-windows-amd64.zip target/release/zlayer.exe completions
      - name: Stage -hcs.exe compat alias
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p hcs-artifact
          cp target/release/zlayer.exe hcs-artifact/zlayer-windows-amd64-hcs.exe
      - name: Upload artifact (primary)
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zlayer-windows-amd64
          path: zlayer-windows-amd64.zip
          retention-days: 1
      - name: Upload artifact (-hcs.exe compat alias)
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zlayer-windows-amd64-hcs
          path: hcs-artifact/zlayer-windows-amd64-hcs.exe
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-windows-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: rm -rf target hcs-artifact zlayer-windows-amd64.zip completions

  # ===========================================
  # Wave 2: Image build + macOS amd64 (2 parallel)
  # ===========================================
  image-build:
    name: Image Build (Pipeline)
    needs: [check-existing, build-linux-amd64]
    if: needs.check-existing.outputs.need_build == 'true'
    # Needs linux-amd64 for zlayer binary
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: image-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Install buildah
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'buildah'
          cross-platform: 'true'
      - name: Download zlayer
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-download-artifact@v4
        with:
          name: zlayer-linux-amd64
      - name: Install zlayer
        if: steps.check.outputs.completed != 'true'
        run: tar xzf zlayer-linux-amd64.tar.gz && chmod +x zlayer && sudo mv zlayer /usr/local/bin/
      - name: Prepare zlayer binary for node image
        if: steps.check.outputs.completed != 'true'
        run: |
          mkdir -p target/release
          cp /usr/local/bin/zlayer target/release/zlayer
      - name: Build all images with pipeline
        if: steps.check.outputs.completed != 'true'
        run: |
          sudo zlayer pipeline \
            -f ZPipeline.yaml \
            --no-tui \
            --set VERSION=build-${{ github.run_id }} \
            --set REGISTRY=zlayer

      - name: Export images as OCI archives
        if: steps.check.outputs.completed != 'true'
        run: |
          for img in zlayer-node zlayer-web zlayer-manager; do
            echo "Exporting ${img}..."
            sudo buildah push zlayer/${img}:build-${{ github.run_id }} \
              oci-archive:${img}-oci.tar
          done

      - name: Upload image artifacts
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: container-images
          path: |
            zlayer-node-oci.tar
            zlayer-web-oci.tar
            zlayer-manager-oci.tar
          retention-days: 1

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: image-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  build-macos-amd64:
    needs: [check-existing, build-macos-arm64, build-linux-amd64]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          targets: x86_64-apple-darwin
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Ensure target installed
        if: steps.check.outputs.completed != 'true'
        run: rustup target add x86_64-apple-darwin
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install protobuf
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i '' "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --target x86_64-apple-darwin --package zlayer
      - name: Download shell completions
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-download-artifact@v4
        with:
          name: zlayer-completions
      - name: Unpack completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          # Completion scripts are platform-agnostic text (generated from
          # the clap tree). The x86_64-apple-darwin binary can't run on the
          # Apple Silicon runner without Rosetta, so reuse the bytes
          # produced by build-linux-amd64.
          tar xzf zlayer-completions.tar.gz
          cp -r completions "$CARGO_TARGET_DIR/x86_64-apple-darwin/release/completions"
      - name: Package
        if: steps.check.outputs.completed != 'true'
        run: tar czf "zlayer-darwin-amd64.tar.gz" -C "$CARGO_TARGET_DIR/x86_64-apple-darwin/release" zlayer completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zlayer-darwin-amd64
          path: zlayer-darwin-amd64.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-macos-amd64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-darwin-amd64.tar.gz zlayer-completions.tar.gz completions

  # ===========================================
  # Wave 3: Linux arm64 (native runner)
  # ===========================================
  build-linux-arm64:
    needs: [check-existing, image-build, build-macos-amd64]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: arm64
    timeout-minutes: 60
    # The `arm64` self-hosted label resolves to a macOS arm64 host, so apt
    # isn't on the host PATH. `node:20-bullseye` is a multi-arch manifest list;
    # the arm64 host pulls the arm64 variant natively (no cross-build). This
    # matches the amd64 sibling job and the in-repo `publish-sdks.yml`
    # arm64+container precedent.
    container: node:20-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev cmake build-essential pkg-config libssl-dev clang git'
      - name: Set workspace version
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.check-existing.outputs.version }}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          grep '^version = ' Cargo.toml
      - name: Build
        if: steps.check.outputs.completed != 'true'
        run: cargo build --release --package zlayer
      - name: Generate shell completions
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          mkdir -p completions
          # Native arm64 runner: the binary runs here, generate completions locally.
          "$CARGO_TARGET_DIR/release/zlayer" completions bash > completions/zlayer.bash
          "$CARGO_TARGET_DIR/release/zlayer" completions zsh > completions/_zlayer
          "$CARGO_TARGET_DIR/release/zlayer" completions fish > completions/zlayer.fish
          "$CARGO_TARGET_DIR/release/zlayer" completions powershell > completions/zlayer.ps1
          "$CARGO_TARGET_DIR/release/zlayer" completions elvish > completions/zlayer.elv
          cp -r completions "$CARGO_TARGET_DIR/release/completions"
      - name: Package
        if: steps.check.outputs.completed != 'true'
        run: tar czf "zlayer-linux-arm64.tar.gz" -C "$CARGO_TARGET_DIR/release" zlayer completions
      - name: Upload artifact
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zlayer-linux-arm64
          path: zlayer-linux-arm64.tar.gz
          retention-days: 1
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: build-linux-arm64
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Cleanup
        if: steps.check.outputs.completed != 'true'
        run: rm -rf $CARGO_TARGET_DIR zlayer-linux-arm64.tar.gz completions

  # ===========================================
  # Verify all builds passed
  # ===========================================
  verify:
    needs: [check-existing, build-linux-amd64, build-linux-arm64, build-macos-amd64, build-macos-arm64, build-windows-amd64, image-build]
    if: needs.check-existing.outputs.need_build == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      success: ${{ steps.check.outputs.success }}
    steps:
      - name: Check all builds
        id: check
        run: echo "success=true" >> $GITHUB_OUTPUT

  # ===========================================
  # Upload artifacts to temp Forgejo Packages
  # ===========================================
  upload-temp-packages:
    needs: [check-existing, verify]
    if: needs.verify.outputs.success == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      package_base_url: ${{ steps.upload.outputs.package_base_url }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
          sparse-checkout: scripts/upload-packages.sh

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: upload-temp-packages
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Download all artifacts
        if: steps.check.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts for debugging
        if: steps.check.outputs.completed != 'true'
        run: |
          echo "=== Downloaded artifacts ==="
          find artifacts -type f -ls

      - name: Upload to temp packages
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          BASE_URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer-temp/${{ github.run_id }}"
          chmod +x scripts/upload-packages.sh
          ./scripts/upload-packages.sh "$BASE_URL" "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" artifacts

      - name: Set output URL
        id: upload
        run: |
          echo "package_base_url=https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer-temp/${{ github.run_id }}" >> $GITHUB_OUTPUT

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: upload-temp-packages
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Auto Tag — only after every platform build has succeeded.
  #
  # The tag never exists speculatively: by the time this job runs, verify
  # has confirmed all platform archives built and upload-temp-packages has
  # staged them. Creating the tag here means a tag's existence always
  # implies "this version has been successfully built on every platform."
  #
  # Uses --force-with-lease semantics by checking for existing tag first;
  # if the tag is already present at the same SHA (e.g. re-run of this
  # job), it's a no-op. If the tag exists pointing at a DIFFERENT SHA,
  # the push fails loudly rather than silently rewriting history.
  # ===========================================
  auto-tag:
    needs: [check-existing, verify, upload-temp-packages]
    if: needs.verify.outputs.success == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.sha }}
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.check-existing.outputs.version }}
          step: auto-tag
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Create and push tag
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          TAG="${{ needs.check-existing.outputs.tag }}"
          SHA="${{ inputs.sha || github.sha }}"

          git config user.name "Zach Handley"
          git config user.email "zachhandley@gmail.com"

          # If the tag already points at this SHA, nothing to do (re-run safety).
          if git rev-parse --verify "refs/tags/${TAG}" >/dev/null 2>&1; then
            EXISTING=$(git rev-list -n 1 "refs/tags/${TAG}")
            if [ "$EXISTING" = "$SHA" ]; then
              echo "Tag ${TAG} already points at ${SHA} — skipping."
              exit 0
            else
              echo "ERROR: tag ${TAG} exists at ${EXISTING} but this build is for ${SHA}." >&2
              echo "Refusing to move the tag." >&2
              exit 1
            fi
          fi

          git tag -a "$TAG" "$SHA" -m "Auto-tagged after successful multi-platform build: $TAG"
          git push origin "$TAG"

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.check-existing.outputs.version }}
          step: auto-tag
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Dispatch Release workflow (after tag exists)
  # ===========================================
  dispatch-release:
    needs: [check-existing, verify, upload-temp-packages, auto-tag]
    if: needs.verify.outputs.success == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispatch Release
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/release.yml/dispatches" \
            -d '{
              "ref": "${{ github.ref }}",
              "inputs": {
                "version": "${{ needs.check-existing.outputs.version }}",
                "sha": "${{ inputs.sha || github.sha }}",
                "artifact_base_url": "${{ needs.upload-temp-packages.outputs.package_base_url }}"
              }
            }'

      - name: Summary
        run: |
          echo "## Build Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ needs.check-existing.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ inputs.sha || github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Artifacts**: ${{ needs.upload-temp-packages.outputs.package_base_url }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Tag created and release workflow dispatched." >> $GITHUB_STEP_SUMMARY
