openapi: 3.1.0
info:
  contact:
    name: ZLayer
    url: https://zlayer.dev
  description: Container orchestration API for ZLayer
  license:
    name: MIT OR Apache-2.0
  title: ZLayer API
  version: 0.1.0
servers:
- url: /
tags:
- description: Health check endpoints
  name: Health
- description: Authentication endpoints
  name: Authentication
- description: User CRUD and password management
  name: Users
- description: Deployment management
  name: Deployments
- description: Service management
  name: Services
- description: Container image building
  name: Build
- description: Raw container lifecycle management
  name: Containers
- description: "OCI image management (list, pull, tag, remove, prune)"
  name: Images
- description: Internal scheduler-to-agent communication
  name: Internal
- description: Secrets management
  name: Secrets
- description: Environment CRUD
  name: Environments
- description: Daemon-wide container lifecycle event stream (SSE)
  name: Events
- description: Project CRUD and deployment linking
  name: Projects
- description: Git push webhook receiver and configuration
  name: Webhooks
- description: Registry and git credential management
  name: Credentials
- description: GitOps sync management
  name: Syncs
- description: Plaintext variable management
  name: Variables
- description: Named runnable script management and execution
  name: Tasks
- description: Workflow DAG management and execution
  name: Workflows
- description: Notification channel management and testing
  name: Notifiers
- description: User group CRUD and membership management
  name: Groups
- description: Resource-level permission grant/revoke
  name: Permissions
- description: Audit log query
  name: Audit
- description: Cluster node management
  name: Nodes
- description: Overlay network status and diagnostics
  name: Overlay
- description: Tunnel token and node-to-node tunnel management
  name: Tunnels
- description: Network access-control group management
  name: Networks
- description: User-defined bridge / overlay networks for standalone containers
  name: ContainerNetworks
- description: "Reverse proxy status (routes, backends, TLS, L4 streams)"
  name: Proxy
- description: "Cluster membership, heartbeats, and disaster recovery"
  name: Cluster
- description: Named volume listing and deletion
  name: Volumes
- description: Storage replication status
  name: Storage
- description: "Cron job listing, triggering, and enable/disable"
  name: Cron
- description: "Job execution triggering, status, and cancellation"
  name: Jobs
- description: Daemon-level introspection (capability survey)
  name: Daemon
paths:
  /api/v1/audit:
    get:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin, or
        [`ApiError::Internal`] if the store fails.
      operationId: list_audit
      parameters:
      - description: Filter by user id.
        explode: true
        in: query
        name: user
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter by resource kind.
        explode: true
        in: query
        name: resource_kind
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Only entries at or after this timestamp (RFC 3339).
        explode: true
        in: query
        name: since
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Only entries at or before this timestamp (RFC 3339).
        explode: true
        in: query
        name: until
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Maximum number of entries to return (default 100).
        explode: true
        in: query
        name: limit
        required: false
        schema:
          minimum: 0
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AuditEntry"
                type: array
          description: List audit entries
        "403":
          description: Admin role required
      summary: List audit log entries. Admin only.
      tags:
      - Audit
  /api/v1/build:
    post:
      description: |-
        Accepts a multipart form with:
        - `dockerfile`: The Dockerfile content (optional if using runtime)
        - `context`: A tarball containing the build context
        - `config`: JSON configuration (`BuildRequest`)

        # Errors

        Returns an error if the request is invalid, context extraction fails, or the build
        cannot be started.
      operationId: start_build
      requestBody:
        content:
          multipart/form-data: {}
        description: Build context with Dockerfile
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerBuildResponse"
          description: Build started
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: |-
        POST /api/v1/build
        Start a new build from multipart upload (Dockerfile + context tarball)
      tags:
      - Build
  /api/v1/build/json:
    post:
      description: |-
        # Errors

        Returns an error if the context path is invalid or the build cannot be started.
      operationId: start_build_json
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRequestWithContext"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerBuildResponse"
          description: Build started
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: |-
        POST /api/v1/build/json
        Start a new build from JSON request with a context path on the server.
      tags:
      - Build
  /api/v1/build/{id}:
    get:
      description: |-
        # Errors

        Returns an error if the build is not found.
      operationId: get_build_status
      parameters:
      - description: Build ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildStatus"
          description: Build status
        "401":
          description: Unauthorized
        "404":
          description: Build not found
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/build/{id}
        Get build status.
      tags:
      - Build
  /api/v1/build/{id}/logs:
    get:
      description: |-
        # Errors

        Returns an error if the build is not found or logs cannot be read.
      operationId: get_build_logs
      parameters:
      - description: Build ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: Build logs
        "401":
          description: Unauthorized
        "404":
          description: Build not found
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/build/{id}/logs
        Get build logs.
      tags:
      - Build
  /api/v1/build/{id}/stream:
    get:
      description: |-
        # Errors

        Returns an error if the build is not found or not active.
      operationId: stream_build
      parameters:
      - description: Build ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: SSE event stream
        "401":
          description: Unauthorized
        "404":
          description: Build not found
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/build/{id}/stream
        Stream build progress via Server-Sent Events.
      tags:
      - Build
  /api/v1/builds:
    get:
      description: |-
        # Errors

        Returns an error if the user is not authenticated.
      operationId: list_builds
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BuildStatus"
                type: array
          description: List of builds
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/builds
        List all builds.
      tags:
      - Build
  /api/v1/cluster/force-leader:
    post:
      description: |-
        `POST /api/v1/cluster/force-leader`

        DESTRUCTIVE operation for when the original leader is permanently lost.
        Saves cluster state, shuts down Raft, writes a recovery marker.
        The daemon must be restarted to complete recovery.

        # Errors

        Returns an error if the confirmation string is wrong, the Raft coordinator
        is unavailable, this node is already the leader, or the recovery state
        cannot be saved.
      operationId: cluster_force_leader
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForceLeaderRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForceLeaderResponse"
          description: Force-leader initiated
        "400":
          description: Invalid confirmation or leader still reachable
        "500":
          description: Failed to save recovery state
        "503":
          description: Raft coordinator not available
      security:
      - bearer_auth: []
      summary: Force this node to become the cluster leader (disaster recovery).
      tags:
      - Cluster
  /api/v1/cluster/gossip/peers:
    get:
      description: |-
        Returns an empty list when the daemon has no gossip pool configured
        (single-node, raft-only, static, or worker-tier without gossip enabled).

        # Errors

        Currently infallible — `GossipPool::peers()` can't fail today. The
        return type stays `Result<_>` so a future fallible implementation
        doesn't need a signature change.
      operationId: cluster_list_gossip_peers
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/GossipPeerSummary"
                type: array
          description: List of gossip pool peers
      security:
      - bearer_auth: []
      summary: '`GET /api/v1/cluster/gossip/peers` — list peers known via the gossip
        pool.'
      tags:
      - Cluster
  /api/v1/cluster/heartbeat:
    post:
      description: |-
        `POST /api/v1/cluster/heartbeat`

        Accepts resource usage data from worker nodes and proposes an
        `UpdateNodeHeartbeat` to the Raft state machine.

        # Panics

        Panics if the system clock is before the Unix epoch.
      operationId: cluster_heartbeat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
        required: true
      responses:
        "200":
          description: Heartbeat accepted
        "500":
          description: Failed to propose heartbeat
        "503":
          description: Raft coordinator not available
      summary: Handle node heartbeat.
      tags:
      - Cluster
  /api/v1/cluster/join:
    post:
      description: |-
        `POST /api/v1/cluster/join`

        Validates the join token, assigns a Raft node ID, calls `raft.add_member()`,
        and returns the assignment + peer list.

        # Errors

        Returns an error if the Raft coordinator is unavailable, the join token is
        invalid, IP allocation fails, or the Raft membership change fails.
      operationId: cluster_join
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterJoinRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterJoinResponse"
          description: Node joined successfully
        "401":
          description: Invalid join token
        "500":
          description: Failed to add member to Raft
        "503":
          description: Raft coordinator not available
      summary: Handle a cluster join request.
      tags:
      - Cluster
  /api/v1/cluster/nodes:
    get:
      description: |-
        `GET /api/v1/cluster/nodes`

        # Errors

        Returns an error if the cluster state cannot be read.
      operationId: cluster_list_nodes
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ClusterNodeSummary"
                type: array
          description: List of cluster nodes
      security:
      - bearer_auth: []
      summary: List all nodes visible in the Raft cluster state.
      tags:
      - Cluster
  /api/v1/cluster/nodes/{id}/labels:
    post:
      description: |-
        # Errors
        Returns `ServiceUnavailable` if the local Raft coordinator is not running,
        or `Internal` on propose failure.
      operationId: cluster_set_node_labels
      parameters:
      - description: Raft node id
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          minimum: 0
          type: integer
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLabelsRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpdateLabelsResponse"
          description: Labels updated
        "503":
          description: Raft coordinator not available
      security:
      - bearer_auth: []
      summary: |-
        Set or remove labels on a node, persisted in raft cluster state so the
        scheduler's `NodeSelector` placement honors them. `labels` entries are
        inserted/overwritten; `remove` keys are deleted.
      tags:
      - Cluster
  /api/v1/cluster/upgrade:
    post:
      description: |-
        `POST /api/v1/cluster/upgrade`

        Returns `421 Misdirected Request` (with an `X-Leader-Addr` header) when
        called on a follower; the CLI should redirect to the leader. The leader
        upgrades followers in ascending `node_id` order; it does NOT upgrade
        itself in this handler — the caller is expected to invoke
        `/api/v1/internal/upgrade/start` against the leader after followers are
        done (or step down first), so the leader process can restart cleanly.

        # Errors

        Returns `ServiceUnavailable` if no Raft coordinator is wired,
        `NotLeader` if this node is not the leader, or `Internal` if cluster
        state cannot be read.
      operationId: cluster_upgrade
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterUpgradeRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterUpgradeResult"
          description: Rolling upgrade completed
        "421":
          description: Not the leader; clients should redirect via the X-Leader-Addr
            header
        "500":
          description: Internal error driving the rollout
        "503":
          description: Raft coordinator not available
      security:
      - bearer_auth: []
      summary: Drive a rolling daemon-binary upgrade across every follower.
      tags:
      - Cluster
  /api/v1/cluster/upgrade-self:
    post:
      description: |-
        `POST /api/v1/cluster/upgrade-self`

        Two-step orchestration:

        1. **Leader handoff via `trigger_elect`**: pick a healthy follower
           (status == `"ready"`, fresh heartbeat) and POST to its
           `/api/v1/internal/raft/trigger-elect`. That follower campaigns
           immediately — Raft safety guarantees only an up-to-date candidate
           wins, so a stale callee just loses the term and a better-up-to-date
           follower wins the next. We then poll our own `raft.metrics()`
           until `current_leader != local_node_id` (timeout 5s). If the
           handoff fails or times out, we still proceed; the worst case is
           the cluster waits one heartbeat-loss window for a new leader.

        2. **Local self-upgrade**: re-enter `POST /api/v1/internal/upgrade/start`
           against `127.0.0.1` so the (now-former) leader's daemon downloads
           the target release, writes the restart sentinel, and exits with
           code 75 — the OS supervisor (launchd / systemd / SCM) respawns it
           on the new binary and it rejoins as a voter.

        # Errors

        Returns `ServiceUnavailable` if Raft or the internal token are
        unconfigured, `Internal` if the leader's own `advertise_addr` /
        `api_port` cannot be resolved from cluster state, or `Internal` if
        the localhost upgrade-start call fails.
      operationId: cluster_upgrade_self
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterUpgradeSelfRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeStartResponse"
          description: Self-upgrade scheduled
        "500":
          description: Internal error scheduling self-upgrade
        "503":
          description: Raft coordinator or internal token not configured
      security:
      - bearer_auth: []
      summary: Trigger a daemon-binary self-upgrade on the local (leader) node.
      tags:
      - Cluster
  /api/v1/cluster/workers:
    get:
      description: |-
        Returns an empty list when this node is not running a worker-tier
        dispatcher (e.g., single-node, raft-only, static, or a worker-tier
        worker-role daemon).

        # Errors

        Never errors today — `known_workers()` is infallible. The result type
        stays `Result<_>` so a future fallible implementation doesn't need a
        signature change.
      operationId: cluster_list_workers
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WorkerSummary"
                type: array
          description: List of worker-tier workers
      security:
      - bearer_auth: []
      summary: '`GET /api/v1/cluster/workers` — list currently-leased worker-tier
        workers.'
      tags:
      - Cluster
  /api/v1/container-networks:
    get:
      description: |-
        # Errors

        [`ApiError::BadRequest`] when the `label` query param is not in
        `key=value` form.
      operationId: list_container_networks
      parameters:
      - description: |-
          Optional label filter in `key=value` form. Only networks whose
          labels contain a matching pair are returned.
        explode: true
        in: query
        name: label
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BridgeNetwork"
                type: array
          description: List of bridge networks
        "400":
          description: Invalid label filter
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: "List all bridge networks, optionally filtered by label."
      tags:
      - ContainerNetworks
    post:
      description: |-
        # Errors

        - [`ApiError::BadRequest`] if the network name or subnet is malformed.
        - [`ApiError::Conflict`] if a network with the same name already exists.
        - [`ApiError::Forbidden`] / [`ApiError::Unauthorized`] from the auth layer.
      operationId: create_container_network
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBridgeNetworkRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeNetwork"
          description: Network created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Network with that name already exists
      security:
      - bearer_auth: []
      summary: Create a new bridge or overlay network.
      tags:
      - ContainerNetworks
  /api/v1/container-networks/{id_or_name}:
    delete:
      description: |-
        # Errors

        - [`ApiError::NotFound`] when no network matches `id_or_name`.
        - [`ApiError::Conflict`] when the network still has attachments and
          `force` is false.
        - Auth errors propagated from the `operator` role check.
      operationId: delete_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      - description: "If true, delete even if the network still has attachments."
        explode: true
        in: query
        name: force
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "204":
          description: Network deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Network not found
        "409":
          description: Network still has attachments (use ?force=true)
      security:
      - bearer_auth: []
      summary: |-
        Delete a bridge network. Refuses if the network still has attachments
        unless `?force=true` is set.
      tags:
      - ContainerNetworks
    get:
      description: |-
        # Errors

        [`ApiError::NotFound`] when no network matches `id_or_name`.
      operationId: get_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeNetworkDetails"
          description: Network details
        "401":
          description: Unauthorized
        "404":
          description: Network not found
      security:
      - bearer_auth: []
      summary: Inspect a single bridge network by id or by name.
      tags:
      - ContainerNetworks
  /api/v1/container-networks/{id_or_name}/connect:
    post:
      description: |-
        # Errors

        - [`ApiError::BadRequest`] for an empty `container_id` or invalid
          `ipv4_address`.
        - [`ApiError::NotFound`] when no network matches `id_or_name`.
      operationId: connect_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectBridgeNetworkRequest"
        required: true
      responses:
        "204":
          description: Container connected
        "400":
          description: Invalid request (e.g. bad ipv4_address)
        "401":
          description: Unauthorized
        "404":
          description: Network not found
      security:
      - bearer_auth: []
      summary: Attach a container to a network.
      tags:
      - ContainerNetworks
  /api/v1/container-networks/{id_or_name}/disconnect:
    post:
      description: |-
        # Errors

        - [`ApiError::BadRequest`] when `container_id` is empty.
        - [`ApiError::NotFound`] when the network or the container-on-network
          pair is not known (unless `force` was passed).
      operationId: disconnect_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisconnectBridgeNetworkRequest"
        required: true
      responses:
        "204":
          description: Container disconnected
        "401":
          description: Unauthorized
        "404":
          description: Network or container not found
      security:
      - bearer_auth: []
      summary: Detach a container from a network.
      tags:
      - ContainerNetworks
  /api/v1/containers:
    get:
      description: |-
        Returns all containers managed through this API. Optionally filter by
        label using the `label` query parameter in `key=value` format.

        # Errors

        Returns an error if the user is not authenticated.
      operationId: list_containers
      parameters:
      - description: Filter by label (key=value format)
        explode: true
        in: query
        name: label
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ContainerInfo"
                type: array
          description: List of containers
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List standalone containers.
      tags:
      - Containers
    post:
      description: |-
        When the daemon has a cluster handle and the request carries
        `node_selector` / `platform`, the request is placed across the cluster
        (see [`place_or_create`]); otherwise the container is created locally.

        # Errors

        Returns an error if image pull fails, container creation fails, no node
        satisfies the placement constraints, or the user lacks the operator role.
      operationId: create_container
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContainerRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerInfo"
          description: Container created and started
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "409":
          description: No node satisfies the placement constraints
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: "Create and start a container (public, JWT-authenticated entry point)."
      tags:
      - Containers
  /api/v1/containers/prune:
    post:
      description: |-
        Mirrors Docker-compat `POST /containers/prune`. Returns the IDs of
        containers that were removed plus the bytes reclaimed.

        # Errors

        Returns 501 when the runtime doesn't support a global prune sweep.
      operationId: prune_containers
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerPruneResponse"
          description: Prune result
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "500":
          description: Internal error
        "501":
          description: Runtime does not support container prune
      security:
      - bearer_auth: []
      summary: Prune stopped containers from the runtime.
      tags:
      - Containers
  /api/v1/containers/{id}:
    delete:
      description: |-
        Sends a stop signal (with a 30-second timeout), then removes the container.

        # Errors

        Returns an error if the container is not found, stop/remove fails, or the
        user lacks the operator role.
      operationId: delete_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Container stopped and removed
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Stop and remove a container.
      tags:
      - Containers
    get:
      description: |-
        # Errors

        Returns an error if the container is not found or the user is not authenticated.
      operationId: get_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerInfo"
          description: Container details
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Get details for a specific container.
      tags:
      - Containers
  /api/v1/containers/{id}/archive:
    get:
      description: |-
        Returns `application/x-tar` bytes. The `X-Docker-Container-Path-Stat`
        header is also emitted (matching Docker's behaviour) so callers can
        inspect the path's metadata without a separate HEAD round-trip.

        # Errors

        * `400 Bad Request` when the `path` query parameter is missing.
        * `404 Not Found` when the container or path does not exist.
        * `501 Not Implemented` when the runtime cannot produce a TAR archive.
      operationId: archive_get
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Container-side path to archive
        explode: true
        in: query
        name: path
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          description: TAR archive (application/x-tar)
        "400":
          description: Missing path query parameter
        "401":
          description: Unauthorized
        "404":
          description: Container or path not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support archive download
      security:
      - bearer_auth: []
      summary: |-
        `GET /api/v1/containers/{id}/archive?path=<...>` — stream a TAR archive
        of the requested file or directory inside the container.
      tags:
      - Containers
    head:
      description: |-
        # Errors

        * `400 Bad Request` when the `path` query parameter is missing.
        * `404 Not Found` when the container or path does not exist.
        * `501 Not Implemented` when the runtime cannot stat container paths.
      operationId: archive_head
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Container-side path to stat
        explode: true
        in: query
        name: path
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          description: Path stat header set
        "400":
          description: Missing path query parameter
        "401":
          description: Unauthorized
        "404":
          description: Container or path not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support archive head
      security:
      - bearer_auth: []
      summary: |-
        `HEAD /api/v1/containers/{id}/archive?path=<...>` — return path-stat
        metadata in the `X-Docker-Container-Path-Stat` header without
        materializing the TAR archive.
      tags:
      - Containers
    put:
      description: |-
        Accepts an `application/x-tar` body. Honours Docker's
        `noOverwriteDirNonDir` and `copyUIDGID` query parameters.

        # Errors

        * `400 Bad Request` when the `path` query parameter is missing or the
          archive payload is malformed.
        * `404 Not Found` when the container or destination path does not exist.
        * `501 Not Implemented` when the runtime cannot extract archives.
      operationId: archive_put
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Container-side path to extract into
        explode: true
        in: query
        name: path
        required: true
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/x-tar:
            schema:
              items:
                format: int32
                minimum: 0
                type: integer
              type: array
        description: Uncompressed TAR archive to extract into the container
        required: true
      responses:
        "200":
          description: Archive extracted
        "400":
          description: Missing path or invalid archive
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container or destination not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support archive upload
      security:
      - bearer_auth: []
      summary: |-
        `PUT /api/v1/containers/{id}/archive?path=<...>` — extract a TAR
        archive into the container at the given path.
      tags:
      - Containers
  /api/v1/containers/{id}/changes:
    get:
      description: |-
        Mirrors Docker-compat `GET /containers/{id}/changes`. Returns one
        `ContainerChangeEntry` per added / modified / deleted path in the
        container's writable layer. Runtimes without a layered filesystem
        (e.g. youki) return 501.

        # Errors

        Returns 404 when the container can't be resolved, 501 when the runtime
        doesn't compute layer diffs.
      operationId: changes_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ContainerChangeEntry"
                type: array
          description: Filesystem changes
        "401":
          description: Unauthorized
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support filesystem diffs
      security:
      - bearer_auth: []
      summary: Report changes to the container's filesystem.
      tags:
      - Containers
  /api/v1/containers/{id}/exec:
    post:
      description: |-
        When `stream=true` is passed as a query parameter, this endpoint upgrades
        to a Server-Sent Events stream emitting:
        - `event: stdout\ndata: <line>\n\n` for each stdout line
        - `event: stderr\ndata: <line>\n\n` for each stderr line
        - `event: exit\ndata: {"exit_code": N}\n\n` as the final event

        # Errors

        Returns an error if the container is not found, the command is invalid,
        execution fails, or the user lacks the operator role.
      operationId: exec_in_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Stream exec events as SSE instead of returning a buffered JSON
          body.
        explode: true
        in: query
        name: stream
        required: false
        schema:
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContainerExecRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerExecResponse"
          description: "Command executed (JSON body when stream=false, SSE stream\
            \ when stream=true)"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Execute a command in a running container.
      tags:
      - Containers
  /api/v1/containers/{id}/kill:
    post:
      description: |-
        Mirrors Docker-compat `POST /containers/{id}/kill`. When the request body's
        `signal` field is omitted, the runtime sends `SIGKILL`. Accepted signals
        are `SIGKILL`, `SIGTERM`, `SIGINT`, `SIGHUP`, `SIGUSR1`, `SIGUSR2` (with
        or without the `SIG` prefix); any other value is rejected with `400`.

        # Errors

        Returns `400` for unknown signals, `404` if the container is not found,
        `403` if the caller lacks the `operator` role, `501` if the runtime does
        not support `kill_container`, and `500` for other runtime errors.
      operationId: kill_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KillContainerRequest"
        required: true
      responses:
        "204":
          description: Signal delivered
        "400":
          description: Invalid signal
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support kill
      security:
      - bearer_auth: []
      summary: Send a signal to a running container.
      tags:
      - Containers
  /api/v1/containers/{id}/logs:
    get:
      description: |-
        Backed by [`Runtime::logs_stream`]. Two wire formats are supported:

        * `format=json` (the default) — emit one NDJSON `LogChunk` per line:
          `{"stream":"stdout|stderr","timestamp":"...","data":"<utf8>"}` (or
          `data_b64` when the bytes aren't valid UTF-8). `Content-Type:
          application/json`.

        * `format=raw` — emit Docker's multiplexed stdcopy framing
          (`application/vnd.docker.raw-stream`). Consumed by the Docker compat
          shim in `zlayer-docker`.

        `follow=true` keeps the stream open until the runtime reports EOF or the
        client disconnects. Stream errors mid-flight are emitted as a final
        `{"error": "..."}` line (json mode) or simply terminate the body (raw
        mode) — Docker's raw framing has no in-band error escape.

        # Errors

        Returns `404` when the container can't be resolved, `500` on a runtime
        failure to open the stream.
      operationId: get_container_logs
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          Number of tail lines to return. `0` and "all" map to "everything
          available"; otherwise the runtime ships the last `tail` lines before
          the live stream begins.
        explode: true
        in: query
        name: tail
        required: false
        schema:
          minimum: 0
          type: integer
        style: form
      - description: Follow logs after the current end-of-buffer marker.
        explode: true
        in: query
        name: follow
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          Earliest log timestamp to include (Unix seconds). `None` means no
          lower bound.
        explode: true
        in: query
        name: since
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      - description: |-
          Latest log timestamp to include (Unix seconds). `None` means no upper
          bound.
        explode: true
        in: query
        name: until
        required: false
        schema:
          format: int64
          nullable: true
          type: integer
        style: form
      - description: |-
          When `true`, the runtime is asked to populate per-chunk timestamps so
          the wire-format includes them.
        explode: true
        in: query
        name: timestamps
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          Include stdout chunks. When neither `stdout` nor `stderr` is set, the
          handler defaults both to `true` (Docker parity).
        explode: true
        in: query
        name: stdout
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: |-
          Include stderr chunks. See [`ContainerLogQuery::stdout`] for the
          "neither set" default behavior.
        explode: true
        in: query
        name: stderr
        required: false
        schema:
          nullable: true
          type: boolean
        style: form
      - description: |-
          Wire format for the streamed body. `"json"` (the default) emits one
          NDJSON `LogChunk` per line; `"raw"` emits Docker's multiplexed stdcopy
          frames (`application/vnd.docker.raw-stream`).
        explode: true
        in: query
        name: format
        required: false
        schema:
          allOf:
          - $ref: "#/components/schemas/ContainerLogFormat"
          nullable: true
        style: form
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: "Container logs (NDJSON when format=json, Docker stdcopy frames\
            \ when format=raw)"
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Stream container logs.
      tags:
      - Containers
  /api/v1/containers/{id}/pause:
    post:
      description: |-
        Mirrors Docker-compat `POST /containers/{id}/pause`. Returns 204 on
        success, 404 if the container isn't found, 501 if the runtime cannot
        pause containers, and 500 for other runtime errors.

        # Errors

        Returns an error if authentication fails, the container is missing, the
        runtime doesn't support pause, or the underlying call fails.
      operationId: pause_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Container paused
        "400":
          description: Container not in a pausable state
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support pause
      security:
      - bearer_auth: []
      summary: Pause a running container by freezing its cgroup.
      tags:
      - Containers
  /api/v1/containers/{id}/port:
    get:
      description: |-
        Mirrors Docker-compat `GET /containers/{id}/port`. Groups the runtime's
        port-binding entries by `<container_port>/<protocol>` so the wire shape
        matches Docker's `{"Ports": {"80/tcp": [...]}}` body.

        # Errors

        Returns 404 when the container can't be resolved, 501 when the runtime
        doesn't expose port bindings.
      operationId: port_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerPortResponse"
          description: Port mappings
        "401":
          description: Unauthorized
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support port-mapping inspection
      security:
      - bearer_auth: []
      summary: Report the published port mappings for a container.
      tags:
      - Containers
  /api/v1/containers/{id}/rename:
    post:
      description: |-
        Mirrors Docker Engine's `POST /containers/{id}/rename?name=<new>`
        endpoint: the container's stored display name is updated to `name`,
        and the underlying runtime is asked to apply the rename so external
        tooling (e.g. `docker ps`) sees the new name.

        # Errors

        * `400` if the `name` query parameter is missing or empty.
        * `404` if the container cannot be resolved.
        * `409` if the runtime rejects the rename (e.g. name already in use).
        * `500` for other runtime failures.
      operationId: rename_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: New human-readable name to assign to the container. Required.
        explode: true
        in: query
        name: name
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "204":
          description: Container renamed
        "400":
          description: Missing or empty `name` query parameter
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: Rename a standalone container.
      tags:
      - Containers
  /api/v1/containers/{id}/restart:
    post:
      description: |-
        Composes `stop_container(timeout)` followed by `start_container`. Errors
        during the stop phase are ignored (the container may already be stopped);
        errors during the start phase are surfaced.

        # Errors

        Returns an error if the container is not found, the start phase fails, or
        the user lacks the operator role.
      operationId: restart_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestartContainerRequest"
        required: true
      responses:
        "204":
          description: Container restarted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: "Restart a container: stop then start."
      tags:
      - Containers
  /api/v1/containers/{id}/start:
    post:
      description: |-
        Useful for re-starting a container that was stopped via
        `POST /api/v1/containers/{id}/stop` without being removed.

        # Errors

        Returns an error if the container is not found, start fails, or the user
        lacks the operator role.
      operationId: start_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Container started
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: Start a previously-created container.
      tags:
      - Containers
  /api/v1/containers/{id}/stats:
    get:
      description: |-
        Backed by [`Runtime::stats_stream`]. The handler always advertises
        `Content-Type: application/json` and ships one [`StatsSample`] per NDJSON
        line.

        * `stream=false` (the default — Docker parity) — await the first
          `StatsSample` and close the body. Returns `200` with a single line.
        * `stream=true` — keep the body open, forwarding samples as they arrive
          until the runtime reports EOF or the client disconnects.

        Mid-stream errors are emitted as a final `{"error":"..."}` line and end
        the body. The legacy `interval` query parameter is accepted for
        backwards-compatibility but ignored: pacing is now driven by the
        runtime's own sampling cadence.

        # Errors

        `404` when the container can't be resolved, `500` if the runtime fails
        to open the stream.
      operationId: get_container_stats
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          Stream periodic samples as SSE events instead of a one-shot JSON
          response.
        explode: true
        in: query
        name: stream
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          Sample cadence in seconds (only used when `stream=true`). Clamped to
          `[1, 60]`. Defaults to `2` seconds.
        explode: true
        in: query
        name: interval
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerStatsResponse"
          description: "Container statistics (NDJSON; one sample when stream=false,\
            \ continuous when stream=true)"
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Stream container resource statistics.
      tags:
      - Containers
  /api/v1/containers/{id}/stop:
    post:
      description: |-
        Sends the runtime's graceful stop signal and waits up to `timeout` seconds
        before force-killing. The container is **not** removed; use
        `DELETE /api/v1/containers/{id}` to stop-and-remove. Idempotent: calling
        stop on an already-stopped container is not an error.

        # Errors

        Returns an error if the container is not found, stop fails, or the user
        lacks the operator role.
      operationId: stop_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopContainerRequest"
        required: true
      responses:
        "204":
          description: Container stopped
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: Stop a running container.
      tags:
      - Containers
  /api/v1/containers/{id}/top:
    get:
      description: |-
        Mirrors Docker-compat `GET /containers/{id}/top?ps_args=`. Returns the
        runtime's process listing as `Titles` + `Processes` matrix.

        # Errors

        Returns 404 when the container can't be resolved, 501 when the runtime
        doesn't expose process listings, and 500 for other failures.
      operationId: top_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          `ps`-style argument string, e.g. `"aux"` or `"-eo pid,user,cmd"`.
          Empty / omitted means "use the runtime's defaults".
        explode: true
        in: query
        name: ps_args
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerTopResponse"
          description: Process listing
        "401":
          description: Unauthorized
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support top
      security:
      - bearer_auth: []
      summary: List the processes running inside a container.
      tags:
      - Containers
  /api/v1/containers/{id}/unpause:
    post:
      description: |-
        Mirrors Docker-compat `POST /containers/{id}/unpause`. Returns 204 on
        success.

        # Errors

        Returns the same error envelope as [`pause_container`].
      operationId: unpause_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Container unpaused
        "400":
          description: Container not in a resumable state
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support unpause
      security:
      - bearer_auth: []
      summary: Resume a previously-paused container.
      tags:
      - Containers
  /api/v1/containers/{id}/update:
    post:
      description: |-
        Mirrors Docker Engine's `POST /containers/{id}/update`. The request body
        matches Docker's wire shape (`CpuShares`, `Memory`, `RestartPolicy`,
        ...) so the `zlayer-docker` compatibility shim can pass it through
        unchanged. Returns Docker's `{"Warnings": [...]}` response on success;
        the warnings vector is always present (possibly empty) so clients that
        match on field presence don't break.

        # Errors

        * `404` if the container cannot be resolved.
        * `400` if the runtime rejects a field as invalid.
        * `501` if the runtime does not support resource updates (the trait
          default returns `Unsupported`).
        * `500` for other runtime failures.
      operationId: update_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContainerUpdateRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerUpdateResponse"
          description: Update applied
        "400":
          description: Invalid update field
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support update
      security:
      - bearer_auth: []
      summary: Update a standalone container's resource limits and/or restart policy.
      tags:
      - Containers
  /api/v1/containers/{id}/wait:
    get:
      description: |-
        This endpoint blocks until the container exits. Useful for CI runners
        that need to wait for a build/test container to complete.

        # Errors

        Returns an error if the container is not found or the wait fails.
      operationId: wait_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerWaitResponse"
          description: Container exited
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Wait for a container to exit and return its exit code.
      tags:
      - Containers
    post:
      description: |-
        Mirrors Docker Engine's `POST /containers/{id}/wait?condition=` 1:1.
        Used by the `zlayer-docker` compatibility shim and any SDK callers
        that consume the Docker shape directly. The legacy
        `GET /api/v1/containers/{id}/wait` returns a richer
        [`ContainerWaitResponse`] for clients that need extended classification
        fields (`reason`, `signal`, `finished_at`).

        `condition` is one of:
        * `"not-running"` (default) — block until the container is no longer running.
        * `"next-exit"` — wait for the next observed exit.
        * `"removed"` — wait until the container is removed.

        # Errors

        Returns `400` for an unknown condition, `404` when the container can't
        be resolved, and `500` if the runtime fails the wait.
      operationId: wait_container_post
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          One of `"not-running"` (default), `"next-exit"`, or `"removed"`.
          Matches Docker's `/containers/{id}/wait` semantics. Omitted
          values default to `"not-running"`.
        explode: true
        in: query
        name: condition
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerWaitDockerResponse"
          description: Container reached the requested condition
        "400":
          description: Invalid condition
        "401":
          description: Unauthorized
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: Wait for a container to exit and return Docker-shaped JSON.
      tags:
      - Containers
