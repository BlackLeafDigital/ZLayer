    get:
      description: |-
        # Errors

        Returns an error if authentication fails or the runtime cannot enumerate
        its image cache (for example, when the backend does not implement
        `list_images`).
      operationId: list_images_handler
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ImageInfoDto"
                type: array
          description: List of cached images
        "401":
          description: Unauthorized
        "501":
          description: Runtime does not support image listing
      security:
      - bearer_auth: []
      summary: List all cached images known to the runtime.
      tags:
      - Images
  /api/v1/images/pull:
    post:
      description: |-
        This is a blocking pull: the handler returns only after the image is
        resolved and stored locally (or the pull fails). When `pull_policy` is
        omitted the default is `"always"`, matching Docker-compat semantics for
        `POST /images/create`. On success, the response echoes the reference and
        best-effort `digest`/`size_bytes` resolved via `list_images()`.

        # Errors

        Returns an error if authentication fails, the reference is empty, the
        image cannot be pulled, or the user lacks the operator role.
      operationId: pull_image_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullImageRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullImageResponse"
          description: Image pulled
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "500":
          description: Pull failed
      security:
      - bearer_auth: []
      summary: Pull an OCI image into the runtime's local cache.
      tags:
      - Images
  /api/v1/images/tag:
    post:
      description: |-
        Docker-compat `POST /api/v1/images/tag`: takes `{ source, target }` and
        asks the runtime to make `target` resolve to the same content as `source`.
        Both references must be non-empty; `target` is split on the last `:` into
        repository + tag (defaulting tag to `latest`).

        # Errors

        Returns `400` if the request body is malformed, `404` if the source image
        is not in the cache, `403` if the caller lacks the `operator` role, `501`
        if the runtime does not support tagging, and `500` for other runtime
        errors.
      operationId: tag_image_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagImageRequest"
        required: true
      responses:
        "204":
          description: Tag created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Source image not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support tagging
      security:
      - bearer_auth: []
      summary: Create a new tag pointing at an existing image.
      tags:
      - Images
  /api/v1/images/{image}:
    delete:
      description: |-
        # Errors

        Returns an error if authentication fails, the image cannot be found, or
        the runtime backend does not support image removal.
      operationId: remove_image_handler
      parameters:
      - description: Image reference (URL-encoded)
        explode: false
        in: path
        name: image
        required: true
        schema:
          type: string
        style: simple
      - description: Force removal even if the image is referenced by containers.
        explode: true
        in: query
        name: force
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "204":
          description: Image removed
        "401":
          description: Unauthorized
        "404":
          description: Image not found
        "501":
          description: Runtime does not support image removal
      security:
      - bearer_auth: []
      summary: Remove an image from the runtime's cache.
      tags:
      - Images
