    HealthCheckRequest:
      description: |-
        Container health check request.

        Mirrors the on-disk `HealthCheck` enum (see `zlayer_spec::HealthCheck`) as a
        discriminated union keyed on `type`. Translated to `zlayer_spec::HealthSpec`
        by `HealthCheckRequest::to_health_spec`. Durations are humantime strings
        (for example `"10s"`, `"500ms"`, `"1m"`).

        ## Variants
        - `type: "tcp"` — requires `port` (1-65535).
        - `type: "http"` — requires `url`; `expect_status` defaults to 200.
        - `type: "command"` — requires `command` (array of argv tokens; joined with
          spaces and passed to `sh -c` by the health monitor, matching the existing
          compose-to-ZLayer conversion in `zlayer-docker`).
      properties:
        command:
          description: |-
            Command argv (required when `type == "command"`). Joined with spaces
            and passed to `sh -c`.
          items:
            type: string
          nullable: true
          type: array
        expect_status:
          description: HTTP status code expected from `url` (defaults to 200).
          format: int32
          minimum: 0
          nullable: true
          type: integer
        interval:
          description: "Interval between checks, humantime format (e.g. `\"30s\"`).\
            \ Defaults to 30s."
          nullable: true
          type: string
        port:
          description: TCP port (required when `type == "tcp"`).
          format: int32
          minimum: 0
          nullable: true
          type: integer
        retries:
          description: Number of consecutive failures before marking unhealthy. Defaults
            to 3.
          format: int32
          minimum: 0
          nullable: true
          type: integer
        start_period:
          description: |-
            Grace period before the first check runs, humantime format. Maps to
            `HealthSpec::start_grace`.
          nullable: true
          type: string
        timeout:
          description: "Timeout per individual check, humantime format."
          nullable: true
          type: string
        type:
          description: "Check variant: `\"tcp\"`, `\"http\"`, or `\"command\"`."
          type: string
        url:
          description: HTTP URL (required when `type == "http"`).
          nullable: true
          type: string
      required:
      - type
    HealthResponse:
      description: Health check response
      example:
        version: version
        runtime_name: runtime_name
        status: status
        uptime_secs: 0
      properties:
        runtime_name:
          description: "Container runtime name (e.g. \"youki\", \"mac-sandbox\", \"\
            docker\")"
          type: string
        status:
          description: Service status
          type: string
        uptime_secs:
          description: Uptime in seconds
          format: int64
          minimum: 0
          nullable: true
          type: integer
        version:
          description: Service version
          type: string
      required:
      - status
      - version
    HeartbeatRequest:
      description: Heartbeat request from a worker node.
      example:
        cpu_used: 0.8008281904610115
        disk_used: 0
        gpu_utilization:
        - utilization_percent: 9.301444
          power_draw_w: 2.302136
          memory_total_mb: 0
          memory_used_mb: 0
          index: 0
          temperature_c: 0
        - utilization_percent: 9.301444
          power_draw_w: 2.302136
          memory_total_mb: 0
          memory_used_mb: 0
          index: 0
          temperature_c: 0
        memory_used: 0
        node_id: 0
      properties:
        cpu_used:
          format: double
          type: number
        disk_used:
          format: int64
          minimum: 0
          type: integer
        gpu_utilization:
          items:
            $ref: "#/components/schemas/GpuUtilizationReport"
          type: array
        memory_used:
          format: int64
          minimum: 0
          type: integer
        node_id:
          format: int64
          minimum: 0
          type: integer
      required:
      - cpu_used
      - disk_used
      - memory_used
      - node_id
    ImageEvent:
      description: An image lifecycle event.
      properties:
        at:
          description: Wall-clock time.
          format: date-time
          type: string
        digest:
          description: Optional content digest (`sha256:...`) when known.
          nullable: true
          type: string
        kind:
          $ref: "#/components/schemas/ImageEventKind"
        reference:
          description: Image reference (e.g. `nginx:latest` or `registry/foo/bar@sha256:...`).
          type: string
        source:
          description: Source reference for `Tag` events (the image being aliased).
          nullable: true
          type: string
      required:
      - at
      - kind
      - reference
    ImageEventKind:
      description: Kind of image lifecycle event.
      enum:
      - pull
      - push
      - delete
      - tag
      type: string
    ImageInfoDto:
      description: |-
        Serializable wrapper for `zlayer_agent::runtime::ImageInfo` so we can
        attach `ToSchema` here (the underlying type in `zlayer-agent` can't
        depend on `utoipa`).
      example:
        reference: reference
        size_bytes: 0
        digest: digest
      properties:
        digest:
          description: Content-addressed digest (`sha256:...`) if known.
          nullable: true
          type: string
        reference:
          description: Canonical image reference (e.g. `zachhandley/zlayer-manager:latest`).
          type: string
        size_bytes:
          description: Size in bytes if known.
          format: int64
          minimum: 0
          nullable: true
          type: integer
      required:
      - reference
    InternalScaleRequest:
      description: |-
        Wire-format scale request fanned out by the cluster's leader to each node
        that gets assigned at least one replica of a service.

        The leader's placement engine produces a `HashMap<NodeId, Vec<(role, index)>>`
        of assignments; each entry becomes one `InternalScaleRequest` HTTP POST.

        Backward-compatible: a peer may send `{service, replicas}` without
        `assignments`. Receiving nodes treat that as a single implicit
        `{role: "default", indices: 0..replicas}` group.
      example:
        assignments:
        - indices:
          - 0
          - 0
          role: role
        - indices:
          - 0
          - 0
          role: role
        replicas: 0
        service: service
      properties:
        assignments:
          description: |-
            Per-role-group container index lists. Empty in Phase 1; populated by
            Phase 2 once `replica_groups` + cross-node identity ship.
          items:
            $ref: "#/components/schemas/ScaleAssignment"
          type: array
        replicas:
          description: |-
            Total target replica count for this node, when caller didn't supply
            explicit per-role assignments (legacy / Phase 1 shape). When
            `assignments` is non-empty, this field is informational.
          format: int32
          minimum: 0
          type: integer
        service:
          description: Service name.
          type: string
      required:
      - service
    InternalScaleResponse:
      description: Response from internal scale operation
      example:
        replicas: 0
        service: service
        success: true
        reroute_to_os: reroute_to_os
        message: message
      properties:
        message:
          description: Optional message
          nullable: true
          type: string
        replicas:
          description: New replica count
          format: int32
          minimum: 0
          type: integer
        reroute_to_os:
          description: |-
            When set, this agent refused the scale because it cannot run the
            workload's OS (H-7 `RouteToPeer` policy). The value is the OCI-canonical
            OS string the workload requires (`linux` / `windows` / `darwin`). The
            scheduler catches this and re-dispatches to a cluster peer whose
            `NodeState.os` matches.
          nullable: true
          type: string
        service:
          description: Service name that was scaled
          type: string
        success:
          description: Whether the operation succeeded
          type: boolean
      required:
      - replicas
      - service
      - success
    IpAllocationResponse:
