      - description: Network name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema: {}
          description: Network details
        "401":
          description: Unauthorized
        "404":
          description: Network not found
      security:
      - bearer_auth: []
      summary: Get a specific network by name.
