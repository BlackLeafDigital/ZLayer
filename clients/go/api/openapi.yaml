  /api/v1/images:
    get:
      description: |-
        # Errors

        Returns an error if authentication fails or the runtime cannot enumerate
        its image cache (for example, when the backend does not implement
        `list_images`).
      operationId: list_images_handler
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ImageInfoDto"
                type: array
          description: List of cached images
        "401":
          description: Unauthorized
        "501":
          description: Runtime does not support image listing
      security:
      - bearer_auth: []
      summary: List all cached images known to the runtime.
      tags:
      - Images
  /api/v1/images/pull:
    post:
      description: |-
        Two behaviours, selected by the `stream` query parameter:

        - `stream=false` (default): blocking pull. The handler returns only
          after the image is resolved and stored locally (or the pull fails).
          Response is `{"reference":"...","digest":"...","size_bytes":...}`
          ([`PullImageResponse`]).
        - `stream=true`: NDJSON stream of [`PullProgressDto`] events. Each
          `Status { ... }` becomes one JSON line; the final `Done { ... }`
          becomes one line and the stream closes. Errors mid-pull surface as
          a single `{"error":"..."}` line and terminate the stream.

        When `pull_policy` is omitted the default is `"always"`, matching
        Docker-compat semantics for `POST /images/create`.

        # Errors

        Returns an error if authentication fails, the reference is empty, the
        image cannot be pulled, or the user lacks the operator role.
      operationId: pull_image_handler
      parameters:
      - description: |-
          When `true`, stream NDJSON `PullProgressDto` events instead of a
          single JSON response. Defaults to `false` (snapshot pull).
        explode: true
        in: query
        name: stream
        required: false
        schema:
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PullImageRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PullImageResponse"
          description: Image pulled (snapshot) or NDJSON stream of PullProgressDto
            when stream=true
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "500":
          description: Pull failed
      security:
      - bearer_auth: []
      summary: Pull an OCI image into the runtime's local cache.
      tags:
      - Images
  /api/v1/images/tag:
    post:
      description: |-
        Docker-compat `POST /api/v1/images/tag`: takes `{ source, target }` and
        asks the runtime to make `target` resolve to the same content as `source`.
        Both references must be non-empty; `target` is split on the last `:` into
        repository + tag (defaulting tag to `latest`).

        # Errors

        Returns `400` if the request body is malformed, `404` if the source image
        is not in the cache, `403` if the caller lacks the `operator` role, `501`
        if the runtime does not support tagging, and `500` for other runtime
        errors.
      operationId: tag_image_handler
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TagImageRequest"
        required: true
      responses:
        "204":
          description: Tag created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Source image not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support tagging
      security:
      - bearer_auth: []
      summary: Create a new tag pointing at an existing image.
      tags:
      - Images
  /api/v1/images/{image}:
    delete:
      description: |-
        # Errors

        Returns an error if authentication fails, the image cannot be found, or
        the runtime backend does not support image removal.
      operationId: remove_image_handler
      parameters:
      - description: Image reference (URL-encoded)
        explode: false
        in: path
        name: image
        required: true
        schema:
          type: string
        style: simple
      - description: Force removal even if the image is referenced by containers.
        explode: true
        in: query
        name: force
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "204":
          description: Image removed
        "401":
          description: Unauthorized
        "404":
          description: Image not found
        "501":
          description: Runtime does not support image removal
      security:
      - bearer_auth: []
      summary: Remove an image from the runtime's cache.
      tags:
      - Images
  /api/v1/internal/raft/trigger-elect:
    post:
      description: |-
        `POST /api/v1/internal/raft/trigger-elect`

        Called by the cluster leader's pre-self-upgrade flow on a healthy
        follower: that follower campaigns immediately instead of waiting for
        heartbeat-loss timeout after the leader exits. Raft safety still
        holds — only an up-to-date candidate can win — so a stale callee
        just loses the term and a more-up-to-date follower wins the next.

        # Errors

        - `Unauthorized` if the internal token is missing or wrong.
        - `ServiceUnavailable` on non-clustered daemons (no Raft coordinator).
        - `Internal` if the underlying `Raft::trigger().elect()` returns
          `Fatal` (coordinator shutdown / storage failure).
      operationId: internal_raft_trigger_elect
      responses:
        "202":
          description: Election triggered
        "401":
          description: Unauthorized — invalid or missing internal token
        "500":
          description: Raft trigger_elect failed
        "503":
          description: Raft coordinator not configured on this daemon
      summary: Trigger an immediate Raft election on this node.
      tags:
      - Internal
  /api/v1/internal/replicas/{service}:
    get:
      description: |-
        This endpoint allows the scheduler to query the current state of a service.

        # Errors

        Returns an error if the service is not found or authentication is invalid.
      operationId: get_replicas_internal
      parameters:
      - description: Service name
        explode: false
        in: path
        name: service
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalScaleResponse"
          description: Current replica count
        "401":
          description: Unauthorized - invalid or missing internal token
        "404":
          description: Service not found
      summary: Get the current replica count for a service.
      tags:
      - Internal
  /api/v1/internal/scale:
    post:
      description: |-
        This endpoint is called by the distributed scheduler leader to trigger
        scaling operations on agent nodes. It uses a shared secret for authentication.

        # Errors

        Returns an error if the service is not found, scaling fails, or authentication
        is invalid.
      operationId: scale_service_internal
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InternalScaleRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InternalScaleResponse"
          description: Service scaled successfully
        "401":
          description: Unauthorized - invalid or missing internal token
        "404":
          description: Service not found
        "500":
          description: Internal error
      summary: Scale a service via internal scheduler request.
      tags:
      - Internal
  /api/v1/internal/upgrade/start:
    post:
      description: |-
        `POST /api/v1/internal/upgrade/start`

        Registers an upgrade job, spawns a worker task that runs the
        `zlayer self-update` subcommand against `current_exe()`, and returns
        `202 Accepted` with an `upgrade_id` the caller can poll via
        `internal_upgrade_status`. On success the daemon exits with code 75 so
        the supervisor (or `--restart-on-exit`) respawns it.

        # Errors

        Returns `Unauthorized` if the internal token is missing or wrong.
      operationId: internal_upgrade_start
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpgradeStartRequest"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeStartResponse"
          description: Upgrade scheduled
        "401":
          description: Unauthorized — invalid or missing internal token
      summary: Schedule a daemon-binary upgrade on this node.
      tags:
      - Internal
  /api/v1/internal/upgrade/{upgrade_id}:
    get:
      description: |-
        `GET /api/v1/internal/upgrade/{upgrade_id}`

        # Errors

        Returns `Unauthorized` if the internal token is missing or wrong, or
        `NotFound` if `upgrade_id` is not in the in-memory job map (which is
        expected after a daemon restart — callers should treat that as
        "upgrade likely complete; daemon respawned").
      operationId: internal_upgrade_status
      parameters:
      - description: Upgrade job id returned by internal_upgrade_start
        explode: false
        in: path
        name: upgrade_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpgradeJobState"
          description: Current upgrade state
        "401":
          description: Unauthorized — invalid or missing internal token
        "404":
          description: Upgrade id not found (may have been lost across a daemon restart)
      summary: Fetch the status of a previously-scheduled daemon-binary upgrade.
      tags:
      - Internal
  /api/v1/jobs/{execution_id}/cancel:
    post:
      description: |-
        Attempts to cancel a running or pending job execution.

        # Errors

        Returns an error if the execution is not found, already completed, or
        cancellation fails.
      operationId: cancel_execution
      parameters:
      - description: Execution ID
        explode: false
        in: path
        name: execution_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: Execution cancelled
        "401":
          description: Unauthorized
        "404":
          description: Execution not found
        "409":
          description: Execution already completed
      security:
      - bearer_auth: []
      summary: "POST /`api/v1/jobs/{execution_id}/cancel` - Cancel a running execution"
