name: ZDB CI

on:
  push:
    branches: [zdb]
  pull_request:
    branches: [zdb]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: false
        type: string

concurrency:
  group: zdb-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "2"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"
  FORGEJO_REGISTRIES: '[{"name":"forgejo","index":"sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/","token":"${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

jobs:
  # ===========================================
  # Check (fmt, clippy)
  # ===========================================
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

  # ===========================================
  # Check (macOS) — catches cfg(target_os = "macos") errors
  # ===========================================
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: brew install protobuf python3

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Check compilation
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ===========================================
  # Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [check, check-macos]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Run unit tests
        run: cargo test --workspace --lib --bins

      - name: Run integration tests
        run: |
          cargo test -p zlayer-scheduler-zql --features test-skip-http --test '*'
          cargo test --workspace --test '*' --exclude zlayer-scheduler

      - name: Run doc tests
        run: cargo test --workspace --doc

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

  # ===========================================
  # Feature Matrix Tests
  # ===========================================
  feature-tests:
    name: Feature Tests
    runs-on: ubuntu-latest
    needs: [check, check-macos]
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--features full"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build with features
        run: cargo build --package zlayer-zql ${{ matrix.features }}

      - name: Test with features
        run: cargo test --package zlayer-zql ${{ matrix.features }}

  # ===========================================
  # Build Release (Linux)
  # ===========================================
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [test, feature-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build release binary
        run: cargo build --release --package zlayer-zql

      - name: Upload artifacts
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: zdb-binaries
          path: |
            target/release/zlayer
          retention-days: 7

  # ===========================================
  # Auto-tag and trigger publish on successful build
  # Only on push to zdb (not PRs or workflow_dispatch)
  # ===========================================
  auto-tag-and-publish:
    name: Auto-Tag & Publish
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/zdb' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Determine next version
        id: version
        run: |
          # Get the latest zdb-v* tag, sorted by version number
          LATEST_TAG=$(git tag -l 'zdb-v*' --sort=-v:refname | head -n1)

          if [ -z "$LATEST_TAG" ]; then
            # No tags yet, start at 0.1.0
            NEXT_VERSION="0.1.0"
          else
            # Strip 'zdb-v' prefix
            CURRENT="${LATEST_TAG#zdb-v}"

            # Split into major.minor.patch
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"

            # Increment patch
            PATCH=$((PATCH + 1))
            NEXT_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          fi

          echo "version=${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=zdb-v${NEXT_VERSION}" >> "$GITHUB_OUTPUT"
          echo "Auto-tagging as zdb-v${NEXT_VERSION}"

      - name: Create and push tag
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Trigger ZDB Publish workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/zdb-publish.yml/dispatches" \
            -d '{"ref": "zdb", "inputs": {"version": "${{ steps.version.outputs.version }}"}}'

  # ===========================================
  # Cache Cleanup
  # ===========================================
  cache-cleanup:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    needs: [build, feature-tests]
    if: always()
    steps:
      - name: Cleanup old caches
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: cleanup
          max-age-days: '30'
          keep-latest: '5'
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
