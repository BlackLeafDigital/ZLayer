          nullable: true
          type: string
        default_environment_id:
          description: New default environment id.
          nullable: true
          type: string
        deploy_spec_path:
          description: |-
            New path (inside the cloned repo) to the `DeploymentSpec` YAML that
            workflow `DeployProject` actions should apply. Pass `""` to clear.
          nullable: true
          type: string
        description:
          description: New description.
          nullable: true
          type: string
        git_branch:
          description: New git branch.
          nullable: true
          type: string
        git_credential_id:
          description: New git credential id.
          nullable: true
          type: string
        git_url:
          description: New git URL.
          nullable: true
          type: string
        name:
          description: New project name.
          nullable: true
          type: string
        poll_interval_secs:
          description: Set polling interval in seconds. `null` disables polling.
          format: int64
          minimum: 0
          nullable: true
          type: integer
        registry_credential_id:
          description: New registry credential id.
          nullable: true
          type: string
    UpdateUserRequest:
      description: |-
        Body for `PATCH /api/v1/users/{id}`. All fields are optional so a caller
        can update a single attribute without touching the others.
      example:
        is_active: true
        role: ""
        display_name: display_name
      properties:
        display_name:
          nullable: true
          type: string
        is_active:
          nullable: true
          type: boolean
        role:
          allOf:
          - $ref: "#/components/schemas/UserRole"
          nullable: true
    UpdateVariableRequest:
      description: "Body for `PATCH /api/v1/variables/{id}`. All fields are optional."
      example:
        name: name
        value: value
      properties:
        name:
          description: New variable name. Will be re-checked for uniqueness.
          nullable: true
          type: string
        value:
          description: New value.
          nullable: true
          type: string
    UpgradeError:
      description: Per-node error captured during a rolling upgrade.
      example:
        message: message
        node_id: 0
      properties:
        message:
          type: string
        node_id:
          format: int64
          minimum: 0
          type: integer
      required:
      - message
      - node_id
    UpgradeJobState:
      description: |-
        State of a single daemon-binary upgrade attempt. Stored in
        [`InternalState::upgrade_jobs`] and returned by `GET
        /api/v1/internal/upgrade/{id}`.
      example:
        finished_at: 2000-01-23T04:56:07.000+00:00
        started_at: 2000-01-23T04:56:07.000+00:00
        upgrade_id: upgrade_id
        error: error
        version: version
        status: ""
      properties:
        error:
          description: Human-readable failure reason (set only when `status == Failed`).
          nullable: true
          type: string
        finished_at:
          description: When the job entered its terminal state (`Restarting` or `Failed`).
          format: date-time
          nullable: true
          type: string
        started_at:
          description: When the job was registered.
          format: date-time
          type: string
        status:
          allOf:
          - $ref: "#/components/schemas/UpgradeStatus"
          description: Current lifecycle state.
        upgrade_id:
          description: Server-generated upgrade id (UUID v4).
          type: string
        version:
          description: Target version (e.g. `"v0.12.0"`); `None` means "latest release".
          nullable: true
          type: string
      required:
      - started_at
      - status
      - upgrade_id
    UpgradeStartRequest:
      description: Request body for `POST /api/v1/internal/upgrade/start`.
      example:
        version: version
      properties:
        version:
          description: |-
            Target version. `None` (or `"latest"`) defers to `self-update`'s
