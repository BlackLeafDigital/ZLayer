name: ZDB Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for artifacts (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "2"
  FORGEJO_REGISTRIES: '[{"name":"forgejo","index":"sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/","token":"${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

jobs:
  # ===========================================
  # Resolve version from tag or input
  # ===========================================
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: zdb
          fetch-depth: 0
      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ inputs.version }}
          tag-prefix: zdb-v
          bump: patch
          service-type: rust

  # ===========================================
  # Publish crates to Forgejo Cargo registry
  # ===========================================
  publish-crates:
    name: Publish Crates (Forgejo)
    needs: [resolve-version]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: zdb
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.resolve-version.outputs.version }}
          step: zdb-publish-crates
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        if: steps.check.outputs.completed != 'true'
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}
      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libseccomp-dev jq
      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Set release version
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="${{ needs.resolve-version.outputs.version || inputs.version }}"
          if [ -z "$VERSION" ]; then echo "ERROR: No version!"; exit 1; fi
          echo "Setting version to: ${VERSION}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
          find crates bin -name Cargo.toml -exec sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" {} +
          cargo generate-lockfile
      - name: Preflight safety checks (zlayer-zql must never publish to crates.io)
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          # Fail if any Cargo.toml declares a publish allowlist targeting crates-io.
          if grep -rEn '^\s*publish\s*=\s*\[[^]]*"crates-io"' crates bin Cargo.toml 2>/dev/null; then
            echo "::error::publish allowlist targets crates-io in zlayer-zql — refusing to run"
            exit 1
          fi
          # Fail if .cargo/config.toml has lost its [registries.forgejo] block.
          if ! grep -q '^\[registries\.forgejo\]' .cargo/config.toml; then
            echo "::error::.cargo/config.toml missing [registries.forgejo]"
            exit 1
          fi
          # Fail if CARGO_REGISTRY_TOKEN is set — zlayer-zql workflows must only use CARGO_REGISTRIES_FORGEJO_TOKEN.
          if [ -n "${CARGO_REGISTRY_TOKEN:-}" ]; then
            echo "::error::CARGO_REGISTRY_TOKEN set — zlayer-zql must use CARGO_REGISTRIES_FORGEJO_TOKEN only"
            exit 1
          fi
          echo "Preflight safety checks passed"
      - name: Publish workspace to Forgejo
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/cargo-publish-workspace@main
        with:
          version: ${{ needs.resolve-version.outputs.version }}
          registry: forgejo
          sparse-index-url: https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo
          require-explicit-registry: 'true'
          cargo-token: ${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.resolve-version.outputs.version }}
          step: zdb-publish-crates
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
