        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVariableRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredVariable"
          description: Updated variable
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "404":
          description: Not found
        "409":
          description: Name collides with another variable
      security:
      - bearer_auth: []
      summary: Update a variable's name and/or value. Admin only.
      tags:
      - Variables
  /api/v1/volumes:
    get:
      description: |-
        Enumerates subdirectories under the volume base directory, reads each
        sidecar when present, and returns a [`VolumeInfo`] for each entry
        (including `in_use_by` when a [`VolumeUsageSource`] is wired).

        # Errors

        Returns an error if the volume directory cannot be read.
      operationId: list_volumes
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/VolumeInfo"
                type: array
          description: List of volumes
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List all volumes on disk.
      tags:
      - Volumes
    post:
      description: |-
        Creates `state.volume_dir/{name}` on disk and writes a
        `.metadata.json` sidecar capturing labels, size, tier, and the
        creation timestamp.

        # Errors

        - 400 Bad Request — invalid name, size, or tier.
        - 403 Forbidden — caller lacks the `operator` role.
        - 409 Conflict — a volume with this name already exists.
        - 500 Internal — filesystem errors.
      operationId: create_volume
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolumeRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeInfo"
          description: Volume created
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Volume already exists
      security:
      - bearer_auth: []
      summary: Create a new named volume.
      tags:
      - Volumes
  /api/v1/volumes/{name}:
    delete:
      description: |-
        By default, refuses to remove a volume that is non-empty OR that any
        container currently reports mounting. `?force=true` overrides both
        checks.

        # Errors

        - 404 Not Found — no such volume.
        - 409 Conflict — non-empty or in-use without `?force=true`.
        - 403 Forbidden — caller lacks the `operator` role.
      operationId: delete_volume
      parameters:
      - description: Volume name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Force removal of non-empty or in-use volumes
        explode: true
        in: query
        name: force
        required: true
        schema:
          type: boolean
        style: form
      responses:
        "204":
          description: Volume deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Volume not found
        "409":
          description: Volume is non-empty or in use (use ?force=true)
      security:
      - bearer_auth: []
      summary: Delete a volume by name.
      tags:
      - Volumes
    get:
      description: |-
        Reads the sidecar when present, synthesizes defaults for legacy
        volumes, and populates `in_use_by` when a [`VolumeUsageSource`] is
        wired.

        # Errors

        - 404 Not Found — no such volume.
        - 500 Internal — filesystem or parse errors.
      operationId: get_volume
      parameters:
      - description: Volume name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeInfo"
          description: Volume metadata
        "401":
          description: Unauthorized
        "404":
          description: Volume not found
      security:
      - bearer_auth: []
      summary: Inspect a single volume by name.
      tags:
      - Volumes
  /api/v1/workflows:
    get:
      description: |-
        # Errors

        Returns [`ApiError::Internal`] if the workflow store fails.
      operationId: list_workflows
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredWorkflow"
                type: array
          description: List of workflows
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List workflows.
      tags:
      - Workflows
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] for an empty name or empty steps list,
        or [`ApiError::Internal`] when the workflow store fails.
      operationId: create_workflow
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredWorkflow"
          description: Workflow created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
      security:
      - bearer_auth: []
      summary: Create a new workflow. Admin only.
      tags:
      - Workflows
  /api/v1/workflows/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the workflow does not exist, or [`ApiError::Internal`] when the
        store fails.
      operationId: delete_workflow
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Workflow deleted
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Delete a workflow. Admin only.
      tags:
      - Workflows
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if no workflow with the given id exists,
        or [`ApiError::Internal`] when the store fails.
      operationId: get_workflow
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredWorkflow"
          description: Workflow
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Fetch a single workflow by id.
      tags:
      - Workflows
  /api/v1/workflows/{id}/run:
    post:
      description: |-
        Iterates steps sequentially:
        - `RunTask` — looks up the task and executes its `body` via `sh -c`.
        - `BuildProject` — clones / fast-forwards the project's git repo, then
          registers and awaits a real buildah build.
        - `DeployProject` — reads the project's `deploy_spec_path` from its
          checked-out working copy, parses it as a `DeploymentSpec`, and upserts
          it into the deployment store.
        - `ApplySync` — delegates to [`apply_sync_inner`] for the real reconcile.

        If a step fails and has an `on_failure` handler, that handler runs before
        the workflow aborts. Subsequent steps are marked `"skipped"`.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the workflow does not exist, or [`ApiError::Internal`] when
        execution or recording fails.
      operationId: run_workflow
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
          description: Workflow run result
        "403":
          description: Admin role required
        "404":
          description: Workflow not found
      security:
      - bearer_auth: []
      summary: Execute a workflow synchronously. Admin only.
      tags:
      - Workflows
  /api/v1/workflows/{id}/runs:
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if the workflow does not exist,
        or [`ApiError::Internal`] when the store fails.
      operationId: list_workflow_runs
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WorkflowRun"
                type: array
          description: List of workflow runs
        "404":
          description: Workflow not found
      security:
      - bearer_auth: []
      summary: "List past runs for a workflow, most recent first."
      tags:
      - Workflows
  /auth/bootstrap:
    post:
      description: |-
        # Errors

        Returns an error if the user store or credential store is not configured,
        if any user already exists, if the request is missing required fields, or
        if the underlying stores fail.
      operationId: bootstrap
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: Admin user created
        "400":
          description: Invalid email or password
        "409":
          description: Bootstrap already completed
        "503":
          description: User store not configured
      summary: Bootstrap the very first admin user. Returns 409 if any user exists.
      tags:
      - Authentication
  /auth/csrf:
    get:
      operationId: csrf
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfResponse"
          description: Rotated CSRF token
      summary: Rotate the CSRF double-submit token for the current session.
      tags:
      - Authentication
  /auth/login:
    post:
      description: |-
        # Errors

        Returns an error if credentials are invalid, the user is disabled, or any
        backing store fails.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: Logged in
        "401":
          description: Invalid credentials
        "403":
          description: User disabled
      summary: Sign in an existing user.
      tags:
      - Authentication
  /auth/logout:
    post:
      operationId: logout
      responses:
        "204":
          description: Logged out
      summary: Clear the session + CSRF cookies.
      tags:
      - Authentication
  /auth/me:
    get:
      description: |-
        # Errors

        Returns an error if the user store is not configured, if the user no longer
        exists, or if the store fails.
      operationId: me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserView"
          description: Current user
        "401":
          description: Not signed in
      summary: Return the currently signed-in user.
      tags:
      - Authentication
  /auth/oidc/providers:
    get:
      operationId: list_providers
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/OidcProviderPublic"
                type: array
          description: List of configured OIDC providers
      summary: '`GET /auth/oidc/providers`.'
      tags:
      - Authentication
  /auth/oidc/{provider}/callback:
    get:
      operationId: callback
      parameters:
      - description: Provider slug
        explode: false
        in: path
        name: provider
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OidcCallbackResponse"
          description: Signed in via OIDC
        "400":
          description: Invalid callback parameters
        "401":
          description: Provider returned an error
        "404":
          description: Unknown provider
      summary: '`GET /auth/oidc/:provider/callback`.'
      tags:
      - Authentication
  /auth/oidc/{provider}/start:
    get:
      operationId: start
      parameters:
      - description: Provider slug
        explode: false
        in: path
        name: provider
        required: true
        schema:
          type: string
        style: simple
      responses:
        "302":
          description: Redirect to provider's authorize URL
        "404":
          description: Unknown provider
      summary: '`GET /auth/oidc/:provider/start` — 302 to the provider''s authorize
        URL.'
      tags:
      - Authentication
  /auth/token:
    post:
      description: |-
        # Errors

        Returns an error if credentials are invalid or token creation fails.
      operationId: get_token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: Token created
        "401":
          description: Invalid credentials
      summary: Get an access token.
      tags:
      - Authentication
  /health/live:
    get:
      operationId: liveness
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Service is alive
      summary: Liveness probe - basic health check
      tags:
      - Health
  /health/ready:
    get:
      operationId: readiness
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Service is ready
        "503":
          description: Service not ready
      summary: Readiness probe - full health check
      tags:
      - Health
  /webhooks/{provider}/{project_id}:
    post:
      description: |-
        This endpoint is **unauthenticated** -- it relies on HMAC signature
        verification against the per-project webhook secret.

        Supported providers: `github`, `gitea`, `forgejo`, `gitlab`.

        # Errors

        Returns [`ApiError::NotFound`] when no webhook secret is configured,
        [`ApiError::Forbidden`] when signature verification fails,
        [`ApiError::BadRequest`] for unsupported providers or missing git URL,
        or [`ApiError::Internal`] on git operation failures.
      operationId: receive_webhook
      parameters:
      - description: "Git host provider (github, gitea, forgejo, gitlab)"
        explode: false
        in: path
        name: provider
        required: true
        schema:
          type: string
        style: simple
      - description: Project id
        explode: false
        in: path
        name: project_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: string
        description: Raw webhook payload from the git host
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
          description: Pull triggered
        "400":
          description: Bad request (unsupported provider or project has no git URL)
        "403":
          description: Signature verification failed
        "404":
          description: Project not found or no webhook secret configured
        "500":
          description: Pull failed
      summary: Receive a webhook push event and trigger a project pull.
      tags:
      - Webhooks
components:
  schemas:
    AddMemberRequest:
      description: "Body for `POST /api/v1/groups/{id}/members`."
      example:
        user_id: user_id
      properties:
        user_id:
          description: The user id to add.
          type: string
      required:
      - user_id
    AuditEntry:
      description: |-
        A recorded audit log entry capturing who did what, when, and to which
        resource.
      example:
        user_id: user_id
        ip: ip
        action: action
        created_at: 2026-04-15T12:00:00Z
        resource_id: resource_id
        details: "{}"
        resource_kind: resource_kind
        id: id
        user_agent: user_agent
      properties:
        action:
          description: |-
            The action performed (e.g. `"create"`, `"update"`, `"delete"`,
            `"execute"`).
          type: string
        created_at:
          description: When the action occurred.
          example: 2026-04-15T12:00:00Z
          type: string
        details:
          description: Additional context as free-form JSON.
          nullable: true
          type: object
        id:
          description: UUID identifier of this audit entry.
          type: string
        ip:
          description: "Client IP address, if known."
          nullable: true
          type: string
        resource_id:
          description: "The specific resource id, if applicable."
          nullable: true
          type: string
        resource_kind:
          description: |-
            The kind of resource acted upon (e.g. `"deployment"`, `"user"`,
            `"project"`).
          type: string
        user_agent:
          description: "Client user-agent string, if known."
          nullable: true
          type: string
        user_id:
          description: The user who performed the action.
          type: string
      required:
      - action
      - created_at
      - id
      - resource_kind
      - user_id
    BackendGroupInfo:
      description: A load-balancer backend group for one service.
      example:
        service: service
        total_count: 0
        healthy_count: 0
        strategy: strategy
        backends:
        - address: address
          healthy: true
          consecutive_failures: 0
          active_connections: 0
        - address: address
          healthy: true
          consecutive_failures: 0
          active_connections: 0
      properties:
        backends:
          description: Backends in this group.
          items:
            $ref: "#/components/schemas/BackendInfo"
          type: array
        healthy_count:
          description: Number of healthy backends.
          minimum: 0
          type: integer
        service:
          description: Service name.
          type: string
        strategy:
          description: Load-balancing strategy (`round_robin` or `least_connections`).
          type: string
        total_count:
          description: Total number of backends.
          minimum: 0
          type: integer
      required:
      - backends
      - healthy_count
      - service
      - strategy
      - total_count
    BackendInfo:
      description: Information about a single backend in a load-balancer group.
      example:
        address: address
        healthy: true
        consecutive_failures: 0
        active_connections: 0
      properties:
        active_connections:
          description: Number of in-flight connections.
          format: int64
          minimum: 0
          type: integer
        address:
          description: Backend address (`ip:port`).
          type: string
        consecutive_failures:
          description: Number of consecutive health-check failures.
          format: int64
          minimum: 0
          type: integer
        healthy:
          description: Whether the backend is currently healthy.
          type: boolean
      required:
      - active_connections
      - address
      - consecutive_failures
      - healthy
    BackendsResponse:
      description: Response for `GET /api/v1/proxy/backends`.
      example:
        total_groups: 0
        groups:
        - service: service
          total_count: 0
          healthy_count: 0
          strategy: strategy
          backends:
          - address: address
            healthy: true
            consecutive_failures: 0
            active_connections: 0
          - address: address
            healthy: true
            consecutive_failures: 0
            active_connections: 0
        - service: service
          total_count: 0
          healthy_count: 0
          strategy: strategy
          backends:
          - address: address
            healthy: true
            consecutive_failures: 0
            active_connections: 0
          - address: address
            healthy: true
            consecutive_failures: 0
            active_connections: 0
      properties:
        groups:
          description: Backend group details.
          items:
            $ref: "#/components/schemas/BackendGroupInfo"
          type: array
        total_groups:
          description: Total number of backend groups.
          minimum: 0
          type: integer
      required:
      - groups
      - total_groups
    BootstrapRequest:
      description: Request for `POST /auth/bootstrap`.
      example:
        password: password
        display_name: display_name
        email: email
      properties:
        display_name:
          nullable: true
          type: string
        email:
          type: string
        password:
          type: string
      required:
      - email
      - password
    BridgeNetwork:
      description: A user-defined bridge or overlay network that containers can attach
        to.
      example:
        subnet: subnet
        internal: true
        driver: ""
        name: name
        created_at: 2000-01-23T04:56:07.000+00:00
        id: id
        labels:
          key: labels
      properties:
        created_at:
          description: "Creation timestamp (UTC, RFC 3339)."
          format: date-time
          type: string
        driver:
          allOf:
          - $ref: "#/components/schemas/BridgeNetworkDriver"
          description: Driver backing the network (bridge vs. overlay).
        id:
          description: Opaque server-generated identifier (UUID v4).
          type: string
        internal:
          description: |-
            If true, containers attached to this network cannot reach the outside
            world — only other containers on the same network.
          type: boolean
        labels:
          additionalProperties:
            type: string
          description: Arbitrary key/value labels for filtering and grouping.
        name:
          description: "Human-readable, unique name (must match `^[a-z0-9][a-z0-9_-]{0,63}$`)."
          type: string
        subnet:
          description: IPv4/IPv6 subnet in CIDR notation (e.g. `"10.240.0.0/24"`).
          nullable: true
          type: string
      required:
      - created_at
      - id
      - name
    BridgeNetworkAttachment:
      description: "A container attached to a [`BridgeNetwork`]."
      example:
        aliases:
        - aliases
        - aliases
        container_name: container_name
        ipv4: ipv4
        container_id: container_id
      properties:
        aliases:
          description: DNS aliases the container can be reached by on this network.
          items:
            type: string
          type: array
        container_id:
          description: Runtime-provided container id.
          type: string
        container_name:
          description: "Container name, if known."
          nullable: true
          type: string
        ipv4:
          description: Assigned IPv4 address on the network (if any).
          nullable: true
          type: string
      required:
      - container_id
    BridgeNetworkDetails:
      allOf:
      - allOf:
        - $ref: "#/components/schemas/BridgeNetwork"
        description: |-
          Core network metadata. Flattened so the JSON stays close to the
          list-item shape returned by `list_container_networks`.
      - properties:
          attached_containers:
            description: Containers currently attached to the network.
            items:
              $ref: "#/components/schemas/BridgeNetworkAttachment"
            type: array
        required:
        - attached_containers
      description: "Response body for `GET /api/v1/container-networks/{id_or_name}`."
      example:
        subnet: subnet
        internal: true
        driver: ""
        name: name
        created_at: 2000-01-23T04:56:07.000+00:00
        attached_containers:
        - aliases:
          - aliases
          - aliases
          container_name: container_name
          ipv4: ipv4
          container_id: container_id
        - aliases:
          - aliases
          - aliases
          container_name: container_name
          ipv4: ipv4
          container_id: container_id
        id: id
        labels:
          key: labels
    BridgeNetworkDriver:
      description: "Backing driver for a [`BridgeNetwork`]."
      enum:
      - bridge
      - overlay
      type: string
    BuildKind:
      description: How a project is built.
      enum:
      - dockerfile
      - compose
      - z_imagefile
      - spec
      type: string
    BuildRequest:
      description: Build request for JSON API
      properties:
        build_args:
          additionalProperties:
            type: string
          description: Build arguments (ARG values)
        no_cache:
          description: Disable cache
          type: boolean
        push:
          description: Push to registry after build
          type: boolean
        runtime:
          description: Use runtime template instead of Dockerfile
          nullable: true
          type: string
        tags:
          description: Tags to apply to the image
          items:
            type: string
          type: array
        target:
          description: Target stage for multi-stage builds
          nullable: true
          type: string
    BuildRequestWithContext:
      description: Build request with server-side context path
      example:
        build_args:
          key: build_args
        context_path: context_path
        no_cache: true
        runtime: runtime
        push: true
        tags:
        - tags
        - tags
        target: target
      properties:
        build_args:
          additionalProperties:
            type: string
          description: Build arguments
        context_path:
