[package]
name = "zlayer-types"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Shared wire types for the ZLayer platform — API DTOs, OCI image references, and related serde types."
readme = "README.md"

[dependencies]
oci-client = { workspace = true }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true }
serde_yaml = { workspace = true }
chrono = { workspace = true, features = ["serde"] }
cron = { workspace = true }
humantime = "2.3"
regex = "1.12"
thiserror = { workspace = true }
utoipa = { workspace = true }
uuid = { workspace = true, features = ["v4"] }
validator = { workspace = true, features = ["derive"] }
# Lifted from zlayer-secrets so cross-crate consumers (zlayer-api, zlayer-agent,
# the CLI) can name secrets data shapes without depending on zlayer-secrets.
secrecy = { workspace = true }
tempfile = "3"
zeroize = { version = "1.7", features = ["derive"] }
base64 = { workspace = true }

[lints]
workspace = true
