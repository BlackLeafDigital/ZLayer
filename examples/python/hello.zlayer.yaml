# Minimal ZLayer deployment spec for the Python SDK end-to-end example.
#
# Mirrors the shape of examples/simple.zlayer.yml, but uses alpine + a
# trivial `sleep infinity` command so the container just sits running
# without needing a network endpoint.
version: v1
deployment: hello

services:
  hello:
    rtype: service
    image:
      name: alpine:3.20
      pull_policy: if_not_present

    command: ["sh", "-c", "sleep infinity"]

    scale:
      mode: fixed
      replicas: 1
