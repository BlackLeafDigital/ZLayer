  /api/v1/deployments:
    get:
      description: |-
        # Errors

        Returns an error if storage access fails.
      operationId: list_deployments
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/DeploymentSummary"
                type: array
          description: List of deployments
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List all deployments.
      tags:
      - Deployments
    post:
      description: |-
        When the daemon has orchestration wired (service manager, proxy, overlay),
        this handler:
         1. Parses and validates the spec YAML
         2. Stores the deployment with status `Deploying`
         3. Spawns an async task that registers services, sets up overlays,
            configures the proxy, and scales services
         4. Returns immediately with `Deploying` status
         5. The async task updates the stored status to `Running` or `Failed`

        Without orchestration wired, it stores the spec with `Pending` status.

        # Errors

        Returns an error if the spec is invalid or storage fails.
      operationId: create_deployment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeploymentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentDetails"
          description: Deployment created
        "400":
          description: Invalid specification
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: Create a new deployment.
      tags:
      - Deployments
  /api/v1/deployments/{deployment}/services:
    get:
      description: |-
        # Errors

        Returns an error if the deployment is not found or storage access fails.
      operationId: list_services
      parameters:
      - description: Deployment name
        explode: false
        in: path
        name: deployment
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ServiceSummary"
                type: array
          description: List of services
        "401":
