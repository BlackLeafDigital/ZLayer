name: macOS Sandbox Images

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild all images even if versions unchanged'
        required: false
        type: boolean
        default: false

  # Weekly check for new SDK versions
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC

env:
  REGISTRY: ghcr.io/blackleafdigital/zlayer
  CARGO_TERM_COLOR: always

jobs:
  # ===========================================
  # Check for SDK version updates
  # ===========================================
  check-versions:
    name: Check SDK Versions
    runs-on: macos-latest
    outputs:
      any_changed: ${{ steps.check.outputs.any_changed }}
      go_version: ${{ steps.detect.outputs.go }}
      rust_version: ${{ steps.detect.outputs.rust }}
      node_version: ${{ steps.detect.outputs.node }}
      python_version: ${{ steps.detect.outputs.python }}
      deno_version: ${{ steps.detect.outputs.deno }}
      bun_version: ${{ steps.detect.outputs.bun }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install jq
        run: command -v jq &>/dev/null || brew install jq

      - name: Detect latest SDK versions
        id: detect
        run: |
          GO=$(curl -fsSL 'https://go.dev/dl/?mode=json' | jq -r '.[0].version' | sed 's/go//' || echo "1.23.0")
          RUST=$(curl -fsSL 'https://static.rust-lang.org/dist/channel-rust-stable.toml' | grep -m1 '^version' | cut -d'"' -f2 | cut -d' ' -f1 || echo "1.82.0")
          NODE=$(curl -fsSL 'https://nodejs.org/dist/index.json' | jq -r '[.[] | select(.lts != false)][0].version' | sed 's/v//' || echo "22.0.0")
          PYTHON=$(curl -fsSL 'https://endoflife.date/api/python.json' | jq -r '.[0].latest' || echo "3.13.0")
          DENO=$(curl -fsSL 'https://api.github.com/repos/denoland/deno/releases/latest' | jq -r '.tag_name' | sed 's/^v//' || echo "2.0.0")
          BUN=$(curl -fsSL 'https://api.github.com/repos/oven-sh/bun/releases/latest' | jq -r '.tag_name' | sed 's/^bun-v//' || echo "1.0.0")

          echo "go=${GO}" >> "$GITHUB_OUTPUT"
          echo "rust=${RUST}" >> "$GITHUB_OUTPUT"
          echo "node=${NODE}" >> "$GITHUB_OUTPUT"
          echo "python=${PYTHON}" >> "$GITHUB_OUTPUT"
          echo "deno=${DENO}" >> "$GITHUB_OUTPUT"
          echo "bun=${BUN}" >> "$GITHUB_OUTPUT"
          echo "Latest: Go=${GO} Rust=${RUST} Node=${NODE} Python=${PYTHON} Deno=${DENO} Bun=${BUN}"

      # Use resolve-version to check if each image already exists in GHCR
      - name: Check golang
        id: check-go
        if: inputs.force_rebuild != true
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ steps.detect.outputs.go }}
          registry: ghcr.io
          registry-type: docker
          image-name: blackleafdigital/zlayer/golang
          registry-user: ${{ github.actor }}
          registry-password: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Check node
        id: check-node
        if: inputs.force_rebuild != true
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ steps.detect.outputs.node }}
          registry: ghcr.io
          registry-type: docker
          image-name: blackleafdigital/zlayer/node
          registry-user: ${{ github.actor }}
          registry-password: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Determine if rebuild needed
        id: check
        run: |
          if [[ "${{ inputs.force_rebuild }}" == "true" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            echo "Force rebuild requested"
          elif [[ "${{ steps.check-go.outputs.is-new }}" == "true" ]] || \
               [[ "${{ steps.check-node.outputs.is-new }}" == "true" ]]; then
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            echo "New SDK versions detected"
          else
            # Default to true — better to rebuild than miss updates
            echo "any_changed=true" >> "$GITHUB_OUTPUT"
            echo "Defaulting to rebuild"
          fi

  # ===========================================
  # Build & Push macOS sandbox images
  # ===========================================
  build-and-push:
    name: Build & Push macOS Images
    needs: [check-versions]
    if: needs.check-versions.outputs.any_changed == 'true'
    runs-on: macos-latest
    env:
      FORGEJO_REGISTRIES: '[{"name":"forgejo","index":"sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/","token":"${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GH_ACCESS_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build and push macOS sandbox images
        uses: ./
        with:
          command: "pipeline -f images/macos/ZPipeline.yaml --push"
