[package]
name = "zlayer-wsl"
version = "0.0.0-dev"
edition = "2021"
description = "WSL2 backend integration for ZLayer on Windows"
license = "MIT"

[lints]
workspace = true

[dependencies]
anyhow = { workspace = true }
