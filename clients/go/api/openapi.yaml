      tags:
      - Notifiers
    patch:
      description: |-
        Supports partial updates: only fields present in the request body are
        changed.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the notifier does not exist, [`ApiError::BadRequest`] for
        validation errors, or [`ApiError::Internal`] when the store fails.
      operationId: update_notifier
      parameters:
      - description: Notifier id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateNotifierRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredNotifier"
          description: Notifier updated
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Update a notifier. Admin only.
      tags:
      - Notifiers
  /api/v1/notifiers/{id}/test:
    post:
      description: |-
        For Slack and Discord, sends a test message via the configured webhook
        URL. For generic webhooks, sends a JSON test payload. For SMTP, sends a
        real email via [`lettre`] using the notifier's configured credentials.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the notifier does not exist, or [`ApiError::Internal`] when the
        notification fails with a truly internal error. Upstream failures
        (bad credentials, unreachable SMTP server, invalid addresses) are
        returned with HTTP 200 and `success: false` in the body, matching the
        convention established by the Slack/Discord/Webhook arms.
      operationId: test_notifier
      parameters:
      - description: Notifier id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotifierResponse"
          description: Test notification sent
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Send a test notification through a notifier. Admin only.
      tags:
      - Notifiers
  /api/v1/overlay/dns:
    get:
      description: |-
        Returns DNS server configuration and registered service count.
        When DNS is not configured, returns a disabled status (not an error).
      operationId: get_dns_status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsStatusResponse"
          description: DNS service status
      summary: Get DNS service status.
      tags:
      - Overlay
  /api/v1/overlay/ip-alloc:
    get:
      description: |-
        Returns the overlay network's IP allocation statistics including CIDR,
        total IPs, allocated count, and utilization. Available on any node that
        has an active overlay (not just leaders).

        # Errors

        Returns an error if the overlay is not initialized.
      operationId: get_ip_allocation
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpAllocationResponse"
          description: IP allocation status
        "503":
          description: Not a leader node or overlay not initialized
      summary: Get IP allocation status.
      tags:
      - Overlay
  /api/v1/overlay/nat/status:
    get:
      description: |-
        Returns the daemon's current NAT traversal configuration plus the live
        runtime state from the overlay manager: configured STUN/TURN servers,
        the bound relay-server address (if running), the locally gathered ICE
        candidates, per-peer connection types, and the timestamp of the last
        successful STUN refresh.

        When the overlay manager is not initialised (host-networking mode) the
        response reports `enabled: false` with empty server / candidate lists
        rather than 503 — the Manager UI uses this endpoint to surface "NAT
        disabled" badges and shouldn't have to special-case missing overlays.
      operationId: get_nat_status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NatStatusResponse"
          description: NAT traversal status
      summary: Get NAT traversal status.
      tags:
      - Overlay
  /api/v1/overlay/peers:
    get:
      description: |-
        Returns peer information from the overlay transport's UAPI state.
        When the overlay is not initialized, returns 503.

        # Errors

        Returns an error if the overlay network is not initialized.
      operationId: get_overlay_peers
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeerListResponse"
          description: List of overlay peers
        "503":
          description: Overlay not initialized
      summary: Get list of overlay peers.
      tags:
      - Overlay
  /api/v1/overlay/services/{name}:
    get:
      description: |-
        Returns the resolved overlay mode (after `resolve_v0_51`) and the
        per-node bridge map describing where on each node the service's
        overlay terminates.

        In v0.51 this endpoint is a stub: the bridge map is always empty and
        the mode is always `Shared` (the only implemented mode). Real wiring
        lands in P9a once `OverlayManager` exposes a per-service bridge view.

        # Errors

        Returns 503 if the overlay manager is not initialised (host
        networking mode). The 404 case (service unknown to this node) is
        reserved for the post-P9a implementation; today the stub always
        responds with an empty bridge map for any name.
      operationId: get_service_overlay_status
      parameters:
      - description: Service name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServiceOverlayStatus"
          description: Service overlay status
        "503":
          description: Overlay not initialized
      summary: Get the overlay status for a single service.
      tags:
      - Overlay
  /api/v1/overlay/services/{name}/bridges/{node_id}:
    get:
      description: |-
        In v0.51 this endpoint is a stub: the bridge map is not yet populated
        by the overlay manager, so every call returns 404. The endpoint
        contract is defined now so adapter crates (zlayer-docker, manager UI,
        Python SDK) can consume it day-one once P9a wires the real bridges.

        # Errors

        Returns 503 if the overlay manager is not initialised, and 404 in all
        other cases until P9a lands.
      operationId: get_service_bridge
      parameters:
      - description: Service name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Node ID
        explode: false
        in: path
        name: node_id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeInfo"
          description: Bridge info for this service on this node
        "404":
          description: No bridge found for this service on this node
        "503":
          description: Overlay not initialized
      summary: Get the bridge attachment for a service on a specific node.
      tags:
      - Overlay
  /api/v1/overlay/status:
    get:
      description: |-
        Returns the current overlay network status including interface name,
        node IP, CIDR, peer counts, and whether the transport is active.
        Returns 503 if the overlay network is not initialized (e.g. host
        networking mode).

        # Errors

        Returns an error if the overlay network is not initialized.
      operationId: get_overlay_status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlayStatusResponse"
          description: Overlay network status
        "503":
          description: Overlay not initialized
      summary: Get overlay network status.
      tags:
      - Overlay
  /api/v1/permissions:
    get:
      description: |-
        Exactly one of `user` or `group` must be provided.

        # Errors

        Returns [`ApiError::BadRequest`] when neither or both query parameters are
        provided, or [`ApiError::Internal`] if the store fails.
      operationId: list_permissions
      parameters:
      - description: Filter by user id.
        explode: true
        in: query
        name: user
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter by group id.
        explode: true
        in: query
        name: group
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredPermission"
                type: array
          description: List permissions
        "400":
          description: Must provide exactly one of user or group
      summary: List permissions for a subject (user or group).
      tags:
      - Permissions
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] when required fields are missing, or
        [`ApiError::Internal`] if the store fails.
      operationId: grant_permission
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantPermissionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredPermission"
          description: Permission granted
        "400":
          description: Invalid request
        "403":
          description: Admin role required
      summary: Grant a permission. Admin only.
      tags:
      - Permissions
  /api/v1/permissions/by-resource:
    get:
      description: |-
        When `id` is supplied, returns exact-resource grants; when omitted, returns
        wildcard grants for the given `kind`.

        # Errors

        Returns [`ApiError::Internal`] on store failure.
      operationId: list_permissions_by_resource
      parameters:
      - description: Resource kind (e.g. `"environment"`).
        explode: true
        in: query
        name: kind
        required: true
        schema:
          type: string
        style: form
      - description: Specific resource id. Omit for wildcard grants only.
        explode: true
        in: query
        name: id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredPermission"
                type: array
          description: Grants on the resource
      summary: List permissions granted on a specific resource.
      tags:
      - Permissions
  /api/v1/permissions/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::NotFound`] when the permission does not exist, or
        [`ApiError::Internal`] if the store fails.
      operationId: revoke_permission
      parameters:
      - description: Permission id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Permission revoked
        "403":
          description: Admin role required
        "404":
          description: Permission not found
      summary: Revoke a permission by id. Admin only.
      tags:
      - Permissions
  /api/v1/projects:
