name: 'ZLayer CLI'
description: 'Install and (optionally) run the ZLayer CLI'
author: 'BlackLeaf Digital'

branding:
  icon: 'box'
  color: 'blue'

inputs:
  version:
    description: 'ZLayer version (default: latest)'
    required: false
    default: 'latest'
  command:
    description: 'Optional ZLayer command to run after install. If empty, the action only installs.'
    required: false
    default: ''
  working-directory:
    description: 'Working directory for the command'
    required: false
    default: '.'
  install-dir:
    description: |
      Where to install the zlayer binary.
      - empty (default): portable install to $RUNNER_TEMP/zlayer-bin. No sudo, no daemon, no system deps touched.
      - non-empty (e.g. /usr/local/bin): full system install via install.sh. Handles libseccomp / cgroups v2 / SELinux relabel / completions / optional daemon. Requires sudo.
    required: false
    default: ''
  data-dir:
    description: |
      ZLAYER_DATA_DIR override propagated via $GITHUB_ENV so every subsequent step in the job sees it.
      - empty in portable mode: defaults to $RUNNER_TEMP/zlayer-data.
      - empty in system mode: leaves ZLAYER_DATA_DIR unset (zlayer uses platform default /var/lib/zlayer).
      - non-empty: written verbatim to $GITHUB_ENV in both modes.
    required: false
    default: ''
  install-daemon:
    description: |
      Only used in system mode (install-dir non-empty). If 'true', install.sh runs `zlayer daemon install`
      (systemd on Linux, launchd on macOS). Default 'false' (sets ZLAYER_NO_SERVICE=1).
    required: false
    default: 'false'

outputs:
  version:
    description: 'Installed ZLayer version'
    value: ${{ steps.install.outputs.version }}
  bin-dir:
    description: 'Directory the zlayer binary was installed into'
    value: ${{ steps.install.outputs.bin_dir }}
  data-dir:
    description: 'Resolved ZLAYER_DATA_DIR (empty when system mode and no override was given).'
    value: ${{ steps.install.outputs.data_dir }}

runs:
  using: 'composite'
  steps:
    - name: Detect platform
      id: platform
      shell: bash
      run: |
        set -euo pipefail
        OS=$(uname -s | tr '[:upper:]' '[:lower:]')
        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64)  ARCH="amd64" ;;
          aarch64|arm64) ARCH="arm64" ;;
          *) echo "Unsupported arch: $ARCH" >&2; exit 1 ;;
        esac
        case "$OS" in
          darwin) PLATFORM="darwin-${ARCH}" ;;
          linux)  PLATFORM="linux-${ARCH}" ;;
          *) echo "Unsupported OS: $OS" >&2; exit 1 ;;
        esac
        echo "platform=$PLATFORM" >> "$GITHUB_OUTPUT"

    - name: Install ZLayer
      id: install
      shell: bash
      run: |
        set -euo pipefail

        VERSION="${{ inputs.version }}"
        PLATFORM="${{ steps.platform.outputs.platform }}"
        INSTALL_DIR_INPUT="${{ inputs.install-dir }}"
        DATA_DIR_INPUT="${{ inputs.data-dir }}"
        INSTALL_DAEMON_INPUT="${{ inputs.install-daemon }}"

        if ! command -v jq >/dev/null 2>&1; then
          echo "Error: jq is required but not installed." >&2
          echo "  macOS:  brew install jq" >&2
          echo "  Linux:  sudo apt-get install -y jq  (or your package manager)" >&2
          exit 1
        fi

        if [ "$VERSION" = "latest" ]; then
          if ! API_JSON="$(curl -fsSL --connect-timeout 10 --max-time 30 \
                  "https://api.github.com/repos/BlackLeafDigital/ZLayer/releases/latest")"; then
            echo "Error: Failed to fetch latest release from api.github.com (timeout/network)." >&2
            echo "Pin a version explicitly via the 'version' input if this persists." >&2
            exit 1
          fi
          VERSION="$(printf '%s' "$API_JSON" | jq -r '.tag_name // empty')"
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "Error: Could not parse tag_name from GitHub API response." >&2
            exit 1
          fi
        fi

        if [ -z "$INSTALL_DIR_INPUT" ]; then
          # ---------------- Portable mode ----------------
          DL_VERSION="${VERSION#v}"
          ARTIFACT="zlayer-${DL_VERSION}-${PLATFORM}.tar.gz"
          URL="https://github.com/BlackLeafDigital/ZLayer/releases/download/${VERSION}/${ARTIFACT}"
          echo "Installing ZLayer ${VERSION} for ${PLATFORM} (portable mode)"
          echo "Source: ${URL}"

          TMPDIR="${RUNNER_TEMP:-/tmp}/zlayer-install-$$"
          BIN_DIR="${RUNNER_TEMP:-/tmp}/zlayer-bin"
          mkdir -p "$TMPDIR" "$BIN_DIR"
          trap 'rm -rf "$TMPDIR"' EXIT

          if ! curl -fsSL --connect-timeout 30 --max-time 300 \
                  "$URL" -o "${TMPDIR}/zlayer.tar.gz"; then
            echo "Error: Download failed for ${URL}" >&2
            exit 1
          fi

          tar -xzf "${TMPDIR}/zlayer.tar.gz" -C "${TMPDIR}"

          BIN_PATH="$(find "${TMPDIR}" -type f -name zlayer -perm -u+x | head -1)"
          if [ -z "$BIN_PATH" ]; then
            BIN_PATH="$(find "${TMPDIR}" -type f -name zlayer | head -1)"
          fi
          if [ -z "$BIN_PATH" ]; then
            echo "Error: zlayer binary not found inside ${ARTIFACT}" >&2
            ls -laR "${TMPDIR}" >&2 || true
            exit 1
          fi

          install -m 0755 "$BIN_PATH" "${BIN_DIR}/zlayer"
          echo "${BIN_DIR}" >> "$GITHUB_PATH"

          if [ -n "$DATA_DIR_INPUT" ]; then
            DATA_DIR="$DATA_DIR_INPUT"
          else
            DATA_DIR="${RUNNER_TEMP:-/tmp}/zlayer-data"
          fi
          mkdir -p "$DATA_DIR"
          echo "ZLAYER_DATA_DIR=${DATA_DIR}" >> "$GITHUB_ENV"

          "${BIN_DIR}/zlayer" --version

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "bin_dir=${BIN_DIR}" >> "$GITHUB_OUTPUT"
          echo "data_dir=${DATA_DIR}" >> "$GITHUB_OUTPUT"
        else
          # ---------------- System mode ----------------
          echo "Installing ZLayer ${VERSION} for ${PLATFORM} (system mode -> ${INSTALL_DIR_INPUT})"

          INSTALLER_DIR="${RUNNER_TEMP:-/tmp}/zlayer-installer-$$"
          mkdir -p "$INSTALLER_DIR"
          trap 'rm -rf "$INSTALLER_DIR"' EXIT
          INSTALLER="${INSTALLER_DIR}/install.sh"

          INSTALLER_URL="https://raw.githubusercontent.com/BlackLeafDigital/ZLayer/${VERSION}/install.sh"
          echo "Fetching installer: ${INSTALLER_URL}"
          if ! curl -fsSL --connect-timeout 30 --max-time 60 \
                  "$INSTALLER_URL" -o "$INSTALLER"; then
            echo "Error: Download failed for ${INSTALLER_URL}" >&2
            exit 1
          fi
          chmod +x "$INSTALLER"

          if [ "$INSTALL_DAEMON_INPUT" != "true" ]; then
            ZLAYER_VERSION="$VERSION" \
            ZLAYER_INSTALL_DIR="$INSTALL_DIR_INPUT" \
            ZLAYER_NO_SERVICE=1 \
              bash "$INSTALLER"
          else
            ZLAYER_VERSION="$VERSION" \
            ZLAYER_INSTALL_DIR="$INSTALL_DIR_INPUT" \
              bash "$INSTALLER"
          fi

          BIN_DIR="$INSTALL_DIR_INPUT"
          case "$BIN_DIR" in
            /usr/local/bin|/usr/bin|/opt/homebrew/bin)
              echo "Skipping \$GITHUB_PATH append: ${BIN_DIR} is already on system PATH"
              ;;
            *)
              echo "${BIN_DIR}" >> "$GITHUB_PATH"
              ;;
          esac

          if [ -n "$DATA_DIR_INPUT" ]; then
            mkdir -p "$DATA_DIR_INPUT"
            echo "ZLAYER_DATA_DIR=${DATA_DIR_INPUT}" >> "$GITHUB_ENV"
          fi

          "${BIN_DIR}/zlayer" --version

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "bin_dir=${BIN_DIR}" >> "$GITHUB_OUTPUT"
          echo "data_dir=${DATA_DIR_INPUT}" >> "$GITHUB_OUTPUT"
        fi

    - name: Run ZLayer command
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        CMD="${{ inputs.command }}"
        if [ -z "$CMD" ]; then
          echo "(no command supplied — install-only invocation)"
          exit 0
        fi
        zlayer $CMD
