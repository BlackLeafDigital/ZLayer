    VolumeMount:
      description: |-
        Volume mount specification.

        The `type` field (a Docker-compatible discriminator) selects how `source`
        is interpreted:
        - `"bind"` (default): `source` is an absolute host path.
        - `"volume"`: `source` is a named-volume identifier.
        - `"tmpfs"`: no `source`; a memory-backed mount is provisioned.
      example:
        readonly: true
        source: source
        type: ""
        target: target
      properties:
        readonly:
          description: Mount as read-only
          type: boolean
        source:
          description: "Host path (bind), volume name (volume), or unused (tmpfs)."
          nullable: true
          type: string
        target:
          description: Container mount path
          type: string
        type:
          allOf:
          - $ref: "#/components/schemas/VolumeMountType"
          description: Mount kind. Omit (or `"bind"`) for legacy host-path binds.
          nullable: true
      required:
      - target
    VolumeMountType:
      description: |-
        Volume mount kind discriminator.

        Selects which [`zlayer_spec::StorageSpec`] variant [`VolumeMount`] is
        translated into by [`build_service_spec`]. When omitted on the wire,
        defaults to [`VolumeMountType::Bind`] (legacy behavior).
      enum:
      - bind
      - volume
      - tmpfs
      type: string
