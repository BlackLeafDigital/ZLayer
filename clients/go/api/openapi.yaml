  /api/v1/daemon/capabilities:
    get:
      description: |-
        Returns the process-wide memoised [`DaemonCapabilities`] snapshot. The
        handler is intentionally state-free — `DaemonCapabilities::get()` is a
        process-wide accessor backed by a `OnceLock`, so it does not need to
        pull from `AppState` and tests don't have to construct one to exercise
        the endpoint.

        If the survey has not been seeded yet (i.e. the daemon's startup task
        hasn't run), the first call here triggers the probe lazily.
      operationId: get_daemon_capabilities
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DaemonCapabilitiesResponse"
          description: Daemon capability survey
      summary: Get the daemon's runtime capability survey.
      tags:
      - Daemon
  /api/v1/deployments:
    get:
      description: |-
        # Errors

        Returns an error if storage access fails.
      operationId: list_deployments
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/DeploymentSummary"
                type: array
          description: List of deployments
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List all deployments.
      tags:
      - Deployments
    post:
      description: |-
        When the daemon has orchestration wired (service manager, proxy, overlay),
        this handler:
         1. Parses and validates the spec YAML
         2. Stores the deployment with status `Deploying`
         3. Spawns an async task that registers services, sets up overlays,
            configures the proxy, and scales services
         4. Returns immediately with `Deploying` status
         5. The async task updates the stored status to `Running` or `Failed`

        Without orchestration wired, it stores the spec with `Pending` status.

        # Errors

        Returns an error if the spec is invalid or storage fails.
      operationId: create_deployment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDeploymentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeploymentDetails"
          description: Deployment created
        "400":
          description: Invalid specification
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: Create a new deployment.
      tags:
      - Deployments
