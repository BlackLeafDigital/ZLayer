name: Stale-session verify (cookies cleared on 401 from /auth/me)
platform: web

# Run this with:
#   intellitester run --storage-state ./.stale-session.state.json ...
#
# The state file was written by stale-session-setup.test.yaml. Between
# the two runs, run-suite.sh executes:
#   zlayer user delete <fixture_user_id> --yes
# So the browser holds valid-looking cookies the API will reject.
#
# Verification is outcome-only: after navigating to /, the redirect to
# /login plus the now-empty cookie jar together prove the Set-Cookie
# expiries rode back on the manager_me round trip.

steps:
  # Sanity: the storageState file actually loaded the cookies.
  - type: assertCookies
    has:
      - zlayer_session
      - zlayer_csrf

  - type: navigate
    value: /

  # The fixture user was deleted, so the manager redirects us to
  # /login (other users still exist in the table).
  - type: waitForSelector
    target: { css: "#login-email" }
    state: visible
    timeout: 15000

  # Browser-jar assertion: after the bounce, both auth cookies must
  # be gone. context.cookies() (which assertCookies wraps) sees
  # HttpOnly cookies, so this catches both clears regardless of
  # JS-visibility.
  - type: assertCookies
    not:
      - zlayer_session
      - zlayer_csrf

  - type: assert
    target: { text: "Sign in to ZLayer" }

  - type: screenshot
    name: stale-session-redirected.png
