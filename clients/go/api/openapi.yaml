openapi: 3.1.0
info:
  contact:
    name: ZLayer
    url: https://zlayer.dev
  description: Container orchestration API for ZLayer
  license:
    name: MIT OR Apache-2.0
  title: ZLayer API
  version: 0.1.0
servers:
- url: /
tags:
- description: Health check endpoints
  name: Health
- description: Authentication endpoints
  name: Authentication
- description: User CRUD and password management
  name: Users
- description: Deployment management
  name: Deployments
- description: Service management
  name: Services
- description: Container image building
  name: Build
- description: Raw container lifecycle management
  name: Containers
- description: "OCI image management (list, pull, tag, remove, prune)"
  name: Images
- description: Internal scheduler-to-agent communication
  name: Internal
- description: Secrets management
  name: Secrets
- description: Environment CRUD
  name: Environments
- description: Daemon-wide container lifecycle event stream (SSE)
  name: Events
- description: Project CRUD and deployment linking
  name: Projects
- description: Git push webhook receiver and configuration
  name: Webhooks
- description: Registry and git credential management
  name: Credentials
- description: GitOps sync management
  name: Syncs
- description: Plaintext variable management
  name: Variables
- description: Named runnable script management and execution
  name: Tasks
- description: Workflow DAG management and execution
  name: Workflows
- description: Notification channel management and testing
  name: Notifiers
- description: User group CRUD and membership management
  name: Groups
- description: Resource-level permission grant/revoke
  name: Permissions
- description: Audit log query
  name: Audit
- description: Cluster node management
  name: Nodes
- description: Overlay network status and diagnostics
  name: Overlay
- description: Tunnel token and node-to-node tunnel management
  name: Tunnels
- description: Network access-control group management
  name: Networks
- description: User-defined bridge / overlay networks for standalone containers
  name: ContainerNetworks
- description: "Reverse proxy status (routes, backends, TLS, L4 streams)"
  name: Proxy
- description: "Cluster membership, heartbeats, and disaster recovery"
  name: Cluster
- description: Named volume listing and deletion
  name: Volumes
- description: Storage replication status
  name: Storage
- description: "Cron job listing, triggering, and enable/disable"
  name: Cron
- description: "Job execution triggering, status, and cancellation"
  name: Jobs
paths:
  /api/v1/audit:
    get:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin, or
        [`ApiError::Internal`] if the store fails.
      operationId: list_audit
      parameters:
      - description: Filter by user id.
        explode: true
        in: query
        name: user
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter by resource kind.
        explode: true
        in: query
        name: resource_kind
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Only entries at or after this timestamp (RFC 3339).
        explode: true
        in: query
        name: since
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Only entries at or before this timestamp (RFC 3339).
        explode: true
        in: query
        name: until
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Maximum number of entries to return (default 100).
        explode: true
        in: query
        name: limit
        required: false
        schema:
          minimum: 0
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/AuditEntry"
                type: array
          description: List audit entries
        "403":
          description: Admin role required
      summary: List audit log entries. Admin only.
      tags:
      - Audit
  /api/v1/build:
    post:
      description: |-
        Accepts a multipart form with:
        - `dockerfile`: The Dockerfile content (optional if using runtime)
        - `context`: A tarball containing the build context
        - `config`: JSON configuration (`BuildRequest`)

        # Errors

        Returns an error if the request is invalid, context extraction fails, or the build
        cannot be started.
      operationId: start_build
      requestBody:
        content:
          multipart/form-data: {}
        description: Build context with Dockerfile
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerBuildResponse"
          description: Build started
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: |-
        POST /api/v1/build
        Start a new build from multipart upload (Dockerfile + context tarball)
      tags:
      - Build
  /api/v1/build/json:
    post:
      description: |-
        # Errors

        Returns an error if the context path is invalid or the build cannot be started.
      operationId: start_build_json
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BuildRequestWithContext"
        required: true
      responses:
        "202":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TriggerBuildResponse"
          description: Build started
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: |-
        POST /api/v1/build/json
        Start a new build from JSON request with a context path on the server.
      tags:
      - Build
  /api/v1/build/{id}:
    get:
      description: |-
        # Errors

        Returns an error if the build is not found.
      operationId: get_build_status
      parameters:
      - description: Build ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BuildStatus"
          description: Build status
        "401":
          description: Unauthorized
        "404":
          description: Build not found
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/build/{id}
        Get build status.
      tags:
      - Build
  /api/v1/build/{id}/logs:
    get:
      description: |-
        # Errors

        Returns an error if the build is not found or logs cannot be read.
      operationId: get_build_logs
      parameters:
      - description: Build ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: Build logs
        "401":
          description: Unauthorized
        "404":
          description: Build not found
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/build/{id}/logs
        Get build logs.
      tags:
      - Build
  /api/v1/build/{id}/stream:
    get:
      description: |-
        # Errors

        Returns an error if the build is not found or not active.
      operationId: stream_build
      parameters:
      - description: Build ID
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          description: SSE event stream
        "401":
          description: Unauthorized
        "404":
          description: Build not found
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/build/{id}/stream
        Stream build progress via Server-Sent Events.
      tags:
      - Build
  /api/v1/builds:
    get:
      description: |-
        # Errors

        Returns an error if the user is not authenticated.
      operationId: list_builds
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BuildStatus"
                type: array
          description: List of builds
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: |-
        GET /api/v1/builds
        List all builds.
      tags:
      - Build
  /api/v1/cluster/force-leader:
    post:
      description: |-
        `POST /api/v1/cluster/force-leader`

        DESTRUCTIVE operation for when the original leader is permanently lost.
        Saves cluster state, shuts down Raft, writes a recovery marker.
        The daemon must be restarted to complete recovery.

        # Errors

        Returns an error if the confirmation string is wrong, the Raft coordinator
        is unavailable, this node is already the leader, or the recovery state
        cannot be saved.
      operationId: cluster_force_leader
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForceLeaderRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ForceLeaderResponse"
          description: Force-leader initiated
        "400":
          description: Invalid confirmation or leader still reachable
        "500":
          description: Failed to save recovery state
        "503":
          description: Raft coordinator not available
      security:
      - bearer_auth: []
      summary: Force this node to become the cluster leader (disaster recovery).
      tags:
      - Cluster
  /api/v1/cluster/heartbeat:
    post:
      description: |-
        `POST /api/v1/cluster/heartbeat`

        Accepts resource usage data from worker nodes and proposes an
        `UpdateNodeHeartbeat` to the Raft state machine.

        # Panics

        Panics if the system clock is before the Unix epoch.
      operationId: cluster_heartbeat
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
        required: true
      responses:
        "200":
          description: Heartbeat accepted
        "500":
          description: Failed to propose heartbeat
        "503":
          description: Raft coordinator not available
      summary: Handle node heartbeat.
      tags:
      - Cluster
  /api/v1/cluster/join:
    post:
      description: |-
        `POST /api/v1/cluster/join`

        Validates the join token, assigns a Raft node ID, calls `raft.add_member()`,
        and returns the assignment + peer list.

        # Errors

        Returns an error if the Raft coordinator is unavailable, the join token is
        invalid, IP allocation fails, or the Raft membership change fails.
      operationId: cluster_join
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClusterJoinRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClusterJoinResponse"
          description: Node joined successfully
        "401":
          description: Invalid join token
        "500":
          description: Failed to add member to Raft
        "503":
          description: Raft coordinator not available
      summary: Handle a cluster join request.
      tags:
      - Cluster
  /api/v1/cluster/nodes:
    get:
      description: |-
        `GET /api/v1/cluster/nodes`

        # Errors

        Returns an error if the cluster state cannot be read.
      operationId: cluster_list_nodes
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ClusterNodeSummary"
                type: array
          description: List of cluster nodes
      security:
      - bearer_auth: []
      summary: List all nodes visible in the Raft cluster state.
      tags:
      - Cluster
  /api/v1/container-networks:
    get:
      description: |-
        # Errors

        [`ApiError::BadRequest`] when the `label` query param is not in
        `key=value` form.
      operationId: list_container_networks
      parameters:
      - description: |-
          Optional label filter in `key=value` form. Only networks whose
          labels contain a matching pair are returned.
        explode: true
        in: query
        name: label
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/BridgeNetwork"
                type: array
          description: List of bridge networks
        "400":
          description: Invalid label filter
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: "List all bridge networks, optionally filtered by label."
      tags:
      - ContainerNetworks
    post:
      description: |-
        # Errors

        - [`ApiError::BadRequest`] if the network name or subnet is malformed.
        - [`ApiError::Conflict`] if a network with the same name already exists.
        - [`ApiError::Forbidden`] / [`ApiError::Unauthorized`] from the auth layer.
      operationId: create_container_network
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBridgeNetworkRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeNetwork"
          description: Network created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Network with that name already exists
      security:
      - bearer_auth: []
      summary: Create a new bridge or overlay network.
      tags:
      - ContainerNetworks
  /api/v1/container-networks/{id_or_name}:
    delete:
      description: |-
        # Errors

        - [`ApiError::NotFound`] when no network matches `id_or_name`.
        - [`ApiError::Conflict`] when the network still has attachments and
          `force` is false.
        - Auth errors propagated from the `operator` role check.
      operationId: delete_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      - description: "If true, delete even if the network still has attachments."
        explode: true
        in: query
        name: force
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "204":
          description: Network deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Network not found
        "409":
          description: Network still has attachments (use ?force=true)
      security:
      - bearer_auth: []
      summary: |-
        Delete a bridge network. Refuses if the network still has attachments
        unless `?force=true` is set.
      tags:
      - ContainerNetworks
    get:
      description: |-
        # Errors

        [`ApiError::NotFound`] when no network matches `id_or_name`.
      operationId: get_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BridgeNetworkDetails"
          description: Network details
        "401":
          description: Unauthorized
        "404":
          description: Network not found
      security:
      - bearer_auth: []
      summary: Inspect a single bridge network by id or by name.
      tags:
      - ContainerNetworks
  /api/v1/container-networks/{id_or_name}/connect:
    post:
      description: |-
        # Errors

        - [`ApiError::BadRequest`] for an empty `container_id` or invalid
          `ipv4_address`.
        - [`ApiError::NotFound`] when no network matches `id_or_name`.
      operationId: connect_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectBridgeNetworkRequest"
        required: true
      responses:
        "204":
          description: Container connected
        "400":
          description: Invalid request (e.g. bad ipv4_address)
        "401":
          description: Unauthorized
        "404":
          description: Network not found
      security:
      - bearer_auth: []
      summary: Attach a container to a network.
      tags:
      - ContainerNetworks
  /api/v1/container-networks/{id_or_name}/disconnect:
    post:
      description: |-
        # Errors

        - [`ApiError::BadRequest`] when `container_id` is empty.
        - [`ApiError::NotFound`] when the network or the container-on-network
          pair is not known (unless `force` was passed).
      operationId: disconnect_container_network
      parameters:
      - description: Network id or name
        explode: false
        in: path
        name: id_or_name
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DisconnectBridgeNetworkRequest"
        required: true
      responses:
        "204":
          description: Container disconnected
        "401":
          description: Unauthorized
        "404":
          description: Network or container not found
      security:
      - bearer_auth: []
      summary: Detach a container from a network.
      tags:
      - ContainerNetworks
  /api/v1/containers:
    get:
      description: |-
        Returns all containers managed through this API. Optionally filter by
        label using the `label` query parameter in `key=value` format.

        # Errors

        Returns an error if the user is not authenticated.
      operationId: list_containers
      parameters:
      - description: Filter by label (key=value format)
        explode: true
        in: query
        name: label
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/ContainerInfo"
                type: array
          description: List of containers
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List standalone containers.
      tags:
      - Containers
    post:
      description: |-
        Pulls the image if needed, creates the container, and starts it.
        Returns the container info including its assigned ID.

        # Errors

        Returns an error if image pull fails, container creation fails, or the
        user lacks the operator role.
      operationId: create_container
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContainerRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerInfo"
          description: Container created and started
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: Create and start a container.
      tags:
      - Containers
  /api/v1/containers/{id}:
    delete:
      description: |-
        Sends a stop signal (with a 30-second timeout), then removes the container.

        # Errors

        Returns an error if the container is not found, stop/remove fails, or the
        user lacks the operator role.
      operationId: delete_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Container stopped and removed
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Stop and remove a container.
      tags:
      - Containers
    get:
      description: |-
        # Errors

        Returns an error if the container is not found or the user is not authenticated.
      operationId: get_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerInfo"
          description: Container details
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Get details for a specific container.
      tags:
      - Containers
  /api/v1/containers/{id}/exec:
    post:
      description: |-
        When `stream=true` is passed as a query parameter, this endpoint upgrades
        to a Server-Sent Events stream emitting:
        - `event: stdout\ndata: <line>\n\n` for each stdout line
        - `event: stderr\ndata: <line>\n\n` for each stderr line
        - `event: exit\ndata: {"exit_code": N}\n\n` as the final event

        # Errors

        Returns an error if the container is not found, the command is invalid,
        execution fails, or the user lacks the operator role.
      operationId: exec_in_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Stream exec events as SSE instead of returning a buffered JSON
          body.
        explode: true
        in: query
        name: stream
        required: false
        schema:
          type: boolean
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContainerExecRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerExecResponse"
          description: "Command executed (JSON body when stream=false, SSE stream\
            \ when stream=true)"
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Execute a command in a running container.
      tags:
      - Containers
  /api/v1/containers/{id}/kill:
    post:
      description: |-
        Mirrors Docker-compat `POST /containers/{id}/kill`. When the request body's
        `signal` field is omitted, the runtime sends `SIGKILL`. Accepted signals
        are `SIGKILL`, `SIGTERM`, `SIGINT`, `SIGHUP`, `SIGUSR1`, `SIGUSR2` (with
        or without the `SIG` prefix); any other value is rejected with `400`.

        # Errors

        Returns `400` for unknown signals, `404` if the container is not found,
        `403` if the caller lacks the `operator` role, `501` if the runtime does
        not support `kill_container`, and `500` for other runtime errors.
      operationId: kill_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KillContainerRequest"
        required: true
      responses:
        "204":
          description: Signal delivered
        "400":
          description: Invalid signal
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
        "501":
          description: Runtime does not support kill
      security:
      - bearer_auth: []
      summary: Send a signal to a running container.
      tags:
      - Containers
  /api/v1/containers/{id}/logs:
    get:
      description: |-
        Returns the last N lines of container logs as plain text, or streams
        logs as Server-Sent Events when `follow=true`.

        # Errors

        Returns an error if the container is not found or log retrieval fails.
      operationId: get_container_logs
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Number of tail lines to return
        explode: true
        in: query
        name: tail
        required: false
        schema:
          minimum: 0
          type: integer
        style: form
      - description: Follow logs (SSE stream)
        explode: true
        in: query
        name: follow
        required: false
        schema:
          type: boolean
        style: form
      responses:
        "200":
          content:
            text/plain:
              schema:
                type: string
          description: Container logs (plain text or SSE stream)
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Get container logs.
      tags:
      - Containers
  /api/v1/containers/{id}/restart:
    post:
      description: |-
        Composes `stop_container(timeout)` followed by `start_container`. Errors
        during the stop phase are ignored (the container may already be stopped);
        errors during the start phase are surfaced.

        # Errors

        Returns an error if the container is not found, the start phase fails, or
        the user lacks the operator role.
      operationId: restart_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RestartContainerRequest"
        required: true
      responses:
        "204":
          description: Container restarted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: "Restart a container: stop then start."
      tags:
      - Containers
  /api/v1/containers/{id}/start:
    post:
      description: |-
        Useful for re-starting a container that was stopped via
        `POST /api/v1/containers/{id}/stop` without being removed.

        # Errors

        Returns an error if the container is not found, start fails, or the user
        lacks the operator role.
      operationId: start_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Container started
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: Start a previously-created container.
      tags:
      - Containers
  /api/v1/containers/{id}/stats:
    get:
      description: |-
        Returns CPU and memory usage statistics for the specified container.
        By default this is a one-shot JSON response. When the query string
        contains `stream=true`, the handler switches to Server-Sent Events and
        emits one `ContainerStatsResponse` sample every `interval` seconds
        (default 2, clamped to `[1, 60]`). The stream ends with a final
        `event: close` when the container exits or the runtime reports an
        unrecoverable error.

        # Errors

        Returns an error if the container is not found or stats retrieval fails.
      operationId: get_container_stats
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: |-
          Stream periodic samples as SSE events instead of a one-shot JSON
          response.
        explode: true
        in: query
        name: stream
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          Sample cadence in seconds (only used when `stream=true`). Clamped to
          `[1, 60]`. Defaults to `2` seconds.
        explode: true
        in: query
        name: interval
        required: false
        schema:
          format: int32
          minimum: 0
          nullable: true
          type: integer
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerStatsResponse"
          description: Container statistics (JSON one-shot or SSE stream)
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Get container resource statistics.
      tags:
      - Containers
  /api/v1/containers/{id}/stop:
    post:
      description: |-
        Sends the runtime's graceful stop signal and waits up to `timeout` seconds
        before force-killing. The container is **not** removed; use
        `DELETE /api/v1/containers/{id}` to stop-and-remove. Idempotent: calling
        stop on an already-stopped container is not an error.

        # Errors

        Returns an error if the container is not found, stop fails, or the user
        lacks the operator role.
      operationId: stop_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StopContainerRequest"
        required: true
      responses:
        "204":
          description: Container stopped
        "401":
          description: Unauthorized
        "403":
          description: Forbidden - operator role required
        "404":
          description: Container not found
        "500":
          description: Internal error
      security:
      - bearer_auth: []
      summary: Stop a running container.
      tags:
      - Containers
  /api/v1/containers/{id}/wait:
    get:
      description: |-
        This endpoint blocks until the container exits. Useful for CI runners
        that need to wait for a build/test container to complete.

        # Errors

        Returns an error if the container is not found or the wait fails.
      operationId: wait_container
      parameters:
      - description: Container identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContainerWaitResponse"
          description: Container exited
        "401":
          description: Unauthorized
        "404":
          description: Container not found
      security:
      - bearer_auth: []
      summary: Wait for a container to exit and return its exit code.
      tags:
      - Containers
