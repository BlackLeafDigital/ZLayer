# ZPipeline.yaml - ZLayer container image pipeline
#
# Build all ZLayer images with coordinated caching:
#   zlayer pipeline -f ZPipeline.yaml --set VERSION=0.1.0
#
# In CI:
#   zlayer pipeline -f ZPipeline.yaml --no-tui --set VERSION=$VERSION --push

version: "1"

vars:
  VERSION: "dev"
  REGISTRY: "zlayer"

defaults:
  format: oci
  retries: 2
  # platforms: ["linux/amd64", "linux/arm64"]  # Multi-arch builds (requires qemu-user-static)
  cache_mounts:
    - target: /root/.cache/cargo-leptos
      id: cargo-leptos-cache
      sharing: shared

images:
  zlayer-node:
    file: images/ZImagefile.zlayer-node
    context: "."
    tags:
      - "${REGISTRY}/zlayer-node:${VERSION}"
      - "${REGISTRY}/zlayer-node:latest"

  zlayer-web:
    file: images/ZImagefile.zlayer-web
    context: "."
    tags:
      - "${REGISTRY}/zlayer-web:${VERSION}"
      - "${REGISTRY}/zlayer-web:latest"

  zlayer-manager:
    file: images/ZImagefile.zlayer-manager
    context: "."
    tags:
      - "${REGISTRY}/zlayer-manager:${VERSION}"
      - "${REGISTRY}/zlayer-manager:latest"

push:
  after_all: false
