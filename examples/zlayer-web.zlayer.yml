# zlayer-web.zlayer.yml - ZLayer Web Frontend
#
# Deploys the Leptos SSR + Hydration web UI.
#
# Deploy zlayer.dev landing page:
# 1. Fetch the published OCI tar from Forgejo:
#      zlayer import --url https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer/<VERSION>/zlayer-web-<VERSION>-oci.tar \
#        --username zachhandley --password <FORGEJO_TOKEN>
# 2. Drop the Cloudflare Origin Certificate pair into <data_dir>/certs/zlayer.dev.{crt,key}
# 3. Point zlayer.dev DNS A record at this server's IP (orange-cloud ON, Full-strict)
# 4. Deploy:
#      zlayer deploy examples/zlayer-web.zlayer.yml

version: v1
deployment: zlayer-web

services:
  web:
    rtype: service
    image:
      name: zlayer-web:latest
      pull_policy: if_not_present

    resources:
      cpu: 1.0
      memory: 512Mi

    env:
      ZLAYER_WEB_ADDR: "0.0.0.0:3000"
      LEPTOS_SITE_ROOT: "/app/target/site"
      RUST_LOG: info

    endpoints:
      - name: http
        protocol: http
        port: 3000
        host: zlayer.dev
        expose: public

    scale:
      mode: fixed
      replicas: 1

    health:
      start_grace: 15s
      interval: 10s
      timeout: 5s
      retries: 3
      check:
        type: tcp
        port: 3000

    errors:
      on_panic:
        action: restart
