# Cluster e2e fixture — worker-tier suite. Deploys a 10-replica nginx
# service that should land entirely on worker-tier worker nodes; the
# 3 control-plane nodes (mode: worker-tier, role: server) must NOT
# receive any replicas because they do not enter the worker dispatcher.
#
# Consumed by the `cluster_worker_tier` suite in run-suite.py.

version: v1
deployment: worker-tier-test

services:
  web:
    rtype: service
    image:
      name: ghcr.io/blackleafdigital/zlayer-test-nginx:1.28-alpine
      pull_policy: if_not_present

    endpoints:
      - name: http
        protocol: http
        port: 80
        expose: public

    # E2E health: a host-side `true` so the service is "healthy" as soon as a
    # replica is running, without depending on overlay/HTTP reachability. These
    # fixtures verify replica scaling + image transition, not endpoint health,
    # and CI's networking can't probe the container's overlay IP.
    health:
      start_grace: 2s
      interval: 3s
      timeout: 5s
      retries: 3
      check:
        type: command
        command: "true"

    scale:
      mode: fixed
      replicas: 10
