[package]
name = "zlayer-scheduler-zql"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "Raft-based distributed scheduler for container orchestration"
keywords = ["container", "scheduler", "raft", "distributed", "orchestration"]
categories = ["concurrency"]
readme = "README.md"

[dependencies]
# Internal crates
zlayer-spec.workspace = true
zlayer-core.workspace = true
zlayer-consensus.workspace = true

# Serialization
serde.workspace = true

# Async
async-trait.workspace = true
tokio.workspace = true

# Error handling
thiserror.workspace = true
anyhow.workspace = true

# Logging/tracing
tracing.workspace = true

# UUID
uuid.workspace = true

# Web framework (for raft service router)
axum.workspace = true

# HTTP client (used by Scheduler for agent communication)
reqwest.workspace = true

# Tower middleware
tower.workspace = true
tower-http.workspace = true

# Consensus (re-exported via zlayer-consensus, but needed for declare_raft_types! macro)
openraft = { workspace = true, features = ["storage-v2"] }

# Metrics
metrics.workspace = true
prometheus.workspace = true
num_cpus = { workspace = true }

# JSON serialization for snapshots
serde_json.workspace = true

# Hex encoding for binary data in ZQL
hex.workspace = true

# Storage (optional, for persistent feature)
zql = { workspace = true, optional = true }

# OpenAPI schema generation
utoipa.workspace = true

# Testing utilities
[dev-dependencies]
tempfile = "3"
wiremock = "0.6"

[features]
test-skip-http = []
# Persistent storage is provided by zlayer-consensus's zql-store feature.
persistent = ["zlayer-consensus/zql-store", "zql"]

[lints]
workspace = true
