      required:
      - access_token
      - expires_in
      - token_type
    TriggerBuildResponse:
      description: Trigger build response
      example:
        build_id: build_id
        message: message
      properties:
        build_id:
          description: Unique build ID for tracking
          type: string
        message:
          description: Human-readable message
          type: string
      required:
      - build_id
      - message
    TriggerCronResponse:
      description: Response after triggering a cron job
      example:
        execution_id: execution_id
        message: message
      properties:
        execution_id:
          description: Execution ID for tracking
          type: string
        message:
          description: Human-readable message
          type: string
      required:
      - execution_id
      - message
    TriggerJobResponse:
      description: Response after triggering a job
      example:
        execution_id: execution_id
        message: message
      properties:
        execution_id:
          description: Unique execution ID for tracking
          type: string
        message:
          description: Human-readable message
          type: string
      required:
      - execution_id
      - message
    TunnelStatus:
      description: Detailed tunnel status
      example:
        expires_at: 0
        registered_services:
        - protocol: protocol
          local_port: 0
          service_id: service_id
          name: name
          remote_port: 0
          status: status
        - protocol: protocol
          local_port: 0
          service_id: service_id
          name: name
          remote_port: 0
          status: status
        client_addr: client_addr
        name: name
        created_at: 0
        allowed_services:
        - allowed_services
        - allowed_services
        id: id
        active_connections: 0
        last_connected: 0
        status: status
      properties:
        active_connections:
          description: Number of active connections
          format: int32
          minimum: 0
          type: integer
        allowed_services:
          description: Services this tunnel can expose
          items:
            type: string
          type: array
        client_addr:
          description: Client IP address (if connected)
          nullable: true
          type: string
        created_at:
          description: When the tunnel was created (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        expires_at:
          description: When the token expires (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        id:
          description: Unique tunnel identifier
          type: string
        last_connected:
          description: "Last time the tunnel connected (Unix timestamp, if ever)"
          format: int64
          minimum: 0
          nullable: true
          type: integer
        name:
          description: Name of the tunnel
          type: string
        registered_services:
          description: Currently registered services
          items:
            $ref: "#/components/schemas/RegisteredServiceInfo"
          type: array
        status:
          description: "Current status (active, disconnected, expired)"
          type: string
      required:
      - active_connections
      - allowed_services
      - created_at
      - expires_at
      - id
      - name
      - registered_services
      - status
    TunnelSummary:
      description: Tunnel summary for list operations
      example:
        expires_at: 0
        name: name
        created_at: 0
        id: id
        services:
        - services
        - services
        last_connected: 0
        status: status
      properties:
        created_at:
          description: When the tunnel was created (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        expires_at:
          description: When the token expires (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        id:
          description: Unique tunnel identifier
          type: string
        last_connected:
          description: "Last time the tunnel connected (Unix timestamp, if ever)"
          format: int64
          minimum: 0
          nullable: true
          type: integer
        name:
          description: Name of the tunnel
          type: string
        services:
          description: Services this tunnel can expose
          items:
            type: string
          type: array
        status:
          description: "Current status (active, disconnected, expired)"
          type: string
      required:
      - created_at
      - expires_at
      - id
      - name
      - services
      - status
    UlimitSpec:
      additionalProperties: false
