name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================
  # Resolve version for ci-step-status tracking.
  # Every downstream job keys its "was this already run?" marker on this
  # version. Re-runs (workflow_dispatch retry, push-after-PR, etc.) targeting
  # the same version short-circuit jobs that already completed successfully,
  # which saves ~30 min per Windows-flake retry.
  #
  # resolve-version handles every trigger: manual dispatch uses inputs.version
  # verbatim; dev pushes bump the latest `v*` tag by patch; if no tags exist
  # it falls back to Cargo.toml via `service-type: rust`. Output is always
  # non-empty.
  # ===========================================
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ inputs.version }}
          tag-prefix: v
          bump: patch
          service-type: rust

  # ===========================================
  # Prepare release branch (temp/v{VERSION})
  # ----
  # Walk existing temp/v* in-flight release branches via check-orphan-versions.
  # Probe PyPI / crates.io directly for each candidate; any branch whose
  # version is already on a public registry gets DELETEd and recorded in
  # burned-versions.txt (PyPI/crates filenames are immutable; retrying with
  # new bytes is impossible). The first still-clean branch is the orphan
  # to retry; otherwise we bump from the latest permanent tag, skipping
  # any burned versions, and create a new temp/v{VERSION}.
  #
  # Permanent v{VERSION} tags are NOT created here — release.yml's
  # create-forgejo-release cuts them at the temp branch HEAD only after
  # every publish step has succeeded, then deletes the temp branch.
  # ===========================================
  prepare-release:
    name: Prepare Release Branch
    needs: [version]
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/dev')
      || (github.event_name == 'workflow_dispatch')
    outputs:
      version: ${{ steps.pick.outputs.version }}
      branch:  ${{ steps.pick.outputs.branch }}
      sha:     ${{ steps.pushbranch.outputs.sha }}
      reason:  ${{ steps.pick.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Probe for orphan temp/v* branches
        id: orphan
        uses: https://forge.blackleafdigital.com/Public/actions/check-orphan-versions@main
        with:
          temp-branch-prefix: temp/v
          max-branches: '10'
          package-name: zlayer
          registries: pypi,cargo
          burn-list-path: .forgejo/burned-versions.txt
          forgejo-base-url: https://forge.blackleafdigital.com
          repo: ${{ github.repository }}
          forgejo-auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
          default-branch: dev

      - name: Resolve candidate next version
        id: resolve
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ inputs.version }}
          tag-prefix: v
          bump: patch
          service-type: rust

      - name: Pick version to build
        id: pick
        shell: bash
        env:
          OVERRIDE: ${{ inputs.version }}
          ORPHAN_VERSION: ${{ steps.orphan.outputs.orphan-version }}
          ORPHAN_BRANCH:  ${{ steps.orphan.outputs.orphan-branch }}
          ABANDONED:      ${{ steps.orphan.outputs.abandoned }}
          RESOLVED:       ${{ steps.resolve.outputs.version }}
          IS_NEW:         ${{ steps.resolve.outputs.is-new }}
          COMMIT_MSG:     ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail
          # resolve-version returns bare X.Y.Z; strip any leading v from override.
          OVR="${OVERRIDE#v}"

          if [ -n "$OVR" ]; then
            {
              echo "version=${OVR}"
              echo "branch=temp/v${OVR}"
              echo "reason=override"
            } >> "$GITHUB_OUTPUT"
            echo "Using inputs.version override: ${OVR}"
            exit 0
          fi

          if [ -n "$ORPHAN_VERSION" ]; then
            {
              echo "version=${ORPHAN_VERSION}"
              echo "branch=${ORPHAN_BRANCH}"
              echo "reason=orphan-retry"
            } >> "$GITHUB_OUTPUT"
            echo "Reusing in-flight orphan ${ORPHAN_BRANCH} (v${ORPHAN_VERSION})"
            exit 0
          fi

          # [np] in commit message means "no publish" — skip release prep.
          if [ "${{ github.event_name }}" = "push" ] && [[ "$COMMIT_MSG" == *"[np]"* ]]; then
            {
              echo "version="
              echo "branch="
              echo "reason=np-skipped"
            } >> "$GITHUB_OUTPUT"
            echo "[np] in commit message — no release this push"
            exit 0
          fi

          # Bump past anything in burned-versions.txt + this run's abandoned.
          BURNED=""
          if [ -f .forgejo/burned-versions.txt ]; then
            BURNED=$(grep -v '^[[:space:]]*$' .forgejo/burned-versions.txt | tr '\n' ',' | sed 's/,$//')
          fi
          if [ -n "$ABANDONED" ]; then
            BURNED="${BURNED:+${BURNED},}${ABANDONED}"
          fi
          is_burned() {
            case ",${BURNED}," in *,$1,*) return 0 ;; *) return 1 ;; esac
          }
          CURRENT="$RESOLVED"
          while is_burned "$CURRENT"; do
            IFS='.' read -r MA MI PA <<< "$CURRENT"
            PA=$((PA + 1))
            CURRENT="${MA}.${MI}.${PA}"
            IS_NEW=true
          done

          if [ "$IS_NEW" = "true" ]; then
            {
              echo "version=${CURRENT}"
              echo "branch=temp/v${CURRENT}"
              echo "reason=new-release"
            } >> "$GITHUB_OUTPUT"
            echo "No orphans; new release at v${CURRENT}"
            exit 0
          fi

          {
            echo "version="
            echo "branch="
            echo "reason=noop"
          } >> "$GITHUB_OUTPUT"
          echo "Nothing to build"

      - name: Create or update temp branch at HEAD
        id: pushbranch
        if: steps.pick.outputs.version != ''
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.FORGEJO_TOKEN }}
          BR: ${{ steps.pick.outputs.branch }}
        run: |
          set -euo pipefail
          git config user.name  "Zach Handley"
          git config user.email "zachhandley@gmail.com"
          git fetch origin "${BR}" || true
          git push origin "HEAD:refs/heads/${BR}" --force-with-lease
          SHA=$(git rev-parse HEAD)
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "Pushed ${SHA} to ${BR}"

  # ===========================================
  # Check (fmt, clippy)
  # ===========================================
  check:
    name: Check
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-check
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy

      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Check formatting
        if: steps.check.outputs.completed != 'true'
        run: cargo fmt --all -- --check

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-check
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Check macOS (check, clippy)
  # Runs in parallel with Linux check to catch macOS-specific
  # compilation errors in #[cfg(target_os = "macos")] code
  # ===========================================
  check-macos:
    name: Check (macOS)
    needs: [version]
    runs-on: macos-latest
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-check-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy

      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-check-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Check Windows (check, clippy)
  # Runs in parallel with Linux check + macOS check to catch
  # Windows-specific compilation errors in #[cfg(target_os = "windows")] code.
  # Only the composite (HCS + WSL2 delegate) build is validated — the "default
  # features" Windows build is a thin CLI without zlayer-agent, which no
  # downstream consumer ships (build.yml always uses `--no-default-features
  # --features hcs-runtime,wsl`).
  # ===========================================
  check-windows:
    name: Check (Windows)
    needs: [version]
    runs-on: windows-latest
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-check-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache-windows

      - name: Install Git Bash
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Install protoc
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'

      - name: Export PROTOC env
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --package zlayer --features hcs-runtime,wsl --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --package zlayer --features hcs-runtime,wsl --all-targets -- -D warnings

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-check-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Test Windows (unit + composite-dispatch integration)
  # Runs the actual test binaries on the MiniWindows self-hosted runner
  # so we catch regressions that only surface at link/runtime. The
  # `composite_dispatch_e2e` tests are `#[ignore]`d by default and only
  # executed here via `-- --ignored` because they require a real
  # Windows 11 22H2+ host with admin + Wintun + the zlayer WSL distro.
  # ===========================================
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    needs: [version, check, check-macos, check-windows]
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy
          sccache: true
          sccache-s3-bucket: ${{ secrets.S3_BUCKET }}
          sccache-s3-endpoint: https://${{ secrets.S3_ENDPOINT }}
          sccache-s3-region: ${{ secrets.S3_REGION }}
          sccache-s3-access-key-id: ${{ secrets.S3_ACCESS_KEY }}
          sccache-s3-secret-access-key: ${{ secrets.S3_ACCESS_SECRET }}
          sccache-key-prefix: sccache-windows

      - name: Install Git Bash
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Install protoc
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'

      - name: Export PROTOC env
        if: steps.check-status.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Install uv (pyo3 build-time Python dep)
        if: steps.check-status.outputs.completed != 'true'
        shell: bash
        run: |
          # MiniWindows has uv via chocolatey; this is a safety net for new runners.
          which uv || choco install uv -y

      - name: Workspace unit tests (HCS + WSL composite)
        if: steps.check-status.outputs.completed != 'true'
        run: uv run --python 3.12 -- cargo test --package zlayer-agent --features hcs-runtime,wsl --lib --no-fail-fast

      - name: Integration — composite_dispatch_e2e (HCS + WSL, --ignored)
        if: steps.check-status.outputs.completed != 'true'
        run: uv run --python 3.12 -- cargo test --package zlayer-agent --features hcs-runtime,wsl --test composite_dispatch_e2e -- --ignored --nocapture
        # These tests need a real Windows 11 22H2+ host with admin + Wintun + the zlayer WSL distro.
        # MiniWindows has all of those; they're ignored by default so they only run when the suffix
        # `-- --ignored` is passed, here and in the local `scripts/windows-remote-check.sh --run-e2e`.

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [version, check, check-macos, check-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          nextest: true

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Run unit and integration tests
        if: steps.check-status.outputs.completed != 'true'
        run: |
          # Scheduler tests need test-skip-http feature
          cargo nextest run -p zlayer-scheduler --features test-skip-http
          # Run all other tests (unit + integration)
          cargo nextest run --workspace --exclude zlayer-scheduler

      - name: Run doc tests
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --workspace --doc

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Test macOS
  # Runs unit and doc tests on macOS. Integration tests
  # requiring root/containers are auto-skipped via cfg(target_os).
  # ===========================================
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    needs: [version, check-macos]
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Run unit tests
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --workspace --lib --bins

      - name: Run doc tests
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --workspace --doc

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Build Release (Linux) — sanity-check only.
  # The real multi-platform release build runs in build.yml,
  # dispatched by auto-tag below.
  # ===========================================
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [version, test, feature-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev cmake pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build release binary
        if: steps.check-status.outputs.completed != 'true'
        run: cargo build --release --package zlayer

      - name: Upload artifacts
        if: steps.check-status.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/zlayer
          retention-days: 7

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Build Release (macOS ARM64) — sanity-check only.
  # The real multi-platform release build runs in build.yml,
  # dispatched by auto-tag below.
  # ===========================================
  build-macos:
    name: Build Release (macOS)
    runs-on: macos-latest
    needs: [version, test-macos]
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-build-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Build release binary
        if: steps.check-status.outputs.completed != 'true'
        run: cargo build --release --package zlayer

      - name: Upload artifacts
        if: steps.check-status.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: binaries-macos-arm64
          path: |
            target/release/zlayer
          retention-days: 7

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-build-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Feature Matrix Tests
  # ===========================================
  feature-tests:
    name: Feature Tests
    runs-on: ubuntu-latest
    needs: [version, check, check-macos, check-windows]
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--features full"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-feature-tests-${{ strategy.job-index }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build with features
        if: steps.check-status.outputs.completed != 'true'
        run: cargo build --package zlayer ${{ matrix.features }}

      - name: Test with features
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --package zlayer ${{ matrix.features }}

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-feature-tests-${{ strategy.job-index }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Dispatch E2E (gate for the release chain)
  #
  # Runs on every successful check+test+feature-tests+sanity-build. On dev
  # pushes (without a `[np]` marker in the commit message), this job forwards
  # the version resolved by the top-level `version` job to e2e.yml, which in
  # turn dispatches build.yml on success. build.yml is responsible for
  # auto-tagging after the multi-platform build succeeds — the tag is
  # never created speculatively.
  #
  # - PR run:        dispatch e2e with version="" (sanity only, no release).
  # - Dev push:      dispatch e2e with resolved version (starts release chain).
  # - [np] dev push: dispatch e2e with version="" (no release).
  # - Manual dispatch with inputs.version: forwarded verbatim.
  # ===========================================
  trigger-e2e:
    name: Trigger E2E
    runs-on: ubuntu-latest
    # prepare-release runs only on dev pushes / workflow_dispatch; on PR runs
    # it's skipped, so its outputs are empty and we fall through to signal-only.
    needs: [version, prepare-release, build, build-macos, feature-tests, test-windows]
    if: |
      always()
      && needs.build.result == 'success'
      && (needs.prepare-release.result == 'success' || needs.prepare-release.result == 'skipped')
    steps:
      - name: Determine version + ref to forward
        id: version
        env:
          PREP_VERSION: ${{ needs.prepare-release.outputs.version }}
          PREP_BRANCH:  ${{ needs.prepare-release.outputs.branch }}
          PREP_SHA:     ${{ needs.prepare-release.outputs.sha }}
        run: |
          if [ -n "$PREP_VERSION" ]; then
            # Release path: e2e + downstream chain run on the temp branch.
            {
              echo "version=v${PREP_VERSION}"
              echo "ref=refs/heads/${PREP_BRANCH}"
              echo "sha=${PREP_SHA}"
            } >> $GITHUB_OUTPUT
          else
            # PR or [np] dev push: e2e still runs for signal, no release chain.
            {
              echo "version="
              echo "ref=${{ github.ref }}"
              echo "sha=${{ github.sha }}"
            } >> $GITHUB_OUTPUT
          fi

      - name: Trigger E2E workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/e2e.yml/dispatches" \
            -d '{"ref": "${{ steps.version.outputs.ref }}", "inputs": {"version": "${{ steps.version.outputs.version }}", "sha": "${{ steps.version.outputs.sha }}"}}'

  # ===========================================
  # Cache Cleanup
  # ===========================================
  cache-cleanup:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    needs: [build, build-macos, feature-tests]
    if: always()
    steps:
      - name: Cleanup old caches
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: cleanup
          max-age-days: '30'
          keep-latest: '5'
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
