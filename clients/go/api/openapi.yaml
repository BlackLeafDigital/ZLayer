        "401":
          description: Unauthorized
        "403":
          description: Forbidden - admin role required
        "503":
          description: Service unavailable - cluster not ready
      security:
      - bearer_auth: []
      summary: Generate a join token for new nodes to join the cluster.
      tags:
      - Nodes
  /api/v1/nodes/{id}:
    get:
      description: |-
        # Errors

        Returns an error if the node is not found.
      operationId: get_node
      parameters:
      - description: Node identifier
        explode: false
        in: path
        name: id
        required: true
        schema:
          format: int64
          minimum: 0
          type: integer
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NodeDetails"
          description: Node details
        "401":
