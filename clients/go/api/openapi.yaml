  /api/v1/environments:
    get:
      description: |-
        Filter rules (see [`ListEnvironmentsQuery`]):

        - `?project={id}` → environments belonging to that project.
        - `?project=*` → every environment across every project + globals,
          merged and sorted by name.
        - no `project` query → only global environments (`project_id IS NULL`).

        # Errors

        Returns [`ApiError::Internal`] if the environment store fails.
      operationId: list_environments
      parameters:
      - description: Project id to filter by; '*' lists all; omit for globals only
        explode: true
        in: query
        name: project
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredEnvironment"
                type: array
          description: List of environments
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List environments.
      tags:
      - Environments
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] for an empty name,
        [`ApiError::Conflict`] when the `(name, project_id)` is already used, or
        [`ApiError::Internal`] when the environment store fails.
      operationId: create_environment
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEnvironmentRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredEnvironment"
          description: Environment created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "409":
          description: Name already used in the given project
      security:
      - bearer_auth: []
      summary: Create a new environment. Admin only.
      tags:
      - Environments
  /api/v1/environments/{id}:
    delete:
      description: |-
        Non-cascading: the operator must purge any secrets attached to the
        environment before deletion (typically via
        `DELETE /api/v1/secrets?env={id}&all=true`). If the environment still
        has secrets, this endpoint returns 409.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the environment does not exist, [`ApiError::Conflict`] when secrets
        remain, or [`ApiError::Internal`] when a backing store fails.
      operationId: delete_environment
      parameters:
      - description: Environment id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Environment deleted
        "403":
          description: Admin role required
        "404":
          description: Not found
        "409":
          description: Environment still has secrets
      security:
      - bearer_auth: []
      summary: Delete an environment. Admin only.
      tags:
      - Environments
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if no environment with the given id exists,
        or [`ApiError::Internal`] when the store fails.
      operationId: get_environment
      parameters:
      - description: Environment id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredEnvironment"
          description: Environment
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Fetch a single environment by id.
      tags:
      - Environments
    patch:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the environment does not exist, [`ApiError::BadRequest`] for an
        empty replacement name, [`ApiError::Conflict`] when the new name collides
        with another environment in the same scope, or [`ApiError::Internal`]
        when the store fails.
      operationId: update_environment
      parameters:
      - description: Environment id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEnvironmentRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredEnvironment"
          description: Updated environment
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "404":
          description: Not found
        "409":
          description: Name collides with another environment
      security:
      - bearer_auth: []
      summary: Rename / re-describe an environment. Admin only.
      tags:
      - Environments
  /api/v1/events:
    get:
      description: |-
        Each event is one JSON object on its own line, terminated with `\n`. The
        response advertises `Content-Type: application/json` (matching Docker's
        `/events` endpoint contract).

        # Errors

        Returns `400` if a `label` query parameter is malformed, `401` if the
        caller is not authenticated.
      operationId: stream_events
      parameters:
      - description: |-
          Follow the event stream. Default: `true`. Reserved for parity with
          Docker-compat tooling; this endpoint is always streaming.
        explode: true
        in: query
        name: follow
        required: false
        schema:
          type: boolean
        style: form
      - description: |-
          Label filter in `k=v` form. Repeatable. An event passes only if all
          filters match (AND semantics).
        explode: true
        in: query
        name: label
        required: false
        schema:
          items:
            type: string
          type: array
        style: form
      responses:
        "200":
          description: NDJSON stream of daemon lifecycle events
        "400":
          description: Invalid label filter
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: Stream daemon lifecycle events as NDJSON.
      tags:
      - Events
  /api/v1/groups:
    get:
      description: |-
        # Errors

        Returns [`ApiError::Internal`] if the group store fails.
      operationId: list_groups
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredUserGroup"
                type: array
          description: List groups
      summary: List all groups.
      tags:
      - Groups
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] when the name is empty, or
        [`ApiError::Internal`] if the store fails.
      operationId: create_group
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateGroupRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredUserGroup"
          description: Group created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
      summary: Create a new group. Admin only.
      tags:
      - Groups
  /api/v1/groups/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::NotFound`] when the group does not exist, or
        [`ApiError::Internal`] if the store fails.
      operationId: delete_group
      parameters:
