      security:
      - bearer_auth: []
      summary: List services in a deployment.
      tags:
      - Services
  /api/v1/deployments/{deployment}/services/{service}:
    get:
      description: |-
        # Errors

        Returns an error if the deployment or service is not found.
      operationId: get_service
      parameters:
      - description: Deployment name
        explode: false
        in: path
        name: deployment
        required: true
        schema:
          type: string
        style: simple
      - description: Service name
        explode: false
        in: path
        name: service
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
