name: Auth happy path (bootstrap -> login -> logout)
platform: web

# Workflows share a browser session across tests, which lets the logout
# test exercise the dropdown menu after bootstrap has logged us in.
config:
  defaults:
    timeout: 30000
    screenshots: on-failure
  web:
    # Match intellitester.config.yaml — the test stack uses 16677 to
    # avoid colliding with a canonical zlayer-manager install on 6677.
    baseUrl: http://127.0.0.1:16677
    headless: true
  healing:
    enabled: false

continueOnFailure: false

tests:
  - file: ./bootstrap.test.yaml
    id: bootstrap

  - file: ./logout.test.yaml
    id: logout

  - file: ./login.test.yaml
    id: login
