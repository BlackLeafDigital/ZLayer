[package]
name = "zlayer-zql"
version.workspace = true
publish = false
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ZLayer CLI - container orchestration platform"

[[bin]]
name = "zlayer"
path = "src/main.rs"

[features]
default = ["full"]
# Full runtime with all CLI commands and capabilities
full = ["docker", "wasm", "s3", "persistent", "observability"]

# Runtime capabilities (forwarded to deps)
docker = ["zlayer-agent/docker"]
wasm = ["zlayer-agent/wasm"]
s3 = ["zlayer-agent/s3", "zlayer-registry/s3"]
persistent = ["zlayer-scheduler/persistent", "zlayer-registry/persistent"]
observability = ["zlayer-observability/axum", "zlayer-observability/propagation"]

[dependencies]
# Internal crates
zlayer-agent.workspace = true
zlayer-spec.workspace = true
zlayer-observability.workspace = true
zlayer-init-actions.workspace = true
zlayer-builder.workspace = true
zlayer-scheduler.workspace = true
zlayer-overlay.workspace = true
zlayer-core.workspace = true
zlayer-tunnel.workspace = true
zlayer-api.workspace = true
zlayer-proxy.workspace = true
zlayer-secrets.workspace = true
zlayer-registry = { workspace = true, features = ["local"] }
zlayer-storage.workspace = true

# TUI
ratatui = "0.29"
crossterm = "0.28"
zlayer-tui.workspace = true

# CLI
clap = { workspace = true, features = ["derive"] }

# Async
tokio = { workspace = true, features = ["full"] }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Secrets
secrecy = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yml = { workspace = true }

# HTTP
reqwest = { workspace = true }
base64 = { workspace = true }
rand = { workspace = true }
hex = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }

# HTTP-over-Unix-socket client (daemon_client)
hyper = { workspace = true }
hyper-util = { workspace = true }
http-body-util = "0.1"
bytes = { workspace = true }
tower = { workspace = true }
tokio-stream = { workspace = true }

# System resource detection
num_cpus = { workspace = true }

[target.'cfg(unix)'.dependencies]
# Daemonization (fork, setsid) and signal handling (kill) -- Unix only
nix = { workspace = true }
libc = { workspace = true }

[target.'cfg(windows)'.dependencies]
zlayer-wsl = { workspace = true }

[lints]
workspace = true
