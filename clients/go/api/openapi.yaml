          type: array
        status:
          description: Current node status
          type: string
      required:
      - address
      - id
      - labels
      - last_heartbeat
      - last_seen
      - registered_at
      - resources
      - role
      - services
      - status
    NodeResourceInfo:
      description: Node resource information
      properties:
        cpu_percent:
