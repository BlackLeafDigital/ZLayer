        name:
          description: New display name. Will be re-checked for uniqueness.
          nullable: true
          type: string
    UpdateGroupRequest:
      description: "Body for `PATCH /api/v1/groups/{id}`."
      example:
        name: name
        description: description
      properties:
        description:
          description: Updated description.
          nullable: true
          type: string
        name:
          description: Updated name.
          nullable: true
          type: string
    UpdateLabelsRequest:
      description: Request to update node labels
      example:
        remove:
        - remove
        - remove
        labels:
          key: labels
      properties:
        labels:
          additionalProperties:
            type: string
          description: Labels to add or update
        remove:
          description: Label keys to remove
