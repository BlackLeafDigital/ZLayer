[package]
name = "zlayer"
version.workspace = true
edition.workspace = true
license.workspace = true
repository.workspace = true
rust-version.workspace = true
description = "ZLayer CLI - container orchestration platform"
publish = false

[[bin]]
name = "zlayer"
path = "src/main.rs"

[features]
default = ["full"]
# Full runtime with all CLI commands and capabilities
full = [
    "docker",
    "docker-compat",
    "wasm",
    "s3",
    "persistent",
    "observability",
    "nat",
    "youki-runtime",
]

# WSL2 backend (Windows-only, thin CLI proxies to daemon in WSL2)
wsl = ["dep:zlayer-wsl"]

# Windows HCS-backed native container runtime. Pulls in `zlayer-agent` on
# Windows (it's otherwise absent from the thin-CLI `--features wsl` build)
# and forwards the `hcs-runtime` marker feature. Can coexist with `wsl`:
# WSL2 handles distro bootstrap, HCS handles native Windows containers.
hcs-runtime = ["dep:zlayer-agent", "zlayer-agent/hcs-runtime"]

# Linux-only `zlayer runtime` runc-compatible CLI surface. Gates both the
# subcommand tree that `Wsl2DelegateRuntime` shells out to inside the
# `zlayer` WSL2 distro and the direct dependency on `zlayer-libcontainer`
# that backs each verb. `zlayer-agent`'s own copy of the libcontainer dep is
# enabled unconditionally on Unix (see `[target.'cfg(unix)'.dependencies]`
# below) — this feature only flips on the version compiled INTO the CLI for
# the runc-compatible verbs.
youki-runtime = ["dep:libcontainer"]

# Runtime capabilities (forwarded to deps)
# The `zlayer-api/docker` forwarding enables the Docker-backed
# `BridgeNetworkRuntime` implementation used by the daemon's
# `/api/v1/container-networks` endpoints.
docker = ["zlayer-agent/docker", "zlayer-api/docker"]
wasm = ["zlayer-agent/wasm"]
s3 = ["zlayer-agent/s3", "zlayer-registry/s3"]
persistent = ["zlayer-scheduler/persistent", "zlayer-registry/persistent"]
observability = ["zlayer-observability/axum", "zlayer-observability/propagation"]
nat = ["zlayer-overlay/nat"]
docker-compat = ["dep:zlayer-docker"]

[dependencies]
# Internal crates (cross-platform)
zlayer-spec.workspace = true
zlayer-types = { workspace = true }
zlayer-observability.workspace = true
zlayer-builder = { workspace = true, features = ["cache", "cache-persistent", "local-registry"] }
zlayer-core.workspace = true
zlayer-tunnel.workspace = true
zlayer-registry = { workspace = true, features = ["local"] }

# Daemon / serve dependencies shared by Linux, macOS, and Windows.
#
# These were previously `cfg(unix)`-only (the Windows build historically
# routed `zlayer serve` through a daemon inside WSL2). After F-7a the
# Windows build runs the native HCS-backed daemon directly, so all of the
# orchestration crates the serve path depends on need to be available on
# every platform.
zlayer-api.workspace = true
zlayer-overlay.workspace = true
zlayer-proxy.workspace = true
zlayer-scheduler.workspace = true
zlayer-secrets.workspace = true
zlayer-storage.workspace = true
secrecy = { workspace = true }

# TUI
ratatui = "0.29"
crossterm = "0.28"
zlayer-tui.workspace = true

# CLI
clap = { workspace = true, features = ["derive", "env"] }
clap_complete = "4"
# Interactive prompts for disambiguation
dialoguer = { version = "0.11", default-features = false, features = ["password"] }

# Async
tokio = { workspace = true, features = ["full"] }

# Logging
tracing = { workspace = true }
tracing-subscriber = { workspace = true }
tracing-appender = { workspace = true }

# Error handling
anyhow = { workspace = true }

# Serialization
serde = { workspace = true }
serde_json = { workspace = true }
serde_yaml = { workspace = true }

# HTTP
reqwest = { workspace = true, features = ["form"] }
base64 = { workspace = true }
rand = { workspace = true }
hex = { workspace = true }
chrono = { workspace = true }
uuid = { workspace = true }

# Self-update: archive extraction and integrity checking. `zip` is Windows-only
# (see `[target.'cfg(target_os = "windows")'.dependencies]` below).
sha2 = { workspace = true }
tar = { workspace = true }
flate2 = { workspace = true }
# Temp directory for staged downloads during `zlayer self-update`. Already
# present in `[dev-dependencies]` for tests; promoted to a regular dep so the
# `commands::self_update` runtime path can use it without #[cfg(test)] gating.
tempfile = "3"

# HTTP-over-Unix-socket client (daemon_client)
hyper = { workspace = true }
hyper-util = { workspace = true }
http-body-util = "0.1"
bytes = { workspace = true }
tower = { workspace = true }
tokio-stream = { workspace = true }

# System resource detection
num_cpus = { workspace = true }
zlayer-paths.workspace = true

# Daemon HTTP-over-UDS client + session file (extracted from this crate)
zlayer-client.workspace = true

# Cross-platform internal crates.
#
# `zlayer-init-actions` is pure reqwest/tokio and builds on every platform.
# `zlayer-docker` only gates its inner `socket/` module on `cfg(unix)`; the
# crate itself compiles on Windows (Docker over TCP works there). Both were
# previously stranded in `[target.'cfg(unix)'.dependencies]`, which broke the
# Windows build because the `docker-compat` feature references
# `dep:zlayer-docker` and the serve path references `zlayer_init_actions`.
zlayer-docker = { workspace = true, optional = true }
zlayer-init-actions.workspace = true
ed25519-dalek.workspace = true

# Duration parsing for CLI flags like `--ttl 24h` / `--ttl 30m` (signed
# cluster join token expiry). Already a transitive workspace dep and used
# directly by `zlayer-types`, `zlayer-api`, and `zlayer-builder`.
humantime = "2"

# Wave 4.1: HS256 cluster-join token minting alongside the Ed25519-signed
# envelope. The leader-side validator in `zlayer-api` already accepts
# HS256 JWTs with `iss=zlayer-cluster`, `aud=cluster-join`, `jti`, `exp`,
# `iat`; this dep lets the CLI mint matching tokens without round-tripping
# through the daemon.
jsonwebtoken = { workspace = true }
async-trait.workspace = true
tonic = "0.14.5"
openraft = { version = "0.9.24", features = ["serde"] }
zlayer-overlayd.workspace = true

[target.'cfg(unix)'.dependencies]
# Internal crates (Unix-only -- depend on boringtun, libcontainer, etc.)
# Enable `youki-runtime` so this binary builds with the libcontainer-backed
# Linux runtime. The feature is a no-op on macOS (libcontainer dep is target-
# gated to Linux) but keeps the manifest declaration uniform across Unix.
zlayer-agent = { workspace = true, features = ["youki-runtime"] }
# Daemonization (fork, setsid) and signal handling (kill) -- Unix only
nix = { workspace = true }
libc = { workspace = true }
# Systemd sd_notify(READY=1) for Type=notify unit
sd-notify = { workspace = true }

[target.'cfg(windows)'.dependencies]
zlayer-wsl = { workspace = true, optional = true }
# Self-update archive extraction on Windows (zlayer-*-windows-amd64.zip).
zip = { workspace = true }
# Optional on Windows: pulled in by the `hcs-runtime` feature when the caller
# wants the full native Windows runtime embedded in the CLI. The thin-CLI
# build (`--no-default-features --features wsl`) leaves this off.
zlayer-agent = { workspace = true, optional = true }
# SCM integration: `zlayer serve --service` registers with the Windows Service
# Control Manager and responds to Stop/Shutdown control codes. See
# `src/daemon_service.rs`. Required by I-2..I-5 (install/stop/uninstall/status
# via SCM) so keep it unconditional on Windows.
windows-service = "0.8"
# UAC re-launch path in `src/privilege.rs`. `Win32_UI_Shell` for
# `ShellExecuteW`, `Win32_UI_WindowsAndMessaging` for `SW_NORMAL`,
# `Win32_Foundation` for shared HINSTANCE/PCWSTR types.
windows = { version = "0.62", features = [
    "Win32_UI_Shell",
    "Win32_UI_WindowsAndMessaging",
    "Win32_Foundation",
] }

[target.'cfg(target_os = "linux")'.dependencies]
libcontainer = { version = "0.6.1-zlayer.5", package = "zlayer-libcontainer", optional = true }

[dev-dependencies]
tempfile = "3"
serial_test = "3"
async-trait = { workspace = true }

[lints]
workspace = true
