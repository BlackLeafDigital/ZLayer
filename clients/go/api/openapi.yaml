          nullable: true
          type: string
        resources:
          allOf:
          - $ref: "#/components/schemas/ContainerResourceLimits"
          description: "Resource limits (CPU, memory)"
          nullable: true
        restart_policy:
          allOf:
          - $ref: "#/components/schemas/ContainerRestartPolicy"
