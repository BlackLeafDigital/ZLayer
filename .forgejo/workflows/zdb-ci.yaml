name: ZDB CI

on:
  push:
    branches: [zdb]
    tags: ['zdb-v*']
  pull_request:
    branches: [zdb]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: false
        type: string

concurrency:
  group: zdb-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"
  FORGEJO_REGISTRIES: '[{"name":"forgejo","index":"sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/","token":"${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

jobs:
  # ===========================================
  # Resolve version for ci-step-status tracking
  # ===========================================
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: zdb
          fetch-depth: 0
      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ inputs.version }}
          tag-prefix: zdb-v
          bump: patch
          service-type: rust

  # ===========================================
  # Check (fmt, clippy)
  # ===========================================
  check:
    name: Check
    needs: [version]
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: zdb-check
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
          NEEDRESTART_SUSPEND: "1"
        run: |
          sudo -E apt-get install -y -o Dpkg::Options::="--force-confnew" protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Check formatting
        if: steps.check.outputs.completed != 'true'
        run: cargo fmt --all -- --check

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: zdb-check
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Check (macOS) — catches cfg(target_os = "macos") errors
  # ===========================================
  check-macos:
    name: Check (macOS)
    needs: [version]
    runs-on: macos-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: zdb-check-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check.outputs.completed != 'true'
        run: brew install protobuf python3

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: zdb-check-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [version, check, check-macos]
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: zdb-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check-status.outputs.completed != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
          NEEDRESTART_SUSPEND: "1"
        run: |
          sudo -E apt-get install -y -o Dpkg::Options::="--force-confnew" protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Install cargo-nextest
        if: steps.check-status.outputs.completed != 'true'
        run: curl -LsSf https://get.nexte.st/latest/linux | tar zxf - -C ${CARGO_HOME:-~/.cargo}/bin

      - name: Run tests (nextest)
        if: steps.check-status.outputs.completed != 'true'
        run: |
          cargo nextest run --workspace --exclude zlayer-scheduler-zql
          cargo nextest run -p zlayer-scheduler-zql --features test-skip-http

      - name: Run doc tests
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --workspace --doc

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: zdb-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Feature Matrix Tests
  # ===========================================
  feature-tests:
    name: Feature Tests
    runs-on: ubuntu-latest
    needs: [version, check, check-macos]
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--features full"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: zdb-feature-tests-${{ strategy.job-index }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install system dependencies
        if: steps.check-status.outputs.completed != 'true'
        env:
          DEBIAN_FRONTEND: noninteractive
          NEEDRESTART_MODE: a
          NEEDRESTART_SUSPEND: "1"
        run: |
          sudo -E apt-get install -y -o Dpkg::Options::="--force-confnew" protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build with features
        if: steps.check-status.outputs.completed != 'true'
        run: cargo build --package zlayer-zql ${{ matrix.features }}

      - name: Test with features
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --package zlayer-zql ${{ matrix.features }}

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: zdb-feature-tests-${{ strategy.job-index }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Auto-tag and trigger publish on successful tests
  # Runs on: branch push (auto-increments tag) or tag push (uses that tag)
  # Skipped if commit message contains [np]
  # ===========================================
  auto-tag-and-publish:
    name: Auto-Tag & Publish
    runs-on: ubuntu-latest
    needs: [version, test, feature-tests]
    if: ${{ !cancelled() && !failure() && github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || !contains(github.event.head_commit.message, '[np]')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ inputs.version }}
          tag-prefix: zdb-v
          bump: patch
          service-type: rust

      - name: Determine tag
        id: tag
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="zdb-v${VERSION}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}, tag: ${TAG}"

      - name: Create and push tag (branch push only)
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
        run: |
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Trigger ZDB Publish workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/zdb-publish.yml/dispatches" \
            -d '{"ref": "zdb", "inputs": {"version": "${{ steps.version.outputs.version }}"}}'

  # ===========================================
  # Cache Cleanup
  # ===========================================
  cache-cleanup:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    needs: [version, test, feature-tests]
    if: always()
    steps:
      - name: Cleanup old caches
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: cleanup
          max-age-days: '30'
          keep-latest: '5'
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
