            $ref: "#/components/schemas/NatPeerDto"
          type: array
        relay_server_bind:
          description: "Address of the locally-bound built-in relay server, if running"
          nullable: true
          type: string
        stun_servers:
          description: Configured STUN servers (host:port)
          items:
            type: string
          type: array
        turn_servers:
          description: Configured TURN/relay servers (host:port)
          items:
            type: string
          type: array
      required:
      - candidates
      - enabled
      - last_refresh
      - peers
      - stun_servers
      - turn_servers
    NetworkAttachmentInfo:
      description: |-
        Per-network attachment entry on [`ContainerInfo::networks`].

        Populated from the runtime's inspect response — mirrors the subset of
        bollard's `EndpointSettings` that API clients need to correlate a container
        with its `container_networks` entries.
      example:
        aliases:
        - aliases
        - aliases
        ipv4: ipv4
        network: network
      properties:
        aliases:
          description: DNS aliases the container answers to on this network.
          items:
            type: string
          type: array
        ipv4:
          description: "Assigned IPv4 on this network, if any."
          nullable: true
          type: string
        network:
          description: |-
            Network name as reported by the runtime. Matches the `name` field on
            entries returned by `GET /api/v1/container-networks`.
          type: string
      required:
      - network
    NetworkAttachmentRequest:
      description: |-
        A request to attach a freshly-created container to a user-defined bridge
        or overlay network, mirroring the wire-shape used by `POST
        /api/v1/container-networks/{id_or_name}/connect`.

        Included on [`CreateContainerRequest::networks`] so callers can wire up
        every attachment in a single call instead of issuing a separate connect
        request per network after container create.
      example:
        aliases:
        - aliases
        - aliases
        ipv4_address: ipv4_address
        network: network
      properties:
        aliases:
          description: Optional DNS aliases for this container on the network.
          items:
            type: string
          type: array
        ipv4_address:
          description: |-
            Optional static IPv4 to pin this container to. Validated as
            [`std::net::Ipv4Addr`] before the runtime is called.
          nullable: true
          type: string
        network:
          description: Bridge-network id or name to attach to.
          type: string
      required:
      - network
    NetworkEvent:
      description: A network lifecycle event.
      properties:
        at:
          description: Wall-clock time.
          format: date-time
          type: string
        container_id:
          description: "Container id, populated for `Connect`/`Disconnect`."
          nullable: true
          type: string
        driver:
          description: "Network driver (e.g. `bridge`, `overlay`)."
          type: string
        id:
          description: Network identifier (registry id).
          type: string
        kind:
          $ref: "#/components/schemas/NetworkEventKind"
        name:
          description: Human-readable network name.
          type: string
      required:
      - at
      - id
      - kind
      - name
    NetworkEventKind:
      description: Kind of network lifecycle event.
      enum:
      - create
      - delete
      - connect
      - disconnect
      type: string
    NetworkMode:
      description: |-
        Network mode for a service container.

        Mirrors Docker's `HostConfig.NetworkMode` semantics. Accepts both an
        enum-tagged form (e.g. `network_mode: { bridge: { name: my-net } }`) and a
        string form (e.g. `"host"`, `"bridge:my-net"`, `"container:abc123"`).
      oneOf:
      - description: Default networking (overlay / bridge as configured by the platform).
        enum:
        - default
        type: string
      - description: Share the host network namespace (Docker `--network host`).
        enum:
        - host
        type: string
      - description: Disable networking entirely (Docker `--network none`).
        enum:
        - none
        type: string
      - $ref: "#/components/schemas/NetworkMode_oneOf"
      - $ref: "#/components/schemas/NetworkMode_oneOf_1"
    NetworkSummary:
      description: Summary returned when listing networks.
      example:
        cidr_count: 0
        name: name
        description: description
        member_count: 0
        rule_count: 0
      properties:
        cidr_count:
          minimum: 0
          type: integer
        description:
          nullable: true
          type: string
        member_count:
          minimum: 0
          type: integer
        name:
          type: string
        rule_count:
          minimum: 0
          type: integer
      required:
      - cidr_count
      - member_count
      - name
      - rule_count
    NodeAffinity:
      description: |-
        Constrains which nodes are allowed to host a given secret's
        decryptable form. Used as the value of `ReplicatedSecret.node_affinity`.
        `None` on a secret = unconstrained (any node may host); `Some(...)`
        = only matching nodes receive a wrap of this row's DEK material,
        and the API gate filters reads accordingly.
      oneOf:
      - $ref: "#/components/schemas/NodeAffinity_oneOf"
      - $ref: "#/components/schemas/NodeAffinity_oneOf_1"
    NodeDetails:
      description: Detailed node information
      example:
        address: address
        role: role
        last_seen: 0
        registered_at: 0
        resources: ""
        id: 0
        services:
        - services
        - services
        last_heartbeat: 0
        labels:
          key: labels
        status: status
      properties:
        address:
          description: Node network address
          type: string
        id:
          description: Node identifier
          format: int64
          minimum: 0
          type: integer
        labels:
          additionalProperties:
            type: string
          description: Node labels for scheduling
        last_heartbeat:
          description: Last heartbeat timestamp (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        last_seen:
          description: Last seen timestamp (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        registered_at:
          description: When the node was registered (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        resources:
          allOf:
          - $ref: "#/components/schemas/NodeResourceInfo"
          description: Node resource information
        role:
          description: Node role
          type: string
        services:
          description: Services running on this node
          items:
            type: string
          type: array
        status:
          description: Current node status
          type: string
      required:
      - address
      - id
      - labels
      - last_heartbeat
      - last_seen
      - registered_at
      - resources
      - role
      - services
      - status
    NodeResourceInfo:
      description: Node resource information
      properties:
        cpu_percent:
          description: CPU usage percentage
          format: double
          type: number
        cpu_total:
          description: Total CPU cores
          format: double
          type: number
        cpu_used:
          description: Used CPU cores
          format: double
          type: number
        memory_percent:
          description: Memory usage percentage
          format: double
          type: number
        memory_total:
          description: Total memory in bytes
          format: int64
          minimum: 0
          type: integer
        memory_used:
          description: Used memory in bytes
          format: int64
          minimum: 0
          type: integer
      required:
      - cpu_percent
      - cpu_total
      - cpu_used
      - memory_percent
      - memory_total
      - memory_used
    NodeSelector:
      additionalProperties: false
      description: Node selection constraints for service placement
      properties:
        labels:
          additionalProperties:
            type: string
          description: Required labels that nodes must have (all must match)
        prefer_labels:
          additionalProperties:
            type: string
          description: "Preferred labels (soft constraint, nodes with these are preferred)"
    NodeSummary:
      description: Node summary for list operations
      example:
        address: address
        role: role
        last_seen: 0
        id: 0
        labels:
          key: labels
        status: status
      properties:
        address:
          description: Node network address
          type: string
        id:
          description: Node identifier
          format: int64
          minimum: 0
          type: integer
        labels:
          additionalProperties:
            type: string
          description: Node labels for scheduling
        last_seen:
          description: Last seen timestamp (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        role:
          description: "Node role (e.g., \"leader\", \"worker\")"
          type: string
        status:
          description: "Current node status (e.g., \"ready\", \"notready\", \"disconnected\"\
            )"
          type: string
      required:
      - address
      - id
      - labels
      - last_seen
      - role
      - status
    NotifierConfig:
      description: Channel-specific configuration for a notifier.
      oneOf:
      - $ref: "#/components/schemas/NotifierConfig_oneOf"
      - $ref: "#/components/schemas/NotifierConfig_oneOf_1"
      - $ref: "#/components/schemas/NotifierConfig_oneOf_2"
      - $ref: "#/components/schemas/NotifierConfig_oneOf_3"
    NotifierKind:
      description: Notification channel type.
      enum:
      - slack
      - discord
      - webhook
      - smtp
      type: string
    OidcCallbackResponse:
      description: |-
        Callback response body (returned as JSON unless the operator prefers a
        redirect; initial integration keeps JSON so the Manager UI can show a
        welcome screen post-exchange).
      example:
        provider: provider
        csrf_token: csrf_token
        user:
          last_login_at: 2026-04-15T12:00:00Z
          is_active: true
          role: role
          id: id
          display_name: display_name
          email: email
      properties:
        csrf_token:
          type: string
        provider:
          type: string
        user:
          $ref: "#/components/schemas/UserView"
      required:
      - csrf_token
      - provider
      - user
    OidcProviderPublic:
      description: |-
        Public-facing projection — what the Manager UI needs to render a login
        button. Never includes the client secret.
      example:
        name: name
        display_name: display_name
      properties:
        display_name:
          type: string
        name:
          type: string
      required:
      - display_name
      - name
    OsKind:
      description: |-
        Operating system a service needs to run on.

        Mirrors the OS half of an OCI platform descriptor. Canonical wire strings
        match Go's `GOOS` values (e.g. `"linux"`, `"windows"`, `"darwin"`).
      enum:
      - linux
      - windows
      - macos
      type: string
    OverlayMode:
      description: |-
        How the daemon places a service's overlay attachment.

        See module docs for the v0.51 implementation status of each variant.
      enum:
      - auto
      - shared
      - dedicated
      type: string
    OverlayStatusResponse:
      description: Overlay network status response
      example:
        total_peers: 0
        node_ip: node_ip
        port: 0
        healthy_peers: 0
        cidr: cidr
        last_check: 0
        unhealthy_peers: 0
        interface: interface
        is_leader: true
      properties:
        cidr:
          description: Overlay network CIDR
          type: string
        healthy_peers:
          description: Number of healthy peers
          minimum: 0
          type: integer
        interface:
          description: Overlay interface name
          type: string
        is_leader:
          description: Whether this node is the cluster leader
          type: boolean
        last_check:
          description: Last health check timestamp (unix epoch seconds)
          format: int64
          minimum: 0
          type: integer
        node_ip:
          description: Node's overlay IP address
          type: string
        port:
          description: Overlay listen port (`WireGuard` protocol)
          format: int32
          minimum: 0
          type: integer
        total_peers:
          description: Total number of peers
          minimum: 0
          type: integer
        unhealthy_peers:
          description: Number of unhealthy peers
          minimum: 0
          type: integer
      required:
      - cidr
      - healthy_peers
      - interface
      - is_leader
      - last_check
      - node_ip
      - port
      - total_peers
      - unhealthy_peers
    PeerInfo:
      description: Peer information
      example:
        public_key: public_key
        last_handshake_secs: 0
        last_ping_ms: 0
        healthy: true
        failure_count: 0
        last_check: 0
        overlay_ip: overlay_ip
      properties:
        failure_count:
          description: Number of consecutive health check failures
          format: int32
          minimum: 0
          type: integer
        healthy:
          description: Whether the peer is healthy
          type: boolean
        last_check:
          description: Last health check timestamp (unix epoch seconds)
          format: int64
          minimum: 0
          type: integer
        last_handshake_secs:
          description: Seconds since last handshake
          format: int64
          minimum: 0
          nullable: true
          type: integer
        last_ping_ms:
          description: Last ping latency in milliseconds
          format: int64
          minimum: 0
          nullable: true
          type: integer
        overlay_ip:
          description: Peer's overlay IP address
          nullable: true
          type: string
        public_key:
          description: Peer's public key
          type: string
      required:
      - failure_count
      - healthy
      - last_check
      - public_key
    PeerListResponse:
      description: Peer list response
      example:
        total: 0
        healthy: 0
        peers:
        - public_key: public_key
          last_handshake_secs: 0
          last_ping_ms: 0
          healthy: true
          failure_count: 0
          last_check: 0
          overlay_ip: overlay_ip
        - public_key: public_key
          last_handshake_secs: 0
          last_ping_ms: 0
          healthy: true
          failure_count: 0
          last_check: 0
          overlay_ip: overlay_ip
      properties:
        healthy:
          description: Number of healthy peers
          minimum: 0
          type: integer
        peers:
          description: List of peer information
          items:
            $ref: "#/components/schemas/PeerInfo"
          type: array
        total:
          description: Total number of peers
          minimum: 0
          type: integer
      required:
      - healthy
      - peers
      - total
    PermissionLevel:
      description: |-
        Access level for a resource permission, ordered from least to most
        privilege.
      enum:
      - none
      - read
      - execute
      - write
      type: string
    PortMapping:
      description: |-
        A single host-to-container port publish rule (Docker's `-p`).

        When `host_port` is `None` (or explicitly `Some(0)`), the container runtime
        assigns an ephemeral host port. `host_ip` defaults to `"0.0.0.0"` to bind
        on all interfaces.
      example:
        container_port: 0
        host_ip: host_ip
        protocol: ""
        host_port: 0
      properties:
        container_port:
          description: Container-side port.
          format: int32
          minimum: 0
          type: integer
        host_ip:
          description: Host interface to bind on. Defaults to `"0.0.0.0"` (all interfaces).
          type: string
        host_port:
          description: Host port. `None` (or zero) means "assign an ephemeral port".
          format: int32
          minimum: 0
          nullable: true
          type: integer
        protocol:
          allOf:
          - $ref: "#/components/schemas/PortProtocol"
          description: Transport protocol (defaults to TCP).
      required:
      - container_port
    PortProtocol:
      description: Transport protocol for a published container port.
      enum:
      - tcp
      - udp
      type: string
    ProjectPullResponse:
      description: "Response body for `POST /api/v1/projects/{id}/pull`."
      example:
        path: path
        project_id: project_id
        git_url: git_url
        branch: branch
        sha: sha
      properties:
        branch:
          description: Branch checked out in the working copy.
          type: string
        git_url:
          description: Git URL that was cloned / fetched.
          type: string
        path:
          description: Absolute path to the working copy on disk.
          type: string
        project_id:
          description: Project id the pull was performed for.
          type: string
        sha:
          description: HEAD commit SHA after the pull.
          type: string
      required:
      - branch
      - git_url
      - path
      - project_id
      - sha
    PruneResultDto:
      description: Serializable wrapper for `zlayer_agent::runtime::PruneResult`.
      example:
        deleted:
        - deleted
        - deleted
        space_reclaimed: 0
      properties:
        deleted:
          description: Image references or digests that were removed.
          items:
            type: string
          type: array
        space_reclaimed:
          description: Bytes reclaimed from the cache.
          format: int64
          minimum: 0
          type: integer
      required:
      - deleted
      - space_reclaimed
    PullImageRequest:
      description: Request body for the pull-image handler. Blocking pull of an OCI
        image.
      example:
        reference: reference
        pull_policy: pull_policy
        registry_auth: ""
        registry_credential_id: registry_credential_id
      properties:
        pull_policy:
          description: |-
            Pull policy override. Accepts `"always"`, `"if_not_present"`, or
            `"never"`. Defaults to `"always"` when omitted.
          nullable: true
          type: string
        reference:
          description: "OCI image reference to pull, e.g. `docker.io/library/nginx:latest`."
          type: string
        registry_auth:
          allOf:
          - $ref: "#/components/schemas/RegistryAuth"
          description: |-
            Inline Docker/OCI registry credentials used for this pull only. Not
            persisted, never logged, never echoed back on a response. Takes
            precedence over `registry_credential_id`.
          nullable: true
        registry_credential_id:
          description: |-
            Id of a persisted registry credential (from
            `POST /api/v1/credentials/registry`) to use for this pull. Ignored
            when [`Self::registry_auth`] is also supplied (inline auth wins).
            Requires the daemon to be configured with a credential store.
          nullable: true
          type: string
      required:
      - reference
    PullImageResponse:
      description: |-
        Response body for the pull-image handler. Reports the pulled reference
        and, when the backend exposes it via `list_images`, the resolved digest
        and on-disk size.
      example:
        reference: reference
        size_bytes: 0
        digest: digest
      properties:
        digest:
          description: Content-addressed digest (`sha256:...`) if the runtime reports
            one.
          nullable: true
          type: string
        reference:
          description: Canonical reference that was pulled.
          type: string
        size_bytes:
          description: On-disk size in bytes if the runtime reports one.
          format: int64
          minimum: 0
          nullable: true
          type: integer
      required:
      - reference
    RegisteredServiceInfo:
      description: Information about a registered service in a tunnel
      example:
        protocol: protocol
        local_port: 0
        service_id: service_id
        name: name
        remote_port: 0
        status: status
      properties:
        local_port:
          description: Local port on the client
          format: int32
          minimum: 0
          type: integer
        name:
          description: Service name
          type: string
        protocol:
          description: Protocol (tcp or udp)
          type: string
        remote_port:
          description: Remote port exposed on the server
          format: int32
          minimum: 0
          type: integer
        service_id:
          description: Service ID
          type: string
        status:
          description: Current status
          type: string
      required:
      - local_port
      - name
      - protocol
      - remote_port
      - service_id
      - status
    RegistryAuth:
      description: |-
        Inline Docker/OCI registry credentials attached to a single pull request.

        Prefer persistent credentials via `/api/v1/credentials/registry` for
        long-lived services. Use this inline form for one-off pulls (e.g. CI
        runners fetching a private image for a single job) where persisting a
        credential is undesirable.
      properties:
        auth_type:
          allOf:
          - $ref: "#/components/schemas/RegistryAuthType"
          description: Which authentication scheme to use against the registry.
        password:
          description: |-
            Password or bearer token. **Never** logged or returned on any
            response — consumed once and dropped.
          type: string
        username:
          description: |-
            Username for the registry (for basic auth) or a placeholder
            identifier when `auth_type == Token`.
          type: string
      required:
      - password
      - username
    RegistryAuthType:
      description: "Authentication scheme for a [`RegistryAuth`]."
      enum:
      - basic
      - token
      type: string
    RegistryAuthTypeSchema:
      description: Authentication method for a registry credential (`OpenAPI` schema).
      enum:
      - basic
      - token
      type: string
    RegistryCredentialResponse:
      description: Registry credential metadata (returned by list/create; no password).
      example:
        registry: registry
        auth_type: ""
        id: id
        username: username
      properties:
        auth_type:
          allOf:
          - $ref: "#/components/schemas/RegistryAuthTypeSchema"
          description: Authentication method.
        id:
          description: Unique identifier.
          type: string
        registry:
          description: "Registry hostname, e.g. `\"docker.io\"`, `\"ghcr.io\"`."
          type: string
        username:
          description: Username for authentication.
          type: string
      required:
      - auth_type
      - id
      - registry
      - username
    ReplicationInfo:
      description: Replication detail within the storage status response
      properties:
        enabled:
          description: Whether replication is configured
          type: boolean
        last_sync:
          description: "ISO-8601 timestamp of the last successful sync, or null"
          nullable: true
          type: string
        pending_changes:
          description: Number of WAL segments pending upload
          minimum: 0
          type: integer
        status:
          description: "Current status: \"active\", \"disabled\", or \"error\""
          type: string
      required:
      - enabled
      - pending_changes
      - status
    RestartContainerRequest:
      description: |-
        Request body for restarting a container. Matches the Docker-compat
        `POST /containers/{id}/restart` shape.
      example:
        timeout: 0
      properties:
        timeout:
          description: |-
            Graceful shutdown timeout in seconds before the runtime force-kills
            the container. Defaults to 30 seconds when omitted.
          format: int64
          minimum: 0
          nullable: true
          type: integer
    RevealAllSecretsResponse:
      description: |-
        Response for the batch reveal endpoint — returns every secret in an env as plaintext.
        Admin-only for now (Phase 3 will gate this on per-env Read permission instead).
      example:
        environment: environment
        secrets:
          key: secrets
      properties:
        environment:
          description: The environment id the secrets were revealed from.
          type: string
        secrets:
          additionalProperties:
            type: string
          description: Name → plaintext value map. Includes every secret in the scope.
      required:
      - environment
      - secrets
    RotateSecretRequest:
      description: Request body for secret rotation.
      example:
        node_affinity: ""
        value: value
      properties:
        node_affinity:
          allOf:
          - $ref: "#/components/schemas/NodeAffinity"
          description: |-
            Optional per-secret node affinity update. `None` here means "leave
            existing affinity unchanged"; to clear affinity explicitly, pass an
            empty selector via a separate update endpoint (Phase 2).
          nullable: true
        value:
          description: The new secret value (will be encrypted at rest).
          type: string
      required:
      - value
    RotateSecretResponse:
      description: Response returned by the rotate endpoint.
      example:
        previous_version: 0
        name: name
        new_version: 0
      properties:
        name:
          description: The secret name.
          type: string
        new_version:
          description: Version after rotation.
          format: int32
          minimum: 0
          type: integer
        previous_version:
          description: |-
            Version prior to rotation. `None` if the secret did not exist (won't
            happen today — rotate rejects missing secrets — but preserved for
            forward compatibility).
          format: int32
          minimum: 0
          nullable: true
          type: integer
      required:
      - name
      - new_version
    RouteInfo:
      description: Information about a single registered route.
      example:
        target_port: 0
        endpoint: endpoint
        protocol: protocol
        strip_prefix: true
        service: service
        host: host
        backends:
        - backends
        - backends
        expose: expose
        path_prefix: path_prefix
      properties:
        backends:
          description: Backend addresses currently assigned to this route.
          items:
            type: string
          type: array
        endpoint:
          description: Endpoint name within the service.
          type: string
        expose:
          description: Exposure type (public / internal).
          type: string
        host:
          description: "Host pattern (e.g. `*.example.com`), or `null` for any host."
          nullable: true
          type: string
        path_prefix:
          description: Path prefix matched by this route.
          type: string
        protocol:
          description: "Protocol (http, https, tcp, etc.)."
          type: string
        service:
          description: Owning service name.
          type: string
        strip_prefix:
          description: Whether the matched prefix is stripped before forwarding.
          type: boolean
        target_port:
          description: Container target port.
          format: int32
          minimum: 0
          type: integer
      required:
      - backends
      - endpoint
      - expose
      - path_prefix
      - protocol
      - service
      - strip_prefix
      - target_port
    RoutesResponse:
      description: Response for `GET /api/v1/proxy/routes`.
      example:
        routes:
        - target_port: 0
          endpoint: endpoint
          protocol: protocol
          strip_prefix: true
          service: service
          host: host
          backends:
          - backends
          - backends
          expose: expose
          path_prefix: path_prefix
        - target_port: 0
          endpoint: endpoint
          protocol: protocol
          strip_prefix: true
          service: service
          host: host
          backends:
          - backends
          - backends
          expose: expose
          path_prefix: path_prefix
        total: 0
      properties:
        routes:
          description: Route details.
          items:
            $ref: "#/components/schemas/RouteInfo"
          type: array
        total:
          description: Total number of routes.
          minimum: 0
          type: integer
      required:
      - routes
      - total
    ScaleAssignment:
      description: |-
        One role-group entry within an [`InternalScaleRequest`]. Phase 2 ships
        this; Phase 1 uses the legacy `replicas` field only.
      example:
        indices:
        - 0
        - 0
        role: role
      properties:
        indices:
          description: |-
            Replica indices within this role that the receiving node should ensure
            exist locally. Each becomes a container `{service}-{role}-{index}`.
          items:
            format: int32
            minimum: 0
            type: integer
          type: array
        role:
          description: "Role name (e.g. `\"default\"`, `\"primary\"`, `\"read\"`)."
          type: string
      required:
      - indices
      - role
    ScaleRequest:
      description: Scale request
      example:
        replicas: 0
      properties:
        replicas:
          description: Target replica count
          format: int32
          minimum: 0
          type: integer
      required:
      - replicas
    SecretMetadataResponse:
      description: |-
        Response containing secret metadata. Never includes the value unless
        the caller is on the explicit `?reveal=true` admin path, in which case
        `value` is populated.
      example:
        updated_at: 6
        name: name
        created_at: 0
        value: value
        version: 0
      properties:
        created_at:
          description: Unix timestamp when the secret was created.
          format: int64
          type: integer
        name:
          description: The name/identifier of the secret.
          type: string
        updated_at:
          description: Unix timestamp when the secret was last updated.
          format: int64
          type: integer
        value:
          description: Plaintext value — populated only on `?reveal=true` admin reads.
          nullable: true
          type: string
        version:
          description: Version number of the secret (incremented on each update).
          format: int32
          minimum: 0
          type: integer
      required:
      - created_at
      - name
      - updated_at
      - version
    ServiceDetails:
      description: Service details
      example:
        endpoints:
        - protocol: protocol
          port: 0
          name: name
          url: url
        - protocol: protocol
          port: 0
          name: name
          url: url
        desired_replicas: 0
        replicas: 0
        name: name
        metrics: ""
        deployment: deployment
        status: status
      properties:
        deployment:
          description: Deployment name
          type: string
        desired_replicas:
          description: Desired replica count
          format: int32
          minimum: 0
          type: integer
        endpoints:
          description: Service endpoints
          items:
            $ref: "#/components/schemas/ServiceEndpoint"
          type: array
        metrics:
          allOf:
          - $ref: "#/components/schemas/ServiceMetrics"
          description: Service metrics
        name:
          description: Service name
          type: string
        replicas:
          description: Current replica count
          format: int32
          minimum: 0
          type: integer
        status:
          description: Service status
          type: string
      required:
      - deployment
      - desired_replicas
      - endpoints
      - metrics
      - name
      - replicas
      - status
    ServiceEndpoint:
      description: Service endpoint
      example:
        protocol: protocol
        port: 0
        name: name
        url: url
      properties:
        name:
          description: Endpoint name
          type: string
        port:
          description: Port
          format: int32
          minimum: 0
          type: integer
        protocol:
          description: Protocol
          type: string
        url:
          description: URL (if public)
          nullable: true
          type: string
      required:
      - name
      - port
      - protocol
    ServiceHealthInfo:
      description: Per-service health info included in deployment details
      example:
        endpoints:
        - endpoints
        - endpoints
        replicas_desired: 0
        name: name
        replicas_running: 0
        health: health
      properties:
        endpoints:
          description: Endpoint URLs for this service
          items:
            type: string
          type: array
        health:
          description: "Health status (\"healthy\", \"unhealthy\", \"unknown\")"
          type: string
        name:
          description: Service name
          type: string
        replicas_desired:
          description: Desired replica count
          format: int32
          minimum: 0
          type: integer
        replicas_running:
          description: Running replica count
          format: int32
          minimum: 0
          type: integer
      required:
      - endpoints
      - health
      - name
      - replicas_desired
      - replicas_running
    ServiceMetrics:
      description: Service metrics
      properties:
        cpu_percent:
          description: CPU usage percentage
          format: double
          type: number
        memory_percent:
          description: Memory usage percentage
          format: double
          type: number
        rps:
          description: Requests per second
          format: double
          nullable: true
          type: number
      required:
      - cpu_percent
      - memory_percent
    ServiceOverlayStatus:
      description: Status of a service's overlay across the cluster.
      example:
        mode: ""
        service: service
        bridges_by_node:
          key:
            subnet: 10.201.0.0/24
            name: name
            gateway: 10.201.0.1
            node_id: node_id
      properties:
        bridges_by_node:
          additionalProperties:
            $ref: "#/components/schemas/BridgeInfo"
          description: |-
            One entry per node where this service has at least one container
            attached. Keys are node IDs as stringified.
        mode:
          allOf:
          - $ref: "#/components/schemas/OverlayMode"
          description: Mode the daemon resolved for this service (after `resolve_v0_51`).
        service:
          type: string
      required:
      - bridges_by_node
      - mode
      - service
    ServiceSummary:
      description: Service summary
      example:
        endpoints:
        - protocol: protocol
          port: 0
          name: name
          url: url
        - protocol: protocol
          port: 0
          name: name
          url: url
        desired_replicas: 0
        replicas: 0
        name: name
        deployment: deployment
        status: status
      properties:
        deployment:
          description: Deployment name
          type: string
        desired_replicas:
          description: Desired replica count
          format: int32
          minimum: 0
          type: integer
        endpoints:
          description: Service endpoints
          items:
            $ref: "#/components/schemas/ServiceEndpoint"
          type: array
        name:
          description: Service name
          type: string
        replicas:
          description: Current replica count
          format: int32
          minimum: 0
          type: integer
        status:
          description: Service status
          type: string
      required:
      - deployment
      - desired_replicas
      - endpoints
      - name
      - replicas
      - status
    SetPasswordRequest:
      description: "Body for `POST /api/v1/users/{id}/password`."
      example:
        new_password: new_password
        current_password: current_password
      properties:
        current_password:
          description: |-
            Required when the caller is setting their own password (non-admin
            path). Admins changing someone else's password may omit this.
          nullable: true
          type: string
        new_password:
          description: New password.
          type: string
      required:
      - new_password
    StepResult:
      description: Result of executing a single step in a workflow run.
      example:
        output: output
        step_name: step_name
        status: status
      properties:
        output:
          description: Optional output or error message.
          nullable: true
          type: string
        status:
          description: "Step outcome: `\"ok\"`, `\"failed\"`, or `\"skipped\"`."
          type: string
        step_name:
          description: The step name.
          type: string
      required:
      - status
      - step_name
    StopContainerRequest:
      description: |-
        Request body for stopping a container. Matches the Docker-compat
        `POST /containers/{id}/stop` shape.
      example:
        timeout: 0
      properties:
        timeout:
          description: |-
            Graceful shutdown timeout in seconds before the runtime force-kills
            the container. Defaults to 30 seconds when omitted.
          format: int64
          minimum: 0
          nullable: true
          type: integer
    StorageStatusResponse:
      description: Storage status response
      example:
        replication: ""
      properties:
        replication:
          allOf:
          - $ref: "#/components/schemas/ReplicationInfo"
          description: Replication status details
      required:
      - replication
    StoredDeployment:
      description: A stored deployment with metadata.
      example:
        updated_at: 2025-01-27T12:00:00Z
        name: name
        created_at: 2025-01-27T12:00:00Z
        spec: "{}"
        status: ""
      properties:
        created_at:
          description: When the deployment was created
          example: 2025-01-27T12:00:00Z
          type: string
        name:
          description: Deployment name (unique identifier)
          type: string
        spec:
          description: "The deployment specification (complex nested structure, see\
            \ spec docs)"
          type: object
        status:
          allOf:
          - $ref: "#/components/schemas/DeploymentStatus"
          description: Current deployment status
        updated_at:
          description: When the deployment was last updated
          example: 2025-01-27T12:00:00Z
          type: string
      required:
      - created_at
      - name
      - spec
      - status
      - updated_at
    StoredEnvironment:
      description: |-
        A deployment/runtime environment (e.g. "dev", "staging", "prod").

        Each environment is an isolated namespace for secrets and, later,
        deployments. Optionally belongs to a `Project` (added in Phase 5) — when
        `project_id` is `None`, the environment is global.
      example:
        updated_at: 2026-04-15T12:00:00Z
        project_id: project_id
        name: name
        created_at: 2026-04-15T12:00:00Z
        description: description
        id: id
      properties:
        created_at:
          description: When the environment was created.
          example: 2026-04-15T12:00:00Z
          type: string
        description:
          description: Free-form description shown in the UI.
          nullable: true
          type: string
        id:
          description: UUID identifier.
          type: string
        name:
          description: Display name (e.g. "dev"). Unique within a given `project_id`.
          type: string
        project_id:
          description: Project id this environment belongs to. `None` = global.
          nullable: true
          type: string
        updated_at:
          description: When the environment was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
      required:
      - created_at
      - id
      - name
      - updated_at
    StoredNotifier:
      description: |-
        A stored notifier — a named notification channel that fires alerts to
        Slack, Discord, a generic webhook, or SMTP when triggered.
      example:
        updated_at: 2026-04-15T12:00:00Z
        kind: ""
        name: name
        created_at: 2026-04-15T12:00:00Z
        id: id
        config: ""
        enabled: true
      properties:
        config:
          allOf:
          - $ref: "#/components/schemas/NotifierConfig"
          description: "Channel-specific configuration (webhook URL, SMTP settings,\
            \ etc.)."
        created_at:
          description: When the notifier was created.
          example: 2026-04-15T12:00:00Z
          type: string
        enabled:
          description: Whether this notifier is active. Disabled notifiers are skipped.
          type: boolean
        id:
          description: UUID identifier.
          type: string
        kind:
          allOf:
          - $ref: "#/components/schemas/NotifierKind"
          description: Notification channel type.
        name:
          description: Display name (e.g. `"deploy-alerts"`).
          type: string
        updated_at:
          description: When the notifier was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
      required:
      - config
      - created_at
      - enabled
      - id
      - kind
      - name
      - updated_at
    StoredPermission:
      description: |-
        A stored permission grant binding a subject (user or group) to a resource
        with a specific access level.

        Canonical `resource_kind` strings (kept here for grep-ability):
        - `"environment"` — a `StoredEnvironment` row.
        - `"deployment"` — a `StoredDeployment` row.
        - `"project"` — a `StoredProject` row.
        - `"secret"` — a row in the secrets store (`{scope}:{name}` keyed).
        - `"node"` — a cluster member identified by `NodeIdentity::node_id`.
      example:
        subject_id: subject_id
        subject_kind: ""
        level: ""
        created_at: 2026-04-15T12:00:00Z
        resource_id: resource_id
        resource_kind: resource_kind
        id: id
      properties:
        created_at:
          description: When the permission was created.
          example: 2026-04-15T12:00:00Z
          type: string
        id:
          description: UUID identifier of this permission grant.
          type: string
        level:
          allOf:
          - $ref: "#/components/schemas/PermissionLevel"
          description: The granted access level.
        resource_id:
          description: |-
            A specific resource id, or `None` for a wildcard (all resources of
            that kind).
          nullable: true
          type: string
        resource_kind:
          description: "The kind of resource (e.g. `\"deployment\"`, `\"project\"\
            `, `\"secret\"`)."
          type: string
        subject_id:
          description: The user or group id.
          type: string
        subject_kind:
          allOf:
          - $ref: "#/components/schemas/SubjectKind"
          description: Whether the subject is a user or a group.
      required:
      - created_at
      - id
      - level
      - resource_kind
      - subject_id
      - subject_kind
    StoredProject:
      description: |-
        A project bundles a git source, build configuration, registry credential
        reference, linked deployments, and a default environment.
      example:
        deploy_spec_path: deploy_spec_path
        auto_deploy: true
        build_path: build_path
        owner_id: owner_id
        created_at: 2026-04-15T12:00:00Z
        description: description
        git_branch: git_branch
        poll_interval_secs: 0
        git_credential_id: git_credential_id
        updated_at: 2026-04-15T12:00:00Z
        build_kind: ""
        name: name
        default_environment_id: default_environment_id
        id: id
        registry_credential_id: registry_credential_id
        git_url: git_url
      properties:
        auto_deploy:
          description: |-
            Whether new commits on the tracked branch should automatically
            trigger a build + deploy cycle.
          type: boolean
        build_kind:
          allOf:
          - $ref: "#/components/schemas/BuildKind"
          description: How the project is built.
          nullable: true
        build_path:
          description: Relative path within the repo (e.g. `"./Dockerfile"`).
          nullable: true
          type: string
        created_at:
          description: When the project was created.
          example: 2026-04-15T12:00:00Z
          type: string
        default_environment_id:
          description: Reference to the default environment for this project.
          nullable: true
          type: string
        deploy_spec_path:
          description: |-
            Relative path (inside the cloned repo) to a `DeploymentSpec` YAML that
            the workflow `DeployProject` action should apply.

            When `None`, the workflow `DeployProject` action fails with a clear
            "no deploy spec configured" error rather than silently succeeding —
            callers are expected to set this explicitly via `project edit`.
          nullable: true
          type: string
        description:
          description: Free-form description shown in the UI.
          nullable: true
          type: string
        git_branch:
          description: "Git branch to build from (default: `\"main\"`)."
          nullable: true
          type: string
        git_credential_id:
          description: Reference to a `GitCredential` (Phase 5.2).
          nullable: true
          type: string
        git_url:
          description: Git repository URL (e.g. `"https://github.com/user/repo"`).
          nullable: true
          type: string
        id:
          description: UUID identifier.
          type: string
        name:
          description: Project name (globally unique).
          type: string
        owner_id:
          description: Reference to the owning user.
          nullable: true
          type: string
        poll_interval_secs:
          description: |-
            If set, the daemon polls the remote for new commits every N seconds.
            `None` disables polling (the project is only updated via manual pull
            or webhook).
          format: int64
          minimum: 0
          nullable: true
          type: integer
        registry_credential_id:
          description: Reference to a `RegistryCredential` (Phase 5.2).
          nullable: true
          type: string
        updated_at:
          description: When the project was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
      required:
      - created_at
      - id
      - name
      - updated_at
    StoredSync:
      description: |-
        A stored sync resource (persistent record of a git-backed resource set).

        A sync points at a directory within a project's checkout that contains
        `ZLayer` resource YAMLs. On diff/apply the directory is scanned, compared
        against current API state, and reconciled.
      example:
        auto_apply: true
        updated_at: 2026-04-15T12:00:00Z
        project_id: project_id
        delete_missing: true
        name: name
        created_at: 2026-04-15T12:00:00Z
        last_applied_sha: last_applied_sha
        git_path: git_path
        id: id
      properties:
        auto_apply:
          description: Whether the sync should automatically apply on pull.
          type: boolean
        created_at:
          description: When the sync was created.
          example: 2026-04-15T12:00:00Z
          type: string
        delete_missing:
          description: |-
            Whether the sync apply should delete resources that are present on the
            API but missing from the manifest directory. Defaults to `false` —
            the safer behaviour, which skips deletes and only creates/updates.
          type: boolean
        git_path:
          description: Path within the project's checkout to scan for resource YAMLs.
          type: string
        id:
          description: UUID identifier.
          type: string
        last_applied_sha:
          description: The commit SHA at which this sync was last applied.
          nullable: true
          type: string
        name:
          description: Display name for this sync.
          type: string
        project_id:
          description: Linked project id (the git checkout to scan).
          nullable: true
          type: string
        updated_at:
          description: When the sync was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
      required:
      - created_at
      - git_path
      - id
      - name
      - updated_at
    StoredTask:
      description: |-
        A stored task — a named runnable script that can be executed on demand.

        Tasks can be global (`project_id = None`) or project-scoped
        (`project_id = Some(project_id)`).
      example:
        updated_at: 2026-04-15T12:00:00Z
        project_id: project_id
        kind: ""
        name: name
        created_at: 2026-04-15T12:00:00Z
        id: id
        body: body
      properties:
        body:
          description: The script/command body.
          type: string
        created_at:
          description: When the task was created.
          example: 2026-04-15T12:00:00Z
          type: string
        id:
          description: UUID identifier.
          type: string
        kind:
          allOf:
          - $ref: "#/components/schemas/TaskKind"
          description: Script type.
        name:
          description: Task name.
          type: string
        project_id:
          description: Project id this task belongs to. `None` = global.
          nullable: true
          type: string
        updated_at:
          description: When the task was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
      required:
      - body
      - created_at
      - id
      - kind
      - name
      - updated_at
    StoredUserGroup:
      description: A stored user group for role-based access control.
      example:
        updated_at: 2026-04-15T12:00:00Z
        name: name
        created_at: 2026-04-15T12:00:00Z
        description: description
        id: id
      properties:
        created_at:
          description: When the group was created.
          example: 2026-04-15T12:00:00Z
          type: string
        description:
          description: Free-form description.
          nullable: true
          type: string
        id:
          description: UUID identifier.
          type: string
        name:
          description: Group name.
          type: string
        updated_at:
          description: When the group was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
      required:
      - created_at
      - id
      - name
      - updated_at
    StoredVariable:
      description: |-
        A stored variable — a plaintext key-value pair for template substitution
        in deployment specs. Variables are NOT encrypted (unlike secrets). They
        live in their own storage, separate from the encrypted secrets store.

        Variables can be global (`scope = None`) or project-scoped
        (`scope = Some(project_id)`).
      example:
        updated_at: 2026-04-15T12:00:00Z
        scope: scope
        name: name
        created_at: 2026-04-15T12:00:00Z
        id: id
        value: value
      properties:
        created_at:
          description: When the variable was created.
          example: 2026-04-15T12:00:00Z
          type: string
        id:
          description: UUID identifier.
          type: string
        name:
          description: |-
            Variable name (e.g. `"APP_VERSION"`, `"LOG_LEVEL"`). Unique within a
            given scope.
          type: string
        scope:
          description: "Scope: project id or `None` for global."
          nullable: true
          type: string
        updated_at:
          description: When the variable was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
        value:
          description: Plaintext variable value.
          type: string
      required:
      - created_at
      - id
      - name
      - updated_at
      - value
    StoredWorkflow:
      description: |-
        A stored workflow — a named sequence of steps forming a DAG that
        composes tasks, project builds, deploys, and sync applies.
      example:
        updated_at: 2026-04-15T12:00:00Z
        project_id: project_id
        name: name
        created_at: 2026-04-15T12:00:00Z
        id: id
        steps:
        - on_failure: on_failure
          name: name
          action: ""
        - on_failure: on_failure
          name: name
          action: ""
      properties:
        created_at:
          description: When the workflow was created.
          example: 2026-04-15T12:00:00Z
          type: string
        id:
          description: UUID identifier.
          type: string
        name:
          description: Workflow name.
          type: string
        project_id:
          description: Optional project scope.
          nullable: true
          type: string
        steps:
          description: Ordered list of steps to execute sequentially.
          items:
            $ref: "#/components/schemas/WorkflowStep"
          type: array
        updated_at:
          description: When the workflow was last updated.
          example: 2026-04-15T12:00:00Z
          type: string
      required:
      - created_at
      - id
      - name
      - steps
      - updated_at
    StreamBackendInfo:
      description: Information about a single L4 stream proxy backend.
      example:
        address: address
      properties:
        address:
          description: Backend address (`ip:port`).
          type: string
      required:
      - address
    StreamInfo:
      description: Information about a single L4 stream proxy.
      example:
        protocol: protocol
        port: 0
        service: service
        backend_count: 0
        backends:
        - address: address
        - address: address
      properties:
        backend_count:
          description: Number of backends.
          minimum: 0
          type: integer
        backends:
          description: Backend addresses.
          items:
            $ref: "#/components/schemas/StreamBackendInfo"
          type: array
        port:
          description: Listen port on this node.
          format: int32
          minimum: 0
          type: integer
        protocol:
          description: Transport protocol (`tcp` or `udp`).
          type: string
        service:
          description: Service name.
          type: string
      required:
      - backend_count
      - backends
      - port
      - protocol
      - service
    StreamsResponse:
      description: Response for `GET /api/v1/proxy/streams`.
      example:
        total: 0
        tcp_count: 0
        streams:
        - protocol: protocol
          port: 0
          service: service
          backend_count: 0
          backends:
          - address: address
          - address: address
        - protocol: protocol
          port: 0
          service: service
          backend_count: 0
          backends:
          - address: address
          - address: address
        udp_count: 0
      properties:
        streams:
          description: Stream details.
          items:
            $ref: "#/components/schemas/StreamInfo"
          type: array
        tcp_count:
          description: TCP stream count.
          minimum: 0
          type: integer
        total:
          description: Total number of stream proxies.
          minimum: 0
          type: integer
        udp_count:
          description: UDP stream count.
          minimum: 0
          type: integer
      required:
      - streams
      - tcp_count
      - total
      - udp_count
    SubjectKind:
      description: Whether a permission subject is a user or a group.
      enum:
      - user
      - group
      type: string
    SuccessResponse:
      description: Generic success response
      example:
        message: message
      properties:
        message:
          description: Success message
          type: string
      required:
      - message
    SyncApplyResponse:
      description: |-
        Response for a real apply. Reports per-resource outcomes, the current
        commit SHA the sync was applied at (when known), and a short human-readable
        summary for CLI display.

        NOTE: This is a breaking change from the previous dry-run-only
        `{ diff, message }` shape. Clients inspecting the apply response directly
        must be updated — callers that only consumed the HTTP status stay working.
      example:
        summary: summary
        applied_sha: applied_sha
        results:
        - resource: resource
          kind: kind
          action: action
          error: error
          status: status
        - resource: resource
          kind: kind
          action: action
          error: error
          status: status
      properties:
        applied_sha:
          description: Commit SHA the sync was applied against (when resolvable).
          nullable: true
          type: string
        results:
          description: Per-resource reconcile results.
          items:
            $ref: "#/components/schemas/SyncResourceResult"
          type: array
        summary:
          description: |-
            Aggregate summary suitable for CLI output, e.g.
            `"3 created, 2 updated, 1 deleted, 0 skipped"`.
          type: string
      required:
      - results
      - summary
    SyncDiffResponse:
      description: JSON-friendly wrapper around the sync diff output.
      example:
        to_delete:
        - to_delete
        - to_delete
        to_update:
        - file_path: file_path
          kind: kind
          name: name
        - file_path: file_path
          kind: kind
          name: name
        to_create:
        - file_path: file_path
          kind: kind
          name: name
        - file_path: file_path
          kind: kind
          name: name
      properties:
        to_create:
          description: Resources to create.
          items:
            $ref: "#/components/schemas/SyncResourceResponse"
          type: array
        to_delete:
          description: Resource names to delete.
          items:
            type: string
          type: array
        to_update:
          description: Resources to update.
          items:
            $ref: "#/components/schemas/SyncResourceResponse"
          type: array
      required:
      - to_create
      - to_delete
      - to_update
    SyncResourceResponse:
      description: A single resource in the diff output.
      example:
        file_path: file_path
        kind: kind
        name: name
      properties:
        file_path:
          description: Source file name.
          type: string
        kind:
          description: Resource kind.
          type: string
        name:
          description: Resource name.
          type: string
      required:
      - file_path
      - kind
      - name
    SyncResourceResult:
      description: Result of reconciling a single resource during apply.
      example:
        resource: resource
        kind: kind
        action: action
        error: error
        status: status
      properties:
        action:
          description: "Action taken: `\"create\"`, `\"update\"`, `\"delete\"`, or\
            \ `\"skip\"`."
          type: string
        error:
          description: |-
            Optional error message (`status == "error"`) or skip reason
            (`action == "skip"`). Omitted on successful `"ok"` results.
          nullable: true
          type: string
        kind:
          description: "Resource kind: `\"deployment\"`, `\"job\"`, `\"cron\"`, or\
            \ other."
          type: string
        resource:
          description: The source manifest path (or remote resource name for deletions).
          type: string
        status:
          description: "Outcome status: `\"ok\"` or `\"error\"`."
          type: string
      required:
      - action
      - kind
      - resource
      - status
    TagImageRequest:
      description: |-
        Request body for the tag-image handler. Matches Docker-compat
        `docker tag` semantics: create a new reference (`target`) pointing at an
        already-cached image (`source`).
      example:
        source: source
        target: target
      properties:
        source:
          description: Existing image reference to tag (e.g. `myapp:latest`).
          type: string
        target:
          description: New reference to create (e.g. `registry.example.com/myapp:v1`).
          type: string
      required:
      - source
      - target
    TargetPlatform:
      description: |-
        Platform a service targets. `None` on `ServiceSpec.platform` means
        "any agent is acceptable" (preserves backward compatibility).
      properties:
        arch:
          $ref: "#/components/schemas/ArchKind"
        os:
          $ref: "#/components/schemas/OsKind"
        osVersion:
          description: |-
            Optional OS version constraint — primarily for Windows multi-platform
            images, where `platform.os.version` in the OCI index distinguishes build
            families (e.g. `10.0.26100.*` for Server 2025 / Win11 24H2,
            `10.0.20348.*` for Server 2022). When set on a Windows target the
            registry platform resolver prefers manifest entries whose `os.version`
            matches this value exactly or shares a `major.minor.build` prefix.
            Unused on Linux/macOS platforms.
          nullable: true
          type: string
      required:
      - arch
      - os
    TaskKind:
      description: Script type for a task.
      enum:
      - bash
      type: string
    TaskRun:
      description: A recorded execution of a task.
      example:
        finished_at: 2026-04-15T12:00:01Z
        stdout: stdout
        exit_code: 0
        started_at: 2026-04-15T12:00:00Z
        task_id: task_id
        id: id
        stderr: stderr
      properties:
        exit_code:
          description: Process exit code (`None` if the task could not be started).
          format: int32
          nullable: true
          type: integer
        finished_at:
          description: When the run finished (`None` if it has not finished yet).
          example: 2026-04-15T12:00:01Z
          nullable: true
          type: string
        id:
          description: UUID identifier of this run.
          type: string
        started_at:
          description: When the run started.
          example: 2026-04-15T12:00:00Z
          type: string
        stderr:
          description: Captured standard error.
          type: string
        stdout:
          description: Captured standard output.
          type: string
        task_id:
          description: The task that was executed.
          type: string
      required:
      - id
      - started_at
      - stderr
      - stdout
      - task_id
    TemplateInfo:
      description: Runtime template information
      example:
        detect_files:
        - detect_files
        - detect_files
        name: name
        description: description
      properties:
        description:
          description: Human-readable description
          type: string
        detect_files:
          description: Files that indicate this runtime should be used
          items:
            type: string
          type: array
        name:
          description: "Template name (e.g., \"node20\")"
          type: string
      required:
      - description
      - detect_files
      - name
    TestNotifierResponse:
      description: "Response from `POST /api/v1/notifiers/{id}/test`."
