name: CI

on:
  push:
    branches: [dev]
  pull_request:
    branches: [dev]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., v1.0.0)'
        required: false
        type: string

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================
  # Resolve version for ci-step-status tracking.
  # Every downstream job keys its "was this already run?" marker on this
  # version. Re-runs (workflow_dispatch retry, push-after-PR, etc.) targeting
  # the same version short-circuit jobs that already completed successfully,
  # which saves ~30 min per Windows-flake retry.
  #
  # resolve-version handles every trigger: manual dispatch uses inputs.version
  # verbatim; dev pushes bump the latest `v*` tag by patch; if no tags exist
  # it falls back to Cargo.toml via `service-type: rust`. Output is always
  # non-empty.
  # ===========================================
  version:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Resolve version
        id: version
        uses: https://forge.blackleafdigital.com/Public/actions/resolve-version@main
        with:
          version: ${{ inputs.version }}
          tag-prefix: v
          bump: patch
          service-type: rust

  # ===========================================
  # Check (fmt, clippy)
  # ===========================================
  check:
    name: Check
    needs: [version]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-check
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy

      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Check formatting
        if: steps.check.outputs.completed != 'true'
        run: cargo fmt --all -- --check

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-check
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Check macOS (check, clippy)
  # Runs in parallel with Linux check to catch macOS-specific
  # compilation errors in #[cfg(target_os = "macos")] code
  # ===========================================
  check-macos:
    name: Check (macOS)
    needs: [version]
    runs-on: macos-latest
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-check-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy

      - name: Install system deps
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-check-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Check Windows (check, clippy)
  # Runs in parallel with Linux check + macOS check to catch
  # Windows-specific compilation errors in #[cfg(target_os = "windows")] code.
  # Only the composite (HCS + WSL2 delegate) build is validated — the "default
  # features" Windows build is a thin CLI without zlayer-agent, which no
  # downstream consumer ships (build.yml always uses `--no-default-features
  # --features hcs-runtime,wsl`).
  # ===========================================
  check-windows:
    name: Check (Windows)
    needs: [version]
    runs-on: windows-latest
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-check-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy

      - name: Install Git Bash
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Install protoc
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'

      - name: Export PROTOC env
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV

      - name: Check compilation
        if: steps.check.outputs.completed != 'true'
        run: cargo check --package zlayer --features hcs-runtime,wsl --all-targets

      - name: Clippy lints
        if: steps.check.outputs.completed != 'true'
        run: cargo clippy --package zlayer --features hcs-runtime,wsl --all-targets -- -D warnings

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-check-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Test Windows (unit + composite-dispatch integration)
  # Runs the actual test binaries on the MiniWindows self-hosted runner
  # so we catch regressions that only surface at link/runtime. The
  # `composite_dispatch_e2e` tests are `#[ignore]`d by default and only
  # executed here via `-- --ignored` because they require a real
  # Windows 11 22H2+ host with admin + Wintun + the zlayer WSL distro.
  # ===========================================
  test-windows:
    name: Test (Windows)
    runs-on: windows-latest
    needs: [version, check, check-macos, check-windows]
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy

      - name: Install Git Bash
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/install-git-bash@main

      - name: Install protoc
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protoc'
          cross-platform: 'true'

      - name: Export PROTOC env
        if: steps.check-status.outputs.completed != 'true'
        shell: bash
        run: echo "PROTOC=C:/ProgramData/chocolatey/bin/protoc.exe" >> $GITHUB_ENV

      - name: Install uv (pyo3 build-time Python dep)
        if: steps.check-status.outputs.completed != 'true'
        shell: bash
        run: |
          # MiniWindows has uv via chocolatey; this is a safety net for new runners.
          which uv || choco install uv -y

      - name: Workspace unit tests (HCS + WSL composite)
        if: steps.check-status.outputs.completed != 'true'
        run: uv run --python 3.12 -- cargo test --package zlayer-agent --features hcs-runtime,wsl --lib --no-fail-fast

      - name: Integration — composite_dispatch_e2e (HCS + WSL, --ignored)
        if: steps.check-status.outputs.completed != 'true'
        run: uv run --python 3.12 -- cargo test --package zlayer-agent --features hcs-runtime,wsl --test composite_dispatch_e2e -- --ignored --nocapture
        # These tests need a real Windows 11 22H2+ host with admin + Wintun + the zlayer WSL distro.
        # MiniWindows has all of those; they're ignored by default so they only run when the suffix
        # `-- --ignored` is passed, here and in the local `scripts/windows-remote-check.sh --run-e2e`.

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test-windows
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [version, check, check-macos, check-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          nextest: true

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Run unit and integration tests
        if: steps.check-status.outputs.completed != 'true'
        run: |
          # Scheduler tests need test-skip-http feature
          cargo nextest run -p zlayer-scheduler --features test-skip-http
          # Run all other tests (unit + integration)
          cargo nextest run --workspace --exclude zlayer-scheduler

      - name: Run doc tests
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --workspace --doc

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Test macOS
  # Runs unit and doc tests on macOS. Integration tests
  # requiring root/containers are auto-skipped via cfg(target_os).
  # ===========================================
  test-macos:
    name: Test (macOS)
    runs-on: macos-latest
    needs: [version, check-macos]
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-test-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Run unit tests
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --workspace --lib --bins

      - name: Run doc tests
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --workspace --doc

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-test-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Build Release (Linux) — sanity-check only.
  # The real multi-platform release build runs in build.yml,
  # dispatched by auto-tag below.
  # ===========================================
  build:
    name: Build Release
    runs-on: ubuntu-latest
    needs: [version, test, feature-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev cmake pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build release binary
        if: steps.check-status.outputs.completed != 'true'
        run: cargo build --release --package zlayer

      - name: Upload artifacts
        if: steps.check-status.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: binaries
          path: |
            target/release/zlayer
          retention-days: 7

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-build
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Build Release (macOS ARM64) — sanity-check only.
  # The real multi-platform release build runs in build.yml,
  # dispatched by auto-tag below.
  # ===========================================
  build-macos:
    name: Build Release (macOS)
    runs-on: macos-latest
    needs: [version, test-macos]
    env:
      CARGO_BUILD_JOBS: "4"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-build-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf'
          cross-platform: 'true'

      - name: Build release binary
        if: steps.check-status.outputs.completed != 'true'
        run: cargo build --release --package zlayer

      - name: Upload artifacts
        if: steps.check-status.outputs.completed != 'true'
        uses: https://github.com/christopherhx/gitea-upload-artifact@v4
        with:
          name: binaries-macos-arm64
          path: |
            target/release/zlayer
          retention-days: 7

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-build-macos
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Feature Matrix Tests
  # ===========================================
  feature-tests:
    name: Feature Tests
    runs-on: ubuntu-latest
    needs: [version, check, check-macos, check-windows]
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--features full"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check step status
        id: check-status
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.version.outputs.version }}
          step: ci-feature-tests-${{ strategy.job-index }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Setup Rust
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main

      - name: Install system deps
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/setup-system-deps@main
        with:
          packages: 'protobuf-compiler libseccomp-dev pkg-config libssl-dev clang'
          cross-platform: 'true'

      - name: Restore cache
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build with features
        if: steps.check-status.outputs.completed != 'true'
        run: cargo build --package zlayer ${{ matrix.features }}

      - name: Test with features
        if: steps.check-status.outputs.completed != 'true'
        run: cargo test --package zlayer ${{ matrix.features }}

      - name: Mark step complete
        if: steps.check-status.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.version.outputs.version }}
          step: ci-feature-tests-${{ strategy.job-index }}
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Dispatch E2E (gate for the release chain)
  #
  # Runs on every successful check+test+feature-tests+sanity-build. On dev
  # pushes (without a `[np]` marker in the commit message), this job forwards
  # the version resolved by the top-level `version` job to e2e.yml, which in
  # turn dispatches build.yml on success. build.yml is responsible for
  # auto-tagging after the multi-platform build succeeds — the tag is
  # never created speculatively.
  #
  # - PR run:        dispatch e2e with version="" (sanity only, no release).
  # - Dev push:      dispatch e2e with resolved version (starts release chain).
  # - [np] dev push: dispatch e2e with version="" (no release).
  # - Manual dispatch with inputs.version: forwarded verbatim.
  # ===========================================
  trigger-e2e:
    name: Trigger E2E
    runs-on: ubuntu-latest
    needs: [version, build, build-macos, feature-tests, test-windows]
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Determine version to forward
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          RESOLVED_VERSION: ${{ needs.version.outputs.version }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
          REF: ${{ github.ref }}
        run: |
          if [[ -n "$INPUT_VERSION" ]]; then
            # Manual workflow_dispatch with an explicit version wins.
            echo "version=$INPUT_VERSION" >> $GITHUB_OUTPUT
          elif [[ "$REF" == "refs/heads/dev" && "$COMMIT_MSG" != *"[np]"* ]]; then
            # Dev push without [np]: use the version resolved at the top of CI.
            echo "version=v$RESOLVED_VERSION" >> $GITHUB_OUTPUT
          else
            # PR runs and [np] dev pushes: e2e still runs for signal, but
            # no build/tag/release chain fires.
            echo "version=" >> $GITHUB_OUTPUT
          fi

      - name: Trigger E2E workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/e2e.yml/dispatches" \
            -d '{"ref": "${{ github.ref }}", "inputs": {"version": "${{ steps.version.outputs.version }}", "sha": "${{ github.sha }}"}}'

  # ===========================================
  # Cache Cleanup
  # ===========================================
  cache-cleanup:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    needs: [build, build-macos, feature-tests]
    if: always()
    steps:
      - name: Cleanup old caches
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: cleanup
          max-age-days: '30'
          keep-latest: '5'
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
