      - stderr
      - stdout
    ContainerHealthInfo:
      description: |-
        Runtime-native health snapshot on [`ContainerInfo::health`].

        Sourced from bollard's `ContainerState.health` for Docker-backed
        containers. The internal `HealthMonitor` in
        `crates/zlayer-agent/src/health.rs` drives service-level health events
        against user-configured health specs; for standalone containers the API
        reports the runtime-native status instead so images with a baked-in
        `HEALTHCHECK` still surface correctly.
      properties:
        failing_streak:
          description: "Consecutive failing probe count, when the runtime tracks it."
          format: int32
          minimum: 0
          nullable: true
          type: integer
        last_output:
          description: "Output from the most recent failing probe, when available."
          nullable: true
          type: string
        status:
          description: |-
            One of `"none"`, `"starting"`, `"healthy"`, `"unhealthy"` (Docker
            `HealthStatusEnum`). Empty / missing upstream values normalise to
            `"none"`.
          type: string
      required:
      - status
    ContainerInfo:
      description: Container information returned by the API
      example:
        image: image
        ipv4: ipv4
        exit_code: 0
        name: name
        created_at: created_at
        health: ""
        pid: 0
        id: id
        state: state
        networks:
        - aliases:
          - aliases
          - aliases
          ipv4: ipv4
          network: network
        - aliases:
          - aliases
          - aliases
          ipv4: ipv4
          network: network
        ports:
        - container_port: 0
          host_ip: host_ip
          protocol: ""
          host_port: 0
        - container_port: 0
          host_ip: host_ip
          protocol: ""
          host_port: 0
        labels:
          key: labels
      properties:
        created_at:
          description: Creation timestamp (ISO 8601)
          type: string
        exit_code:
          description: |-
            Most-recent exit code. `None` for containers still running and for
            containers that have never exited.
          format: int32
          nullable: true
          type: integer
        health:
          allOf:
          - $ref: "#/components/schemas/ContainerHealthInfo"
          description: |-
            Runtime-native health status, when the container image declares a
            `HEALTHCHECK` (or equivalent). `None` when the runtime doesn't track
            health for this container.
          nullable: true
        id:
          description: Container identifier
          type: string
        image:
          description: OCI image reference
          type: string
        ipv4:
          description: |-
            Primary IPv4 address (first non-empty IP across attached networks).
            Docker's `bridge` network is preferred when present.
          nullable: true
          type: string
        labels:
          additionalProperties:
            type: string
          description: Labels
        name:
          description: Human-readable name (if set)
          nullable: true
          type: string
        networks:
          description: |-
            Networks this container is attached to, with per-network aliases
            and IPv4. Empty when the runtime doesn't surface network detail.
          items:
            $ref: "#/components/schemas/NetworkAttachmentInfo"
          type: array
        pid:
          description: Process ID (if running)
          format: int32
          minimum: 0
          nullable: true
          type: integer
        ports:
          description: |-
            Published port mappings (container → host). Populated from the
            runtime's inspect response; empty when the runtime doesn't expose
            port-level detail or the container has no published ports.
          items:
            $ref: "#/components/schemas/PortMapping"
          type: array
        state:
          description: "Container state (pending, running, exited, failed)"
          type: string
      required:
      - created_at
      - id
      - image
      - labels
      - state
    ContainerResourceLimits:
      description: Resource limits for a container
      properties:
        cpu:
          description: "CPU limit in cores (e.g., 0.5, 1.0, 2.0)"
          format: double
          nullable: true
          type: number
        memory:
          description: "Memory limit (e.g., \"256Mi\", \"1Gi\")"
          nullable: true
          type: string
    ContainerRestartKind:
      description: Which flavor of container restart policy to apply.
      enum:
      - "no"
      - always
      - unless_stopped
      - on_failure
      type: string
    ContainerRestartPolicy:
      additionalProperties: false
      description: |-
        Container-runtime-level restart policy.

        Maps onto Docker's `HostConfig.RestartPolicy`. Distinct from
        [`PanicPolicy`], which governs what `ZLayer` does in response to an
        application panic (it does not set a Docker restart policy).
      properties:
        delay:
          description: |-
            Humantime-formatted delay between restarts (e.g. `"500ms"`,
            `"2s"`). Accepted for forward-compatibility but currently ignored
            by the Docker backend: bollard's `RestartPolicy` has no per-kind
            delay field. When set, the runtime emits a warning.
          nullable: true
          type: string
        kind:
          allOf:
          - $ref: "#/components/schemas/ContainerRestartKind"
          description: Which restart policy to apply.
        max_attempts:
          description: |-
            For `on_failure` only: maximum number of restart attempts before
            giving up. Ignored by other kinds. `None` means "retry forever".
          format: int32
          minimum: 0
          nullable: true
          type: integer
      required:
      - kind
    ContainerStatsResponse:
      description: Container resource statistics
      example:
        cpu_usage_usec: 0
        memory_percent: 5.962133916683182
        id: id
        memory_limit: 0
        memory_bytes: 0
      properties:
        cpu_usage_usec:
          description: CPU usage in microseconds
          format: int64
          minimum: 0
          type: integer
        id:
          description: Container identifier
          type: string
        memory_bytes:
          description: Current memory usage in bytes
          format: int64
          minimum: 0
          type: integer
        memory_limit:
          description: Memory limit in bytes (`u64::MAX` if unlimited)
          format: int64
          minimum: 0
          type: integer
        memory_percent:
          description: Memory usage as percentage of limit
          format: double
          type: number
      required:
      - cpu_usage_usec
      - id
      - memory_bytes
      - memory_limit
      - memory_percent
    ContainerWaitResponse:
      description: |-
        Wait response with container exit code plus optional classification
        fields (added in §3.12 of the SDK-fixes spec).

        The three optional fields (`reason`, `signal`, `finished_at`) are
        additive — clients that only read `exit_code` keep working unchanged.
      example:
        reason: reason
        finished_at: finished_at
        exit_code: 0
        id: id
        signal: signal
      properties:
        exit_code:
          description: |-
            Exit code (0 = success). When the container was killed by signal
            `N`, this is typically `128 + N`.
          format: int32
          type: integer
        finished_at:
          description: |-
            RFC3339 timestamp of when the container exited, if reported by
            the runtime.
          nullable: true
          type: string
        id:
          description: Container identifier
          type: string
        reason:
          description: |-
            Classification of the exit. One of `"exited"`, `"signal"`,
            `"oom_killed"`, or `"runtime_error"`. Absent when the runtime
            didn't classify the exit.
          nullable: true
          type: string
        signal:
          description: |-
            Signal name when `reason == "signal"`, e.g. `"SIGKILL"`. Absent
            when the runtime couldn't determine it (or the exit wasn't a
            signal death).
          nullable: true
          type: string
      required:
      - exit_code
      - id
    CreateBridgeNetworkRequest:
