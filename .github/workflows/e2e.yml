name: E2E Tests

on:
  repository_dispatch:
    types: [run-e2e-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0) - triggers release if provided'
        required: false
        type: string
      sha:
        description: 'Commit SHA to test'
        required: false
        type: string
      test:
        description: 'Run a specific e2e suite (empty = all). For the intellitester subset, use `manager-intellitester:<yaml>` to run a single test.'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - youki
          - wasm
          - docker
          - manager-unit
          - manager-intellitester
          - manager-intellitester:login.test.yaml
          - manager-intellitester:nav-smoke.test.yaml
          - manager-intellitester:stale-session-setup.test.yaml
          - manager-intellitester:stale-session-verify.test.yaml
          - raft-e2e
          - raft-e2e:cluster_3node
          - raft-e2e:cluster_failover
          - raft-e2e:cluster_scaling
          - raft-e2e:cluster_upgrade
          - raft-e2e:cluster_node_upgrade
          - scheduler-unit
          - macos-unit
          - macos-sandbox

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "4"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"

jobs:
  # ===========================================
  # E2E Tests (Youki/libcontainer)
  # ===========================================
  e2e-tests:
    name: E2E Tests (Youki)
    runs-on: ubuntu-latest
    if: inputs.test == '' || inputs.test == 'youki'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev

      - name: Setup E2E environment
        run: |
          sudo rm -rf /tmp/zlayer-youki-e2e-test 2>/dev/null || true
          mkdir -p /tmp/zlayer-youki-e2e-test/{state,rootfs,bundles,cache}

      - name: Run E2E tests
        run: sudo -E env "PATH=$PATH" cargo test --package zlayer-agent --test youki_e2e -- --nocapture --test-threads=1
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Fix permissions after sudo test
        if: always()
        run: |
          sudo chown -R "$(id -u):$(id -g)" ~/.cargo 2>/dev/null || true
          sudo chown -R "$(id -u):$(id -g)" target 2>/dev/null || true

      - name: Cleanup
        if: always()
        run: |
          sudo rm -rf /var/lib/zlayer/* 2>/dev/null || true
          rm -rf /tmp/zlayer-youki-e2e-test 2>/dev/null || true

  # ===========================================
  # E2E Tests (WASM)
  # ===========================================
  wasm-e2e-tests:
    name: E2E Tests (WASM)
    runs-on: ubuntu-latest
    if: inputs.test == '' || inputs.test == 'wasm'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev

      - name: Run WASM E2E tests
        run: cargo test --package zlayer-agent --features wasm --test wasm_e2e_test -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

  # ===========================================
  # E2E Tests (Docker)
  # ===========================================
  docker-e2e-tests:
    name: E2E Tests (Docker)
    runs-on: ubuntu-latest
    if: inputs.test == '' || inputs.test == 'docker'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-docker-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev

      - name: Run Docker E2E tests
        run: cargo test --package zlayer-agent --features docker --test docker_runtime_test -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

  # ===========================================
  # E2E Tests (Manager UI)
  # ===========================================
  manager-tests:
    name: E2E Tests (Manager)
    runs-on: ubuntu-latest
    if: inputs.test == '' || inputs.test == 'manager-unit'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-manager-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev

      - name: Run Manager tests
        run: cargo test --package zlayer-manager --lib --features ssr -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

  # ===========================================
  # E2E Tests (Manager Intellitester / Playwright)
  #
  # Boots a hermetic daemon + manager on non-default ports (data-dir
  # under target/zlayer-e2e/<suite-id>/), then runs the Intellitester
  # YAML suite via
  # `uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py`.
  # Use the `test` workflow_dispatch input (e.g.
  # `manager-intellitester:login.test.yaml`) to run a single test.
  # ===========================================
  manager-intellitester-tests:
    name: E2E Tests (Manager Intellitester)
    runs-on: ubuntu-latest
    # Temporarily disabled: last run hung indefinitely on the throwaway
    # daemon. Re-enable by restoring the `inputs.test == ''` branch once
    # run-suite.py is stabilised. Still selectable via the dropdown.
    if: |
      inputs.test == 'manager-intellitester' ||
      startsWith(inputs.test, 'manager-intellitester:')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-manager-intellitester-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('crates/zlayer-manager/tests/e2e/package.json') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev sqlite3

      - name: Install cargo-leptos
        run: cargo install cargo-leptos --locked || true

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install node deps
        run: |
          pnpm install --prefix crates/zlayer-manager
          pnpm install --prefix crates/zlayer-manager/tests/e2e

      - name: Install Playwright Chromium
        run: pnpm --prefix crates/zlayer-manager/tests/e2e dlx playwright install chromium --with-deps

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Run manager intellitester suite
        run: |
          # Dropdown emits '', 'manager-intellitester', or
          # 'manager-intellitester:<yaml>'. Strip the prefix when present.
          YAML="${{ inputs.test }}"
          case "$YAML" in
            manager-intellitester:*) ONLY="${YAML#manager-intellitester:}" ;;
            *) ONLY="" ;;
          esac
          # The throwaway daemon runs unprivileged: overlay/TUN init logs a
          # CAP_NET_ADMIN warning and degrades to "cross-node networking
          # disabled", which is harmless for the auth/manager intellitester
          # flow. Pass --sudo-daemon only if the runner image starts
          # requiring elevated daemon caps.
          if [ -n "$ONLY" ]; then
            uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py \
              --throwaway --only "$ONLY"
          else
            uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py \
              --throwaway
          fi
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: info

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: manager-e2e-screenshots
          path: |
            crates/zlayer-manager/tests/e2e/**/*.png
            crates/zlayer-manager/tests/e2e/screenshots/
          if-no-files-found: ignore
          retention-days: 7

  # ===========================================
  # E2E Tests (Raft / Cluster)
  #
  # Builds zlayer once, then runs one or more cluster suites via the
  # throwaway-daemon harness (run-suite.py). Use the `test` input to
  # pick a single suite (e.g. `raft-e2e:cluster_failover`) or pass the
  # bare `raft-e2e` value (or leave empty) to run all four suites
  # sequentially.
  # ===========================================
  raft-e2e-tests:
    name: E2E Tests (Raft)
    # Pin to the NVIDIA/GPU runners (privileged → writable cgroups) so the
    # cluster_scaling / cluster_upgrade suites can create workload containers;
    # the plain ubuntu-latest pool includes a runner that doesn't reliably grant
    # privilege.
    runs-on: nvidia
    if: |
      inputs.test == '' ||
      inputs.test == 'raft-e2e' ||
      startsWith(inputs.test, 'raft-e2e:')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-raft-e2e-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      # cluster_scaling / cluster_upgrade create real workload containers, which
      # need a WRITABLE cgroup-v2 subtree. In the runner's job container the
      # daemon lands at the cgroup-v2 root with /sys/fs/cgroup read-only, so
      # libcontainer cannot create the per-container cgroup. Make it writable and
      # delegate a `zlayer-e2e` parent (best-effort; needs a privileged job
      # container — the diagnostics say so if it isn't).
      - name: Prepare writable cgroup for nested container creation
        run: |
          set +e
          echo "== cgroup diagnostics (before) =="
          cat /proc/self/cgroup || true
          grep -E 'cgroup' /proc/mounts || true
          ls -ld /sys/fs/cgroup || true
          mount -o remount,rw /sys/fs/cgroup 2>&1 \
            && echo "remount rw: OK" \
            || echo "remount rw: FAILED (job container is not privileged)"
          if mkdir -p /sys/fs/cgroup/zlayer-e2e 2>/dev/null; then
            echo "created /sys/fs/cgroup/zlayer-e2e"
            echo "+cpu +memory +pids +io" > /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null || true
            echo "+cpu +memory +pids +io" > /sys/fs/cgroup/zlayer-e2e/cgroup.subtree_control 2>/dev/null || true
            echo "ZLAYER_CGROUP_PARENT=/zlayer-e2e" >> "$GITHUB_ENV"
            echo "exported ZLAYER_CGROUP_PARENT=/zlayer-e2e"
          else
            echo "cgroup root not writable; cluster_scaling/cluster_upgrade cannot create containers"
            echo "  -> the runner must launch job containers privileged (or delegate a writable cgroup)"
          fi
          echo "== cgroup diagnostics (after) =="
          ls -ld /sys/fs/cgroup /sys/fs/cgroup/zlayer-e2e 2>/dev/null || true
          cat /sys/fs/cgroup/cgroup.subtree_control 2>/dev/null || true
          exit 0

      - name: Build zlayer
        run: cargo build --release -p zlayer -p zlayer-overlayd

      - name: Run raft cluster suite(s)
        run: |
          YAML="${{ inputs.test }}"
          case "$YAML" in
            raft-e2e:*) SUITE="${YAML#raft-e2e:}" ;;
            *) SUITE="cluster_3node" ;;
          esac
          # For the bare `raft-e2e` option (or an empty test input meaning
          # "run everything"), iterate all four cluster suites. Otherwise
          # run the single suite resolved above.
          if [ "$YAML" = "raft-e2e" ] || [ -z "$YAML" ]; then
            for s in cluster_3node cluster_failover cluster_scaling cluster_upgrade cluster_node_upgrade; do
              echo "=== Running suite: $s ==="
              uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py --throwaway --suite "$s"
            done
          else
            uv run crates/zlayer-manager/tests/e2e/scripts/run-suite.py --throwaway --suite "$SUITE"
          fi
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: info

  # ===========================================
  # Scheduler Unit Tests
  #
  # Pure-Rust unit-test coverage for the zlayer-scheduler crate using
  # the `test-skip-http` feature to bypass real HTTP transports.
  # ===========================================
  scheduler-unit-tests:
    name: Unit Tests (Scheduler)
    runs-on: ubuntu-latest
    if: inputs.test == '' || inputs.test == 'scheduler-unit'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-scheduler-unit-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev

      - name: Install cargo-nextest
        uses: taiki-e/install-action@nextest

      - name: Run scheduler unit tests
        run: cargo nextest run -p zlayer-scheduler --features test-skip-http
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: warn

  # ===========================================
  # macOS Unit Tests
  # Runs unit and doc tests on macOS to catch regressions in
  # macOS-specific code (#[cfg(target_os = "macos")]).
  # Linux-only tests are automatically excluded.
  # ===========================================
  macos-unit-tests:
    name: Unit Tests (macOS)
    runs-on: macos-latest
    if: inputs.test == '' || inputs.test == 'macos-unit'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: brew install protobuf

      - name: Run unit tests
        run: cargo test --workspace --lib --bins
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Run doc tests
        run: cargo test --workspace --doc

  # ===========================================
  # E2E Tests (macOS Sandbox)
  # ===========================================
  macos-sandbox-e2e:
    name: E2E Tests (macOS Sandbox)
    runs-on: macos-latest
    if: inputs.test == '' || inputs.test == 'macos-sandbox'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.client_payload.sha || inputs.sha || github.sha }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-macos-sandbox-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: brew install protobuf

      - name: Setup E2E environment
        run: |
          rm -rf /tmp/zlayer-macos-sandbox-e2e-test 2>/dev/null || true
          mkdir -p /tmp/zlayer-macos-sandbox-e2e-test/{data,logs}
          mkdir -p /tmp/zlayer-macos-sandbox-e2e-test/data/{containers,images}

      - name: Run macOS Sandbox E2E tests
        run: cargo test --package zlayer-agent --test macos_sandbox_e2e -- --nocapture
        env:
          RUST_BACKTRACE: 1
          RUST_LOG: debug

      - name: Cleanup
        if: always()
        run: |
          rm -rf /tmp/zlayer-macos-sandbox-e2e-test 2>/dev/null || true

  # ===========================================
  # Trigger Release (if version provided)
  # ===========================================
  trigger-release:
    name: Trigger Release
    runs-on: ubuntu-latest
    needs: [e2e-tests, wasm-e2e-tests, docker-e2e-tests, manager-tests, manager-intellitester-tests, raft-e2e-tests, scheduler-unit-tests, macos-unit-tests, macos-sandbox-e2e]
    # Release dispatch requires `inputs.test == ''` so partial e2e runs
    # (e.g. `test: manager-intellitester`) never short-circuit into a
    # release — the other suites would be skipped, not passed.
    if: |
      (github.event.client_payload.version != '' || inputs.version != '') &&
      (inputs.test == null || inputs.test == '') &&
      !failure() && !cancelled()
    steps:
      - name: Determine version
        id: version
        run: |
          VERSION="${{ github.event.client_payload.version || inputs.version }}"
          SHA="${{ github.event.client_payload.sha || inputs.sha || github.sha }}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "sha=${SHA}" >> $GITHUB_OUTPUT

      - name: Trigger GitHub release workflow
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          curl -X POST \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            "https://api.github.com/repos/${{ github.repository }}/dispatches" \
            -d '{"event_type": "create-release", "client_payload": {"version": "${{ steps.version.outputs.version }}", "sha": "${{ steps.version.outputs.sha }}"}}'

      - name: Summary
        run: |
          echo "## E2E Tests Passed" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Version**: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "- **SHA**: ${{ steps.version.outputs.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release workflow triggered." >> $GITHUB_STEP_SUMMARY
