      - Groups
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] when no such group exists, or
        [`ApiError::Internal`] when the store fails.
      operationId: get_group
      parameters:
      - description: Group id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredUserGroup"
          description: Group
        "404":
          description: Not found
      summary: Fetch a single group by id.
      tags:
      - Groups
    patch:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::NotFound`] when the group does not exist, or
        [`ApiError::Internal`] if the store fails.
      operationId: update_group
      parameters:
      - description: Group id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateGroupRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredUserGroup"
          description: Updated group
        "403":
          description: Admin role required
        "404":
          description: Not found
      summary: Update a group's name and/or description. Admin only.
      tags:
      - Groups
  /api/v1/groups/{id}/members:
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] when `user_id` is empty,
        [`ApiError::NotFound`] when the group does not exist, or
        [`ApiError::Internal`] if the store fails.
      operationId: add_member
      parameters:
      - description: Group id
        explode: false
