    ClusterUpgradeRequest:
      description: |-
        Request body for `POST /api/v1/cluster/upgrade`.

        Drives a leader-coordinated rolling daemon-binary upgrade across the
        cluster. The leader walks every follower in ascending `node_id` order
        (and finally upgrades itself), instructing each to download the target
        `zlayer` release and restart. Followers come back on the same advertise
        address and re-join Raft; the leader waits for each one to be healthy
        again before moving on.
      example:
        cooldown_secs: 0
        strict: true
        version: version
      properties:
        cooldown_secs:
          description: Seconds to pause between node upgrades after each follower
            comes back healthy.
          format: int64
          minimum: 0
          type: integer
        strict:
          description: Abort the rollout if any follower fails to come back healthy.
          type: boolean
        version:
          description: Target zlayer version (e.g. "v0.12.0"). Defaults to latest
            GitHub release if absent.
          nullable: true
          type: string
    ClusterUpgradeResult:
      description: Final result of a rolling upgrade attempt.
      example:
        upgraded:
        - null
        - null
        errors:
        - message: message
          node_id: 0
        - message: message
          node_id: 0
        skipped:
        - null
        - null
      properties:
        errors:
          description: Nodes that failed mid-upgrade (one entry per failure).
          items:
            $ref: "#/components/schemas/UpgradeError"
          type: array
        skipped:
          description: "Nodes intentionally skipped (e.g. unreachable, missing api\
            \ endpoint)."
          items:
            $ref: "#/components/schemas/u64"
          type: array
        upgraded:
          description: Nodes that successfully restarted on the new binary.
          items:
            $ref: "#/components/schemas/u64"
          type: array
      required:
      - errors
      - skipped
      - upgraded
    ClusterUpgradeSelfRequest:
      description: |-
        Request body for `POST /api/v1/cluster/upgrade-self`.

        Triggers a daemon-binary self-upgrade on this node. Used by the CLI
        after `cluster_upgrade` finishes the follower walk, so the leader can
        upgrade itself last. The handler re-enters
        `internal_upgrade_start` over localhost using the configured internal
        token, so all the existing self-update / sentinel / exit-75 plumbing
        is reused.
      example:
        version: version
      properties:
        version:
          description: Target version (e.g. `"v0.12.0"`). Defaults to latest GitHub
            release.
          nullable: true
          type: string
    ConnectBridgeNetworkRequest:
      description: "Body for `POST /api/v1/container-networks/{id_or_name}/connect`."
      example:
        aliases:
        - aliases
        - aliases
        ipv4_address: ipv4_address
        container_id: container_id
      properties:
        aliases:
          description: Optional DNS aliases on this network.
          items:
            type: string
          type: array
        container_id:
          description: Container id to attach.
          type: string
        ipv4_address:
          description: |-
            Optional static IPv4 to pin this container to. Validated as
            [`std::net::Ipv4Addr`].
          nullable: true
          type: string
      required:
      - container_id
    ContainerChangeEntry:
      description: |-
        One row of `GET /api/v1/containers/{id}/changes` (Docker compat shape).

        Mirrors Docker's `{"Path": "/foo", "Kind": 0}` body:
        `Kind` is a numeric enum where `0 = Modified`, `1 = Added`, `2 = Deleted`.
      example:
        Path: Path
        Kind: 0
      properties:
        Kind:
          description: "`0` = Modified, `1` = Added, `2` = Deleted (Docker's wire\
            \ integer)."
          format: int32
          minimum: 0
          type: integer
        Path:
          description: "Path inside the container that changed (absolute, e.g. `/etc/hosts`)."
          type: string
      required:
      - Kind
      - Path
    ContainerEvent:
      description: A container lifecycle event published on the bus.
      properties:
        at:
          description: |-
            Wall-clock time the event was emitted.

            Serialized as an RFC 3339 string on the wire.
          format: date-time
          type: string
        exit_code:
          description: |-
            Exit code, when known. Populated for `Die` events where a wait has
            already resolved; otherwise `None`.
          format: int32
          nullable: true
          type: integer
        id:
          description: "Container identifier (the API's id string, not the raw runtime\
            \ id)."
          type: string
        kind:
          allOf:
          - $ref: "#/components/schemas/ContainerEventKind"
          description: What kind of transition this event represents.
        labels:
          additionalProperties:
            type: string
          description: |-
            Labels on the container at the time of the event. Used by subscribers
            to filter via the `label=k=v` query param (AND semantics).
        reason:
          description: |-
            Free-form human-readable reason. For `Die`, may indicate "stopped",
            "killed", "oom-killed"; for `Oom`, the OOM detail; for `Health`, may
            echo the probe failure message.
          nullable: true
          type: string
        status:
          description: |-
            Health status, only populated for `Health` events (e.g. "healthy",
            "unhealthy", "starting").
          nullable: true
          type: string
      required:
      - at
      - id
      - kind
    ContainerEventKind:
      description: Kind of container lifecycle event.
      enum:
      - start
      - die
      - oom
      - health
      type: string
    ContainerExecRequest:
      description: Exec request for running a command in a container
      example:
        command:
        - command
        - command
      properties:
        command:
          description: Command and arguments to execute
          items:
            type: string
          type: array
      required:
      - command
    ContainerExecResponse:
      description: Exec response with command output
      example:
        stdout: stdout
        exit_code: 0
        stderr: stderr
      properties:
        exit_code:
          description: Exit code from the command
          format: int32
          type: integer
        stderr:
          description: Standard error
          type: string
        stdout:
          description: Standard output
          type: string
      required:
      - exit_code
      - stderr
      - stdout
    ContainerHealthInfo:
      description: |-
        Runtime-native health snapshot on [`ContainerInfo::health`].

        Sourced from bollard's `ContainerState.health` for Docker-backed
        containers. The internal `HealthMonitor` in
        `crates/zlayer-agent/src/health.rs` drives service-level health events
        against user-configured health specs; for standalone containers the API
        reports the runtime-native status instead so images with a baked-in
        `HEALTHCHECK` still surface correctly.
      properties:
        failing_streak:
          description: "Consecutive failing probe count, when the runtime tracks it."
          format: int32
          minimum: 0
          nullable: true
          type: integer
        last_output:
          description: "Output from the most recent failing probe, when available."
          nullable: true
          type: string
        status:
          description: |-
            One of `"none"`, `"starting"`, `"healthy"`, `"unhealthy"` (Docker
            `HealthStatusEnum`). Empty / missing upstream values normalise to
            `"none"`.
          type: string
      required:
      - status
    ContainerInfo:
      description: Container information returned by the API
      example:
        image: image
        ipv4: ipv4
        exit_code: 0
        name: name
        created_at: created_at
        health: ""
        pid: 0
        id: id
        state: state
        networks:
        - aliases:
          - aliases
          - aliases
          ipv4: ipv4
          network: network
        - aliases:
          - aliases
          - aliases
          ipv4: ipv4
          network: network
        ports:
        - container_port: 0
          host_ip: host_ip
          protocol: ""
          host_port: 0
        - container_port: 0
          host_ip: host_ip
          protocol: ""
          host_port: 0
        labels:
          key: labels
      properties:
        created_at:
          description: Creation timestamp (ISO 8601)
          type: string
        exit_code:
          description: |-
            Most-recent exit code. `None` for containers still running and for
            containers that have never exited.
          format: int32
          nullable: true
          type: integer
        health:
          allOf:
          - $ref: "#/components/schemas/ContainerHealthInfo"
          description: |-
            Runtime-native health status, when the container image declares a
            `HEALTHCHECK` (or equivalent). `None` when the runtime doesn't track
            health for this container.
          nullable: true
        id:
          description: Container identifier
          type: string
        image:
          description: OCI image reference
          type: string
        ipv4:
          description: |-
            Primary IPv4 address (first non-empty IP across attached networks).
            Docker's `bridge` network is preferred when present.
          nullable: true
          type: string
        labels:
          additionalProperties:
            type: string
          description: Labels
        name:
          description: Human-readable name (if set)
          nullable: true
          type: string
        networks:
          description: |-
            Networks this container is attached to, with per-network aliases
            and IPv4. Empty when the runtime doesn't surface network detail.
          items:
            $ref: "#/components/schemas/NetworkAttachmentInfo"
          type: array
        pid:
          description: Process ID (if running)
          format: int32
          minimum: 0
          nullable: true
          type: integer
        ports:
          description: |-
            Published port mappings (container → host). Populated from the
            runtime's inspect response; empty when the runtime doesn't expose
            port-level detail or the container has no published ports.
          items:
            $ref: "#/components/schemas/PortMapping"
          type: array
        state:
          description: "Container state (pending, running, exited, failed)"
          type: string
      required:
      - created_at
      - id
      - image
      - labels
      - state
    ContainerLogFormat:
      description: "Wire format for [`ContainerLogQuery::format`]."
      enum:
      - json
      - raw
      type: string
    ContainerPortBinding:
      description: "One host binding inside a [`ContainerPortResponse`] entry."
      example:
        HostIp: HostIp
        HostPort: HostPort
      properties:
        HostIp:
          description: |-
            Host IP that maps to the container port. Empty / `"0.0.0.0"` means
            "any IPv4 address".
          nullable: true
          type: string
        HostPort:
          description: Host port (always serialised as a string in Docker's wire format).
          nullable: true
          type: string
    ContainerPortResponse:
      description: |-
        Response body for `GET /api/v1/containers/{id}/port` (Docker compat shape).

        Mirrors Docker's `{"Ports": {"80/tcp": [{"HostIp":"...","HostPort":"..."}]}}`
        body. Each key is `<container_port>/<protocol>` and the value is the list
        of host bindings for that port (or `null` when the port is exposed but not
        published).
      example:
        Ports:
          key:
          - HostIp: HostIp
            HostPort: HostPort
          - HostIp: HostIp
            HostPort: HostPort
      properties:
        Ports:
          additionalProperties:
            items:
              $ref: "#/components/schemas/ContainerPortBinding"
            nullable: true
          description: Map of `"<port>/<protocol>"` to host bindings.
      required:
      - Ports
    ContainerPruneResponse:
      description: |-
        Response body for `POST /api/v1/containers/prune` (Docker compat shape).

        Docker uses `ContainersDeleted` / `SpaceReclaimed` `PascalCase` fields, so
        SDK consumers (and the docker shim) can read the body verbatim.
      example:
        SpaceReclaimed: 0
        ContainersDeleted:
        - ContainersDeleted
        - ContainersDeleted
      properties:
        ContainersDeleted:
          description: Container IDs that were removed.
          items:
            type: string
          type: array
        SpaceReclaimed:
          description: Bytes reclaimed from the runtime's container storage.
          format: int64
          minimum: 0
          type: integer
      required:
      - ContainersDeleted
      - SpaceReclaimed
    ContainerResourceLimits:
      description: Resource limits for a container
      properties:
        cpu:
          description: "CPU limit in cores (e.g., 0.5, 1.0, 2.0)"
          format: double
          nullable: true
          type: number
        memory:
          description: "Memory limit (e.g., \"256Mi\", \"1Gi\")"
          nullable: true
          type: string
    ContainerRestartKind:
      description: Which flavor of container restart policy to apply.
      enum:
      - "no"
      - always
      - unless_stopped
      - on_failure
      type: string
    ContainerRestartPolicy:
      additionalProperties: false
      description: |-
        Container-runtime-level restart policy.

        Maps onto Docker's `HostConfig.RestartPolicy`. Distinct from
        [`PanicPolicy`], which governs what `ZLayer` does in response to an
        application panic (it does not set a Docker restart policy).
      properties:
        delay:
          description: |-
            Humantime-formatted delay between restarts (e.g. `"500ms"`,
            `"2s"`). Accepted for forward-compatibility but currently ignored
            by the Docker backend: bollard's `RestartPolicy` has no per-kind
            delay field. When set, the runtime emits a warning.
          nullable: true
          type: string
        kind:
          allOf:
          - $ref: "#/components/schemas/ContainerRestartKind"
          description: Which restart policy to apply.
        max_attempts:
          description: |-
            For `on_failure` only: maximum number of restart attempts before
            giving up. Ignored by other kinds. `None` means "retry forever".
          format: int32
          minimum: 0
          nullable: true
          type: integer
      required:
      - kind
    ContainerStatsResponse:
      description: Container resource statistics
      example:
        cpu_usage_usec: 0
        memory_percent: 5.962133916683182
        id: id
        memory_limit: 0
        memory_bytes: 0
      properties:
        cpu_usage_usec:
          description: CPU usage in microseconds
          format: int64
          minimum: 0
          type: integer
        id:
          description: Container identifier
          type: string
        memory_bytes:
          description: Current memory usage in bytes
          format: int64
          minimum: 0
          type: integer
        memory_limit:
          description: Memory limit in bytes (`u64::MAX` if unlimited)
          format: int64
          minimum: 0
          type: integer
        memory_percent:
          description: Memory usage as percentage of limit
          format: double
          type: number
      required:
      - cpu_usage_usec
      - id
      - memory_bytes
      - memory_limit
      - memory_percent
    ContainerTopResponse:
      description: |-
        Response body for `GET /api/v1/containers/{id}/top` (Docker compat shape).

        Wire field names use Docker's `Titles` / `Processes` casing so the
        shim can pass the body through untouched.
      example:
        Processes:
        - - Processes
          - Processes
        - - Processes
          - Processes
        Titles:
        - Titles
        - Titles
      properties:
        Processes:
          description: |-
            One row per process inside the container. Each row has the same
            length as `titles`.
          items:
            items:
              type: string
            type: array
          type: array
        Titles:
          description: |-
            `ps` column titles — e.g. `["UID", "PID", "PPID", "C", "STIME",
            "TTY", "TIME", "CMD"]`.
          items:
            type: string
          type: array
      required:
      - Processes
      - Titles
    ContainerUpdateRequest:
      description: |-
        Request body for `POST /api/v1/containers/{id}/update`.

        Mirrors Docker Engine's `POST /containers/{id}/update` body 1:1 so the
        `zlayer-docker` compatibility shim can pass the wire payload straight
        through. Every field is optional — only the fields present on the wire
        are applied; unset fields are left untouched on the running container.

        Field naming uses Docker's `PascalCase` on the wire (`CpuShares`,
        `Memory`, ...) and `snake_case` on the Rust side. Subset of the full
        Docker schema: `ZLayer` supports the resource knobs (cpu, memory, pids,
        blkio) plus `RestartPolicy`. Windows-only fields (`CpuCount`,
        `IOMaximumIOps`) and ulimits/devices are accepted on the wire but
        silently ignored by the Linux runtimes.
      example:
        MemoryReservation: 3
        Memory: 9
        CpuPeriod: 6
        CpusetMems: CpusetMems
        RestartPolicy: ""
        CpuQuota: 1
        CpuRealtimeRuntime: 5
        BlkioWeight: 0
        CpuShares: 2
        MemorySwap: 2
        PidsLimit: 4
        CpusetCpus: CpusetCpus
        CpuRealtimePeriod: 5
        KernelMemory: 7
      properties:
        BlkioWeight:
          description: "Block IO weight (relative weight, range 10-1000)."
          format: int32
          minimum: 0
          nullable: true
          type: integer
        CpuPeriod:
          description: CPU CFS period in microseconds.
          format: int64
          nullable: true
          type: integer
        CpuQuota:
          description: |-
            CPU CFS quota in microseconds. Together with `cpu_period` defines
            the fraction of a CPU the container may use.
          format: int64
          nullable: true
          type: integer
        CpuRealtimePeriod:
          description: CPU real-time period in microseconds.
          format: int64
          nullable: true
          type: integer
        CpuRealtimeRuntime:
          description: CPU real-time runtime in microseconds.
          format: int64
          nullable: true
          type: integer
        CpuShares:
          description: |-
            Relative CPU weight (cgroup `cpu.weight` or `cpu.shares`). Range
            2-262144 on cgroup v2; 2-262144 mapped from 1-10000 on v1.
          format: int64
          nullable: true
          type: integer
        CpusetCpus:
          description: "CPUs allowed for execution (e.g. `\"0-3\"`, `\"0,1\"`)."
          nullable: true
          type: string
        CpusetMems:
          description: Memory nodes (NUMA) allowed for execution (e.g. `"0-3"`).
          nullable: true
          type: string
        KernelMemory:
          description: |-
            Kernel memory limit in bytes (deprecated upstream; accepted for
            wire compatibility).
          format: int64
          nullable: true
          type: integer
        Memory:
          description: Memory limit in bytes. Set `0` to remove the limit.
          format: int64
          nullable: true
          type: integer
        MemoryReservation:
          description: |-
            Soft memory limit in bytes. The kernel reclaims pages above this
            reservation when the host comes under memory pressure.
          format: int64
          nullable: true
          type: integer
        MemorySwap:
          description: |-
            Total memory limit (memory + swap) in bytes. `-1` removes the swap
            limit, matching Docker semantics.
          format: int64
          nullable: true
          type: integer
        PidsLimit:
          description: PIDs limit. Set `0` or `-1` for unlimited.
          format: int64
          nullable: true
          type: integer
        RestartPolicy:
          allOf:
          - $ref: "#/components/schemas/ContainerUpdateRestartPolicy"
          description: |-
            New restart policy. When present, replaces the container's stored
            restart policy. Docker applies this asynchronously: the next time
            the supervisor decides whether to restart, it consults the new
            policy.
          nullable: true
    ContainerUpdateResponse:
      description: |-
        Response body for `POST /api/v1/containers/{id}/update`.

        Mirrors Docker's `{"Warnings": [...]}` shape so the compat layer
        passes the body through verbatim. `Warnings` is always present (even
        if empty) for wire compatibility with clients that match the field
        presence, not just its contents.
      example:
        Warnings:
        - Warnings
        - Warnings
      properties:
        Warnings:
          description: |-
            Human-readable warnings emitted by the runtime while applying the
            update — e.g. `"kernel memory limit is deprecated"`.
          items:
            type: string
          type: array
    ContainerUpdateRestartPolicy:
      description: |-
        Restart policy entry for [`ContainerUpdateRequest`].

        Mirrors Docker's `HostConfig.RestartPolicy` shape so the Docker compat
        layer can pass the wire payload through unchanged. `name` accepts the
        same set of strings as `docker run --restart`: `""`, `"no"`, `"always"`,
        `"unless-stopped"`, or `"on-failure"`. `maximum_retry_count` is only
        honoured when `name == "on-failure"`.
      properties:
        MaximumRetryCount:
          description: |-
            Maximum number of retries before giving up (only used with
            `on-failure`). When `0` or omitted, retries are unbounded.
          format: int64
          nullable: true
          type: integer
        Name:
          description: "`\"no\"`, `\"always\"`, `\"unless-stopped\"`, or `\"on-failure\"\
            `."
          nullable: true
          type: string
    ContainerWaitDockerError:
      description: "Error envelope nested inside [`ContainerWaitDockerResponse`]."
      properties:
        Message:
          description: Human-readable description of why the wait failed.
          type: string
      required:
      - Message
    ContainerWaitDockerResponse:
      description: |-
        Docker-shaped wait response returned by
        `POST /api/v1/containers/{id}/wait`.

        Mirrors Docker Engine's `/containers/{id}/wait` body 1:1: a
        `StatusCode` field plus an optional `Error` envelope. Used by the
        `zlayer-docker` compatibility shim and any SDK callers that consume
        the Docker shape directly. The richer
        [`ContainerWaitResponse`] (returned by the legacy `GET` endpoint) is
        preserved for clients that need the `reason` / `signal` / `finished_at`
        classification fields.
      example:
        Error: ""
        StatusCode: 0
      properties:
        Error:
          allOf:
          - $ref: "#/components/schemas/ContainerWaitDockerError"
          description: |-
            Optional error envelope surfaced when the wait itself failed
            (e.g. the container was removed before reaching `not-running`
            when `condition=not-running` was requested). Absent on a normal
            exit.
          nullable: true
        StatusCode:
          description: |-
            Container exit code (0 = success). When killed by signal `N`,
            this is typically `128 + N`, matching Docker's convention.
          format: int64
          type: integer
      required:
      - StatusCode
    ContainerWaitResponse:
      description: |-
        Wait response with container exit code plus optional classification
        fields (added in §3.12 of the SDK-fixes spec).

        The three optional fields (`reason`, `signal`, `finished_at`) are
        additive — clients that only read `exit_code` keep working unchanged.
      example:
        reason: reason
        finished_at: finished_at
        exit_code: 0
        id: id
        signal: signal
      properties:
        exit_code:
          description: |-
            Exit code (0 = success). When the container was killed by signal
            `N`, this is typically `128 + N`.
          format: int32
          type: integer
        finished_at:
          description: |-
            RFC3339 timestamp of when the container exited, if reported by
            the runtime.
          nullable: true
          type: string
        id:
          description: Container identifier
          type: string
        reason:
          description: |-
            Classification of the exit. One of `"exited"`, `"signal"`,
            `"oom_killed"`, or `"runtime_error"`. Absent when the runtime
            didn't classify the exit.
          nullable: true
          type: string
        signal:
          description: |-
            Signal name when `reason == "signal"`, e.g. `"SIGKILL"`. Absent
            when the runtime couldn't determine it (or the exit wasn't a
            signal death).
          nullable: true
          type: string
      required:
      - exit_code
      - id
    CreateAccessSessionRequest:
      description: |-
        Request to create a temporary access session for an existing tunneled service.

        Used by `zlayer tunnel access <endpoint>` to ask the daemon to bind a local
        TCP listener that proxies to a remote service. The daemon returns the local
        address so the CLI can either connect directly (when the daemon and CLI
        share a host) or open a second hop forwarder.
      example:
        endpoint: endpoint
        ttl_secs: 0
        local_port: 0
      properties:
        endpoint:
          description: |-
            Service endpoint to access (e.g. "postgres.service.zlayer" or
            "host:port"). The daemon resolves this through the overlay network
            when configured.
          type: string
        local_port:
          description: |-
            Optional local port for the daemon to bind. `None` (or `0`) lets the
            daemon auto-assign an ephemeral port.
          format: int32
          minimum: 0
          nullable: true
          type: integer
        ttl_secs:
          description: |-
            Time-to-live in seconds for the session. After this expires the
            listener is torn down.
          format: int64
          minimum: 0
          type: integer
      required:
      - endpoint
    CreateAccessSessionResponse:
      description: Response after creating a temporary access session.
      example:
        endpoint: endpoint
        expires_at: 0
        local_addr: local_addr
        session_id: session_id
      properties:
        endpoint:
          description: Original endpoint requested.
          type: string
        expires_at:
          description: Unix timestamp at which the session expires.
          format: int64
          minimum: 0
          type: integer
        local_addr:
          description: "Local address the daemon bound for this session, e.g. `127.0.0.1:30042`."
          type: string
        session_id:
          description: Unique session identifier (UUID).
          type: string
      required:
      - endpoint
      - expires_at
      - local_addr
      - session_id
    CreateBridgeNetworkRequest:
      description: Body for `POST /api/v1/container-networks`.
      example:
        subnet: subnet
        internal: true
        driver: ""
        name: name
        labels:
          key: labels
      properties:
        driver:
          allOf:
          - $ref: "#/components/schemas/BridgeNetworkDriver"
          description: "Driver, defaults to `bridge`."
          nullable: true
        internal:
          description: Internal-only (no egress) network.
          type: boolean
        labels:
          additionalProperties:
            type: string
          description: Arbitrary labels.
        name:
          description: "Network name (must match `^[a-z0-9][a-z0-9_-]{0,63}$`)."
          type: string
        subnet:
          description: |-
            Subnet CIDR (e.g. `"10.240.0.0/24"`). Validated as
            [`ipnetwork::IpNetwork`].
          nullable: true
          type: string
      required:
      - name
    CreateContainerRequest:
      description: Request to create and start a container
      example:
        memory_swap: memory_swap
        security_opt:
        - security_opt
        - security_opt
        network_mode: ""
        work_dir: work_dir
        read_only_root_fs: true
        health_check: ""
        networks:
        - aliases:
          - aliases
          - aliases
          ipv4_address: ipv4_address
          network: network
        - aliases:
          - aliases
          - aliases
          ipv4_address: ipv4_address
          network: network
        ports:
        - container_port: 0
          host_ip: host_ip
          protocol: ""
          host_port: 0
        - container_port: 0
          host_ip: host_ip
          protocol: ""
          host_port: 0
        platform: ""
        lifecycle: ""
        pids_limit: 5
        cap_add:
        - cap_add
        - cap_add
        hostname: hostname
        pid_mode: pid_mode
        blkio_weight: 0
        ipc_mode: ipc_mode
        init_container: true
        registry_credential_id: registry_credential_id
        memory_reservation: memory_reservation
        stop_signal: stop_signal
        image: image
        cap_drop:
        - cap_drop
        - cap_drop
        devices:
        - path: path
          read: true
          mknod: true
          write: true
        - path: path
          read: true
          mknod: true
          write: true
        dns:
        - dns
        - dns
        registry_auth: ""
        volumes:
        - readonly: true
          source: source
          type: ""
          target: target
        - readonly: true
          source: source
          type: ""
          target: target
        extra_groups:
        - extra_groups
        - extra_groups
        oom_score_adj: 5
        resources: ""
        cpuset: cpuset
        extra_hosts:
        - extra_hosts
        - extra_hosts
        env:
          key: env
        command:
        - command
        - command
        labels:
          key: labels
        sysctls:
          key: sysctls
        privileged: true
        node_selector: ""
        ulimits:
          key:
            hard: 2
            soft: 7
        restart_policy: ""
        pull_policy: pull_policy
        name: name
        memory_swappiness: 0
        stop_grace_period: 30s
        user: user
        cpu_shares: 0
        oom_kill_disable: true
      properties:
        blkio_weight:
          description: "Block IO weight, 10-1000 (Docker `--blkio-weight`)."
          format: int32
          minimum: 0
          nullable: true
          type: integer
        cap_add:
          description: |-
            Linux capabilities to add (Docker `--cap-add`). Maps to
            `ServiceSpec::capabilities`.
          items:
            type: string
          type: array
        cap_drop:
          description: Linux capabilities to drop (Docker `--cap-drop`).
          items:
            type: string
          type: array
        command:
          description: Command to run (overrides image entrypoint)
          items:
            type: string
          nullable: true
          type: array
        cpu_shares:
          description: Relative CPU shares (Docker `--cpu-shares`). Default weight
            is 1024.
          format: int32
          minimum: 0
          nullable: true
          type: integer
        cpuset:
          description: |-
            CPUs that the container is allowed to execute on
            (Docker `--cpuset-cpus`).
          nullable: true
          type: string
        devices:
          description: Host devices to expose to the container (Docker `--device`).
          items:
            $ref: "#/components/schemas/DeviceSpec"
          type: array
        dns:
          description: |-
            Additional DNS servers (maps to Docker's `--dns`). Each entry must be
            a plausible IPv4 or IPv6 address.
          items:
            type: string
          type: array
        env:
          additionalProperties:
            type: string
          description: Environment variables
        extra_groups:
          description: |-
            Additional groups to add to the container process
            (Docker `--group-add`).
          items:
            type: string
          type: array
        extra_hosts:
          description: |-
            Extra `hostname:ip` entries appended to `/etc/hosts` (maps to Docker's
            `--add-host`). The special literal `host-gateway` is accepted as the
            `ip` half.
          items:
            type: string
          type: array
        health_check:
          allOf:
          - $ref: "#/components/schemas/HealthCheckRequest"
          description: |-
            Optional health check. When omitted, the daemon installs a no-op
            placeholder (`HealthCheck::Tcp { port: 0 }`) matching the current
            default; the health monitor treats `port == 0` as "skip".
          nullable: true
        hostname:
          description: Optional container hostname (maps to Docker's `--hostname`).
          nullable: true
          type: string
        image:
          description: "OCI image reference (e.g., \"nginx:latest\", \"ubuntu:22.04\"\
            )"
          type: string
        init_container:
          description: |-
            Run a Docker-supplied init process (PID 1) inside the container
            (Docker `--init`). Distinct from `ZLayer`'s pre-start init actions.
          nullable: true
          type: boolean
        ipc_mode:
          description: |-
            IPC namespace mode (Docker `--ipc`). Accepts e.g. `"host"`,
            `"shareable"`, `"private"`, or `"container:<id>"`.
          nullable: true
          type: string
        labels:
          additionalProperties:
            type: string
          description: Labels for filtering and grouping
        lifecycle:
          allOf:
          - $ref: "#/components/schemas/LifecycleSpec"
          description: |-
            Container lifecycle policy. Carries the `delete_on_exit` knob (Docker
            `--rm` / `HostConfig.AutoRemove`) so the daemon can remove terminated
            container records and bundles once they exit. Defaults to
            [`crate::spec::LifecycleSpec::default()`] (i.e. retain on exit), which
            matches the historical behavior for callers that omit the field.
        memory_reservation:
          description: Soft memory limit (Docker `--memory-reservation`).
          nullable: true
          type: string
        memory_swap:
          description: Total memory limit including swap (Docker `--memory-swap`).
          nullable: true
          type: string
        memory_swappiness:
          description: "Container memory swappiness, 0-100 (Docker `--memory-swappiness`)."
          format: int32
          minimum: 0
          nullable: true
          type: integer
        name:
          description: Optional human-readable name
          nullable: true
          type: string
        network_mode:
          allOf:
          - $ref: "#/components/schemas/NetworkMode"
          description: |-
            Network mode (Docker `--network`). Accepts `"default"`, `"host"`,
            `"none"`, `"bridge"`, `"bridge:<name>"`, or `"container:<id>"`. When
            omitted, defaults to [`crate::spec::NetworkMode::Default`].
          nullable: true
        networks:
          description: |-
            User-defined bridge/overlay networks to attach the newly-created
            container to. Each entry references a network by id or name and is
            attached after the container is successfully started. If any
            attachment fails, the partially-started container is rolled back
            (stopped + removed) and the request is failed.
          items:
            $ref: "#/components/schemas/NetworkAttachmentRequest"
          type: array
        node_selector:
          allOf:
          - $ref: "#/components/schemas/NodeSelector"
          description: |-
            Node selection constraints (required / preferred labels). When set on a
            daemon that has a cluster handle, the leader places the container on a
            node whose labels satisfy the required set; otherwise the field is
            ignored and the container is created locally.
          nullable: true
        oom_kill_disable:
          description: Disable the OOM killer for the container (Docker `--oom-kill-disable`).
          nullable: true
          type: boolean
        oom_score_adj:
          description: OOM-killer score adjustment (Docker `--oom-score-adj`).
          format: int32
          nullable: true
          type: integer
        pid_mode:
          description: |-
            PID namespace mode (Docker `--pid`). Accepts e.g. `"host"` or
            `"container:<id>"`.
          nullable: true
          type: string
        pids_limit:
          description: |-
            Maximum number of processes the container may spawn
            (Docker `--pids-limit`).
          format: int64
          nullable: true
          type: integer
        platform:
          allOf:
          - $ref: "#/components/schemas/TargetPlatform"
          description: |-
            Target platform (OS + arch) the container must run on, e.g.
            `darwin/arm64`. When set on a clustered daemon, the leader places the
            container on a node whose reported platform matches; when no node
            matches, the request is rejected. Ignored on single-node daemons.
          nullable: true
        ports:
          description: |-
            Published ports (Docker's `-p host:container/proto`). When omitted,
            the container is created without any host port publishing.
          items:
            $ref: "#/components/schemas/PortMapping"
          type: array
        privileged:
          description: |-
            Run the container in privileged mode (Docker `--privileged`). When
            omitted, defaults to `false`.
          nullable: true
          type: boolean
        pull_policy:
          description: "Image pull policy: \"always\", \"`if_not_present`\", or \"\
            never\""
          nullable: true
          type: string
        read_only_root_fs:
          description: Mount the container's root filesystem read-only (Docker `--read-only`).
          type: boolean
        registry_auth:
          allOf:
          - $ref: "#/components/schemas/RegistryAuth"
          description: |-
            Inline Docker/OCI registry credentials used for this pull only. Not
            persisted, never logged, never echoed back on a response. When both
            `registry_credential_id` and `registry_auth` are set, this field
            takes precedence.
          nullable: true
        registry_credential_id:
          description: |-
            Id of a persisted registry credential (from
            `POST /api/v1/credentials/registry`) to use when pulling the image.
            Ignored when [`Self::registry_auth`] is also supplied (inline auth
            wins). Requires the daemon to be configured with a credential store
            — otherwise the request is rejected with `400`.
          nullable: true
          type: string
        resources:
          allOf:
          - $ref: "#/components/schemas/ContainerResourceLimits"
          description: "Resource limits (CPU, memory)"
          nullable: true
        restart_policy:
          allOf:
          - $ref: "#/components/schemas/ContainerRestartPolicy"
          description: |-
            Container restart policy (Docker-style). When omitted, the runtime
            applies no explicit restart policy (Docker default: `"no"`).
          nullable: true
        security_opt:
          description: |-
            Security options such as `apparmor=...`, `seccomp=...`,
            `no-new-privileges:true` (Docker `--security-opt`).
          items:
            type: string
          type: array
        stop_grace_period:
          description: |-
            Grace period to wait between the stop signal and a forced kill
            (Docker `--stop-timeout`). Wire format is a humantime string
            (e.g. `"30s"`, `"500ms"`, `"1m"`).
          example: 30s
          nullable: true
          type: string
        stop_signal:
          description: |-
            Signal sent to the container's main process to request a graceful
            shutdown (Docker `--stop-signal`). Accepts e.g. `"SIGTERM"` or `"15"`.
          nullable: true
          type: string
        sysctls:
          additionalProperties:
            type: string
          description: Kernel sysctl overrides (Docker `--sysctl`).
        ulimits:
          additionalProperties:
            $ref: "#/components/schemas/UlimitSpec"
          description: Per-process ulimits (Docker `--ulimit`).
        user:
          description: |-
            User and group override for the container's main process
            (Docker `--user uid:gid`).
          nullable: true
          type: string
        volumes:
          description: Volume mounts
          items:
            $ref: "#/components/schemas/VolumeMount"
          type: array
        work_dir:
          description: Working directory inside the container
          nullable: true
          type: string
      required:
      - image
    CreateDeploymentRequest:
      description: Create deployment request
      example:
        spec: spec
      properties:
        spec:
          description: Deployment specification (YAML content)
          type: string
      required:
      - spec
    CreateEnvironmentRequest:
      description: Body for `POST /api/v1/environments`.
      example:
        project_id: project_id
        name: name
        description: description
      properties:
        description:
          description: Free-form description shown in the UI.
          nullable: true
          type: string
        name:
          description: Display name. Must be unique within the chosen `project_id`
            namespace.
          type: string
        project_id:
          description: Owning project id. `None` = global environment.
          nullable: true
          type: string
      required:
      - name
    CreateGitCredentialRequest:
      description: Body for `POST /api/v1/credentials/git`.
      example:
        kind: ""
        name: name
        value: value
      properties:
        kind:
          allOf:
          - $ref: "#/components/schemas/GitCredentialKindSchema"
          description: Credential kind.
        name:
          description: Human-readable label (e.g. `"GitHub PAT for ci"`).
          type: string
        value:
          description: "PAT or SSH key content (stored encrypted, never returned)."
          type: string
      required:
      - kind
      - name
      - value
    CreateGroupRequest:
      description: Body for `POST /api/v1/groups`.
      example:
        name: name
        description: description
      properties:
        description:
          description: Free-form description.
          nullable: true
          type: string
        name:
          description: Group name.
          type: string
      required:
      - name
    CreateNodeTunnelRequest:
      description: Request to create a node-to-node tunnel
      example:
        local_port: 0
        name: name
        remote_port: 0
        from_node: from_node
        expose: expose
        to_node: to_node
      properties:
        expose:
          description: "Exposure level (public, internal)"
          type: string
        from_node:
          description: Source node ID
          type: string
        local_port:
          description: Local port on the source node
          format: int32
          minimum: 0
          type: integer
        name:
          description: Name for this tunnel
          type: string
        remote_port:
          description: Remote port on the destination node
          format: int32
          minimum: 0
          type: integer
        to_node:
          description: Destination node ID
          type: string
      required:
      - from_node
      - local_port
      - name
      - remote_port
      - to_node
    CreateNodeTunnelResponse:
      description: Response after creating a node-to-node tunnel
      example:
        local_port: 0
        name: name
        remote_port: 0
        from_node: from_node
        expose: expose
        to_node: to_node
        status: status
      properties:
        expose:
          description: Exposure level
          type: string
        from_node:
          description: Source node ID
          type: string
        local_port:
          description: Local port
          format: int32
          minimum: 0
          type: integer
        name:
          description: Tunnel name
          type: string
        remote_port:
          description: Remote port
          format: int32
          minimum: 0
          type: integer
        status:
          description: Current status
          type: string
        to_node:
          description: Destination node ID
          type: string
      required:
      - expose
      - from_node
      - local_port
      - name
      - remote_port
      - status
      - to_node
    CreateNotifierRequest:
      description: Body for `POST /api/v1/notifiers`.
      example:
        kind: ""
        name: name
        config: ""
      properties:
        config:
          allOf:
          - $ref: "#/components/schemas/NotifierConfig"
          description: Channel-specific configuration.
        kind:
          allOf:
          - $ref: "#/components/schemas/NotifierKind"
          description: Notification channel type.
        name:
          description: Notifier name.
          type: string
      required:
      - config
      - kind
      - name
    CreateProjectRequest:
      description: Body for `POST /api/v1/projects`.
      example:
        poll_interval_secs: 0
        deploy_spec_path: deploy_spec_path
        auto_deploy: true
        build_path: build_path
        git_credential_id: git_credential_id
        build_kind: ""
        name: name
        description: description
        git_branch: git_branch
        default_environment_id: default_environment_id
        registry_credential_id: registry_credential_id
        git_url: git_url
      properties:
        auto_deploy:
          description: Enable automatic deploy on new commits.
          nullable: true
          type: boolean
        build_kind:
          allOf:
          - $ref: "#/components/schemas/BuildKind"
          description: How the project is built.
          nullable: true
        build_path:
          description: Relative build path within the repo.
          nullable: true
          type: string
        default_environment_id:
          description: Default environment id.
          nullable: true
          type: string
        deploy_spec_path:
          description: |-
            Relative path (inside the cloned repo) to a `DeploymentSpec` YAML
            that the workflow `DeployProject` action should apply.
          nullable: true
          type: string
        description:
          description: Free-form description.
          nullable: true
          type: string
        git_branch:
          description: Git branch to build from.
          nullable: true
          type: string
        git_credential_id:
          description: Reference to a `GitCredential` id.
          nullable: true
          type: string
        git_url:
          description: Git repository URL.
          nullable: true
          type: string
        name:
          description: Project name (globally unique).
          type: string
        poll_interval_secs:
          description: Polling interval in seconds (None = no polling).
          format: int64
          minimum: 0
          nullable: true
          type: integer
        registry_credential_id:
          description: Reference to a `RegistryCredential` id.
          nullable: true
          type: string
      required:
      - name
    CreateRegistryCredentialRequest:
      description: Body for `POST /api/v1/credentials/registry`.
      example:
        registry: registry
        auth_type: ""
        password: password
        username: username
      properties:
        auth_type:
          allOf:
          - $ref: "#/components/schemas/RegistryAuthTypeSchema"
          description: Authentication method.
        password:
          description: "Password or token value (stored encrypted, never returned)."
          type: string
        registry:
          description: Registry hostname (e.g. `"docker.io"`).
          type: string
        username:
          description: Username for authentication.
          type: string
      required:
      - auth_type
      - password
      - registry
      - username
    CreateSecretRequest:
      description: |-
        Request to create or update a secret.

        `scope` is optional and only honored on the legacy code path — when set
        alongside `?environment=`, the request is rejected.
      example:
        scope: scope
        name: name
        node_affinity: ""
        value: value
      properties:
        name:
          description: The name of the secret.
          type: string
        node_affinity:
          allOf:
          - $ref: "#/components/schemas/NodeAffinity"
          description: |-
            Optional per-secret node affinity. `None` (default) = any node may
            host the decryptable form. When set, only matching nodes receive a
            wrap of the DEK material for this row, and the API gate filters
            reads accordingly. Ignored on standalone (non-clustered) daemons.
          nullable: true
        scope:
          description: |-
            Optional explicit scope (legacy form). Mutually exclusive with the
            `?environment=` query parameter.
          nullable: true
          type: string
        value:
          description: The secret value (will be encrypted at rest).
          type: string
      required:
      - name
      - value
    CreateSyncRequest:
      description: Body for `POST /api/v1/syncs`.
      example:
        auto_apply: true
        project_id: project_id
        delete_missing: true
        name: name
        git_path: git_path
      properties:
        auto_apply:
          description: Whether the sync should automatically apply on pull.
          nullable: true
          type: boolean
        delete_missing:
          description: |-
            Whether `apply` should delete resources on the API that are missing
            from the manifest directory. Defaults to `false` (the safer choice).
          nullable: true
          type: boolean
        git_path:
          description: Path within the project's checkout to scan for resource YAMLs.
          type: string
        name:
          description: Display name for this sync.
          type: string
        project_id:
          description: Linked project id.
          nullable: true
          type: string
      required:
      - git_path
      - name
    CreateTaskRequest:
      description: Body for `POST /api/v1/tasks`.
      example:
        project_id: project_id
        kind: ""
        name: name
        body: body
      properties:
        body:
          description: The script/command body.
          type: string
        kind:
          allOf:
          - $ref: "#/components/schemas/TaskKind"
          description: Script type.
        name:
          description: Task name.
          type: string
        project_id:
          description: Project id scope. `None` = global task.
          nullable: true
          type: string
      required:
      - body
      - kind
      - name
    CreateTunnelRequest:
      description: Request to create a new tunnel token
      example:
        ttl_secs: 0
        name: name
        services:
        - services
        - services
      properties:
        name:
          description: Name for this tunnel (for identification)
          type: string
        services:
          description: Optional list of services this tunnel is allowed to expose
          items:
            type: string
          type: array
        ttl_secs:
          description: "Time-to-live in seconds (default: 24 hours)"
          format: int64
          minimum: 0
          type: integer
      required:
      - name
    CreateTunnelResponse:
      description: Response after creating a tunnel token
      example:
        expires_at: 0
        name: name
        created_at: 0
        id: id
        services:
        - services
        - services
        token: token
      properties:
        created_at:
          description: When the tunnel was created (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        expires_at:
          description: When the token expires (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        id:
          description: Unique tunnel identifier
          type: string
        name:
          description: Name of the tunnel
          type: string
        services:
          description: Services this tunnel can expose
          items:
            type: string
          type: array
        token:
          description: The tunnel token to use for authentication
          type: string
      required:
      - created_at
      - expires_at
      - id
      - name
      - services
      - token
    CreateUserRequest:
      description: Body for `POST /api/v1/users`.
      example:
        password: password
        role: admin
        display_name: display_name
        email: email
      properties:
        display_name:
          nullable: true
          type: string
        email:
          type: string
        password:
          type: string
        role:
          $ref: "#/components/schemas/UserRole"
      required:
      - email
      - password
      - role
    CreateVariableRequest:
      description: Body for `POST /api/v1/variables`.
      example:
        scope: scope
        name: name
        value: value
      properties:
        name:
          description: |-
            Variable name (e.g. `"APP_VERSION"`). Must be unique within the chosen
            scope.
          type: string
        scope:
          description: Project id scope. `None` = global variable.
          nullable: true
          type: string
        value:
          description: Plaintext value.
          type: string
      required:
      - name
      - value
    CreateVolumeRequest:
      description: Request body for `POST /api/v1/volumes`.
      example:
        size: size
        tier: tier
        name: name
        labels:
          key: labels
      properties:
        labels:
          additionalProperties:
            type: string
          description: Optional labels to attach to the volume.
        name:
          description: "Volume name. Required. Must match `^[a-z0-9][a-z0-9_-]{0,63}$`."
          type: string
        size:
          description: |-
            Optional size hint (humansize format: `"512Mi"`, `"10Gi"`).
            Recorded in the sidecar for display and future quota enforcement.
          nullable: true
          type: string
        tier:
          description: |-
            Optional storage tier. Accepts `"local"` (default), `"cached"`,
            `"network"`, matching `zlayer_spec::StorageTier`.
          nullable: true
          type: string
      required:
      - name
    CreateWorkflowRequest:
      description: Body for `POST /api/v1/workflows`.
      example:
        project_id: project_id
        name: name
        steps:
        - on_failure: on_failure
          name: name
          action: ""
        - on_failure: on_failure
          name: name
          action: ""
      properties:
        name:
          description: Workflow name.
          type: string
        project_id:
          description: Optional project scope.
          nullable: true
          type: string
        steps:
          description: Ordered list of steps.
          items:
            $ref: "#/components/schemas/WorkflowStep"
          type: array
      required:
      - name
      - steps
    CronJobResponse:
      description: Response for cron job information
      example:
        schedule: schedule
        next_run: next_run
        name: name
        last_run: last_run
        enabled: true
      properties:
        enabled:
          description: Whether the job is enabled
          type: boolean
        last_run:
          description: When the job last ran (ISO 8601 format)
          nullable: true
          type: string
        name:
          description: Job name
          type: string
        next_run:
          description: Next scheduled run time (ISO 8601 format)
          nullable: true
          type: string
        schedule:
          description: Cron schedule expression
          type: string
      required:
      - enabled
      - name
      - schedule
    CronStatusResponse:
      description: Response for enable/disable operations
      example:
        name: name
        message: message
        enabled: true
      properties:
        enabled:
          description: New enabled state
          type: boolean
        message:
          description: Human-readable message
          type: string
        name:
          description: Job name
          type: string
      required:
      - enabled
      - message
      - name
    CsrfResponse:
      example:
        csrf_token: csrf_token
      properties:
        csrf_token:
          type: string
      required:
      - csrf_token
    DaemonCapabilitiesResponse:
      description: |-
        Response body for `GET /api/v1/daemon/capabilities`.

        Snapshot of the daemon's runtime environment: privilege level, cgroup
        scoping, network-related kernel capabilities. The fields mirror
        [`DaemonCapabilities`] field-for-field; values are memoised at process
        start and do not change at runtime.
      example:
        mode: ""
        tun_device_available: true
        cgroup_parent: cgroup_parent
        has_cap_net_admin: true
        can_write_cgroup_root: true
        is_root: true
        is_nested: true
      properties:
        can_write_cgroup_root:
          description: |-
            `true` if the cgroup root's `cgroup.subtree_control` has the owner-
            write bit set.
          type: boolean
        cgroup_parent:
          description: "The cgroup v2 path of the current process, if any."
          nullable: true
          type: string
        has_cap_net_admin:
          description: '`true` if `CAP_NET_ADMIN` is present in the process''s bounding
            set.'
          type: boolean
        is_nested:
          description: |-
            `true` if the process appears to be inside a container (non-root
            cgroup v2 path).
          type: boolean
        is_root:
          description: '`true` if the process is running as uid 0.'
          type: boolean
        mode:
          allOf:
          - $ref: "#/components/schemas/DaemonModeDto"
          description: Coarse classification derived from the boolean fields below.
        tun_device_available:
          description: |-
            `true` if `/dev/net/tun` can be opened r/w without
            EACCES/EPERM/ENOENT/ENXIO.
          type: boolean
      required:
      - can_write_cgroup_root
      - has_cap_net_admin
      - is_nested
      - is_root
      - mode
      - tun_device_available
    DaemonEvent:
      description: |-
        A daemon lifecycle event. One of container, image, network, or volume.

        Events are tagged on the wire with `"resource"` (`container` | `image` |
        `network` | `volume`) so consumers can route on resource type without
        matching the variant shape.
      oneOf:
      - $ref: "#/components/schemas/DaemonEvent_oneOf"
      - $ref: "#/components/schemas/DaemonEvent_oneOf_1"
      - $ref: "#/components/schemas/DaemonEvent_oneOf_2"
      - $ref: "#/components/schemas/DaemonEvent_oneOf_3"
    DaemonModeDto:
      description: |-
        Coarse classification of the daemon's effective execution environment.

        Mirror of [`zlayer_agent::capability::DaemonMode`]. The agent's enum lives
