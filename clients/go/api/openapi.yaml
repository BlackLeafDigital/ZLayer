    NetworkAttachmentInfo:
      description: |-
        Per-network attachment entry on [`ContainerInfo::networks`].

        Populated from the runtime's inspect response — mirrors the subset of
        bollard's `EndpointSettings` that API clients need to correlate a container
        with its `container_networks` entries.
      example:
        aliases:
        - aliases
        - aliases
        ipv4: ipv4
        network: network
      properties:
        aliases:
          description: DNS aliases the container answers to on this network.
          items:
            type: string
          type: array
        ipv4:
          description: "Assigned IPv4 on this network, if any."
          nullable: true
          type: string
        network:
          description: |-
            Network name as reported by the runtime. Matches the `name` field on
            entries returned by `GET /api/v1/container-networks`.
          type: string
      required:
      - network
    NetworkAttachmentRequest:
      description: |-
        A request to attach a freshly-created container to a user-defined bridge
        or overlay network, mirroring the wire-shape used by `POST
        /api/v1/container-networks/{id_or_name}/connect`.

        Included on [`CreateContainerRequest::networks`] so callers can wire up
        every attachment in a single call instead of issuing a separate connect
        request per network after container create.
      example:
        aliases:
        - aliases
        - aliases
        ipv4_address: ipv4_address
        network: network
      properties:
        aliases:
          description: Optional DNS aliases for this container on the network.
          items:
            type: string
          type: array
        ipv4_address:
          description: |-
            Optional static IPv4 to pin this container to. Validated as
            [`std::net::Ipv4Addr`] before the runtime is called.
          nullable: true
          type: string
        network:
          description: Bridge-network id or name to attach to.
          type: string
      required:
      - network
    NetworkSummary:
      description: Summary returned when listing networks.
      example:
        cidr_count: 0
        name: name
        description: description
        member_count: 0
        rule_count: 0
      properties:
        cidr_count:
          minimum: 0
          type: integer
        description:
          nullable: true
          type: string
        member_count:
          minimum: 0
          type: integer
        name:
          type: string
        rule_count:
          minimum: 0
          type: integer
      required:
      - cidr_count
      - member_count
      - name
      - rule_count
    NodeDetails:
      description: Detailed node information
      example:
        address: address
        role: role
        last_seen: 0
        registered_at: 0
        resources: ""
        id: 0
        services:
        - services
        - services
        last_heartbeat: 0
        labels:
          key: labels
        status: status
      properties:
        address:
          description: Node network address
          type: string
        id:
          description: Node identifier
          format: int64
          minimum: 0
          type: integer
        labels:
          additionalProperties:
            type: string
          description: Node labels for scheduling
        last_heartbeat:
          description: Last heartbeat timestamp (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        last_seen:
          description: Last seen timestamp (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        registered_at:
          description: When the node was registered (Unix timestamp)
          format: int64
          minimum: 0
          type: integer
        resources:
