        consumers that deserialize strictly. New consumers should use
        [`VolumeInfo`]. `list_volumes` now returns [`VolumeInfo`] which is a
        strict superset of the fields in `VolumeSummary`.
      properties:
        name:
          description: Volume name (directory name).
          type: string
        path:
          description: Host filesystem path.
          type: string
        size_bytes:
          description: Approximate size in bytes.
          format: int64
          minimum: 0
          nullable: true
          type: integer
      required:
      - name
      - path
