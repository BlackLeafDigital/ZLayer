[build-system]
requires = ["maturin>=1.4,<2.0"]
build-backend = "maturin"

[project]
name = "zlayer"
description = "Python bindings for ZLayer, a lightweight Rust-based container orchestrator with built-in networking, scaling, and observability."
readme = { file = "README.md", content-type = "text/markdown" }
license = { text = "Apache-2.0" }
requires-python = ">=3.8"
authors = [
    { name = "Zach Handley", email = "zach@blackleafdigital.com" },
]
keywords = ["container", "orchestration", "docker", "kubernetes", "wasm", "zlayer"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Intended Audience :: System Administrators",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.8",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Programming Language :: Python :: Implementation :: CPython",
    "Programming Language :: Rust",
    "Topic :: Software Development :: Libraries :: Python Modules",
    "Topic :: System :: Distributed Computing",
    "Topic :: System :: Systems Administration",
    "Typing :: Typed",
]
dynamic = ["version"]

[project.urls]
Homepage = "https://zlayer.dev"
Repository = "https://github.com/BlackLeafDigital/ZLayer"
Documentation = "https://zlayer.dev/docs"
Issues = "https://github.com/BlackLeafDigital/ZLayer/issues"
Changelog = "https://github.com/BlackLeafDigital/ZLayer/blob/main/CHANGELOG.md"

[project.optional-dependencies]
test = [
    "pytest>=7",
    "pytest-asyncio>=0.21",
]
dev = [
    "pytest>=7.0",
    "pytest-asyncio>=0.21",
    "maturin>=1.4,<2.0",
]

[tool.maturin]
features = ["pyo3/abi3-py38"]
python-source = "python"
module-name = "zlayer._zlayer"
