      example:
        hard: 2
        soft: 7
      properties:
        hard:
          description: Hard limit.
          format: int64
          type: integer
        soft:
          description: Soft limit.
          format: int64
          type: integer
    UpdateEnvironmentRequest:
      description: "Body for `PATCH /api/v1/environments/{id}`. All fields are optional."
