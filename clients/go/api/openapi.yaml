        name:
          description: Updated name.
          nullable: true
          type: string
    UpdateProjectRequest:
      description: "Body for `PATCH /api/v1/projects/{id}`. All fields are optional."
      example:
        poll_interval_secs: 0
        deploy_spec_path: deploy_spec_path
        auto_deploy: true
        build_path: build_path
        git_credential_id: git_credential_id
        build_kind: ""
        name: name
        description: description
        git_branch: git_branch
        default_environment_id: default_environment_id
        registry_credential_id: registry_credential_id
        git_url: git_url
      properties:
        auto_deploy:
          description: Enable or disable automatic deploy on new commits.
          nullable: true
          type: boolean
        build_kind:
          allOf:
          - $ref: "#/components/schemas/BuildKind"
          description: New build kind.
          nullable: true
        build_path:
