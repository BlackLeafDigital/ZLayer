    ClusterJoinRequest:
      description: Request body for `POST /api/v1/cluster/join`.
      example:
        os: ""
        cpu_total: 6.027456183070403
        raft_port: 0
        services:
        - services
        - services
        api_port: 0
        labels:
          key: labels
        token: token
        mode: mode
        secrets_pubkey:
        - 0
        - 0
        wg_public_key: wg_public_key
        disk_total: 0
        gpus:
        - vendor: vendor
          memory_mb: 0
          model: model
        - vendor: vendor
          memory_mb: 0
          model: model
        overlay_port: 0
        arch: ""
        advertise_addr: advertise_addr
        memory_total: 0
      properties:
        advertise_addr:
          description: Joining node's advertise address (IP)
          type: string
        api_port:
          description: Joining node's API server port
          format: int32
          minimum: 0
          type: integer
        arch:
          allOf:
          - $ref: "#/components/schemas/ArchKind"
          description: CPU architecture of the joining agent. Same legacy semantics
            as `os`.
          nullable: true
        cpu_total:
          description: Total CPU cores on the joining node
          format: double
          type: number
        disk_total:
          description: Total disk in bytes
          format: int64
          minimum: 0
          type: integer
        gpus:
          description: Detected GPUs
          items:
            $ref: "#/components/schemas/GpuInfoSummary"
          type: array
        labels:
          additionalProperties:
            type: string
          description: |-
            Free-form labels advertised by the joining agent, used for
            `NodeSelector` placement matching. Empty on legacy clients.
        memory_total:
          description: Total memory in bytes
          format: int64
          minimum: 0
          type: integer
        mode:
          description: "Node mode: \"full\" or \"replicate\""
          type: string
        os:
          allOf:
          - $ref: "#/components/schemas/OsKind"
          description: |-
            Operating system of the joining agent. `None` = legacy client that did
            not report platform info.
          nullable: true
        overlay_port:
          description: Joining node's overlay port (`WireGuard`)
          format: int32
          minimum: 0
          type: integer
        raft_port:
          description: Joining node's Raft RPC port
          format: int32
          minimum: 0
          type: integer
        secrets_pubkey:
          description: |-
            Joiner's 32-byte X25519 pubkey for sealed-box DEK wrapping.
            Present on Phase-1+ joiners; absent on legacy clients (in which
            case the leader treats the node as not eligible to host
            replicated-secret ciphertext until it re-joins with a pubkey).
          items:
            format: int32
            minimum: 0
            type: integer
          nullable: true
          type: array
        services:
          description: Services to replicate (only if mode == "replicate")
          items:
            type: string
          nullable: true
          type: array
        token:
          description: Base64-encoded join token (contains `auth_secret` for validation)
          type: string
        wg_public_key:
          description: Joining node's `WireGuard` public key
          type: string
      required:
      - advertise_addr
      - overlay_port
      - raft_port
      - token
      - wg_public_key
    ClusterJoinResponse:
      description: Response body for `POST /api/v1/cluster/join`.
      example:
        slice_cidr: slice_cidr
        role: role
        dek_generation: 0
        raft_node_id: 0
        wrapped_dek:
        - 0
        - 0
        warnings:
        - warnings
        - warnings
        peers:
        - wg_public_key: wg_public_key
          raft_node_id: 0
          overlay_port: 0
          raft_port: 0
          advertise_addr: advertise_addr
          overlay_ip: overlay_ip
          node_id: node_id
        - wg_public_key: wg_public_key
          raft_node_id: 0
          overlay_port: 0
          raft_port: 0
          advertise_addr: advertise_addr
          overlay_ip: overlay_ip
          node_id: node_id
        join_secret: join_secret
        overlay_ip: overlay_ip
        node_id: node_id
        node_jwt: node_jwt
      properties:
        dek_generation:
          description: |-
            Cluster DEK generation that `wrapped_dek` was sealed under. Lets
            the joiner detect rotation drift if it re-joins after a revocation
            rotated the cluster DEK. `None` when `wrapped_dek` is `None`.
          format: int64
          minimum: 0
          nullable: true
          type: integer
        join_secret:
          description: |-
            Cluster-wide HMAC join secret. Returned to authenticated joiners
            so they can derive the same internal RPC bearer as the leader.
            `None` on legacy responses from older leaders.
          nullable: true
          type: string
        node_id:
          description: Assigned node UUID
          type: string
        node_jwt:
          description: |-
            Node JWT minted by the leader for this joiner — `roles: ["node"]`,
            `node_id` set. Used to authenticate inter-node calls separately
            from any user identity. `None` on legacy responses.
          nullable: true
          type: string
        overlay_ip:
          description: Assigned overlay IP for the new node
          type: string
        peers:
          description: Existing peers in the cluster
          items:
            $ref: "#/components/schemas/ClusterPeer"
          type: array
        raft_node_id:
          description: Assigned Raft node ID (monotonic u64)
          format: int64
          minimum: 0
          type: integer
        role:
          description: "Role assigned to this node: \"voter\" or \"learner\""
          type: string
        slice_cidr:
          description: |-
            Per-node slice CIDR assigned by the leader (e.g. "10.200.42.0/28").
            Empty string if the leader is not slice-aware yet.
          type: string
        warnings:
          description: |-
            Server-side advisory warnings to surface to the operator/CLI.

            Examples: "your token format is deprecated and will be removed in
            release X.Y", "consider rotating the signing key, last rotated N
            days ago". Present-but-empty means "no warnings"; serialized as
            `null` (skip-if-none) when there are none.
          items:
            type: string
          nullable: true
          type: array
        wrapped_dek:
          description: |-
            Sealed-box-wrapped copy of the cluster DEK addressed to the
            joiner's `secrets_pubkey`. The joiner unwraps with its node X25519
            private key and holds the DEK in zeroized memory. `None` on legacy
            responses or when the joiner did not provide a `secrets_pubkey`.
          items:
            format: int32
            minimum: 0
            type: integer
          nullable: true
          type: array
      required:
      - node_id
      - overlay_ip
      - peers
      - raft_node_id
      - role
    ClusterNodeSummary:
      description: Summary of a cluster node for listing.
      example:
        address: address
        role: role
        registered_at: 0
        memory_used: 0
        cpu_total: 0.8008281904610115
        last_heartbeat: 0
        overlay_ip: overlay_ip
        is_leader: true
