          type: integer
        memory_used:
          description: Used memory in bytes
          format: int64
          minimum: 0
          type: integer
      required:
      - cpu_percent
      - cpu_total
      - cpu_used
      - memory_percent
      - memory_total
      - memory_used
    NodeSummary:
      description: Node summary for list operations
      example:
        address: address
        role: role
        last_seen: 0
        id: 0
        labels:
          key: labels
        status: status
      properties:
        address:
          description: Node network address
