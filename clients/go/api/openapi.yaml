      example:
        public_key: public_key
        last_handshake_secs: 0
        last_ping_ms: 0
        healthy: true
        failure_count: 0
        last_check: 0
        overlay_ip: overlay_ip
      properties:
        failure_count:
          description: Number of consecutive health check failures
          format: int32
          minimum: 0
