    HealthCheckRequest:
      description: |-
        Container health check request.

        Mirrors the on-disk `HealthCheck` enum (see `zlayer_spec::HealthCheck`) as a
        discriminated union keyed on `type`. Translated to `zlayer_spec::HealthSpec`
        by `HealthCheckRequest::to_health_spec`. Durations are humantime strings
        (for example `"10s"`, `"500ms"`, `"1m"`).

        ## Variants
        - `type: "tcp"` — requires `port` (1-65535).
        - `type: "http"` — requires `url`; `expect_status` defaults to 200.
        - `type: "command"` — requires `command` (array of argv tokens; joined with
          spaces and passed to `sh -c` by the health monitor, matching the existing
          compose-to-ZLayer conversion in `zlayer-docker`).
      properties:
        command:
          description: |-
            Command argv (required when `type == "command"`). Joined with spaces
            and passed to `sh -c`.
          items:
            type: string
          nullable: true
          type: array
        expect_status:
          description: HTTP status code expected from `url` (defaults to 200).
          format: int32
          minimum: 0
          nullable: true
          type: integer
        interval:
          description: "Interval between checks, humantime format (e.g. `\"30s\"`).\
            \ Defaults to 30s."
          nullable: true
          type: string
        port:
          description: TCP port (required when `type == "tcp"`).
          format: int32
          minimum: 0
          nullable: true
          type: integer
        retries:
          description: Number of consecutive failures before marking unhealthy. Defaults
            to 3.
          format: int32
          minimum: 0
          nullable: true
          type: integer
        start_period:
          description: |-
            Grace period before the first check runs, humantime format. Maps to
            `HealthSpec::start_grace`.
          nullable: true
          type: string
        timeout:
          description: "Timeout per individual check, humantime format."
          nullable: true
          type: string
        type:
          description: "Check variant: `\"tcp\"`, `\"http\"`, or `\"command\"`."
          type: string
        url:
          description: HTTP URL (required when `type == "http"`).
          nullable: true
          type: string
      required:
      - type
    HealthResponse:
      description: Health check response
      example:
        version: version
        runtime_name: runtime_name
        status: status
        uptime_secs: 0
      properties:
        runtime_name:
          description: "Container runtime name (e.g. \"youki\", \"mac-sandbox\", \"\
            docker\")"
          type: string
        status:
          description: Service status
          type: string
        uptime_secs:
          description: Uptime in seconds
          format: int64
          minimum: 0
          nullable: true
          type: integer
        version:
          description: Service version
          type: string
      required:
      - status
      - version
    HeartbeatRequest:
      description: Heartbeat request from a worker node.
      example:
        cpu_used: 0.8008281904610115
        disk_used: 0
        gpu_utilization:
        - utilization_percent: 9.301444
          power_draw_w: 2.302136
          memory_total_mb: 0
          memory_used_mb: 0
          index: 0
          temperature_c: 0
        - utilization_percent: 9.301444
          power_draw_w: 2.302136
          memory_total_mb: 0
          memory_used_mb: 0
          index: 0
          temperature_c: 0
        memory_used: 0
        node_id: 0
      properties:
        cpu_used:
          format: double
          type: number
        disk_used:
          format: int64
          minimum: 0
          type: integer
        gpu_utilization:
          items:
            $ref: "#/components/schemas/GpuUtilizationReport"
          type: array
        memory_used:
          format: int64
          minimum: 0
          type: integer
        node_id:
          format: int64
          minimum: 0
          type: integer
      required:
