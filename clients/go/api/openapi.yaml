      properties:
        message:
          type: string
        upgrade_id:
          type: string
      required:
      - message
      - upgrade_id
    UpgradeStatus:
      description: |-
        Lifecycle of a daemon-binary upgrade job, tracked in-memory on the node
        being upgraded.
      enum:
      - pending
      - downloading
      - applying
      - restarting
      - failed
      type: string
    UserRole:
      description: |-
        User role. Admins can do everything; regular users are constrained by
        per-resource permissions (added in a later phase).
      enum:
      - admin
      - user
      type: string
    UserView:
      description: Response shape used by login + bootstrap + me.
      example:
        last_login_at: 2026-04-15T12:00:00Z
        is_active: true
        role: role
        id: id
        display_name: display_name
        email: email
      properties:
        display_name:
          type: string
        email:
          type: string
        id:
          type: string
        is_active:
          type: boolean
        last_login_at:
          example: 2026-04-15T12:00:00Z
          nullable: true
          type: string
        role:
          type: string
      required:
      - display_name
      - email
      - id
      - is_active
      - role
    VolumeEvent:
      description: A volume lifecycle event.
      properties:
        at:
          description: Wall-clock time.
          format: date-time
          type: string
        container_id:
          description: "Container id, populated for `Mount`/`Unmount`."
          nullable: true
          type: string
        driver:
          description: Volume driver (e.g. `local`).
          type: string
        kind:
          $ref: "#/components/schemas/VolumeEventKind"
        name:
          description: Volume name.
          type: string
      required:
      - at
      - kind
      - name
    VolumeEventKind:
      description: Kind of volume lifecycle event.
      enum:
      - create
      - delete
      - mount
      - unmount
      type: string
    VolumeInfo:
      description: |-
        Full volume response shape used by the list, inspect, and create
        endpoints.
      example:
        path: path
        size_bytes: 0
        in_use_by:
        - in_use_by
        - in_use_by
        name: name
        created_at: created_at
        labels:
          key: labels
      properties:
        created_at:
          description: |-
            RFC 3339 creation timestamp. For volumes without a sidecar this is
            the directory's mtime (best-effort).
          type: string
        in_use_by:
          description: |-
            Container IDs currently mounting this volume. Empty when no
            `VolumeUsageSource` is wired.
          items:
            type: string
          type: array
        labels:
          additionalProperties:
            type: string
          description: Labels from the sidecar. Empty when no sidecar is present.
        name:
          description: Volume name (directory name).
          type: string
        path:
          description: Host filesystem path.
          type: string
        size_bytes:
          description: |-
            Approximate size in bytes (sum of regular files in the volume
            directory). `None` when the directory could not be walked, or for
            freshly created empty volumes where `0` would be equally
            informative.
          format: int64
          minimum: 0
          nullable: true
          type: integer
      required:
      - created_at
      - name
      - path
    VolumeMount:
      description: |-
        Volume mount specification.

        The `type` field (a Docker-compatible discriminator) selects how `source`
        is interpreted:
        - `"bind"` (default): `source` is an absolute host path.
        - `"volume"`: `source` is a named-volume identifier.
        - `"tmpfs"`: no `source`; a memory-backed mount is provisioned.
      example:
        readonly: true
        source: source
        type: ""
        target: target
      properties:
        readonly:
          description: Mount as read-only
          type: boolean
        source:
          description: "Host path (bind), volume name (volume), or unused (tmpfs)."
          nullable: true
          type: string
        target:
          description: Container mount path
          type: string
        type:
          allOf:
          - $ref: "#/components/schemas/VolumeMountType"
          description: Mount kind. Omit (or `"bind"`) for legacy host-path binds.
          nullable: true
      required:
      - target
    VolumeMountType:
      description: |-
        Volume mount kind discriminator.

        Selects which [`zlayer_spec::StorageSpec`] variant [`VolumeMount`] is
        translated into by [`build_service_spec`]. When omitted on the wire,
        defaults to [`VolumeMountType::Bind`] (legacy behavior).
      enum:
      - bind
      - volume
      - tmpfs
      type: string
    VolumeSummary:
      description: |-
        Legacy response shape kept for backwards compatibility with older SDK
        consumers that deserialize strictly. New consumers should use
        [`VolumeInfo`]. `list_volumes` now returns [`VolumeInfo`] which is a
        strict superset of the fields in `VolumeSummary`.
      properties:
        name:
          description: Volume name (directory name).
          type: string
        path:
          description: Host filesystem path.
          type: string
        size_bytes:
          description: Approximate size in bytes.
          format: int64
          minimum: 0
          nullable: true
          type: integer
      required:
      - name
      - path
    WebhookInfoResponse:
      description: "Response for `GET /api/v1/projects/{id}/webhook`."
      example:
        secret: secret
        url: url
      properties:
        secret:
          description: The HMAC secret to paste into the git host.
          type: string
        url:
          description: Full URL to configure in the git host's webhook settings.
          type: string
      required:
      - secret
      - url
    WebhookResponse:
      description: Response for the public webhook receiver.
      example:
        sha: sha
        status: status
      properties:
        sha:
          description: HEAD commit SHA after the pull.
          type: string
        status:
          description: Operation result -- always `"ok"` on success.
          type: string
      required:
      - sha
      - status
    WorkerSummary:
      description: "Summary of a worker-tier worker node, returned by `GET /api/v1/cluster/workers`."
      example:
        os: os
        api_addr: api_addr
        last_seen_unix_secs: 6
        id: 0
        state: state
        labels:
          key: labels
      properties:
        api_addr:
          description: Worker's API/health address (host:port).
          type: string
        id:
          description: Worker's assigned node id.
          format: int64
          minimum: 0
          type: integer
        labels:
          additionalProperties:
            type: string
          description: Labels declared during Register.
        last_seen_unix_secs:
          description: Last time the leader observed the worker.
          format: int64
          type: integer
        os:
          description: Worker's reported OS.
          type: string
        state:
          description: Liveness state (`ready` | `unreachable` | `draining`).
          type: string
      required:
      - api_addr
      - id
      - last_seen_unix_secs
      - os
      - state
    WorkflowAction:
      description: The action a workflow step performs.
      oneOf:
      - $ref: "#/components/schemas/WorkflowAction_oneOf"
      - $ref: "#/components/schemas/WorkflowAction_oneOf_1"
      - $ref: "#/components/schemas/WorkflowAction_oneOf_2"
      - $ref: "#/components/schemas/WorkflowAction_oneOf_3"
    WorkflowRun:
      description: A recorded execution of a workflow.
      example:
        step_results:
        - output: output
          step_name: step_name
          status: status
        - output: output
          step_name: step_name
          status: status
        workflow_id: workflow_id
        finished_at: 2026-04-15T12:00:01Z
        started_at: 2026-04-15T12:00:00Z
        id: id
        status: ""
      properties:
        finished_at:
          description: When the run finished (`None` if still running).
          example: 2026-04-15T12:00:01Z
          nullable: true
          type: string
        id:
          description: UUID identifier of this run.
          type: string
        started_at:
          description: When the run started.
          example: 2026-04-15T12:00:00Z
          type: string
        status:
          allOf:
          - $ref: "#/components/schemas/WorkflowRunStatus"
          description: Overall run status.
        step_results:
          description: Per-step results.
          items:
            $ref: "#/components/schemas/StepResult"
          type: array
        workflow_id:
          description: The workflow that was executed.
          type: string
      required:
      - id
      - started_at
      - status
      - step_results
      - workflow_id
    WorkflowRunStatus:
      description: Overall status of a workflow run.
      enum:
      - pending
      - running
      - completed
      - failed
      type: string
    WorkflowStep:
      description: A single step in a workflow.
      example:
        on_failure: on_failure
        name: name
        action: ""
      properties:
        action:
          allOf:
          - $ref: "#/components/schemas/WorkflowAction"
          description: The action to perform.
        name:
          description: Step name (display label).
          type: string
        on_failure:
          description: Name of another step (or task id) to run on failure.
          nullable: true
          type: string
      required:
      - action
      - name
    u64:
      format: int64
      minimum: 0
      type: integer
    DaemonEvent_oneOf:
