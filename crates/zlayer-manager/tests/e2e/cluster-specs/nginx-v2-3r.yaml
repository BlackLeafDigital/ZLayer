# Cluster e2e fixture — v2 image, 3 replicas. Used by cluster_upgrade suite (post-rollout target).

version: v1
deployment: e2e-cluster-app

services:
  web:
    rtype: service
    image:
      name: docker.io/library/nginx:1.29-alpine
      pull_policy: if_not_present

    endpoints:
      - name: http
        protocol: http
        port: 80
        expose: public

    scale:
      mode: fixed
      replicas: 3
