name: zlayer-web image (continuous)

# Continuous publish loop for the zlayer-web landing page image. The full
# release pipeline (build.yml -> release.yml) is workflow_dispatch only and
# overkill for the public site, where we want every commit touching the web
# crate or its container build to show up on https://zlayer.dev within a few
# minutes. This workflow rebuilds just the zlayer-web image and pushes
# :latest + :dev to both ZRegistry (the public landing page is the dogfood
# case for our own registry) and forge.blackleafdigital.com (Komodo's
# current pull source because ZRegistry returns 404 instead of 401 on
# unauthenticated manifest GETs for private images, which trips Docker's
# resolver). The Komodo procedure `zlayer-web-redeploy` is then poked via
# its webhook so the running stack picks up the new digest.

on:
  workflow_dispatch:
  push:
    branches: [dev]
    paths:
      - 'crates/zlayer-web/**'
      - 'images/Dockerfile.zlayer-web'
      - 'images/ZImagefile.zlayer-web'
      - '.forgejo/workflows/zlayer-web-image.yml'

env:
  IMAGE_NAME: zlayer-web

jobs:
  build-and-push:
    name: Build & publish zlayer-web image
    runs-on: ubuntu-latest
    # cargo-chef + cargo-leptos + the wasm32 toolchain is a fat build;
    # MiniBeast is the same runner the release pipeline's `image-build`
    # job uses for the same crate.
    if: ${{ !contains(github.event.head_commit.message, '[skip-zlayer-web]') }}
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install buildah
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends buildah

      - name: Login to Forgejo registry
        run: echo "${{ secrets.FORGEJO_ACTIONS_TOKEN }}" | sudo buildah login -u zachhandley --password-stdin forge.blackleafdigital.com

      - name: Login to ZRegistry
        run: echo "${{ secrets.ZREGISTRY_ZLAYER_WEB_PUBLISH_TOKEN }}" | sudo buildah login -u zlayer-web-ci --password-stdin registry.blackleafdigital.com

      - name: Compute tags
        id: tags
        shell: bash
        run: |
          set -euo pipefail
          SHA="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y%m%d)"
          # :dev is what Komodo's stack consumes via :latest (kept in sync);
          # the sha-dated tag is for traceability.
          echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
          echo "date_sha=dev-${DATE}-${SHA}" >> "$GITHUB_OUTPUT"

      - name: Build zlayer-web image
        shell: bash
        run: |
          set -euo pipefail
          sudo buildah bud \
            -f images/Dockerfile.zlayer-web \
            -t forge.blackleafdigital.com/blackleafdigital/zlayer-web:latest \
            -t forge.blackleafdigital.com/blackleafdigital/zlayer-web:dev \
            -t forge.blackleafdigital.com/blackleafdigital/zlayer-web:${{ steps.tags.outputs.date_sha }} \
            -t registry.blackleafdigital.com/blackleafdigital/zlayer-web:latest \
            -t registry.blackleafdigital.com/blackleafdigital/zlayer-web:dev \
            -t registry.blackleafdigital.com/blackleafdigital/zlayer-web:${{ steps.tags.outputs.date_sha }} \
            .

      - name: Push to forge.blackleafdigital.com
        run: |
          for TAG in latest dev ${{ steps.tags.outputs.date_sha }}; do
            sudo buildah push forge.blackleafdigital.com/blackleafdigital/zlayer-web:${TAG}
          done

      - name: Push to ZRegistry
        run: |
          for TAG in latest dev ${{ steps.tags.outputs.date_sha }}; do
            sudo buildah push registry.blackleafdigital.com/blackleafdigital/zlayer-web:${TAG}
          done

      - name: Trigger Komodo zlayer-web-redeploy
        # KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK is the procedure listener URL
        # (https://<komodo>/listener/github/procedure/<id>/<branch>).
        # KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK_SECRET is the procedure's
        # webhook_secret; Komodo verifies X-Hub-Signature-256 against it
        # (HMAC-SHA256 over the raw body), so we sign here.
        env:
          KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK: ${{ secrets.KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK }}
          KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK_SECRET: ${{ secrets.KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK_SECRET }}
        run: |
          set -euo pipefail
          BODY='{"ref":"refs/heads/dev"}'
          SIG=$(printf '%s' "$BODY" \
            | openssl dgst -sha256 -hmac "$KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK_SECRET" -hex \
            | awk '{print $2}')
          curl -fsSL -X POST \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${SIG}" \
            -H "X-GitHub-Event: push" \
            -d "$BODY" \
            "$KOMODO_ZLAYER_WEB_REDEPLOY_WEBHOOK"
