        [`ApiError::Conflict`] when the email is already registered, or
        [`ApiError::Internal`] if a backing store fails.
      operationId: create_user
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateUserRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserView"
          description: User created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "409":
          description: Email already in use
      summary: Create a new user. Admin only.
      tags:
      - Users
  /api/v1/users/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] when an admin tries to delete themselves, or
        [`ApiError::Internal`] if a backing store fails.
      operationId: delete_user
      parameters:
      - description: User id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Deleted (or already absent)
        "400":
          description: Cannot delete your own account
        "403":
          description: Admin role required
      summary: |-
        Delete a user. Admin only. Callers cannot delete their own account.
        Idempotent — returns 204 whether the user existed or not.
      tags:
      - Users
    get:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when a non-admin tries to read a
        different user, [`ApiError::NotFound`] when no such user exists, or
        [`ApiError::Internal`] when the store fails.
      operationId: get_user
      parameters:
      - description: User id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserView"
          description: User
        "404":
          description: Not found
      summary: |-
        Fetch a single user. Admins can read any record; regular users can read
        only their own.
      tags:
      - Users
    patch:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::NotFound`] when the user does not exist, or
        [`ApiError::Internal`] if the user store fails.
      operationId: update_user
      parameters:
      - description: User id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserView"
          description: Updated user
        "403":
          description: Admin role required
        "404":
          description: Not found
      summary: Update a user's mutable fields. Admin only.
      tags:
      - Users
  /api/v1/users/{id}/password:
    post:
      description: |-
        # Errors

        Returns [`ApiError::BadRequest`] for missing fields,
        [`ApiError::Unauthorized`] for an incorrect current password,
        [`ApiError::Forbidden`] when the caller is not allowed to change this
        user's password, [`ApiError::NotFound`] when the user does not exist,
        or [`ApiError::Internal`] if a backing store fails.
      operationId: set_password
      parameters:
      - description: User id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetPasswordRequest"
        required: true
      responses:
        "204":
          description: Password updated
        "400":
          description: Invalid request
        "401":
          description: Current password incorrect (self-service path)
        "403":
          description: Not permitted
        "404":
          description: Not found
      summary: |-
        Set a user's password. Admins may change any user's password; regular
        users may only change their own, and must supply `current_password`.
      tags:
      - Users
  /api/v1/variables:
    get:
      description: |-
        Filter rules (see [`ListVariablesQuery`]):

        - `?scope={id}` -> variables belonging to that scope.
        - no `scope` query -> only global variables (`scope IS NULL`).

        # Errors

        Returns [`ApiError::Internal`] if the variable store fails.
      operationId: list_variables
      parameters:
      - description: Scope (project id) to filter by; omit for globals only
        explode: true
        in: query
        name: scope
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredVariable"
                type: array
          description: List of variables
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List variables.
      tags:
      - Variables
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] for an empty name,
        [`ApiError::Conflict`] when the `(name, scope)` is already used, or
        [`ApiError::Internal`] when the variable store fails.
      operationId: create_variable
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVariableRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredVariable"
          description: Variable created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "409":
          description: Name already used in the given scope
      security:
      - bearer_auth: []
      summary: Create a new variable. Admin only.
      tags:
      - Variables
  /api/v1/variables/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the variable does not exist, or [`ApiError::Internal`] when the
        store fails.
      operationId: delete_variable
      parameters:
      - description: Variable id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Variable deleted
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Delete a variable. Admin only.
      tags:
      - Variables
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if no variable with the given id exists,
        or [`ApiError::Internal`] when the store fails.
      operationId: get_variable
      parameters:
      - description: Variable id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredVariable"
          description: Variable
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Fetch a single variable by id.
      tags:
      - Variables
    patch:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the variable does not exist, [`ApiError::BadRequest`] for an
        empty replacement name, [`ApiError::Conflict`] when the new name collides
        with another variable in the same scope, or [`ApiError::Internal`]
        when the store fails.
      operationId: update_variable
      parameters:
      - description: Variable id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateVariableRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredVariable"
          description: Updated variable
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "404":
          description: Not found
        "409":
          description: Name collides with another variable
      security:
      - bearer_auth: []
      summary: Update a variable's name and/or value. Admin only.
      tags:
      - Variables
  /api/v1/volumes:
    get:
      description: |-
        Enumerates subdirectories under the volume base directory, reads each
        sidecar when present, and returns a [`VolumeInfo`] for each entry
        (including `in_use_by` when a [`VolumeUsageSource`] is wired).

        # Errors

        Returns an error if the volume directory cannot be read.
      operationId: list_volumes
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/VolumeInfo"
                type: array
          description: List of volumes
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List all volumes on disk.
      tags:
      - Volumes
    post:
      description: |-
        Creates `state.volume_dir/{name}` on disk and writes a
        `.metadata.json` sidecar capturing labels, size, tier, and the
        creation timestamp.

        # Errors

        - 400 Bad Request — invalid name, size, or tier.
        - 403 Forbidden — caller lacks the `operator` role.
        - 409 Conflict — a volume with this name already exists.
        - 500 Internal — filesystem errors.
      operationId: create_volume
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateVolumeRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeInfo"
          description: Volume created
        "400":
          description: Bad request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "409":
          description: Volume already exists
      security:
      - bearer_auth: []
      summary: Create a new named volume.
      tags:
      - Volumes
  /api/v1/volumes/{name}:
    delete:
      description: |-
        By default, refuses to remove a volume that is non-empty OR that any
        container currently reports mounting. `?force=true` overrides both
        checks.

        # Errors

        - 404 Not Found — no such volume.
        - 409 Conflict — non-empty or in-use without `?force=true`.
        - 403 Forbidden — caller lacks the `operator` role.
      operationId: delete_volume
      parameters:
      - description: Volume name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Force removal of non-empty or in-use volumes
        explode: true
        in: query
        name: force
        required: true
        schema:
          type: boolean
        style: form
      responses:
        "204":
          description: Volume deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Volume not found
        "409":
          description: Volume is non-empty or in use (use ?force=true)
      security:
      - bearer_auth: []
      summary: Delete a volume by name.
      tags:
      - Volumes
    get:
      description: |-
        Reads the sidecar when present, synthesizes defaults for legacy
        volumes, and populates `in_use_by` when a [`VolumeUsageSource`] is
        wired.

        # Errors

        - 404 Not Found — no such volume.
        - 500 Internal — filesystem or parse errors.
      operationId: get_volume
      parameters:
      - description: Volume name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VolumeInfo"
          description: Volume metadata
        "401":
          description: Unauthorized
        "404":
          description: Volume not found
      security:
      - bearer_auth: []
      summary: Inspect a single volume by name.
      tags:
      - Volumes
  /api/v1/workflows:
    get:
      description: |-
        # Errors

        Returns [`ApiError::Internal`] if the workflow store fails.
      operationId: list_workflows
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredWorkflow"
                type: array
          description: List of workflows
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List workflows.
      tags:
      - Workflows
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] for an empty name or empty steps list,
        or [`ApiError::Internal`] when the workflow store fails.
      operationId: create_workflow
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkflowRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredWorkflow"
          description: Workflow created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
      security:
      - bearer_auth: []
      summary: Create a new workflow. Admin only.
      tags:
      - Workflows
  /api/v1/workflows/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the workflow does not exist, or [`ApiError::Internal`] when the
        store fails.
      operationId: delete_workflow
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Workflow deleted
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Delete a workflow. Admin only.
      tags:
      - Workflows
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if no workflow with the given id exists,
        or [`ApiError::Internal`] when the store fails.
      operationId: get_workflow
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredWorkflow"
          description: Workflow
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Fetch a single workflow by id.
      tags:
      - Workflows
  /api/v1/workflows/{id}/run:
    post:
      description: |-
        Iterates steps sequentially:
        - `RunTask` — looks up the task and executes its `body` via `sh -c`.
        - `BuildProject` — clones / fast-forwards the project's git repo, then
          registers and awaits a real buildah build.
        - `DeployProject` — reads the project's `deploy_spec_path` from its
          checked-out working copy, parses it as a `DeploymentSpec`, and upserts
          it into the deployment store.
        - `ApplySync` — delegates to [`apply_sync_inner`] for the real reconcile.

        If a step fails and has an `on_failure` handler, that handler runs before
        the workflow aborts. Subsequent steps are marked `"skipped"`.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the workflow does not exist, or [`ApiError::Internal`] when
        execution or recording fails.
      operationId: run_workflow
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkflowRun"
          description: Workflow run result
        "403":
          description: Admin role required
        "404":
          description: Workflow not found
      security:
      - bearer_auth: []
      summary: Execute a workflow synchronously. Admin only.
      tags:
      - Workflows
  /api/v1/workflows/{id}/runs:
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if the workflow does not exist,
        or [`ApiError::Internal`] when the store fails.
      operationId: list_workflow_runs
      parameters:
      - description: Workflow id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/WorkflowRun"
                type: array
          description: List of workflow runs
        "404":
          description: Workflow not found
      security:
      - bearer_auth: []
      summary: "List past runs for a workflow, most recent first."
      tags:
      - Workflows
  /auth/bootstrap:
    post:
      description: |-
        # Errors

        Returns an error if the user store or credential store is not configured,
        if any user already exists, if the request is missing required fields, or
        if the underlying stores fail.
      operationId: bootstrap
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BootstrapRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: Admin user created
        "400":
          description: Invalid email or password
        "409":
          description: Bootstrap already completed
        "503":
          description: User store not configured
      summary: Bootstrap the very first admin user. Returns 409 if any user exists.
      tags:
      - Authentication
  /auth/csrf:
    get:
      operationId: csrf
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CsrfResponse"
          description: Rotated CSRF token
      summary: Rotate the CSRF double-submit token for the current session.
      tags:
      - Authentication
  /auth/login:
    post:
      description: |-
        # Errors

        Returns an error if credentials are invalid, the user is disabled, or any
        backing store fails.
      operationId: login
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          description: Logged in
        "401":
          description: Invalid credentials
        "403":
          description: User disabled
      summary: Sign in an existing user.
      tags:
      - Authentication
  /auth/logout:
    post:
      operationId: logout
      responses:
        "204":
          description: Logged out
      summary: Clear the session + CSRF cookies.
      tags:
      - Authentication
  /auth/me:
    get:
      description: |-
        # Errors

        Returns an error if the user store is not configured, if the user no longer
        exists, or if the store fails.
      operationId: me
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserView"
          description: Current user
        "401":
          description: Not signed in
      summary: Return the currently signed-in user.
      tags:
      - Authentication
  /auth/oidc/providers:
    get:
      operationId: list_providers
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/OidcProviderPublic"
                type: array
          description: List of configured OIDC providers
      summary: '`GET /auth/oidc/providers`.'
      tags:
      - Authentication
  /auth/oidc/{provider}/callback:
    get:
      operationId: callback
      parameters:
      - description: Provider slug
        explode: false
        in: path
        name: provider
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OidcCallbackResponse"
          description: Signed in via OIDC
        "400":
          description: Invalid callback parameters
        "401":
          description: Provider returned an error
        "404":
          description: Unknown provider
      summary: '`GET /auth/oidc/:provider/callback`.'
      tags:
      - Authentication
  /auth/oidc/{provider}/start:
    get:
      operationId: start
      parameters:
      - description: Provider slug
        explode: false
        in: path
        name: provider
        required: true
        schema:
          type: string
        style: simple
      responses:
        "302":
          description: Redirect to provider's authorize URL
        "404":
          description: Unknown provider
      summary: '`GET /auth/oidc/:provider/start` — 302 to the provider''s authorize
        URL.'
      tags:
      - Authentication
  /auth/token:
    post:
      description: |-
        # Errors

        Returns an error if credentials are invalid or token creation fails.
      operationId: get_token
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TokenResponse"
          description: Token created
        "401":
          description: Invalid credentials
      summary: Get an access token.
      tags:
      - Authentication
  /health/live:
    get:
      operationId: liveness
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Service is alive
      summary: Liveness probe - basic health check
      tags:
      - Health
  /health/ready:
    get:
      operationId: readiness
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
          description: Service is ready
        "503":
          description: Service not ready
      summary: Readiness probe - full health check
      tags:
      - Health
  /webhooks/{provider}/{project_id}:
    post:
      description: |-
        This endpoint is **unauthenticated** -- it relies on HMAC signature
        verification against the per-project webhook secret.

        Supported providers: `github`, `gitea`, `forgejo`, `gitlab`.

        # Errors

        Returns [`ApiError::NotFound`] when no webhook secret is configured,
        [`ApiError::Forbidden`] when signature verification fails,
        [`ApiError::BadRequest`] for unsupported providers or missing git URL,
        or [`ApiError::Internal`] on git operation failures.
      operationId: receive_webhook
      parameters:
      - description: "Git host provider (github, gitea, forgejo, gitlab)"
        explode: false
        in: path
        name: provider
        required: true
        schema:
          type: string
        style: simple
      - description: Project id
        explode: false
        in: path
        name: project_id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              type: string
        description: Raw webhook payload from the git host
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookResponse"
          description: Pull triggered
        "400":
          description: Bad request (unsupported provider or project has no git URL)
        "403":
          description: Signature verification failed
        "404":
          description: Project not found or no webhook secret configured
        "500":
          description: Pull failed
      summary: Receive a webhook push event and trigger a project pull.
      tags:
      - Webhooks
components:
  schemas:
    AddMemberRequest:
      description: "Body for `POST /api/v1/groups/{id}/members`."
      example:
        user_id: user_id
      properties:
        user_id:
          description: The user id to add.
          type: string
      required:
      - user_id
    ArchKind:
      description: CPU architecture a service needs. Mirrors the arch half of an OCI
        platform.
      enum:
      - amd64
      - arm64
      type: string
    AuditEntry:
      description: |-
        A recorded audit log entry capturing who did what, when, and to which
        resource.
      example:
        user_id: user_id
        ip: ip
        action: action
        created_at: 2026-04-15T12:00:00Z
        resource_id: resource_id
        details: "{}"
        resource_kind: resource_kind
        id: id
        user_agent: user_agent
      properties:
        action:
          description: |-
            The action performed (e.g. `"create"`, `"update"`, `"delete"`,
            `"execute"`).
          type: string
        created_at:
          description: When the action occurred.
          example: 2026-04-15T12:00:00Z
          type: string
        details:
          description: Additional context as free-form JSON.
          nullable: true
          type: object
        id:
          description: UUID identifier of this audit entry.
          type: string
        ip:
