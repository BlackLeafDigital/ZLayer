name: Sync dev → zdb

on:
  push:
    branches: [dev]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: zdb
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "Zach Handley"
          git config user.email "zachhandley@gmail.com"

      - name: Merge dev into zdb
        run: |
          git fetch origin dev
          if git merge origin/dev --no-edit; then
            echo "Merge succeeded, pushing..."
            git push origin zdb
          else
            echo "::error::Merge conflicts detected — manual merge required"
            git merge --abort
            exit 1
          fi
