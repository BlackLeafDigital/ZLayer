name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string
      sha:
        description: 'Commit SHA for the release'
        required: false
        type: string
      artifact_base_url:
        description: 'Base URL for temp artifact packages from build workflow'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "2"
  # Baked into release binaries via option_env! at compile time. Propagates to
  # every step in this workflow, so any cargo invocation (publish-crate /
  # publish-all-crates verification builds, plus any future in-workflow
  # `cargo build --release`) sees the secret. Resolves to empty when the
  # secret is unset, which option_env! treats as None — safe.
  ZLAYER_REPOSYNC_HMAC_SECRET: ${{ secrets.ZLAYER_REPOSYNC_HMAC_SECRET }}

jobs:
  # ===========================================
  # Detect release type
  # ===========================================
  detect:
    runs-on: ubuntu-latest
    outputs:
      binary: ${{ steps.check.outputs.binary }}
      crate_name: ${{ steps.check.outputs.crate_name }}
      sdk_name: ${{ steps.check.outputs.sdk_name }}
      docker: ${{ steps.check.outputs.docker }}
      is_major: ${{ steps.check.outputs.is_major }}
      is_general: ${{ steps.check.outputs.is_general }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.ref }}
          fetch-depth: 0
      - name: Detect release type
        id: check
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            TAG="${{ inputs.version }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          # Normalize bare version numbers (e.g. "0.10.5" -> "v0.10.5")
          if [[ "$TAG" =~ ^[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            TAG="v${TAG}"
          fi
          RAW_VERSION=$(echo "$TAG" | grep -oP '\d+\.\d+\.\d+' || echo "0.0.0")
          # Strip leading zeros from each component to avoid "invalid leading zero" cargo errors
          IFS='.' read -r V_MAJOR V_MINOR V_PATCH <<< "$RAW_VERSION"
          VERSION="$((10#$V_MAJOR)).$((10#$V_MINOR)).$((10#$V_PATCH))"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          if [[ "$TAG" == major-v* ]]; then
            echo "is_major=true" >> $GITHUB_OUTPUT
            echo "is_general=true" >> $GITHUB_OUTPUT
            echo "binary=true" >> $GITHUB_OUTPUT
            echo "docker=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == v[0-9]* ]]; then
            echo "is_general=true" >> $GITHUB_OUTPUT
            echo "binary=true" >> $GITHUB_OUTPUT
            echo "docker=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == docker-v* ]]; then
            echo "docker=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == spec-v* ]]; then
            echo "crate_name=zlayer-spec" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == core-v* ]]; then
            echo "crate_name=zlayer-core" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == registry-v* ]]; then
            echo "crate_name=zlayer-registry" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == obs-v* ]]; then
            echo "crate_name=zlayer-observability" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == builder-v* ]]; then
            echo "crate_name=zlayer-builder" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == overlay-v* ]]; then
            echo "crate_name=zlayer-overlay" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == init-v* ]]; then
            echo "crate_name=zlayer-init-actions" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == scheduler-v* ]]; then
            echo "crate_name=zlayer-scheduler" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == storage-v* ]]; then
            echo "crate_name=zlayer-storage" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == tunnel-v* ]]; then
            echo "crate_name=zlayer-tunnel" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == tui-v* ]]; then
            echo "crate_name=zlayer-tui" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == consensus-v* ]]; then
            echo "crate_name=zlayer-consensus" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == build-v* ]]; then
            echo "crate_name=zlayer-builder" >> $GITHUB_OUTPUT
            echo "binary=true" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == rust-sdk-v* ]]; then
            echo "sdk_name=rust" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == py-sdk-v* ]]; then
            echo "sdk_name=python" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == ts-sdk-v* ]]; then
            echo "sdk_name=typescript" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == go-sdk-v* ]]; then
            echo "sdk_name=go" >> $GITHUB_OUTPUT
          elif [[ "$TAG" == c-sdk-v* ]]; then
            echo "sdk_name=c" >> $GITHUB_OUTPUT
          fi

  # ===========================================
  # Upload binaries to registry (download from temp packages)
  # ===========================================
  upload-binaries:
    needs: [detect]
    if: needs.detect.outputs.binary == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.ref }}
          sparse-checkout: scripts/upload-packages.sh
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.detect.outputs.version }}
          step: upload-binaries
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - name: Download artifacts from temp storage
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          BASE_URL="${{ inputs.artifact_base_url }}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          mkdir -p artifacts

          # zlayer-rootfs.tar.gz is the WSL2 distro tarball produced by
          # build.yml's build-rootfs job (Alpine minirootfs + iproute2 +
          # iptables + /usr/local/bin/zlayer). It gets published as a
          # release asset alongside the platform binaries so a fresh
          # Windows host can `wsl --import` it directly from the release
          # URL without needing the OCI registry. The docker-push job
          # additionally publishes the same tarball as an OCI image.
          # zlayer-linux-amd64-musl.tar.gz is a fully static (musl) build of
          # the same `zlayer` binary, produced by build.yml's
          # build-linux-amd64-musl job. It's the binary baked into the WSL2
          # rootfs (Alpine/musl), and we ship it as a release asset too so
          # users on Alpine/musl hosts (or any glibc-less environment) can
          # grab a working portable binary without rebuilding.
          for name in zlayer-linux-amd64 zlayer-linux-amd64-musl zlayer-linux-arm64 zlayer-darwin-amd64 zlayer-darwin-arm64 zlayer-completions zlayer-rootfs; do
            echo "Downloading ${name}.tar.gz..."
            curl -L --fail --max-time 300 --connect-timeout 30 --retry 3 --retry-delay 5 \
              --user "$AUTH" \
              -o "artifacts/${name}.tar.gz" \
              "${BASE_URL}/${name}.tar.gz"
            echo "OK ${name}.tar.gz"
          done

          # Download Windows artifact (zip format)
          echo "Downloading zlayer-windows-amd64.zip..."
          curl -L --fail --max-time 300 --connect-timeout 30 --retry 3 --retry-delay 5 \
            --user "$AUTH" \
            -o "artifacts/zlayer-windows-amd64.zip" \
            "${BASE_URL}/zlayer-windows-amd64.zip"
          echo "OK zlayer-windows-amd64.zip"

          # Compat alias: zlayer-windows-amd64-hcs.exe is the same binary as
          # the one inside zlayer-windows-amd64.zip, kept for one release so
          # anything pinning the pre-F-7a name keeps working. Remove after
          # the next release.
          echo "Downloading zlayer-windows-amd64-hcs.exe (compat alias)..."
          curl -L --fail --max-time 300 --connect-timeout 30 --retry 3 --retry-delay 5 \
            --user "$AUTH" \
            -o "artifacts/zlayer-windows-amd64-hcs.exe" \
            "${BASE_URL}/zlayer-windows-amd64-hcs.exe"
          echo "OK zlayer-windows-amd64-hcs.exe"

      - name: Upload to Forgejo Packages
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          PKG_URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer/${VERSION}"
          chmod +x scripts/upload-packages.sh
          ./scripts/upload-packages.sh "$PKG_URL" "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" artifacts
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.detect.outputs.version }}
          step: upload-binaries
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Merge to main (after binaries uploaded)
  # ===========================================
  merge-to-main:
    # Depends on create-forgejo-release because that's the step that cuts
    # the permanent v{VERSION} tag from the temp branch HEAD. Without it,
    # the GitHub tag push below has nothing to push.
    needs: [detect, upload-binaries, create-forgejo-release]
    if: needs.detect.outputs.binary == 'true' || needs.detect.outputs.is_major == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.ref }}
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.detect.outputs.version }}
          step: merge-to-main
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Configure git
        if: steps.check.outputs.completed != 'true'
        run: |
          git config user.name "Forgejo CI"
          git config user.email "ci@forge.blackleafdigital.com"

      # Compute the tag to operate on. For auto-release dispatches the
      # github.ref_name is `temp/vX.Y.Z` (the in-flight branch name), which
      # is NOT the tag we want to push. Resolve the canonical tag name from
      # inputs.version / detect.outputs.version, falling back to
      # github.ref_name only for the manual SDK-tag dispatch paths
      # (spec-v*, core-v*, etc.) where the trigger ref IS the tag.
      - name: Compute triggering tag
        id: tagname
        if: steps.check.outputs.completed != 'true'
        env:
          INPUT_VERSION: ${{ inputs.version }}
          REF_NAME:      ${{ github.ref_name }}
          DETECT_VER:    ${{ needs.detect.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -n "$INPUT_VERSION" ]; then
            case "$INPUT_VERSION" in
              v[0-9]*|major-v[0-9]*|docker-v[0-9]*|\
              spec-v[0-9]*|core-v[0-9]*|registry-v[0-9]*|obs-v[0-9]*|builder-v[0-9]*|\
              overlay-v[0-9]*|init-v[0-9]*|scheduler-v[0-9]*|storage-v[0-9]*|\
              tunnel-v[0-9]*|tui-v[0-9]*|consensus-v[0-9]*|build-v[0-9]*|\
              rust-sdk-v[0-9]*|py-sdk-v[0-9]*|ts-sdk-v[0-9]*|go-sdk-v[0-9]*|c-sdk-v[0-9]*)
                echo "tag=${INPUT_VERSION}" >> "$GITHUB_OUTPUT" ;;
              *)
                # Bare digits / non-prefixed — assume general release.
                echo "tag=v${DETECT_VER}" >> "$GITHUB_OUTPUT" ;;
            esac
          else
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge dev into main
        if: steps.check.outputs.completed != 'true'
        run: |
          git checkout main
          # Use -X theirs to prefer dev changes on conflicts
          git merge origin/dev --no-ff -X theirs -m "Merge dev into main for release ${{ steps.tagname.outputs.tag }}"
          git push origin main

      # Forgejo→GitHub push mirror is disabled so proprietary refs can't leak.
      # The workflow now owns every byte that lands on github.com. Each push
      # below uses a FULL literal refspec — never --mirror, never --all, never
      # refs/*:refs/*. Any change here needs review.
      - name: Push main to GitHub
        if: steps.check.outputs.completed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
        run: |
          set -euo pipefail
          git remote remove github 2>/dev/null || true
          git remote add github "https://x-access-token:${GH_TOKEN}@github.com/BlackLeafDigital/ZLayer.git"
          git push github "refs/heads/main:refs/heads/main"

      - name: Push release tag to GitHub
        if: steps.check.outputs.completed != 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}
          TRIGGERING_TAG: ${{ steps.tagname.outputs.tag }}
        run: |
          set -euo pipefail
          # Hard allowlist — only the tag prefixes release.yml already dispatches on.
          case "$TRIGGERING_TAG" in
            v[0-9]*|major-v[0-9]*|docker-v[0-9]*|\
            spec-v[0-9]*|core-v[0-9]*|registry-v[0-9]*|obs-v[0-9]*|builder-v[0-9]*|\
            overlay-v[0-9]*|init-v[0-9]*|scheduler-v[0-9]*|storage-v[0-9]*|\
            tunnel-v[0-9]*|tui-v[0-9]*|consensus-v[0-9]*|build-v[0-9]*|\
            rust-sdk-v[0-9]*|py-sdk-v[0-9]*|ts-sdk-v[0-9]*|go-sdk-v[0-9]*|c-sdk-v[0-9]*) ;;
            *) echo "tag '$TRIGGERING_TAG' not on allowlist — skipping GitHub tag push"; exit 0 ;;
          esac
          # Tag was just cut by create-forgejo-release; pull it locally.
          git fetch origin --tags
          # `github` remote was added by the previous step.
          git push github "refs/tags/${TRIGGERING_TAG}:refs/tags/${TRIGGERING_TAG}"

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.detect.outputs.version }}
          step: merge-to-main
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Publish single crate (specific crate tag only)
  # ===========================================
  publish-crate:
    needs: detect
    if: needs.detect.outputs.crate_name != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.ref }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev protobuf-compiler
      - name: Set crate versions
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "Setting all crate versions to ${VERSION}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
      - name: Publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: cargo publish -p ${{ needs.detect.outputs.crate_name }} --allow-dirty

  # ===========================================
  # Publish all crates (general release, after merge)
  # ===========================================
  publish-all-crates:
    needs: [detect]
    if: needs.detect.outputs.is_general == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.sha || github.ref }}
          fetch-depth: 0
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.detect.outputs.version }}
          step: publish-all-crates
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        if: steps.check.outputs.completed != 'true'
      - name: Install deps
        if: steps.check.outputs.completed != 'true'
        run: sudo apt-get update && sudo apt-get install -y libseccomp-dev protobuf-compiler
      - name: Set crate versions
        if: steps.check.outputs.completed != 'true'
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          echo "Setting all crate versions to ${VERSION}"
          sed -i "s/0\.0\.0-dev/${VERSION}/g" Cargo.toml
      - name: Publish workspace to crates.io
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/cargo-publish-workspace@main
        with:
          version: ${{ needs.detect.outputs.version }}
          registry: crates-io
          cargo-token: ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.detect.outputs.version }}
          step: publish-all-crates
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Trigger SDK publishing workflow
  # ===========================================
  trigger-sdk-publish:
    needs: [detect, upload-binaries, merge-to-main]
    if: needs.detect.outputs.is_general == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Dispatch publish-sdks workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/publish-sdks.yml/dispatches" \
            -d '{"ref":"main","inputs":{"version":"${{ needs.detect.outputs.version }}"}}'

  # ===========================================
  # Docker Push (uses pre-built images from build workflow)
  # ===========================================
  docker-push:
    needs: [detect, merge-to-main]
    if: needs.detect.outputs.docker == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.detect.outputs.version }}
          step: docker-push
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      - name: Install buildah
        if: steps.check.outputs.completed != 'true'
        run: sudo apt-get update && sudo apt-get install -y buildah

      - name: Download pre-built image archives
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          for img in zlayer-node zlayer-web zlayer-manager; do
            echo "Downloading ${img}-oci.tar..."
            curl -fsSL --max-time 600 --connect-timeout 30 --retry 3 --retry-delay 5 \
              "${{ inputs.artifact_base_url }}/${img}-oci.tar" \
              --user "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
              -o "${img}-oci.tar"
            echo "OK ${img}-oci.tar downloaded"
          done

      - name: Download WSL2 rootfs tarball
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          echo "Downloading zlayer-rootfs.tar.gz..."
          curl -fsSL --max-time 600 --connect-timeout 30 --retry 3 --retry-delay 5 \
            "${{ inputs.artifact_base_url }}/zlayer-rootfs.tar.gz" \
            --user "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            -o "zlayer-rootfs.tar.gz"
          ls -la zlayer-rootfs.tar.gz

      - name: Login to Forgejo registry
        if: steps.check.outputs.completed != 'true'
        run: echo "${{ secrets.FORGEJO_ACTIONS_TOKEN }}" | sudo buildah login -u zachhandley --password-stdin forge.blackleafdigital.com

      - name: Login to Docker Hub
        if: steps.check.outputs.completed != 'true'
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | sudo buildah login -u zachhandley --password-stdin docker.io

      - name: Login to GHCR
        if: steps.check.outputs.completed != 'true'
        run: echo "${{ secrets.GH_ACCESS_TOKEN }}" | sudo buildah login -u "${{ github.actor }}" --password-stdin ghcr.io

      # ZRegistry receives zlayer-web specifically (the public landing page
      # image). The publish token's scope is
      # `publish:container:blackleafdigital/zlayer-web`, minted via
      # ZREGISTRY_ADMIN_TOKEN against /v1/tokens.
      - name: Login to ZRegistry
        if: steps.check.outputs.completed != 'true'
        run: echo "${{ secrets.ZREGISTRY_ZLAYER_WEB_PUBLISH_TOKEN }}" | sudo buildah login -u zlayer-web-ci --password-stdin registry.blackleafdigital.com

      - name: Download binary archive for CLI image
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          echo "Downloading zlayer-linux-amd64.tar.gz..."
          curl -L --fail --max-time 300 --connect-timeout 30 --retry 3 --retry-delay 5 \
            --user "$AUTH" \
            -o "zlayer-linux-amd64.tar.gz" \
            "${{ inputs.artifact_base_url }}/zlayer-linux-amd64.tar.gz"

      - name: Load, tag, and push images
        if: steps.check.outputs.completed != 'true'
        run: |
          set +o pipefail  # Disable pipefail to avoid SIGPIPE issues
          VERSION="${{ needs.detect.outputs.version }}"

          # Clean buildah storage to avoid stale overlay layer errors
          sudo buildah rm --all 2>/dev/null || true
          sudo buildah rmi --all --force 2>/dev/null || true

          # --- Pre-built container images (from ZPipeline) ---
          for img in zlayer-node zlayer-web zlayer-manager; do
            echo "Processing ${img}..."

            # Load from OCI archive - capture image ID from output
            IMAGE_ID=$(sudo buildah pull oci-archive:${img}-oci.tar 2>&1 | tail -1)
            if [ -z "$IMAGE_ID" ] || [[ "$IMAGE_ID" == *"Error"* ]]; then
              echo "ERROR: Failed to load ${img}-oci.tar, skipping"
              continue
            fi
            echo "Loaded image ID: ${IMAGE_ID}"

            # zlayer-web also goes to ZRegistry (the public landing page is
            # the dogfood case for our own multi-protocol registry). Komodo
            # currently pulls from forge.blackleafdigital.com because of an
            # un-authenticated-manifest 404 quirk in ZRegistry's container
            # adapter; once fixed, the Komodo stack can switch its image URL
            # back to registry.blackleafdigital.com/blackleafdigital/zlayer-web.
            if [ "$img" = "zlayer-web" ]; then
              sudo buildah tag ${IMAGE_ID} registry.blackleafdigital.com/blackleafdigital/zlayer-web:${VERSION}
              sudo buildah tag ${IMAGE_ID} registry.blackleafdigital.com/blackleafdigital/zlayer-web:latest
              sudo buildah push registry.blackleafdigital.com/blackleafdigital/zlayer-web:${VERSION}
              sudo buildah push registry.blackleafdigital.com/blackleafdigital/zlayer-web:latest

              # forge.blackleafdigital.com is Komodo's current pull source.
              sudo buildah tag ${IMAGE_ID} forge.blackleafdigital.com/blackleafdigital/zlayer-web:${VERSION}
              sudo buildah tag ${IMAGE_ID} forge.blackleafdigital.com/blackleafdigital/zlayer-web:latest
              sudo buildah push forge.blackleafdigital.com/blackleafdigital/zlayer-web:${VERSION}
              sudo buildah push forge.blackleafdigital.com/blackleafdigital/zlayer-web:latest
            fi

            # zlayer-web only goes to Forgejo/ZRegistry, others go to Docker Hub + GHCR
            if [ "$img" != "zlayer-web" ]; then
              # Tag for Docker Hub and GHCR
              sudo buildah tag ${IMAGE_ID} zachhandley/${img}:${VERSION}
              sudo buildah tag ${IMAGE_ID} zachhandley/${img}:latest
              sudo buildah tag ${IMAGE_ID} ghcr.io/blackleafdigital/${img}:${VERSION}
              sudo buildah tag ${IMAGE_ID} ghcr.io/blackleafdigital/${img}:latest

              # Push to Docker Hub (zachhandley namespace)
              sudo buildah push zachhandley/${img}:${VERSION}
              sudo buildah push zachhandley/${img}:latest

              # Push to GHCR (BlackLeafDigital namespace)
              sudo buildah push ghcr.io/blackleafdigital/${img}:${VERSION}
              sudo buildah push ghcr.io/blackleafdigital/${img}:latest
            fi

            # Export versioned archives for Forgejo Packages (all images)
            sudo buildah tag ${IMAGE_ID} ${img}:${VERSION}
            sudo buildah push ${img}:${VERSION} oci-archive:${img}-${VERSION}-oci.tar
          done

          # --- Minimal CLI image (single zlayer binary) ---
          echo "Building minimal image for zlayer..."
          tar xzf "zlayer-linux-amd64.tar.gz"

          ctr=$(sudo buildah from alpine:latest)
          sudo buildah copy $ctr "zlayer" "/usr/local/bin/zlayer"
          sudo buildah config --entrypoint '["zlayer"]' $ctr
          sudo buildah config --label "org.opencontainers.image.source=https://github.com/BlackLeafDigital/ZLayer" $ctr
          sudo buildah config --label "org.opencontainers.image.version=${VERSION}" $ctr
          IMAGE_ID=$(sudo buildah commit $ctr zlayer:${VERSION})

          sudo buildah tag ${IMAGE_ID} zachhandley/zlayer:${VERSION}
          sudo buildah tag ${IMAGE_ID} zachhandley/zlayer:latest
          sudo buildah tag ${IMAGE_ID} ghcr.io/blackleafdigital/zlayer:${VERSION}
          sudo buildah tag ${IMAGE_ID} ghcr.io/blackleafdigital/zlayer:latest

          sudo buildah push zachhandley/zlayer:${VERSION}
          sudo buildah push zachhandley/zlayer:latest
          sudo buildah push ghcr.io/blackleafdigital/zlayer:${VERSION}
          sudo buildah push ghcr.io/blackleafdigital/zlayer:latest

          rm -f zlayer
          echo "Done: zlayer"

      - name: Build and push zlayer-rootfs OCI image
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.detect.outputs.version }}"
          IMAGE="forge.blackleafdigital.com/blackleafdigital/zlayer-rootfs"

          # Build a single-layer OCI image straight from the rootfs
          # tarball. `buildah add --chown 0:0 <tarball> /` extracts the
          # tarball into the container's root, producing exactly one
          # layer whose contents match what `wsl --import` would lay out.
          # This way the same artifact is consumable as both a WSL2
          # distro tar AND an OCI image — single source of truth.
          ctr=$(sudo buildah from scratch)
          sudo buildah add --chown 0:0 "$ctr" zlayer-rootfs.tar.gz /
          sudo buildah config \
            --label "org.opencontainers.image.title=zlayer-rootfs" \
            --label "org.opencontainers.image.version=${VERSION}" \
            --label "org.opencontainers.image.source=https://forge.blackleafdigital.com/BlackLeafDigital/ZLayer" \
            --label "org.opencontainers.image.description=zlayer WSL2 rootfs (Alpine + iproute2 + iptables + /usr/local/bin/zlayer)" \
            --label "org.opencontainers.image.revision=${{ inputs.sha || github.sha }}" \
            --created-by "release.yml docker-push" \
            "$ctr"
          IMAGE_ID=$(sudo buildah commit "$ctr" "${IMAGE}:${VERSION}")
          sudo buildah tag "${IMAGE_ID}" "${IMAGE}:latest"

          # Push both tags. Versioned tag is immutable; :latest moves.
          sudo buildah push "${IMAGE}:${VERSION}"
          sudo buildah push "${IMAGE}:latest"
          echo "Done: zlayer-rootfs ${VERSION} (and :latest)"

      - name: Upload image archives to Forgejo Packages
        if: steps.check.outputs.completed != 'true'
        shell: bash
        run: |
          VERSION="${{ needs.detect.outputs.version }}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          PKG_URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer/${VERSION}"

          for img in zlayer-node zlayer-web zlayer-manager; do
            file="${img}-${VERSION}-oci.tar"
            url="${PKG_URL}/${file}"
            local_size=$(stat -c%s "$file")

            # Version-pinned OCI archives are immutable. The previous
            # size-match check kept triggering a DELETE + re-PUT on re-runs
            # because buildah's OCI tar output isn't byte-reproducible
            # (embedded layer timestamps). Forgejo's 409 on the re-PUT was
            # the visible symptom. Treat any existing remote file as done.
            remote_size=$(curl -sI --user "$AUTH" "$url" 2>/dev/null \
              | grep -i content-length | tail -1 | tr -dc '0-9') || true
            if [ -n "$remote_size" ] && [ "$remote_size" -gt 0 ]; then
              echo "= Skipping $file (already uploaded, ${remote_size} bytes remote vs ${local_size} bytes local — treating as immutable)"
              continue
            fi

            echo "Uploading $file (${local_size} bytes)..."
            curl --fail --max-time 600 --connect-timeout 30 --retry 3 --retry-delay 10 \
              --user "$AUTH" \
              --upload-file "$file" \
              "$url" && echo "OK $file uploaded"
          done

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.detect.outputs.version }}
          step: docker-push
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Create Forgejo Release
  # ===========================================
  create-forgejo-release:
    # Intentionally does NOT need docker-push: a Docker Hub / GHCR outage
    # must not block the Forgejo release. The release notes still advertise
    # the container images, but users pulling them just retry the image
    # push if it failed.
    needs: [detect, upload-binaries]
    if: always() && needs.detect.outputs.is_general == 'true' && needs.upload-binaries.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Check step status
        id: check
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: check
          version: ${{ needs.detect.outputs.version }}
          step: create-forgejo-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

      # Resolve the temp/v{VERSION} branch HEAD so the release tag is created
      # at the exact commit that produced the published artifacts. If the
      # branch is gone (a previous run already cut the tag), fall back to
      # the existing tag's SHA for idempotency.
      - name: Resolve temp branch SHA
        id: tempsha
        if: steps.check.outputs.completed != 'true'
        shell: bash
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          REPO: ${{ github.repository }}
          AUTH: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
        run: |
          set -euo pipefail
          BR="temp/v${VERSION}"
          TAG="v${VERSION}"
          API="https://forge.blackleafdigital.com/api/v1/repos/${REPO}"

          BR_RESP=$(curl -s -u "$AUTH" -w '\n%{http_code}' "${API}/branches/${BR}")
          BR_CODE=$(printf '%s' "$BR_RESP" | tail -n1)
          BR_BODY=$(printf '%s' "$BR_RESP" | sed '$d')
          if [ "$BR_CODE" = "200" ]; then
            SHA=$(printf '%s' "$BR_BODY" | jq -r '.commit.id')
            if [ -z "$SHA" ] || [ "$SHA" = "null" ]; then
              echo "::error::branch ${BR} returned 200 but no commit.id"
              exit 1
            fi
            echo "Found temp branch ${BR} at ${SHA}"
            echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
            echo "branch_present=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          TAG_RESP=$(curl -s -u "$AUTH" -w '\n%{http_code}' "${API}/tags/${TAG}")
          TAG_CODE=$(printf '%s' "$TAG_RESP" | tail -n1)
          TAG_BODY=$(printf '%s' "$TAG_RESP" | sed '$d')
          if [ "$TAG_CODE" = "200" ]; then
            SHA=$(printf '%s' "$TAG_BODY" | jq -r '.commit.sha // .id')
            echo "temp branch missing; tag ${TAG} already exists at ${SHA}"
            echo "sha=${SHA}" >> "$GITHUB_OUTPUT"
            echo "branch_present=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::error::Cannot resolve a SHA for ${TAG}: branch ${BR} not found (HTTP ${BR_CODE}) and tag not found (HTTP ${TAG_CODE})."
          exit 1

      - name: Create Forgejo Release (cuts permanent tag)
        if: steps.check.outputs.completed != 'true'
        run: |
          set -euo pipefail
          VERSION="${{ needs.detect.outputs.version }}"
          TAG="v${VERSION}"
          SHA="${{ steps.tempsha.outputs.sha }}"
          PACKAGES_URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer/${VERSION}"

          # Create release body
          cat > release_body.md << 'RELEASE_EOF'
          ## ZLayer ${VERSION}

          ### Install

          ```bash
          # Install zlayer (unified binary: TUI, CLI, runtime, builder)
          curl -sSL https://raw.githubusercontent.com/BlackLeafDigital/ZLayer/main/install.sh | sh
          ```

          ### Binary

          | Binary | Linux | macOS | Windows |
          |--------|-------|-------|---------|
          | `zlayer` | [amd64](${PACKAGES_URL}/zlayer-linux-amd64.tar.gz) / [arm64](${PACKAGES_URL}/zlayer-linux-arm64.tar.gz) | [amd64](${PACKAGES_URL}/zlayer-darwin-amd64.tar.gz) / [arm64](${PACKAGES_URL}/zlayer-darwin-arm64.tar.gz) | [amd64](${PACKAGES_URL}/zlayer-windows-amd64.zip) |

          Every platform tarball/zip now ships with a `completions/` directory
          containing bash/zsh/fish/powershell/elvish scripts. A standalone
          [zlayer-completions.tar.gz](${PACKAGES_URL}/zlayer-completions.tar.gz)
          is also published for package maintainers.

          ### Windows WSL2 rootfs

          The [zlayer-rootfs.tar.gz](${PACKAGES_URL}/zlayer-rootfs.tar.gz)
          tarball is an Alpine minirootfs with `iproute2` / `iptables` /
          `ca-certificates` and `/usr/local/bin/zlayer` baked in. It is
          imported automatically on first run by `zlayer.exe` on Windows
          (the WSL2 delegate uses `wsl --import zlayer ...` to materialize
          a Linux distro for running Linux workloads). The same content is
          also available as an OCI image at
          `forge.blackleafdigital.com/blackleafdigital/zlayer-rootfs:${VERSION}`
          (and `:latest`).

          ### Python (PyPI)

          ```bash
          pip install zlayer==${VERSION}
          ```

          Python bindings for ZLayer — in-process runtime (Linux) and a remote `Client` for driving a daemon.

          ### TypeScript / JavaScript (npm)

          ```bash
          npm install @zlayer/client@${VERSION}
          # or the raw generated client
          npm install @zlayer/api-client@${VERSION}
          ```

          `@zlayer/client` wraps the OpenAPI-generated `@zlayer/api-client` with ergonomic methods.

          ### Container Images

          **Docker Hub** (`zachhandley/`):
          ```bash
          docker pull zachhandley/zlayer-node:${VERSION}
          docker pull zachhandley/zlayer-manager:${VERSION}
          ```

          **GHCR** (`ghcr.io/blackleafdigital/`):
          ```bash
          docker pull ghcr.io/blackleafdigital/zlayer-node:${VERSION}
          docker pull ghcr.io/blackleafdigital/zlayer-manager:${VERSION}
          ```

          **Forgejo Packages** (includes `zlayer-web`):
          - [zlayer-node](${PACKAGES_URL}/zlayer-node-${VERSION}-oci.tar)
          - [zlayer-manager](${PACKAGES_URL}/zlayer-manager-${VERSION}-oci.tar)
          - [zlayer-web](${PACKAGES_URL}/zlayer-web-${VERSION}-oci.tar) *(Forgejo only)*

          ### Using with ZLayer

          Pull and run images directly with ZLayer:
          ```bash
          # Pull images
          zlayer pull zachhandley/zlayer-node:${VERSION}
          zlayer pull zachhandley/zlayer-manager:${VERSION}

          # Or deploy from a spec file
          zlayer deploy my-deployment.yaml
          ```

          ### What's Changed

          See the [CHANGELOG](https://forge.blackleafdigital.com/BlackLeafDigital/ZLayer/src/branch/main/CHANGELOG.md) for details.
          RELEASE_EOF

          # Substitute VERSION in the body
          sed -i "s/\${VERSION}/${VERSION}/g" release_body.md
          sed -i "s|\${PACKAGES_URL}|${PACKAGES_URL}|g" release_body.md

          # Create release via Forgejo API. tag_name + target_commitish creates
          # the tag at the named SHA atomically. If the release already exists
          # at the same SHA, Forgejo accepts the call; if at a different SHA,
          # it errors — we treat that as success (a prior partial run already
          # cut the tag, the duplicate POST is idempotent).
          curl --fail -sS -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/releases" \
            -d "$(jq -n \
              --arg tag "$TAG" \
              --arg sha "$SHA" \
              --arg name "ZLayer $VERSION" \
              --arg body "$(cat release_body.md)" \
              '{tag_name: $tag, target_commitish: $sha, name: $name, body: $body, draft: false, prerelease: false}'
            )" || {
              echo "::warning::Release POST failed; assuming it already exists at this SHA."
            }

      - name: Delete temp/v{VERSION} branch
        if: steps.check.outputs.completed != 'true' && steps.tempsha.outputs.branch_present == 'true'
        shell: bash
        env:
          VERSION: ${{ needs.detect.outputs.version }}
          REPO: ${{ github.repository }}
          AUTH: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}
        run: |
          set -euo pipefail
          BR="temp/v${VERSION}"
          API="https://forge.blackleafdigital.com/api/v1/repos/${REPO}/branches/${BR}"
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -X DELETE -u "$AUTH" "$API")
          case "$CODE" in
            204|404) echo "temp branch ${BR} deleted (HTTP ${CODE})" ;;
            *) echo "::warning::Failed to delete ${BR} (HTTP ${CODE}); manual cleanup may be needed" ;;
          esac

      - name: Mark step complete
        if: steps.check.outputs.completed != 'true'
        uses: https://forge.blackleafdigital.com/Public/actions/ci-step-status@main
        with:
          mode: mark
          version: ${{ needs.detect.outputs.version }}
          step: create-forgejo-release
          base-url: https://forge.blackleafdigital.com
          owner: BlackLeafDigital
          auth: zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}

  # ===========================================
  # Trigger GitHub release
  # ===========================================
  trigger-github:
    needs: [detect, upload-binaries]
    if: always() && needs.detect.outputs.is_general == 'true' && needs.upload-binaries.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger GitHub E2E + Release
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.GH_ACCESS_TOKEN }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/BlackLeafDigital/ZLayer/actions/workflows/e2e.yml/dispatches \
            -d '{"ref":"main","inputs":{"version":"${{ needs.detect.outputs.version }}","sha":"${{ github.sha }}"}}'

  # ===========================================
  # Build & Push macOS Sandbox Images
  # ===========================================
  macos-sandbox-images:
    needs: [detect]
    if: needs.detect.outputs.docker == 'true' || needs.detect.outputs.is_general == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger macOS sandbox images workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/macos-images.yml/dispatches" \
            -d '{"ref": "dev", "inputs": {"version": "${{ needs.detect.outputs.version }}", "force_rebuild": "true"}}'

  # ===========================================
  # Cleanup temp packages (runs after all jobs)
  # ===========================================
  cleanup:
    needs: [detect, upload-binaries, merge-to-main, docker-push, publish-all-crates, trigger-sdk-publish, create-forgejo-release, trigger-github, macos-sandbox-images]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup temp packages
        run: |
          RUN_ID=$(echo "${{ inputs.artifact_base_url }}" | grep -oP 'zlayer-temp/\K[^/]+')
          echo "Cleaning up temp packages for run_id: ${RUN_ID}"
          curl -X DELETE \
            --user "zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}" \
            "https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer-temp/${RUN_ID}" || true
