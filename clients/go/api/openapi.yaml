      - Nodes
  /api/v1/notifiers:
    get:
      description: |-
        # Errors

        Returns [`ApiError::Internal`] if the notifier store fails.
      operationId: list_notifiers
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredNotifier"
                type: array
          description: List of notifiers
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List notifiers.
      tags:
      - Notifiers
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] for an empty name or kind/config mismatch,
        or [`ApiError::Internal`] when the notifier store fails.
      operationId: create_notifier
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNotifierRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredNotifier"
          description: Notifier created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
      security:
      - bearer_auth: []
      summary: Create a new notifier. Admin only.
      tags:
      - Notifiers
  /api/v1/notifiers/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the notifier does not exist, or [`ApiError::Internal`] when the
        store fails.
      operationId: delete_notifier
      parameters:
      - description: Notifier id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Notifier deleted
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Delete a notifier. Admin only.
      tags:
      - Notifiers
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if no notifier with the given id exists,
        or [`ApiError::Internal`] when the store fails.
      operationId: get_notifier
      parameters:
      - description: Notifier id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredNotifier"
          description: Notifier
        "404":
