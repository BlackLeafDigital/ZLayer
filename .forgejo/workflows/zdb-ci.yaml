name: ZDB CI

on:
  push:
    branches: [zdb]
    tags: ['zdb-v*']
  pull_request:
    branches: [zdb]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g., 0.1.0)'
        required: false
        type: string

concurrency:
  group: zdb-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "2"
  RUST_BACKTRACE: 1
  CARGO_INCREMENTAL: "0"
  FORGEJO_REGISTRIES: '[{"name":"forgejo","index":"sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/","token":"${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

jobs:
  # ===========================================
  # Check (fmt, clippy)
  # ===========================================
  check:
    name: Check
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: rustfmt, clippy
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Check compilation
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

  # ===========================================
  # Check (macOS) — catches cfg(target_os = "macos") errors
  # ===========================================
  check-macos:
    name: Check (macOS)
    runs-on: macos-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    env:
      CARGO_BUILD_JOBS: "2"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: brew install protobuf python3

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          components: clippy
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Check compilation
        run: cargo check --workspace --all-targets

      - name: Clippy lints
        run: cargo clippy --workspace --all-targets -- -D warnings

  # ===========================================
  # Test
  # ===========================================
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: [check, check-macos]
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Run unit tests
        run: cargo test --workspace --lib --bins

      - name: Run integration tests
        run: |
          cargo test -p zlayer-scheduler-zql --features test-skip-http --test '*'
          cargo test --workspace --test '*' --exclude zlayer-scheduler

      - name: Run doc tests
        run: cargo test --workspace --doc

      - name: Save cache
        if: always()
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: save
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

  # ===========================================
  # Feature Matrix Tests
  # ===========================================
  feature-tests:
    name: Feature Tests
    runs-on: ubuntu-latest
    needs: [check, check-macos]
    if: ${{ !startsWith(github.ref, 'refs/tags/') && !contains(github.event.head_commit.message, '[skip-checks]') }}
    strategy:
      matrix:
        features:
          - "--no-default-features"
          - "--features full"
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler libseccomp-dev jq

      - name: Setup Rust
        uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}

      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Build with features
        run: cargo build --package zlayer-zql ${{ matrix.features }}

      - name: Test with features
        run: cargo test --package zlayer-zql ${{ matrix.features }}

  # ===========================================
  # Auto-tag and trigger publish on successful tests
  # Runs on: branch push (auto-increments tag) or tag push (uses that tag)
  # Skipped if commit message contains [np]
  # ===========================================
  auto-tag-and-publish:
    name: Auto-Tag & Publish
    runs-on: ubuntu-latest
    needs: [test, feature-tests]
    if: ${{ github.event_name == 'push' && (startsWith(github.ref, 'refs/tags/') || !contains(github.event.head_commit.message, '[np]')) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: zdb
          fetch-depth: 0
          token: ${{ secrets.FORGEJO_TOKEN }}

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/zdb-v* ]]; then
            # Tag was pushed directly -- use it
            TAG="${{ github.ref_name }}"
            VERSION="${TAG#zdb-v}"
            echo "Using pushed tag: ${TAG}"
          else
            # Branch push -- auto-increment
            LATEST_TAG=$(git tag -l 'zdb-v*' --sort=-v:refname | head -n1)

            if [ -z "$LATEST_TAG" ]; then
              VERSION="0.1.0"
            else
              CURRENT="${LATEST_TAG#zdb-v}"
              IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
              # Strip leading zeros to avoid invalid semver
              MAJOR=$((10#$MAJOR))
              MINOR=$((10#$MINOR))
              PATCH=$((10#$PATCH + 1))
              VERSION="${MAJOR}.${MINOR}.${PATCH}"
            fi

            TAG="zdb-v${VERSION}"
            echo "Auto-tagging as ${TAG}"
          fi

          # Validate semver (no leading zeros allowed)
          if ! [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "ERROR: Invalid semver: ${VERSION}"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag (branch push only)
        if: ${{ startsWith(github.ref, 'refs/heads/') }}
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Trigger ZDB Publish workflow
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            "${{ github.server_url }}/api/v1/repos/${{ github.repository }}/actions/workflows/zdb-publish.yml/dispatches" \
            -d '{"ref": "zdb", "inputs": {"version": "${{ steps.version.outputs.version }}"}}'

  # ===========================================
  # Cache Cleanup
  # ===========================================
  cache-cleanup:
    name: Cleanup Old Caches
    runs-on: ubuntu-latest
    needs: [test, feature-tests]
    if: always()
    steps:
      - name: Cleanup old caches
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: cleanup
          max-age-days: '30'
          keep-latest: '5'
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
