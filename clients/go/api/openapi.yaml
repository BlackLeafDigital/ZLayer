      - bearer_auth: []
      summary: Update a notifier. Admin only.
      tags:
      - Notifiers
  /api/v1/notifiers/{id}/test:
    post:
      description: |-
        For Slack and Discord, sends a test message via the configured webhook
        URL. For generic webhooks, sends a JSON test payload. For SMTP, sends a
        real email via [`lettre`] using the notifier's configured credentials.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the notifier does not exist, or [`ApiError::Internal`] when the
        notification fails with a truly internal error. Upstream failures
        (bad credentials, unreachable SMTP server, invalid addresses) are
        returned with HTTP 200 and `success: false` in the body, matching the
        convention established by the Slack/Discord/Webhook arms.
      operationId: test_notifier
      parameters:
      - description: Notifier id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TestNotifierResponse"
          description: Test notification sent
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Send a test notification through a notifier. Admin only.
      tags:
      - Notifiers
  /api/v1/overlay/dns:
    get:
      description: |-
        Returns DNS server configuration and registered service count.
        When DNS is not configured, returns a disabled status (not an error).
      operationId: get_dns_status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DnsStatusResponse"
          description: DNS service status
      summary: Get DNS service status.
      tags:
      - Overlay
  /api/v1/overlay/ip-alloc:
    get:
      description: |-
        Returns the overlay network's IP allocation statistics including CIDR,
        total IPs, allocated count, and utilization. Available on any node that
        has an active overlay (not just leaders).

        # Errors

        Returns an error if the overlay is not initialized.
      operationId: get_ip_allocation
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IpAllocationResponse"
          description: IP allocation status
        "503":
          description: Not a leader node or overlay not initialized
      summary: Get IP allocation status.
      tags:
      - Overlay
  /api/v1/overlay/peers:
    get:
      description: |-
        Returns peer information from the overlay transport's UAPI state.
        When the overlay is not initialized, returns 503.

        # Errors

        Returns an error if the overlay network is not initialized.
      operationId: get_overlay_peers
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PeerListResponse"
          description: List of overlay peers
        "503":
          description: Overlay not initialized
      summary: Get list of overlay peers.
      tags:
      - Overlay
  /api/v1/overlay/status:
    get:
      description: |-
        Returns the current overlay network status including interface name,
        node IP, CIDR, peer counts, and whether the transport is active.
        Returns 503 if the overlay network is not initialized (e.g. host
        networking mode).

        # Errors

        Returns an error if the overlay network is not initialized.
      operationId: get_overlay_status
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OverlayStatusResponse"
          description: Overlay network status
        "503":
          description: Overlay not initialized
      summary: Get overlay network status.
      tags:
      - Overlay
  /api/v1/permissions:
    get:
      description: |-
        Exactly one of `user` or `group` must be provided.

        # Errors

        Returns [`ApiError::BadRequest`] when neither or both query parameters are
        provided, or [`ApiError::Internal`] if the store fails.
      operationId: list_permissions
      parameters:
      - description: Filter by user id.
        explode: true
        in: query
        name: user
        required: false
        schema:
          nullable: true
          type: string
        style: form
      - description: Filter by group id.
        explode: true
        in: query
        name: group
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredPermission"
                type: array
          description: List permissions
        "400":
          description: Must provide exactly one of user or group
      summary: List permissions for a subject (user or group).
      tags:
      - Permissions
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] when required fields are missing, or
        [`ApiError::Internal`] if the store fails.
      operationId: grant_permission
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GrantPermissionRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredPermission"
          description: Permission granted
        "400":
          description: Invalid request
        "403":
          description: Admin role required
      summary: Grant a permission. Admin only.
      tags:
      - Permissions
  /api/v1/permissions/by-resource:
    get:
      description: |-
        When `id` is supplied, returns exact-resource grants; when omitted, returns
        wildcard grants for the given `kind`.

        # Errors

        Returns [`ApiError::Internal`] on store failure.
      operationId: list_permissions_by_resource
      parameters:
      - description: Resource kind (e.g. `"environment"`).
        explode: true
        in: query
        name: kind
        required: true
        schema:
          type: string
        style: form
      - description: Specific resource id. Omit for wildcard grants only.
        explode: true
        in: query
        name: id
        required: false
        schema:
          nullable: true
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredPermission"
                type: array
          description: Grants on the resource
      summary: List permissions granted on a specific resource.
      tags:
      - Permissions
  /api/v1/permissions/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::NotFound`] when the permission does not exist, or
        [`ApiError::Internal`] if the store fails.
      operationId: revoke_permission
      parameters:
      - description: Permission id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Permission revoked
        "403":
          description: Admin role required
        "404":
          description: Permission not found
      summary: Revoke a permission by id. Admin only.
      tags:
      - Permissions
  /api/v1/projects:
    get:
      description: |-
        Any authenticated user can list projects.

        # Errors

        Returns [`ApiError::Internal`] if the project store fails.
      operationId: list_projects
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/StoredProject"
                type: array
          description: List of projects
        "401":
          description: Unauthorized
      security:
      - bearer_auth: []
      summary: List all projects.
      tags:
      - Projects
    post:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] when the caller is not an admin,
        [`ApiError::BadRequest`] for an empty name,
        [`ApiError::Conflict`] when the name is already used, or
        [`ApiError::Internal`] when the project store fails.
      operationId: create_project
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
        required: true
      responses:
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredProject"
          description: Project created
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "409":
          description: Name already used
      security:
      - bearer_auth: []
      summary: Create a new project. Admin only.
      tags:
      - Projects
  /api/v1/projects/{id}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the project does not exist, or [`ApiError::Internal`] when the
        store fails.
      operationId: delete_project
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Project deleted
        "403":
          description: Admin role required
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Delete a project. Admin only. Cascade-removes deployment links.
      tags:
      - Projects
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] if no project with the given id exists,
        or [`ApiError::Internal`] when the store fails.
      operationId: get_project
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredProject"
          description: Project
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Fetch a single project by id.
      tags:
      - Projects
    patch:
      description: |-
        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the project does not exist, [`ApiError::BadRequest`] for an empty
        replacement name, [`ApiError::Conflict`] when the new name collides, or
        [`ApiError::Internal`] when the store fails.
      operationId: update_project
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoredProject"
          description: Updated project
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "404":
          description: Not found
        "409":
          description: Name collides with another project
      security:
      - bearer_auth: []
      summary: Update a project. Admin only.
      tags:
      - Projects
  /api/v1/projects/{id}/deployments:
    get:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] when the project does not exist,
        or [`ApiError::Internal`] when the store fails.
      operationId: list_project_deployments
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  type: string
                type: array
          description: Linked deployment names
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: List deployment names linked to a project.
      tags:
      - Projects
    post:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] when the project does not exist,
        [`ApiError::BadRequest`] for an empty deployment name, or
        [`ApiError::Internal`] when the store fails.
      operationId: link_project_deployment
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LinkDeploymentRequest"
        required: true
      responses:
        "201":
          description: Deployment linked
        "400":
          description: Invalid request
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Link a deployment to a project.
      tags:
      - Projects
  /api/v1/projects/{id}/deployments/{name}:
    delete:
      description: |-
        # Errors

        Returns [`ApiError::NotFound`] when the project or link does not exist,
        or [`ApiError::Internal`] when the store fails.
      operationId: unlink_project_deployment
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      - description: Deployment name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      responses:
        "204":
          description: Deployment unlinked
        "404":
          description: Not found
      security:
      - bearer_auth: []
      summary: Unlink a deployment from a project.
      tags:
      - Projects
  /api/v1/projects/{id}/pull:
    post:
      description: |-
        Authentication is resolved from `git_credential_id`: when set, the
        matching [`GitCredential`](zlayer_secrets::GitCredential) is looked up in
        the [`GitCredentialStore`](zlayer_secrets::GitCredentialStore) and its
        kind determines whether we build a PAT or SSH auth config. When the
        project has no credential id, or the state has no git credential store
        attached, we fall back to anonymous auth.

        Admin only.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the project does not exist, [`ApiError::BadRequest`] when the
        project has no `git_url` or its `git_credential_id` cannot be resolved,
        or [`ApiError::Internal`] on any underlying git / credential store
        failure.
      operationId: pull_project
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProjectPullResponse"
          description: Pull succeeded
        "400":
          description: Project has no git URL configured
        "403":
          description: Admin role required
        "404":
          description: Project not found
        "500":
          description: Git operation failed
      security:
      - bearer_auth: []
      summary: |-
        Clone the project's git repository (or fast-forward pull if the working
        copy already exists) into `{clone_root}/{project_id}` and return the
        resulting HEAD SHA.
      tags:
      - Projects
  /api/v1/projects/{id}/webhook:
    get:
      description: |-
        Returns the webhook URL pattern and the HMAC secret. Generates the
        secret on first call if it does not exist.

        Auth required (any authenticated user).

        # Errors

        Returns [`ApiError::NotFound`] when the project does not exist,
        or [`ApiError::Internal`] on store failures.
      operationId: get_webhook_info
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookInfoResponse"
          description: Webhook configuration
        "404":
          description: Project not found
      security:
      - bearer_auth: []
      summary: Get webhook configuration for a project.
      tags:
      - Webhooks
  /api/v1/projects/{id}/webhook/rotate:
    post:
      description: |-
        Admin only.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins,
        [`ApiError::NotFound`] when the project does not exist,
        or [`ApiError::Internal`] on store failures.
      operationId: rotate_webhook_secret
      parameters:
      - description: Project id
        explode: false
        in: path
        name: id
        required: true
        schema:
          type: string
        style: simple
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WebhookInfoResponse"
          description: New webhook configuration
        "403":
          description: Admin role required
        "404":
          description: Project not found
      security:
      - bearer_auth: []
      summary: Rotate (regenerate) the webhook secret for a project.
      tags:
      - Webhooks
  /api/v1/proxy/backends:
    get:
      description: |-
        Returns each service's backend group with its strategy, health status, and
        active connection counts.

        # Errors

        Returns `ApiError::ServiceUnavailable` if the load balancer is not initialised.
      operationId: list_backends
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackendsResponse"
          description: Load-balancer backend groups
        "503":
          description: Load balancer not available
      security:
      - bearer_auth: []
      summary: List all load-balancer backend groups.
      tags:
      - Proxy
  /api/v1/proxy/routes:
    get:
      description: |-
        Returns the full list of L7 routes with their host patterns, path prefixes,
        backends, and protocol information.

        # Errors

        Returns `ApiError::ServiceUnavailable` if the service registry is not initialised.
      operationId: list_routes
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RoutesResponse"
          description: List of routes
        "503":
          description: Service registry not available
      security:
      - bearer_auth: []
      summary: List all registered proxy routes.
      tags:
      - Proxy
  /api/v1/proxy/streams:
    get:
      description: |-
        Returns all TCP and UDP stream proxies with their listen ports, service
        names, and backends.

        # Errors

        Returns `ApiError::ServiceUnavailable` if the stream registry is not initialised.
      operationId: list_streams
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreamsResponse"
          description: L4 stream proxies
        "503":
          description: Stream registry not available
      security:
      - bearer_auth: []
      summary: List L4 stream proxies.
      tags:
      - Proxy
  /api/v1/proxy/tls:
    get:
      description: |-
        Returns cached certificate domains with metadata (expiry, fingerprint)
        when available.

        # Errors

        Returns `ApiError::ServiceUnavailable` if the certificate manager is not initialised.
      operationId: list_tls
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TlsResponse"
          description: Loaded TLS certificates
        "503":
          description: Certificate manager not available
      security:
      - bearer_auth: []
      summary: List loaded TLS certificates.
      tags:
      - Proxy
  /api/v1/secrets:
    get:
      description: |-
        Scope resolution: see [`resolve_scope`].

        # Errors

        Returns an error if storage access fails.
      operationId: list_secrets
      parameters:
      - description: Environment id
        explode: true
        in: query
        name: environment
        required: false
        schema:
          type: string
        style: form
      - description: Explicit scope
        explode: true
        in: query
        name: scope
        required: false
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                items:
                  $ref: "#/components/schemas/SecretMetadataResponse"
                type: array
          description: List of secret metadata
        "401":
          description: Unauthorized
        "404":
          description: Environment id unknown
      security:
      - bearer_auth: []
      summary: List secrets in a scope.
      tags:
      - Secrets
    post:
      description: |-
        Stores a new secret or updates an existing one. The secret value is
        encrypted at rest and the version number is incremented on updates.

        Scope resolution: see [`resolve_scope`].

        # Errors

        Returns an error if validation fails, storage operations fail, or the
        caller lacks permission.
      operationId: create_secret
      parameters:
      - description: Environment id (mutually exclusive with body 'scope')
        explode: true
        in: query
        name: environment
        required: false
        schema:
          type: string
        style: form
      - description: Explicit scope (legacy)
        explode: true
        in: query
        name: scope
        required: false
        schema:
          type: string
        style: form
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSecretRequest"
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretMetadataResponse"
          description: Secret updated
        "201":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SecretMetadataResponse"
          description: Secret created
        "400":
          description: Invalid request
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Environment id unknown
      security:
      - bearer_auth: []
      summary: Create or update a secret.
      tags:
      - Secrets
  /api/v1/secrets/bulk-import:
    post:
      description: |-
        Each non-empty, non-comment line is parsed into a (name, value) pair and
        written to the env's scope. Lines that fail to parse are returned in
        `errors` and do not abort the import. Each successful write is counted
        as either `created` or `updated`.

        # Errors

        Returns [`ApiError::Forbidden`] for non-admins, [`ApiError::NotFound`]
        when the environment id is unknown, or [`ApiError::Internal`] when the
        secrets store fails.
      operationId: bulk_import_secrets
      parameters:
      - description: Environment id to import into
        explode: true
        in: query
        name: environment
        required: true
        schema:
          type: string
        style: form
      requestBody:
        content:
          text/plain:
            schema:
              type: string
        required: true
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportResponse"
          description: Import summary
        "400":
          description: Invalid request
        "403":
          description: Admin role required
        "404":
          description: Environment id unknown
      security:
      - bearer_auth: []
      summary: Bulk-import secrets from a dotenv-style payload (`KEY=value\n…`).
      tags:
      - Secrets
  /api/v1/secrets/reveal-all:
    get:
      description: |-
        Used by `zlayer run` to build the child-process env in a single round-trip.

        # Errors

        Returns `ApiError::Forbidden` if the caller is not admin, `ApiError::NotFound`
        if the environment is unknown, and `ApiError::Internal` for storage failures.
      operationId: reveal_all_secrets
      parameters:
      - description: Environment id (required)
        explode: true
        in: query
        name: environment
        required: true
        schema:
          type: string
        style: form
      responses:
        "200":
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevealAllSecretsResponse"
          description: Every secret revealed
        "401":
          description: Unauthorized
        "403":
          description: Admin required
        "404":
          description: Environment not found
      security:
      - bearer_auth: []
      summary: Reveal every secret in an environment at once (admin only).
      tags:
      - Secrets
  /api/v1/secrets/{name}:
    delete:
      description: |-
        Scope resolution: see [`resolve_scope_get`] (the same query type is
        reused minus `reveal`).

        # Errors

        Returns an error if the secret is not found, storage access fails, or
        the caller lacks permission.
      operationId: delete_secret
      parameters:
      - description: Secret name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Environment id
        explode: true
        in: query
        name: environment
        required: false
        schema:
          type: string
        style: form
      - description: Explicit scope
        explode: true
        in: query
        name: scope
        required: false
        schema:
          type: string
        style: form
      responses:
        "204":
          description: Secret deleted
        "401":
          description: Unauthorized
        "403":
          description: Forbidden
        "404":
          description: Secret not found
      security:
      - bearer_auth: []
      summary: Delete a secret.
      tags:
      - Secrets
    get:
      description: |-
        Scope resolution: see [`resolve_scope_get`].

        # Errors

        Returns an error if the secret is not found, the caller is unauthorised
        to reveal, or storage access fails.
      operationId: get_secret_metadata
      parameters:
      - description: Secret name
        explode: false
        in: path
        name: name
        required: true
        schema:
          type: string
        style: simple
      - description: Environment id
        explode: true
        in: query
        name: environment
        required: false
        schema:
          type: string
