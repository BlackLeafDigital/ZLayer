[package]
name = "zlayer-desktop-zql"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "ZLayer Manager desktop application (Tauri)"
publish = false

[lib]
name = "zlayer_desktop_lib"
crate-type = ["staticlib", "cdylib", "rlib"]

[[bin]]
name = "zlayer-desktop"
path = "src/main.rs"

[build-dependencies]
tauri-build = { version = "2", features = [] }

[dependencies]
tauri = { version = "2", features = [] }
tauri-plugin-opener = "2"
tauri-plugin-window-state = "2"
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
zlayer-manager = { path = "../../crates/zlayer-manager", package = "zlayer-manager-zql", features = ["ssr"] }
