      - status
    ClusterPeer:
      description: Summary of an existing cluster peer returned in join response.
      example:
        wg_public_key: wg_public_key
        raft_node_id: 0
        overlay_port: 0
        raft_port: 0
        advertise_addr: advertise_addr
        overlay_ip: overlay_ip
        node_id: node_id
      properties:
        advertise_addr:
          description: Advertise address
          type: string
        node_id:
          description: UUID
          type: string
        overlay_ip:
          description: Overlay IP
          type: string
        overlay_port:
          description: Overlay port
          format: int32
          minimum: 0
