      required:
      - message
      - success
    TlsResponse:
      description: Response for `GET /api/v1/proxy/tls`.
      example:
        acme_available: true
        total: 0
        certificates:
        - not_after: not_after
          not_before: not_before
          domain: domain
          fingerprint: fingerprint
          needs_renewal: true
        - not_after: not_after
          not_before: not_before
          domain: domain
          fingerprint: fingerprint
          needs_renewal: true
        acme_email: acme_email
      properties:
        acme_available:
