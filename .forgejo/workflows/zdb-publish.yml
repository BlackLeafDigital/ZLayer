name: ZDB Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version for artifacts (e.g., 0.1.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  CARGO_BUILD_JOBS: "2"
  FORGEJO_REGISTRIES: '[{"name":"forgejo","index":"sparse+https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/cargo/","token":"${{ secrets.FORGEJO_ACTIONS_TOKEN }}"}]'

jobs:
  # ===========================================
  # Extract version from tag or input
  # ===========================================
  resolve-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Strip zdb-v prefix from tag
            TAG="${{ github.ref_name }}"
            echo "version=${TAG#zdb-v}" >> "$GITHUB_OUTPUT"
          fi

  # ===========================================
  # Build zlayer binary (Linux amd64)
  # ===========================================
  build-binary:
    needs: [resolve-version]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    container: node:20-bullseye
    steps:
      - uses: actions/checkout@v4
        with:
          ref: zdb
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}
      - name: Install system deps
        run: apt-get update && apt-get install -y sudo protobuf-compiler libseccomp-dev cmake build-essential pkg-config libssl-dev clang git jq
      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}
      - name: Set release version
        run: |
          VERSION="${{ needs.resolve-version.outputs.version || inputs.version }}"
          if [ -z "$VERSION" ]; then echo "ERROR: No version!"; exit 1; fi
          echo "Setting version to: ${VERSION}"
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" Cargo.toml
          find crates bin -name Cargo.toml -exec sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" {} +
          sed -i "s/version = \"0.0.0-dev\", package/version = \"${VERSION}\", package/" Cargo.toml
          cargo generate-lockfile
      - name: Build
        run: cargo build --release --package zlayer-zql
      - name: Package
        run: tar czf "zlayer-linux-amd64.tar.gz" -C $CARGO_TARGET_DIR/release zlayer
      - name: Upload artifact
        uses: actions/upload-artifact@v3
        with:
          name: zlayer-zql-linux-amd64
          path: zlayer-linux-amd64.tar.gz
          retention-days: 7

  # ===========================================
  # Build zlayer-zql-* container images
  # ===========================================
  build-images:
    name: Build ZQL Images
    needs: [resolve-version, build-binary]
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
        with:
          ref: zdb
      - name: Install buildah
        run: sudo apt-get update && sudo apt-get install -y buildah
      - name: Download zlayer binary
        uses: actions/download-artifact@v3
        with:
          name: zlayer-zql-linux-amd64
      - name: Install zlayer
        run: tar xzf zlayer-linux-amd64.tar.gz && chmod +x zlayer && sudo mv zlayer /usr/local/bin/
      - name: Set release version
        run: |
          VERSION="${{ needs.resolve-version.outputs.version || inputs.version }}"
          if [ -z "$VERSION" ]; then echo "ERROR: No version!"; exit 1; fi
          echo "Setting version to: ${VERSION}"
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" Cargo.toml
          find crates bin -name Cargo.toml -exec sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" {} +
          sed -i "s/version = \"0.0.0-dev\", package/version = \"${VERSION}\", package/" Cargo.toml
      - name: Inject Forgejo registry credentials for buildah containers
        run: |
          # When buildah copies the source into the container, cargo needs
          # credentials for the private forgejo registry. Append the token
          # to the existing [registries.forgejo] section in .cargo/config.toml.
          sed -i '/^\[registries\.forgejo\]/a token = "Bearer ${{ secrets.FORGEJO_ACTIONS_TOKEN }}"' .cargo/config.toml

      - name: Prepare zlayer binary for node image
        run: |
          mkdir -p target/release
          cp /usr/local/bin/zlayer target/release/zlayer

      - name: Build images with pipeline (zlayer-zql namespace)
        run: |
          sudo zlayer pipeline \
            -f ZPipeline.yaml \
            --no-tui \
            --set VERSION=${{ needs.resolve-version.outputs.version }} \
            --set REGISTRY=zlayer-zql

      - name: Export and upload OCI archives
        shell: bash
        run: |
          VERSION="${{ needs.resolve-version.outputs.version }}"
          AUTH="zachhandley:${{ secrets.FORGEJO_ACTIONS_TOKEN }}"
          PKG_URL="https://forge.blackleafdigital.com/api/packages/BlackLeafDigital/generic/zlayer-zql/${VERSION}"

          for img in zlayer-node zlayer-web zlayer-manager; do
            echo "Exporting ${img}..."
            sudo buildah push zlayer-zql/${img}:${VERSION} \
              oci-archive:zlayer-zql-${img}-oci.tar

            echo "Uploading zlayer-zql-${img}-oci.tar..."
            curl --fail --max-time 600 --connect-timeout 30 --retry 3 --retry-delay 10 \
              --user "$AUTH" \
              --upload-file "zlayer-zql-${img}-oci.tar" \
              "${PKG_URL}/zlayer-zql-${img}-oci.tar" && echo "OK"
          done

  # ===========================================
  # Publish crates to Forgejo Cargo registry
  # ===========================================
  publish-crates:
    name: Publish Crates (Forgejo)
    needs: [build-images]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: zdb
      - uses: https://forge.blackleafdigital.com/Public/actions/setup-rust@main
        with:
          registries: ${{ env.FORGEJO_REGISTRIES }}
      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler libseccomp-dev jq
      - name: Restore cache
        uses: https://forge.blackleafdigital.com/Public/actions/s3-cache@main
        with:
          mode: restore
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          path: ${{ env.CARGO_HOME }}/registry ${{ env.CARGO_HOME }}/git
          bucket: ${{ secrets.S3_BUCKET }}
          endpoint: https://${{ secrets.S3_ENDPOINT }}
          region: ${{ secrets.S3_REGION }}
          access-key: ${{ secrets.S3_ACCESS_KEY }}
          secret-key: ${{ secrets.S3_ACCESS_SECRET }}

      - name: Set release version
        run: |
          VERSION="${{ needs.resolve-version.outputs.version || inputs.version }}"
          if [ -z "$VERSION" ]; then echo "ERROR: No version!"; exit 1; fi
          echo "Setting version to: ${VERSION}"
          sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" Cargo.toml
          find crates bin -name Cargo.toml -exec sed -i "s/^version = \"0.0.0-dev\"/version = \"${VERSION}\"/" {} +
          sed -i "s/version = \"0.0.0-dev\", package/version = \"${VERSION}\", package/" Cargo.toml
          cargo generate-lockfile
      - name: Publish crates to Forgejo
        run: |
          # Topological publish order (leaves first, dependents after)
          CRATES="
            zlayer-spec-zql
            zlayer-observability-zql
            zlayer-init-actions-zql
            zlayer-storage-zql
            zlayer-registry-zql
            zlayer-tui-zql
            zlayer-secrets-zql
            zlayer-consensus-zql
            zlayer-tunnel-zql
            zlayer-core-zql
            zlayer-overlay-zql
            zlayer-builder-zql
            zlayer-scheduler-zql
          "

          for crate in $CRATES; do
            echo "Publishing $crate to Forgejo..."
            if cargo publish --registry forgejo -p "$crate" --allow-dirty; then
              echo "OK: $crate published"
            else
              echo "WARN: $crate may already exist or failed"
            fi
            sleep 10
          done
